/* ===================== MOTOR DE ALERTAS CLÍNICAS v1 (Etapa 27) =====================
   Read-only: computa al vuelo de respuestas_cuestionario + gestiones_contacto (últimos 30 días). SIN
   colecciones nuevas, SIN reglas nuevas, CERO escrituras (salvo la gestión ya existente al Marcar atendido).
   Doctrina + fuentes: [[Doctrina-Alertas-Clinicas]]. */

/* ===== UMBRALES CLÍNICOS — firma dirección médica =====
   Cambiar acá (un solo lugar) tras la firma. Estado/fuentes en la doctrina. */
const WHO5_AMARILLO = 52;       // OMS: score < 52 = bienestar bajo (fuente OMS, adoptado)
const WHO5_ROJO     = 28;       // PROPUESTA (literatura clínica) — PENDIENTE firma dirección médica; ajustable
const CAIDA_TENDENCIA = 10;     // caída ≥10 pts de WHO-5 vs. promedio propio (criterio operativo propio)
const SEMANAS_REGULARIDAD = 4;  // "regularidad baja" = ≤2 respuestas en las últimas 4 semanas

/* NEWS2 PARCIAL — fuente Royal College of Physicians — BORRADOR firma médica (Etapa 34, N3).
   Tabla SELLADA (4 de 6 parámetros). BORRADOR: disparar alerta SOLO tras firma de la dirección médica.
   SALVAGUARDA: parámetro faltante = DATO FALTANTE (subscore null), NO 0 → score PARCIAL, nunca un agregado
   bajo falsamente tranquilizador. Misma tabla que socio/index.html (instrumento sellado, duplicado a propósito). */
function news2FC(v){   if(v==null) return null; if(v<=40)return 3; if(v<=50)return 2; if(v<=90)return 0; if(v<=110)return 1; if(v<=130)return 2; return 3; }
function news2SIS(v){  if(v==null) return null; if(v<=90)return 3; if(v<=100)return 2; if(v<=110)return 1; if(v<=219)return 0; return 3; }
function news2TEMP(v){ if(v==null) return null; if(v<=35.0)return 3; if(v<=36.0)return 1; if(v<=38.0)return 0; if(v<=39.0)return 1; return 2; }
function news2SPO2(v){ if(v==null) return null; if(v<=91)return 3; if(v<=93)return 2; if(v<=95)return 1; return 0; }
function calcularNEWS2(fc, sis, temp, spo2){
  const s={ fc:news2FC(fc), sis:news2SIS(sis), temp:news2TEMP(temp), spo2:news2SPO2(spo2) };
  const pres=[s.fc,s.sis,s.temp,s.spo2].filter(x=>x!=null);
  const score=pres.reduce((a,b)=>a+b,0), parcial=pres.length<4, redScore=pres.some(x=>x===3);
  let nivel; if(score>=7)nivel='alto'; else if(score>=5)nivel='medio'; else if(redScore)nivel='bajo-medio'; else nivel='bajo';
  return { score, parcial, redScore, subscores:s, nivel };
}
const NEWS2_LBL={ fc:'FC', sis:'PA sist.', temp:'Temp', spo2:'SpO₂' };
const NEWS2_UNI={ fc:'lpm', sis:'mmHg', temp:'°C', spo2:'%' };

// fiebre: pregunta del ARMADOR cuyo texto matchee /fiebre/i respondida true. LÍMITE CONOCIDO: si renombran
// la pregunta y deja de matchear /fiebre/i, se pierde la detección (documentado en la doctrina).
function fiebreEn(r){ return (r.respuestas||[]).some(a=> /fiebre/i.test(a.texto||'') && (a.valor===true || a.valor==='si')); }
function alertaNivel(n){ return n==='roja'?{ico:'🔴',c:'#E5484D',lbl:'ROJA'}:n==='amarilla'?{ico:'🟡',c:'#E0A23B',lbl:'AMARILLA'}:{ico:'⚪',c:'#888',lbl:'SEGUIMIENTO'}; }
function alertaHace(t){ const ms=tms(t); if(ms==null) return '—'; const d=Math.floor((Date.now()-ms)/86400000); if(d<=0) return 'hoy'; if(d===1) return '1 día'; if(d<7) return d+' días'; const w=Math.floor(d/7); return w+(w===1?' semana':' semanas'); }

/* FUNCIÓN PURA. FUENTES: respuestas_cuestionario (N1) + reportes_sintomas (N2, Etapa 30). gestiones
   (gestiones_contacto) atiende AMBAS (doc id = respuestaId o reporteId). Una persona = UNA tarjeta con su
   nivel MÁS ALTO (motivos acumulados de todas sus fuentes). Fuente CON gestión = atendida → no dispara.
   Devuelve [{nivel,personaId,personaNombre,motivo,motivos,fuentes:[ids],respuestaId,primaria:{tipo,id},fecha}]. */
const RANK_ALERTA={ roja:3, amarilla:2, seguimiento:1 };
// Detalle del/los parámetro(s) crítico(s) (subscore 3) de un chequeo de parámetros, para el motivo ROJA.
function news2Critico(r){
  const sub=calcularNEWS2(r.fc,r.sis,r.temp,r.spo2).subscores; const crit=[];
  ['fc','sis','temp','spo2'].forEach(k=>{ if(sub[k]===3 && r[k]!=null) crit.push(NEWS2_LBL[k]+' '+r[k]+' '+NEWS2_UNI[k]); });
  return crit.join(', ');
}
function computarAlertas(respuestas, gestiones, reportes, parametros){
  const G = gestiones||{}, now = Date.now(), V30 = 30*86400000;
  const acc = {}; // pid -> tarjeta acumulada
  function bump(pid, nombre, nivel, motivos, fuentes, fecha, primaria){
    const a = acc[pid] || (acc[pid]={ personaId:pid, personaNombre:nombre||'—', nivel:null, motivos:[], fuentes:[], fecha:null, primaria:null });
    if(nombre && (a.personaNombre==='—')) a.personaNombre=nombre;
    if(nivel && (!a.nivel || RANK_ALERTA[nivel]>RANK_ALERTA[a.nivel])){ a.nivel=nivel; if(primaria) a.primaria=primaria; }
    if(!a.primaria && primaria) a.primaria=primaria;
    (motivos||[]).forEach(m=>a.motivos.push(m));
    (fuentes||[]).forEach(f=>{ if(f && a.fuentes.indexOf(f)===-1) a.fuentes.push(f); });
    const ms=tms(fecha); if(ms!=null && (a.fecha==null || ms>(tms(a.fecha)||0))) a.fecha=fecha;
  }

  // ── N1: respuestas_cuestionario (WHO-5 / contacto / fiebre / regularidad / caída) ──
  const byPer = {};
  (respuestas||[]).filter(r=>{ const ms=tms(r.creadoEn); return ms!=null && (now-ms)<=V30; })
    .forEach(r=>{ const pid=r.personaId||('resp:'+r.id); (byPer[pid]=byPer[pid]||[]).push(r); });
  Object.keys(byPer).forEach(pid=>{
    const arr = byPer[pid].slice().sort((a,b)=>(tms(b.creadoEn)||0)-(tms(a.creadoEn)||0));
    const latest = arr[0];
    if(G[latest.id]) return; // última respuesta atendida → no dispara
    const nombre = latest.personaNombre || '—';
    const score = (latest.who5 && typeof latest.who5.score==='number') ? latest.who5.score : null;
    const fiebre = fiebreEn(latest);
    const pedido = latest.pedidoContacto===true;
    const motivos=[]; let nivel=null;
    const rojo    = (score!=null && score<=WHO5_ROJO) || (pedido && ((score!=null && score<WHO5_ROJO) || fiebre));
    const amarillo= (score!=null && score<WHO5_AMARILLO) || pedido || fiebre;
    if(rojo) nivel='roja'; else if(amarillo) nivel='amarilla';
    if(score!=null && score<=WHO5_ROJO) motivos.push('WHO-5 '+score+' — bienestar muy bajo');
    else if(score!=null && score<WHO5_AMARILLO) motivos.push('WHO-5 '+score+' — bienestar bajo (OMS)');
    if(pedido) motivos.push('Pidió que lo contacten');
    if(fiebre) motivos.push('Reportó fiebre en el último chequeo');
    const scores = arr.map(r=>(r.who5 && typeof r.who5.score==='number')?r.who5.score:null).filter(v=>v!=null);
    const enVentana = arr.filter(r=>{ const ms=tms(r.creadoEn); return ms!=null && (now-ms) <= SEMANAS_REGULARIDAD*7*86400000; }).length;
    if(arr.length>=1 && enVentana<=2){ motivos.push('Regularidad baja ('+enVentana+' en '+SEMANAS_REGULARIDAD+' semanas)'); nivel=nivel||'seguimiento'; }
    if(scores.length>=3){
      const prom = scores.reduce((a,b)=>a+b,0)/scores.length;
      const ult = (score!=null)?score:scores[0];
      if((prom-ult) >= CAIDA_TENDENCIA){ motivos.push('Caída de bienestar (WHO-5 '+ult+' vs. promedio '+Math.round(prom)+')'); nivel=nivel||'seguimiento'; }
    }
    if(nivel) bump(pid, nombre, nivel, motivos, [latest.id], latest.creadoEn, {tipo:'respuesta', id:latest.id});
  });

  // ── N2: reportes_sintomas (Etapa 30) — declarativo, dispara por el QUÉ ──
  const repByPer = {};
  (reportes||[]).filter(r=>{ const ms=tms(r.creadoEn); return ms!=null && (now-ms)<=V30; })
    .forEach(r=>{ const pid=r.personaId||('rep:'+r.id); (repByPer[pid]=repByPer[pid]||[]).push(r); });
  Object.keys(repByPer).forEach(pid=>{
    const arr = repByPer[pid].slice().sort((a,b)=>(tms(b.creadoEn)||0)-(tms(a.creadoEn)||0));
    const sinGestion = arr.filter(r=>!G[r.id]);
    if(!sinGestion.length) return; // todos los reportes atendidos → no dispara
    const conBandera = sinGestion.filter(r=>r.tieneBanderaRoja===true);
    const nombre = arr[0].personaNombre || '—';
    let nivel, motivos=[], primaria;
    if(conBandera.length){
      nivel='roja';
      const rb=conBandera[0];
      const nombres=(rb.sintomas||[]).filter(s=>s.banderaRoja).map(s=>s.nombre).filter(Boolean);
      motivos.push('Reportó: '+(nombres.join(', ')||'síntoma de bandera roja'));
      primaria={tipo:'reporte', id:rb.id};
    }else{
      nivel='amarilla';
      motivos.push('Reportó síntomas');
      primaria={tipo:'reporte', id:sinGestion[0].id};
    }
    bump(pid, nombre, nivel, motivos, sinGestion.map(r=>r.id), arr[0].creadoEn, primaria);
  });

  // ── N3: chequeos_parametros (Etapa 34) — NEWS2 parcial, dispara por el score/redScore ──
  const parByPer = {};
  (parametros||[]).filter(r=>{ const ms=tms(r.creadoEn); return ms!=null && (now-ms)<=V30; })
    .forEach(r=>{ const pid=r.personaId||('par:'+r.id); (parByPer[pid]=parByPer[pid]||[]).push(r); });
  Object.keys(parByPer).forEach(pid=>{
    const arr = parByPer[pid].slice().sort((a,b)=>(tms(b.creadoEn)||0)-(tms(a.creadoEn)||0));
    const sinGestion = arr.filter(r=>!G[r.id]);
    if(!sinGestion.length) return; // todos atendidos → no dispara
    const latest = sinGestion[0];
    const nn = latest.news2Nivel, red = latest.news2RedScore===true;
    // BORRADOR pendiente firma médica. SEGURIDAD: redScore (un parámetro en 3) → ROJA (un signo crítico
    // aislado no baja a amarilla). 'bajo-medio' implica redScore → cae en roja (la contradicción del spec
    // "bajo-medio→amarilla suave" vs "redScore→roja" se resolvió por seguridad; a decidir por la dirección médica).
    let nivel=null;
    if(nn==='alto' || red) nivel='roja';
    else if(nn==='medio') nivel='amarilla';
    else if(nn==='bajo-medio') nivel='amarilla';
    if(!nivel) return; // 'bajo' → nada
    const nombre = latest.personaNombre || '—';
    const crit = news2Critico(latest);
    const motivo = 'NEWS2 '+(latest.news2Score!=null?latest.news2Score:'?')+(latest.news2Parcial?' (parcial)':'')+((nivel==='roja'&&crit)?(' — '+crit):'');
    bump(pid, nombre, nivel, [motivo], sinGestion.map(r=>r.id), latest.creadoEn, {tipo:'parametro', id:latest.id});
  });

  const out = Object.keys(acc).map(pid=>{ const a=acc[pid]; a.motivo=a.motivos.join(' · '); a.respuestaId=(a.primaria&&a.primaria.id)||a.fuentes[0]||''; return a; });
  out.sort((a,b)=> (RANK_ALERTA[b.nivel]-RANK_ALERTA[a.nivel]) || ((tms(b.fecha)||0)-(tms(a.fecha)||0)) );
  return out;
}

// Detalle de la respuesta origen (reusado por Respuestas y por Alertas): respuestas + WHO-5 + contacto/gestión.
// Línea de contacto para el llamado (teléfono denormalizado, Etapa 31). Compartida por respuestas y reportes.
function monTelLine(r){
  const t=(r&&r.personaTelefono||'').trim();
  return t
    ? `<div style="margin-bottom:.35rem"><a href="tel:${esc(t)}" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:700;color:var(--r);text-decoration:none">📞 ${esc(t)}</a></div>`
    : `<div style="margin-bottom:.35rem;font-size:.74rem;color:var(--ink3)">Sin teléfono registrado</div>`;
}
function monOrigenHtml(r, gest){
  const g=(gest||{})[r.id];
  const respHtml=(r.respuestas||[]).length? (r.respuestas||[]).map(a=>`<div style="display:flex;justify-content:space-between;gap:1rem;padding:.26rem 0"><span style="font-size:.78rem;color:var(--ink2)">${esc(a.texto||a.preguntaId||'—')}</span><span style="font-size:.82rem;font-weight:700;text-align:right;white-space:nowrap">${esc(monValorLbl(a))}</span></div>`).join('') : `<div style="font-size:.76rem;color:var(--ink3)">Sin preguntas del armador.</div>`;
  const who5D = (r.who5 && typeof r.who5.score==='number')
    ? `<div style="margin-top:.4rem;font-size:.76rem"><b>WHO-5 (OMS):</b> score <b>${r.who5.score}</b>/100 · raw ${r.who5.raw}/25 · valores [${(r.who5.valores||[]).join(', ')}]${r.who5.score<WHO5_UMBRAL?' · <span style="color:var(--r);font-weight:700">bienestar bajo (OMS)</span>':''}</div>` : '';
  let contD='';
  if(r.pedidoContacto){
    const motivo=r.motivoContacto?`<div style="font-size:.76rem;color:var(--ink2);margin-top:.25rem">Motivo: “${esc(r.motivoContacto)}”</div>`:'';
    contD = g
      ? `<div style="margin-top:.5rem;background:#eef7f1;border:1px solid #cfe8db;border-radius:8px;padding:.5rem .6rem"><div style="font-size:.78rem;font-weight:700;color:var(--g,#1D9E75)">✓ Contacto atendido</div><div style="font-size:.72rem;color:var(--ink2)">por ${esc(g.atendidoPorNombre||g.atendidoPor||'—')} · ${monRespFmt(g.atendidoEn)}</div>${motivo}</div>`
      : `<div style="margin-top:.5rem;background:#fff0ee;border:1px solid #f3c9c4;border-radius:8px;padding:.5rem .6rem"><div style="font-size:.78rem;font-weight:700;color:var(--r)">📞 Pidió que lo contacten</div>${motivo}<button class="btn-r" style="width:auto;padding:.35rem .75rem;margin-top:.5rem" onclick="event.stopPropagation();monMarcarAtendido('${r.id}')">Marcar atendido</button></div>`;
  }
  return monTelLine(r)+respHtml+who5D+contD;
}

// Detalle de un reporte de síntomas (N2) origen, para el expand de Alertas.
function monReporteById(id){ return (S.mon.reportes||[]).find(r=>r.id===id); }
function monReporteHtml(rep, gest){
  const g=(gest||{})[rep.id];
  const sint=(rep.sintomas||[]).length? (rep.sintomas||[]).map(s=>`<span style="display:inline-block;background:${s.banderaRoja?'#fdecec':'#eef2f6'};color:${s.banderaRoja?'#B01000':'var(--ink2)'};font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:6px;margin:.1rem .2rem .1rem 0">${s.banderaRoja?'🚩 ':''}${esc(s.nombre||'—')}</span>`).join('') : '<span style="font-size:.74rem;color:var(--ink3)">Sin síntomas del catálogo.</span>';
  const txt=rep.texto?`<div style="font-size:.76rem;color:var(--ink2);margin-top:.4rem">“${esc(rep.texto)}”</div>`:'';
  const gDiv = g
    ? `<div style="margin-top:.5rem;background:#eef7f1;border:1px solid #cfe8db;border-radius:8px;padding:.5rem .6rem"><div style="font-size:.78rem;font-weight:700;color:var(--g,#1D9E75)">✓ Atendido</div><div style="font-size:.72rem;color:var(--ink2)">por ${esc(g.atendidoPorNombre||g.atendidoPor||'—')} · ${monRespFmt(g.atendidoEn)}</div></div>`
    : `<div style="margin-top:.5rem"><button class="btn-r" style="width:auto;padding:.35rem .75rem" onclick="event.stopPropagation();monMarcarAtendido('${rep.id}')">Marcar atendido</button></div>`;
  return `<div style="margin-top:.2rem">${monTelLine(rep)}<div style="font-size:.72rem;color:var(--ink3);font-weight:700;margin-bottom:.3rem">Auto-reporte de síntomas${rep.tieneBanderaRoja?' · <span style="color:var(--r)">🚩 bandera roja</span>':''}</div>${sint}${txt}${gDiv}</div>`;
}
// Detalle de un chequeo de parámetros (N3) origen: score NEWS2, si es parcial, subscores + valores crudos,
// teléfono. El médico ve el score real (el afiliado NUNCA). Recomputa subscores de los valores guardados.
function monParametroById(id){ return (S.mon.parametros||[]).find(r=>r.id===id); }
function monParametroHtml(p, gest){
  const g=(gest||{})[p.id];
  const n2=calcularNEWS2(p.fc,p.sis,p.temp,p.spo2);
  const filas=['fc','sis','temp','spo2'].map(k=>{
    const val=p[k], sub=n2.subscores[k];
    const raw = (val==null) ? '<span style="color:var(--ink3)">no medido</span>' : (esc(val)+' '+NEWS2_UNI[k]);
    const scChip = (sub==null) ? '' : `<span style="display:inline-block;min-width:16px;text-align:center;background:${sub===3?'#E5484D':sub===2?'#E0A23B':sub===1?'#F5C542':'#cfe8db'};color:${sub>=2?'#fff':'#333'};font-size:.62rem;font-weight:800;padding:.05rem .35rem;border-radius:5px">${sub}</span>`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.22rem 0"><span style="font-size:.76rem;color:var(--ink2)">${NEWS2_LBL[k]}</span><span style="font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:.4rem">${raw} ${scChip}</span></div>`;
  }).join('');
  const nivelColor = (n2.nivel==='alto'||n2.redScore)?'var(--r)':(n2.nivel==='medio'||n2.nivel==='bajo-medio')?'#E0A23B':'var(--g,#1D9E75)';
  const head=`<div style="font-size:.82rem"><b>NEWS2:</b> <b style="color:${nivelColor}">${p.news2Score!=null?p.news2Score:n2.score}</b>${p.news2Parcial||n2.parcial?' <span style="color:var(--o,#E0A23B);font-weight:700">(PARCIAL — faltan parámetros)</span>':''} · nivel ${esc(p.news2Nivel||n2.nivel)}${(p.news2RedScore||n2.redScore)?' · <span style="color:var(--r);font-weight:700">RED SCORE</span>':''}</div>`;
  const gDiv = g
    ? `<div style="margin-top:.5rem;background:#eef7f1;border:1px solid #cfe8db;border-radius:8px;padding:.5rem .6rem"><div style="font-size:.78rem;font-weight:700;color:var(--g,#1D9E75)">✓ Atendido</div><div style="font-size:.72rem;color:var(--ink2)">por ${esc(g.atendidoPorNombre||g.atendidoPor||'—')} · ${monRespFmt(g.atendidoEn)}</div></div>`
    : `<div style="margin-top:.5rem"><button class="btn-r" style="width:auto;padding:.35rem .75rem" onclick="event.stopPropagation();monMarcarAtendido('${p.id}')">Marcar atendido</button></div>`;
  return `<div style="margin-top:.2rem">${monTelLine(p)}<div style="font-size:.72rem;color:var(--ink3);font-weight:700;margin-bottom:.3rem">Chequeo de parámetros (NEWS2 parcial · BORRADOR)</div>${head}<div style="margin-top:.35rem;border-top:1px dashed var(--border);padding-top:.3rem">${filas}</div>${gDiv}</div>`;
}
// Atiende TODAS las fuentes sin gestión de una tarjeta (crea una gestión por cada respuesta/reporte/chequeo).
function monAtenderAlerta(fuentesCsv){ String(fuentesCsv||'').split(',').filter(Boolean).forEach(id=>monMarcarAtendido(id)); }

/* ---- MONITOREO → Alertas (sub-sección) ---- */
function monAlertaFiltro(n){ if(S.mon){ S.mon.aFiltro=n; } render(); }
function monRespById(id){ return (S.mon.resp||[]).find(r=>r.id===id); }
function monAlertasView(){
  if(S.mon.respErr) return `<div class="card">No se pudieron cargar las respuestas: ${esc(S.mon.respErr)}</div>`;
  if(S.mon.resp===null) return `<div class="card">Cargando alertas…</div>`;
  const al=computarAlertas(S.mon.resp, S.mon.gest||{}, S.mon.reportes||[], S.mon.parametros||[]);
  const nR=al.filter(a=>a.nivel==='roja').length, nA=al.filter(a=>a.nivel==='amarilla').length, nS=al.filter(a=>a.nivel==='seguimiento').length;
  const filtro=S.mon.aFiltro||'todas';
  const fb=(id,lbl)=>`<button class="btn-o" style="width:auto;padding:.3rem .6rem;${filtro===id?'border-color:var(--r);color:var(--r);font-weight:700':''}" onclick="monAlertaFiltro('${id}')">${lbl}</button>`;
  const vis=al.filter(a=>filtro==='todas'||a.nivel===filtro);
  const rows=vis.length? vis.map(a=>{
    const m=alertaNivel(a.nivel);
    const exp=!!(S.mon.aExp&&S.mon.aExp[a.respuestaId]);
    // detalle del origen según tipo de fuente primaria (respuesta N1 o reporte de síntomas N2)
    let det='';
    if(exp){
      let inner='';
      if(a.primaria && a.primaria.tipo==='reporte'){ const rep=monReporteById(a.primaria.id); if(rep) inner=monReporteHtml(rep,S.mon.gest||{}); }
      else if(a.primaria && a.primaria.tipo==='parametro'){ const pp=monParametroById(a.primaria.id); if(pp) inner=monParametroHtml(pp,S.mon.gest||{}); }
      else { const r=monRespById(a.respuestaId); if(r) inner=monOrigenHtml(r,S.mon.gest||{}); }
      const atender=(a.fuentes&&a.fuentes.length>1)?`<div style="margin-top:.5rem"><button class="btn-r" style="width:auto;padding:.35rem .75rem" onclick="event.stopPropagation();monAtenderAlerta('${a.fuentes.join(',')}')">Marcar atendido (${a.fuentes.length} fuentes)</button></div>`:'';
      det=`<div style="width:100%;margin-top:.5rem;border-top:1px solid var(--border);padding-top:.4rem">${inner}${atender}</div>`;
    }
    return `<div class="lr" style="flex-wrap:wrap;cursor:pointer;border-left:4px solid ${m.c}" onclick="monAlertaToggle('${a.respuestaId}')"><div class="lrb" style="flex:1 1 100%"><div class="lrn">${m.ico} ${esc(a.personaNombre)} <span style="font-size:.6rem;font-weight:800;color:${m.c}">${m.lbl}</span></div><div class="lrs">${esc(a.motivo)} · hace ${alertaHace(a.fecha)} · ${exp?'▲ ocultar':'▼ detalle'}</div></div>${det}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin alertas${filtro!=='todas'?' de ese nivel':''}.</div>`;
  const cont=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem"><span style="font-weight:700">Alertas clínicas</span><span style="margin-left:auto;font-size:.85rem;font-weight:700">🔴 ${nR} · 🟡 ${nA} · ⚪ ${nS}</span></div>`;
  const cero=!al.length?`<div style="font-size:.82rem;color:var(--g,#1D9E75);font-weight:700;margin-bottom:.5rem">Sin alertas clínicas ✓</div>`:'';
  return `${cont}${cero}<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem">${fb('todas','Todas')}${fb('roja','🔴 Rojas')}${fb('amarilla','🟡 Amarillas')}${fb('seguimiento','⚪ Seguimiento')}</div>
    <div style="font-size:.66rem;color:var(--ink3);margin-bottom:.5rem">Computadas al vuelo (read-only) de los últimos 30 días. "Marcar atendido" crea la gestión y apaga la alerta. Umbrales: WHO-5 &lt;52 ámbar / ≤28 rojo (propuesta, pendiente firma médica).</div>
    <div class="card">${rows}</div>`;
}
function monAlertaToggle(id){ if(!S.mon)return; if(!S.mon.aExp)S.mon.aExp={}; S.mon.aExp[id]=!S.mon.aExp[id]; render(); }

// Bloque de alertas para el Dashboard del superadmin (compacto, arriba del mapa).
function alertasBloqueDash(resp, gest, reportes, parametros){
  if(resp==null || gest==null || reportes==null || parametros==null) return `<div class="card" style="margin-bottom:.7rem"><div style="font-weight:800;margin-bottom:.3rem">Alertas clínicas</div><div style="font-size:.78rem;color:var(--ink3)">Cargando…</div></div>`;
  const al=computarAlertas(resp, gest, reportes, parametros);
  const nR=al.filter(a=>a.nivel==='roja').length, nA=al.filter(a=>a.nivel==='amarilla').length, nS=al.filter(a=>a.nivel==='seguimiento').length;
  const head=`<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem"><div style="font-weight:800">Alertas clínicas</div><span style="margin-left:auto;font-size:.82rem;font-weight:700">🔴 ${nR} · 🟡 ${nA} · ⚪ ${nS}</span></div>`;
  if(!al.length) return `<div class="card" style="margin-bottom:.7rem;border-left:4px solid #1D9E75">${head}<div style="font-size:.82rem;color:#1D9E75;font-weight:700">Sin alertas clínicas ✓</div></div>`;
  const rows=al.map(a=>{
    const m=alertaNivel(a.nivel);

async function monSintMover(id,dir){
  if(!puede('clinico'))return; monErr('');

  if(i<0||j<0||j>=all.length) return;

/* ===================== GEO — demanda por barrio (v2 de Estadísticas) =====================
   normalizarDireccion(): portado READ-ONLY de geocode-padron.js (proyecto Maiztegui/TUGO) — SOLO la
   lógica de normalización (prefijos, abreviaturas, sufijos, parse calle+altura). Cero datos copiados.
   GeoJSON de 58 barrios (cartografía municipal, Ord. 8850/18) en app/barrios-pergamino.geojson.
   Point-in-polygon con Turf.js (CDN), geocoding con Nominatim público (1 req/seg en el batch), mapa
   Leaflet+CartoDB (CDN). Todo lazy-load. La resolución del episodio es fire-and-forget (nunca bloquea). */
function geoStripAccents(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function geoNormStreet(raw){
  let s=geoStripAccents(raw).toUpperCase().trim();
  s=s.replace(/N\xc2\xba/gi,'').replace(/\xc2\xba/gi,'').replace(/N°/g,'').replace(/Nº/g,'');
  s=s.replace(/^(AVDA\.?|AVENIDA|AV\.?|CALLE|C\.?\s|BV\.?|BVAR\.?|BOULEVARD|DR\.?|GRAL\.?|PJE\.?|PASAJE|DIAG\.?|INT\.?|PRES\.?|CNEL\.?|CAP\.?|SGT\.?|TTE\.?|MONSEOR|MONSENOR)\s*/i,'');
  s=s.replace(/^STA\.\s?/i,'SANTA ').replace(/^STO\.\s?/i,'SANTO ').replace(/^M\.\s/i,'MARIANO ').replace(/^BME\.\s?/i,'BARTOLOME ').replace(/^J\s?J\s/i,'JUAN JOSE ').replace(/^J\s?A\s/i,'JOSE A ');
  return s.replace(/\s+/g,' ').trim();
}
function normalizarDireccion(dom){
  if(!dom) return { calle:null, altura:null, isRural:true };
  let d=geoStripAccents(dom).trim().toUpperCase();
  if(/^RUTA\b/.test(d)||/ZONA RURAL/i.test(d)||/^ESTANCIA\b/.test(d)||/^CHACRA\b/.test(d)) return { calle:null, altura:null, isRural:true };
  d=d.replace(/\s+B[°OºA]\.?\s*\S+.*$/i,'').replace(/\s+DPTO.*$/i,'').replace(/\s+UF\s.*$/i,'').replace(/\s+S\/N.*$/i,'').replace(/\s+-T\d+.*$/i,'').replace(/\s+TIRA\s.*$/i,'');
  let m=d.match(/^(.+?)\s+(\d{1,5})\s*[-/]?\s*$/);
  if(m){ const calle=geoNormStreet(m[1]), altura=parseInt(m[2],10); if(calle&&altura>0&&altura<20000) return {calle,altura,isRural:false}; }
  m=d.match(/^(.+?)\s+(\d{1,5})\b/);
  if(m){ const calle=geoNormStreet(m[1]), altura=parseInt(m[2],10); if(calle&&altura>0&&altura<20000) return {calle,altura,isRural:false}; }
  const calle=geoNormStreet(d);
  return { calle:calle||null, altura:null, isRural:!calle };
}
/* ---- Lazy-load de librerías (CDN) + assets ---- */
/* Cache de promesas de carga por src: las llamadas concurrentes (p.ej. bind() disparado por
   renders en ráfaga del onSnapshot) esperan LA MISMA promesa, que resuelve recién en el onload
   real. Antes se deduplicaba por el <script> ya presente en el DOM y se resolvía al toque aunque
   el script no hubiera terminado de cargar → window.L quedaba undefined → "reading 'map'" (race). */
const _geoScriptP={};
function geoLoadScript(src){ if(_geoScriptP[src]) return _geoScriptP[src]; _geoScriptP[src]=new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.setAttribute('data-geo',src); s.onload=()=>res(); s.onerror=()=>{ _geoScriptP[src]=null; rej(new Error('no cargó '+src)); }; document.head.appendChild(s); }); return _geoScriptP[src]; }
function geoLoadCss(href){ if(document.querySelector('link[data-geo="'+href+'"]')) return; const l=document.createElement('link'); l.rel='stylesheet'; l.href=href; l.setAttribute('data-geo',href); document.head.appendChild(l); }
async function geoEnsureTurf(){ if(!window.turf) await geoLoadScript('https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js'); return window.turf; }
async function geoEnsureLeaflet(){ geoLoadCss('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'); if(!window.L) await geoLoadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'); return window.L; }
async function geoBarrios(){ if(S.geoBarrios) return S.geoBarrios; const r=await fetch('barrios-pergamino.geojson'); if(!r.ok) throw new Error('no se pudo cargar el GeoJSON de barrios'); S.geoBarrios=await r.json(); return S.geoBarrios; }
/* ---- Resolución de coordenada -> barrio (point-in-polygon) y dirección -> coordenada (Nominatim) ---- */
const GEO_CENTRO=[-60.5736,-33.8894]; // lon,lat aprox del centro de Pergamino
function geoDistKm(lon1,lat1,lon2,lat2){ const R=6371,toR=x=>x*Math.PI/180; const dLat=toR(lat2-lat1),dLon=toR(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(a)); }
async function geoBarrioDeCoord(lon,lat){ const turf=await geoEnsureTurf(); const g=await geoBarrios(); const pt=turf.point([lon,lat]); for(const f of g.features){ try{ if(turf.booleanPointInPolygon(pt,f)) return f.properties.nombre; }catch(_){} } return null; }
async function geoNominatim(calle,altura){
  const street=encodeURIComponent((altura?altura+' ':'')+calle);
  const url='https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=1&country=Argentina&city=Pergamino&street='+street;
  const r=await fetch(url,{headers:{'Accept':'application/json'}}); // UA no seteable en browser; Referer/Origin identifica
  if(!r.ok) throw new Error('nominatim '+r.status);
  const a=await r.json(); if(!a.length) return null;
  const hit=a[0]; return { lat:parseFloat(hit.lat), lon:parseFloat(hit.lon), exact: !!(altura && hit.address && hit.address.house_number) };
}
/* Prioridad: 1) arribo GPS (Fase A) 2) domicilio->Nominatim 3) sin_ubicar. Devuelve {barrio, geoPrecision,
   geoLat, geoLng} — las coords son las del PUNTO usado para resolver el barrio (Etapa 25: se persisten
   para pintar el mapa; antes solo se guardaba el barrio). */
async function geoResolverEpisodio(ep){
  const aLat=ep.arribo&&ep.arribo.lat, aLon=ep.arribo&&ep.arribo.long;
  if(aLat!=null && aLon!=null){ const b=await geoBarrioDeCoord(aLon,aLat); if(b) return { barrio:b, geoPrecision:'gps_arribo', geoLat:aLat, geoLng:aLon }; }
  const nd=normalizarDireccion(ep.domicilio||'');
  if(nd.calle){
    try{
      const hit=await geoNominatim(nd.calle,nd.altura);
      if(hit){
        const dist=geoDistKm(GEO_CENTRO[0],GEO_CENTRO[1],hit.lon,hit.lat);
        if(dist<=5){ const b=await geoBarrioDeCoord(hit.lon,hit.lat); if(b) return { barrio:b, geoPrecision: hit.exact?'geo_exacto':'geo_aprox', geoLat:hit.lat, geoLng:hit.lon }; }
      }
    }catch(_){}
  }
  return { barrio:null, geoPrecision:'sin_ubicar', geoLat:null, geoLng:null };
}
// Fire-and-forget: NUNCA en el camino crítico del despacho. Si falla (permiso/red/geocode), barrio queda null → lo levanta el batch.
function geoResolverYGuardar(epId, ep){
  (async()=>{ try{ const res=await geoResolverEpisodio(ep); await db.collection('episodios').doc(epId).set({ barrio:res.barrio, geoPrecision:res.geoPrecision, geoLat:res.geoLat, geoLng:res.geoLng, geoResueltoEn:FV() },{merge:true}); }catch(_){} })();
}
/* Batch: barre episodios pendientes, resuelve con prioridad arribo, 1 req/seg contra Nominatim.
   Idempotente: salta los que YA tienen barrio + coords. RETRO-COMPLETA (Etapa 25) los que tienen barrio
   pero les faltan geoLat/geoLng (resueltos por la E22, que no guardaba coords): re-resuelve para persistir
   el punto (arribo = gratis; geocodificados = re-consulta a 1 req/s). */
async function geocodificarPendientes(){
  if(!puedeConfig() || !S.est) return;
  S.est.geoBusy=true; S.est.geoReport=''; render();
  const rep={ gps_arribo:0, geo_exacto:0, geo_aprox:0, sin_ubicar:0, retro:0, saltados:0, errores:0 };
  try{
    const snap=await db.collection('episodios').get();
    for(const doc of snap.docs){
      const ep={id:doc.id,...doc.data()};
      const tieneCoords = ep.geoLat!=null && ep.geoLng!=null;
      if(ep.barrio && tieneCoords){ rep.saltados++; continue; } // ya resuelto por completo (barrio + coords)
      const hasArribo=ep.arribo&&ep.arribo.lat!=null&&ep.arribo.long!=null;
      if(!hasArribo && !(ep.domicilio||'').trim()){ rep.saltados++; continue; } // sin dato para resolver
      const esRetro = !!ep.barrio && !tieneCoords; // tiene barrio (E22) pero le faltan coords → retro-completar
      try{
        if(!hasArribo) await new Promise(r=>setTimeout(r,1100)); // rate-limit Nominatim: 1 req/seg
        const res=await geoResolverEpisodio(ep);
        await db.collection('episodios').doc(ep.id).set({ barrio:res.barrio, geoPrecision:res.geoPrecision, geoLat:res.geoLat, geoLng:res.geoLng, geoResueltoEn:FV() },{merge:true});
        if(esRetro) rep.retro++; else rep[res.geoPrecision]=(rep[res.geoPrecision]||0)+1;
      }catch(e){ rep.errores++; }
    }
    S.est.geoReport='Resueltos — GPS arribo: '+rep.gps_arribo+' · exacto: '+rep.geo_exacto+' · aprox: '+rep.geo_aprox+' · sin ubicar: '+rep.sin_ubicar+' · retro-completados (coords): '+rep.retro+' · saltados (ya con barrio+coords/sin dato): '+rep.saltados+(rep.errores?(' · errores: '+rep.errores):'');
    S.est.geoBusy=false; render();
  }catch(e){ S.est.geoBusy=false; S.est.geoReport='No se pudo geocodificar: '+(e.message||e); render(); }
}
/* Mapa Leaflet choropleth (on-demand, lazy). Pinta los 58 polígonos por cantidad de llamadas del período. */
async function geoDibujarMapa(){
  const cont=document.getElementById('geo-mapa'); if(!cont || !S.est) return;
  S.est.mapaOn=true; // una vez dibujado, bind() lo redibuja tras cada render (presets/toggle)
  if(!S.geoMap) cont.innerHTML='<div style="padding:1rem;font-size:.8rem;color:var(--ink3)">Cargando mapa…</div>';
  try{
    const L=await geoEnsureLeaflet(); const g=await geoBarrios();
    if(!document.body.contains(cont)) return; // el DOM cambió mientras cargaba
    const demanda=(S.est.data&&S.est.data.demanda)||{};
    if(S.geoMap){ try{S.geoMap.remove();}catch(_){} S.geoMap=null; }
    cont.innerHTML='';
    const map=L.map(cont).setView([GEO_CENTRO[1],GEO_CENTRO[0]],13); S.geoMap=map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
    const vals=Object.keys(demanda).map(k=>demanda[k]); const max=vals.length?Math.max.apply(null,vals):0;
    const color=n=>{ if(!n) return '#e8e4dc'; const t=max?n/max:0; return t>0.66?'#DC1400':t>0.33?'#F07800':'#F5C542'; };
    L.geoJSON(g,{ style:f=>({color:'#888',weight:1,fillColor:color(demanda[f.properties.nombre]||0),fillOpacity:.6}),
      onEachFeature:(f,layer)=>{ layer.bindTooltip(f.properties.nombre+': '+(demanda[f.properties.nombre]||0),{sticky:true}); } }).addTo(map);
    // Etapa 25 — VER PUNTOS: superpone los episodios del rango como circleMarkers chicos por código.
    if(S.est.geoPuntos){
      (S.est.data&&S.est.data.eps||[]).filter(e=>e.geoLat!=null&&e.geoLng!=null).forEach(e=>{
        L.circleMarker([e.geoLat,e.geoLng],{ radius:4, color:'#333', weight:1, fillColor:mapaCodColor(e.codigoPresuntivo), fillOpacity:.9 })
          .bindTooltip(`${mapaIncLbl(e)} · ${estDia(e)} · ${esc(e.barrio||'sin ubicar')}`,{sticky:true}).addTo(map);
      });
    }
    mapaAgregarBase(L, map); // base de ambulancias (marcador fijo, siempre visible)
    setTimeout(()=>{ try{map.invalidateSize();}catch(_){}} ,120);
  }catch(e){ cont.innerHTML='<div style="padding:1rem;font-size:.8rem;color:var(--r)">No se pudo dibujar el mapa: '+esc(e.message||e)+'</div>'; }
}
/* Presets de rango (recomputan) + toggle de puntos (redibuja vía bind si el mapa está activo). */
function estPreset(tipo){ if(!S.est) return; S.est.desde = (tipo==='hoy')?estHoyStr():estHaceStr(tipo==='7'?7:30); S.est.hasta=estHoyStr(); estActualizar(); }
function estTogglePuntos(on){ if(S.est){ S.est.geoPuntos=!!on; } render(); }

/* ===================== MAPA EN VIVO (Etapa 25) — episodios activos como puntos por código =====================
   Se dibuja en la bandeja del despachante y en el dashboard del superadmin, colgado de la MISMA data que ya
   alimenta cada vista (S.bandeja.items / S.dash.eps) — NO crea una segunda suscripción. bind() lo redibuja
   tras cada render (el dashboard re-renderiza en cada snapshot). Pan/zoom persistidos en S.mapaVivoView. */

function mapaCodColor(c){ return MAPA_CODCOLOR[c]||'#888'; }

function mapaVivoActivos(eps){ return (eps||[]).filter(e=>FLUJO.includes(e.estado) && e.geoLat!=null && e.geoLng!=null); }

async function mapaVivoDibujar(eps){
  const cont=document.getElementById('mapa-vivo'); if(!cont) return;
  try{
    const L=await geoEnsureLeaflet(); const g=await geoBarrios();
    if(!document.body.contains(cont)) return; // el DOM cambió mientras cargaba Leaflet
    if(S.mapaVivo){ try{ S.mapaVivo.remove(); }catch(_){} S.mapaVivo=null; }
    cont.innerHTML='';
    const v=S.mapaVivoView||{lat:GEO_CENTRO[1],lng:GEO_CENTRO[0],zoom:13};
    const map=L.map(cont).setView([v.lat,v.lng],v.zoom); S.mapaVivo=map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
    L.geoJSON(g,{ style:()=>({color:'#bbb',weight:1,fill:false}) }).addTo(map); // barrios de contexto (trazo suave, sin choropleth)
    mapaVivoActivos(eps).forEach(e=>{

        .addTo(map);

    map.on('moveend zoomend',()=>{ const c=map.getCenter(); S.mapaVivoView={lat:c.lat,lng:c.lng,zoom:map.getZoom()}; }); // persiste pan/zoom entre redibujos
    setTimeout(()=>{ try{map.invalidateSize();}catch(_){}} ,120);
  }catch(e){ cont.innerHTML='<div style="padding:1rem;font-size:.8rem;color:var(--r)">No se pudo dibujar el mapa: '+esc(e.message||e)+'</div>'; }

// Paso 1: mostrar el DIFF y pedir confirmación in-page (NO window.confirm). No escribe todavía.
function spGuardarPermisos(uid){
  const e=document.getElementById('sp-err-perm');
  const msg=(t,ok)=>{ if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color=ok?'var(--g,#1D9E75)':'var(--r)'; } };
  msg('');
  if(uid===S.user.uid){ msg('No podés configurar tus propios permisos.'); return; } // anti-lockout (UI; reglas también)
  const LBL=Object.fromEntries(CAPS);
  const u=((S.sp&&S.sp.users)||[]).find(x=>x.uid===uid); const actual=(u&&u.permisos)||{};
  const activar=[], desactivar=[];
  document.querySelectorAll('.sp-cap').forEach(c=>{ const k=c.dataset.cap, era=actual[k]===true;
    if(c.checked && !era) activar.push(LBL[k]||k);
    if(!c.checked && era) desactivar.push(LBL[k]||k); });
  const cont=document.getElementById('sp-confirm'); if(!cont) return;
  if(!activar.length && !desactivar.length){ msg('No hay cambios para guardar.'); cont.innerHTML=''; return; }
  const linea=(t,arr,color)=>arr.length?`<div style="font-size:.74rem;color:${color}"><b>${t}:</b> ${arr.map(esc).join(', ')}</div>`:'';
  cont.innerHTML=`<div style="border:1.5px solid var(--border2);border-radius:10px;padding:.6rem;background:var(--bg)">
    <div style="font-size:.72rem;color:var(--ink2);margin-bottom:.35rem">Vas a cambiar los permisos de <b>${esc((u&&u.email)||uid)}</b>:</div>
    ${linea('Activar', activar, 'var(--g,#1D9E75)')}${linea('Desactivar', desactivar, 'var(--r)')}
    <div style="display:flex;gap:.4rem;margin-top:.55rem">
      <button class="btn-r" style="flex:1" onclick="spGuardarPermisosConfirmar('${uid}')">Confirmar cambios</button>
      <button class="btn-o" style="flex:1" onclick="document.getElementById('sp-confirm').innerHTML=''">Cancelar</button>
    </div></div>`;
}
// Paso 2: escribe (update -> reemplaza el mapa entero con las 12 caps, sin merge; no deja caps colgadas) + READ-BACK.
async function spGuardarPermisosConfirmar(uid){
  const e=document.getElementById('sp-err-perm'); const cont=document.getElementById('sp-confirm');
  const msg=(t,ok)=>{ if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color=ok?'var(--g,#1D9E75)':'var(--r)'; } };
  if(uid===S.user.uid){ msg('No podés configurar tus propios permisos.'); return; }
  const permisos={};
  CAPS.forEach(([k])=>{ permisos[k]=false; }); // arranca en false las 12 -> el update fija el mapa completo
  document.querySelectorAll('.sp-cap').forEach(c=>{ permisos[c.dataset.cap]=c.checked; });
  if(cont) cont.innerHTML='<div style="font-size:.74rem;color:var(--ink3)">Guardando…</div>';
  try{
    await db.collection('usuarios').doc(uid).update({ permisos }); // update: reemplaza el campo permisos (anti-stale)
    // READ-BACK: re-leo el doc y comparo con lo que quise escribir
    const snap=await db.collection('usuarios').doc(uid).get();
    const srv=(snap.exists && snap.data().permisos)||{};
    const okKeys=Object.keys(permisos).filter(k=>permisos[k]===true);
    const coincide=okKeys.every(k=>srv[k]===true) && Object.keys(srv).filter(k=>srv[k]===true).length===okKeys.length;
    if(cont) cont.innerHTML='';
    if(coincide){
      const u=((S.sp&&S.sp.users)||[]).find(x=>x.uid===uid); if(u) u.permisos=permisos; // refresca cache local (sin esperar el snapshot)
      msg('✓ Permisos guardados y confirmados en el servidor.', true);
    } else {
      msg('⚠ Se guardó pero el read-back NO coincide. Recargá y verificá.');
    }
  }catch(err){ if(cont) cont.innerHTML=''; msg('No se pudo guardar: '+spErr(err)); }
}

/* ===================== GUARDIAS — Bloque 1 (BASE: modelo + validación cliente) =====================
   Cronograma de tripulación. Una guardia = UNA persona (chofer o médico) en una ventana horaria,
   en un móvil (modalidad 'activa') o sin móvil ('pasiva' = backup / auto propio).
   Reparto de validación: SOLAPES y MÉDICO-SIN-CHOFER se validan acá (cliente, con query + cómputo
   de intersección); las reglas Firestore controlan permiso + forma + coherencia local.
   La UI (calendario con filtros) es el 2º prompt — acá solo el modelo, la validación y un alta mínima.
   OJO: no usar S.guardias (lo ocupa el mock adGuardias del admin). Estado nuevo cuando haya UI: S.crono. */

const GUARDIA_ROLES=['chofer','medico'];
const GUARDIA_MODALIDADES=['activa','pasiva'];
const GUARDIA_ESTADOS=['programada','activa','cerrada'];

// Normaliza inicio/fin a ms. Acepta Timestamp de Firestore, {seconds}, Date, number o string ISO.
function gMs(v){
  if(v==null) return null;
  if(typeof v==='number') return v;
  if(typeof v.toMillis==='function') return v.toMillis();   // Firestore Timestamp
  if(v.seconds!=null) return v.seconds*1000;                // {seconds, nanoseconds}
  if(v instanceof Date) return v.getTime();
  const t=Date.parse(v); return isNaN(t)?null:t;
}
// Solape = intersección temporal REAL (>0). Bordes que se tocan (finA==inicioB) NO es solape (relevo limpio).
function gSolapan(aIni,aFin,bIni,bFin){
  const ai=gMs(aIni),af=gMs(aFin),bi=gMs(bIni),bf=gMs(bFin);
  if(ai==null||af==null||bi==null||bf==null) return false;
  return ai < bf && bi < af;   // estricto: tocarse en el borde no cuenta
}

// Trae las guardias de un móvil (para validar solapes y dotación). Excluye la propia (al editar).
async function gGuardiasDeMovil(movilId, excluirId){
  if(!movilId) return [];
  const snap=await db.collection('guardias').where('movilId','==',movilId).get();
  return snap.docs.filter(d=>d.id!==excluirId).map(d=>({id:d.id,...d.data()}));
}

// Filtro "vigente ahora": guardia activa (no cerrada) cuyo intervalo contiene now.
function gVigente(g){ const now=Date.now(); return g.modalidad==='activa' && g.estado!=='cerrada' && gMs(g.inicio)!=null && gMs(g.fin)!=null && gMs(g.inicio)<=now && now<gMs(g.fin); }

// Dotación VIGENTE de un móvil = chofer + médico de guardia activa ahora. A lo sumo 1 de cada
// (el bloqueo duro de solapes del Bloque 1 garantiza unicidad). Devuelve {chofer, medico} con {id,nombre}|null.
async function gDotacionVigente(movilId){
  if(!movilId) return {chofer:null,medico:null};
  const vig=(await gGuardiasDeMovil(movilId,null)).filter(gVigente);
  const ch=vig.find(g=>g.rol==='chofer'), me=vig.find(g=>g.rol==='medico');
  return { chofer: ch?{id:ch.personaId,nombre:ch.personaNombre||''}:null,
           medico: me?{id:me.personaId,nombre:me.personaNombre||''}:null };
}

// Guardias activas AHORA agrupadas por móvil (para poblar el selector de despacho).
// Cada item = { movilId, movilNombre, chofer:{id,nombre}|null, medico:{id,nombre}|null }.
async function gGuardiasActivas(){
  const snap=await db.collection('guardias').where('modalidad','==','activa').get();
  const vig=snap.docs.map(d=>({id:d.id,...d.data()})).filter(g=>g.movilId && gVigente(g));
  const byMov={};
  vig.forEach(g=>{
    const k=g.movilId;
    if(!byMov[k]) byMov[k]={movilId:k, movilNombre:g.movilNombre||'', chofer:null, medico:null};
    const p={id:g.personaId,nombre:g.personaNombre||''};
    if(g.rol==='chofer') byMov[k].chofer=p; else if(g.rol==='medico') byMov[k].medico=p;
  });
  return Object.values(byMov);
}

// Validación de una guardia ANTES de guardar -> {bloqueo:[], alertas:[]}. UNA sola pasada de query.
//  - BLOQUEO DURO: otra persona del MISMO ROL, activa, en el MISMO MÓVIL, con intersección >0.
//  - ALERTA (médico-sin-chofer): médico activo sin chofer solapado en ese móvil (deja guardar).
async function gValidar(guardia){
  const out={bloqueo:[],alertas:[]};
  if(guardia.modalidad==='activa' && guardia.movilId){
    const otras=await gGuardiasDeMovil(guardia.movilId, guardia.id||null);
    const activas=otras.filter(g=>g.modalidad==='activa' && g.estado!=='cerrada');
    for(const g of activas){ // bloqueo: mismo rol solapado
      if(g.rol===guardia.rol && gSolapan(guardia.inicio,guardia.fin,g.inicio,g.fin)){
        out.bloqueo.push(`Ya hay ${g.rol==='chofer'?'un chofer':'un médico'} (${g.personaNombre||g.personaId}) en este móvil en esa franja.`);
      }
    }
    if(guardia.rol==='medico'){ // alerta: médico activo sin chofer solapado
      const hayChofer=activas.some(g=>g.rol==='chofer' && gSolapan(guardia.inicio,guardia.fin,g.inicio,g.fin));
      if(!hayChofer) out.alertas.push('Este móvil no tiene chofer en esa franja. Un móvil no puede operar sin chofer.');
    }
  }
  return out;
}

// Alta mínima de una guardia (valida modelo/reglas; la UI viene en el 2º prompt).
// force=true salta SOLO las ALERTAS (nunca el bloqueo duro). Devuelve {ok, id?, bloqueo?, alertas?, error?}.
async function gCrear(datos, force){
  if(!puede('gestionar_guardias')) return {ok:false,error:'Sin permiso para gestionar guardias.'};
  const g={
    personaId:datos.personaId||'', personaNombre:datos.personaNombre||'',
    rol:datos.rol, modalidad:datos.modalidad,
    movilId:(datos.modalidad==='activa')?(datos.movilId||null):null,
    movilNombre:(datos.modalidad==='activa')?(datos.movilNombre||null):null,
    inicio:datos.inicio, fin:datos.fin,
    estado:datos.estado||'programada'
  };
  // forma mínima (coherente con la regla; la regla es la defensa real)
  if(!GUARDIA_ROLES.includes(g.rol)) return {ok:false,error:'Rol inválido.'};
  if(!GUARDIA_MODALIDADES.includes(g.modalidad)) return {ok:false,error:'Modalidad inválida.'};
  if(!GUARDIA_ESTADOS.includes(g.estado)) return {ok:false,error:'Estado inválido.'};
  if(g.modalidad==='activa' && !g.movilId) return {ok:false,error:'Una guardia activa requiere móvil.'};
  if(gMs(g.inicio)==null || gMs(g.fin)==null) return {ok:false,error:'Inicio y fin son requeridos.'};
  if(gMs(g.fin)<=gMs(g.inicio)) return {ok:false,error:'El fin debe ser posterior al inicio.'};
  const v=await gValidar(g);
  if(v.bloqueo.length) return {ok:false,bloqueo:v.bloqueo};
  if(v.alertas.length && !force) return {ok:false,alertas:v.alertas};
  try{
    const ref=await db.collection('guardias').add({...g, creadoEn:FV(), creadoPor:S.user.uid});
    return {ok:true, id:ref.id, alertas:v.alertas};
  }catch(e){ return {ok:false,error:(e.message||String(e))}; }
}

/* ===================== CRONOGRAMA — UI del calendario de guardias (2º prompt del Bloque 1) =====================
   Vista semanal (7 días × horas), color por móvil, filtros superponibles, alta/edición/baja.
   Reusa gMs/gSolapan/gValidar/gCrear (base). Estado propio S.crono (NO S.guardias = mock admin). */
const CRONO_WD=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const CRONO_COLORS=['#DC1400','#1D9E75','#2D6CDF','#E08600','#7A3FB8','#0F8A8A','#C2185B','#4A7A1A'];
const CRONO_HH=34; // alto de hora en px

function cronoMondayMs(ms){ const d=new Date(ms); const dow=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-dow); return d.getTime(); }
function cronoDTLocal(ms){ if(ms==null) return ''; const d=new Date(ms); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function cronoColorMovil(id){ const arr=S.crono&&S.crono.moviles||[]; const i=arr.findIndex(m=>m.id===id); return CRONO_COLORS[(i<0?0:i)%CRONO_COLORS.length]; }
function cronoFormOpen(){ return !!(S.crono && S.crono.edit!=null); }
function cronoVisible(g){
  if(!S.crono) return true;
  const mk=g.movilId||'__pasiva__';
  return (S.crono.filtMov[mk]!==false) && (S.crono.filtPers[g.personaId]!==false);
}

function cronoAttach(){
  if(S.cronoUnsub) return;
  const upd=()=>{ if(!cronoFormOpen()) render(); }; // no re-render con el form abierto (perdería lo tipeado)
  S.cronoUnsub=[
    db.collection('guardias').onSnapshot(s=>{ if(!S.crono) return; S.crono.guardias=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.crono){ S.crono.err=(e.message||String(e)); render(); } })
  ];
  db.collection('moviles').where('activo','==',true).get()
    .then(s=>{ if(!S.crono) return; S.crono.moviles=s.docs.map(d=>({id:d.id,...d.data()})); if(!cronoFormOpen()) render(); })
    .catch(()=>{ if(S.crono) S.crono.moviles=[]; });
  // personas para el selector: médicos de `staff_medico` (nombre+activo) + choferes de `staff` (rol==chofer).
  // Fuentes NO sensibles, legibles por esInterno → los cap-holders de gestionar_guardias ya no reciben 'denied'.
  // NO se lee `usuarios` (permisos de todos) ni `personas` (antecedentes clínicos).
  Promise.all([
    db.collection('staff_medico').get(),
    db.collection('staff').where('rol','==','chofer').get()
  ]).then(([med, chof])=>{ if(!S.crono) return;
    const medicos=med.docs.map(d=>({uid:d.id, nombre:d.data().nombre||'', activo:d.data().activo, rol:'medico'})).filter(p=>p.activo!==false);
    const choferes=chof.docs.map(d=>({uid:d.id, nombre:d.data().nombre||'', activo:d.data().activo, rol:'chofer'})).filter(p=>p.activo!==false);
    S.crono.personas=[...medicos, ...choferes]; if(!cronoFormOpen()) render();
  }).catch(()=>{ if(S.crono) S.crono.personas='denied'; });
}
function cronoDetach(){ if(S.cronoUnsub){ S.cronoUnsub.forEach(u=>{ try{u();}catch(_){} }); S.cronoUnsub=null; } }

function cronoFlash(obj){ // mensaje en el form SIN re-render (preserva inputs)
  const e=document.getElementById('cr-flash'); if(!e) return;
  if(!obj){ e.innerHTML=''; e.style.display='none'; return; }
  const col=obj.k==='ok'?'var(--g,#1D9E75)':obj.k==='warn'?'var(--o)':'var(--r)';
  e.style.display='block';
  e.innerHTML=`<div style="color:${col};font-size:.8rem">${esc(obj.t)}${obj.k==='warn'?` <button class="btn-o" style="width:auto;padding:.2rem .55rem;margin-top:.3rem;color:var(--o);border-color:var(--o)" onclick="cronoGuardar(true)">Guardar igual</button>`:''}</div>`;
}

function cronoPanel(){
  if(!puede('gestionar_guardias')) return `<div class="card">No tenés permiso para gestionar guardias.</div>`;
  if(!S.crono){ S.crono={weekStart:cronoMondayMs(Date.now()),guardias:null,moviles:null,personas:null,filtMov:{},filtPers:{},edit:null,form:null,flash:null,err:''}; cronoAttach(); }
  if(S.crono.err) return `<div class="card">No se pudo cargar el cronograma: ${esc(S.crono.err)}</div>`;
  const fl=S.crono.flash;
  const flashHtml = fl?`<div style="margin-bottom:.5rem;font-size:.8rem;font-weight:600;color:${fl.k==='ok'?'var(--g,#1D9E75)':fl.k==='warn'?'var(--o)':'var(--r)'}">${esc(fl.t)}</div>`:'';
  if(S.crono.edit!=null) return `<div style="font-weight:700;margin:.1rem 0 .6rem">Cronograma de guardias</div>${flashHtml}${cronoForm()}`;
  if(S.crono.guardias===null||S.crono.moviles===null) return `<div class="card">Cargando cronograma…</div>`;

  const ws=S.crono.weekStart, we=ws+6*86400000;
  const dd=ms=>{const d=new Date(ms);return `${d.getDate()}/${d.getMonth()+1}`;};
  const header=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
    <div style="font-weight:700">Cronograma <span style="font-size:.62rem;color:var(--ink3);font-weight:400">● en vivo</span></div>
    <button class="btn-r" style="width:auto;padding:.4rem .7rem" onclick="cronoNueva()">+ Nueva</button>
  </div>
  <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem">
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoWeek(-1)">←</button>
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoHoy()">Hoy</button>
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoWeek(1)">→</button>
    <span style="font-size:.75rem;color:var(--ink2);font-weight:600">${dd(ws)} – ${dd(we)}</span>
  </div>`;

  const chip=(txt,on,c,cb,dash)=>`<button onclick="${cb}" style="font-size:.62rem;padding:.2rem .5rem;border-radius:12px;border:1.5px ${dash?'dashed':'solid'} ${c};background:${on?c:'transparent'};color:${on?'#fff':c};cursor:pointer">${esc(txt)}</button>`;
  const movChips=(S.crono.moviles||[]).map(m=>chip(m.nombre||m.id, S.crono.filtMov[m.id]!==false, cronoColorMovil(m.id), `cronoFilt('mov','${m.id}')`)).join('');
  const pasChip=chip('Pasiva', S.crono.filtMov['__pasiva__']!==false, '#9a9a9a', `cronoFilt('mov','__pasiva__')`, true);
  const persArr=Array.isArray(S.crono.personas)?S.crono.personas:[];
  const persChips=persArr.map(p=>chip((p.nombre||p.uid).split(' ')[0], S.crono.filtPers[p.uid]!==false, p.rol==='chofer'?'#4A7A1A':'#2D6CDF', `cronoFilt('pers','${p.uid}')`)).join('');
  const filters=`<div style="margin-bottom:.5rem">
    <div style="font-size:.58rem;color:var(--ink3);letter-spacing:.08em;margin-bottom:.2rem">MÓVILES</div>
    <div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem">${movChips}${pasChip}</div>
    <div style="font-size:.58rem;color:var(--ink3);letter-spacing:.08em;margin-bottom:.2rem">PERSONAS</div>
    <div style="display:flex;flex-wrap:wrap;gap:.3rem">${persChips||'<span style="font-size:.7rem;color:var(--ink3)">— sin choferes/médicos —</span>'}</div>
  </div>`;

  const days=[...Array(7)].map((_,i)=>ws+i*86400000);
  const head=`<div style="display:flex;margin-left:30px">${days.map(dm=>{const d=new Date(dm);return `<div style="flex:1;min-width:80px;text-align:center;font-size:.6rem;font-weight:700;color:var(--ink2);padding:.2rem 0">${CRONO_WD[(d.getDay()+6)%7]} ${d.getDate()}</div>`;}).join('')}</div>`;
  const gutter=`<div style="width:30px;flex:none">${[...Array(24)].map((_,h)=>`<div style="height:${CRONO_HH}px;font-size:.55rem;color:var(--ink3);text-align:right;padding-right:2px">${h}</div>`).join('')}</div>`;
  const cols=days.map(dm=>{
    const dayEnd=dm+86400000;
    const blocks=(S.crono.guardias||[]).filter(cronoVisible).map(g=>{
      const gi=gMs(g.inicio),gf=gMs(g.fin); if(gi==null||gf==null||gf<=dm||gi>=dayEnd) return '';
      const top=Math.max(0,(Math.max(gi,dm)-dm)/3600000)*CRONO_HH;
      const h=Math.max(15,(Math.min(gf,dayEnd)-Math.max(gi,dm))/3600000*CRONO_HH);
      const pasiva=g.modalidad==='pasiva'||!g.movilId;
      const c=pasiva?'#9a9a9a':cronoColorMovil(g.movilId);
      const icon=g.rol==='chofer'?'🚗':'⚕️';
      return `<div onclick="event.stopPropagation();cronoEditar('${g.id}')" title="${esc(g.personaNombre||'')}" style="position:absolute;top:${top}px;left:2px;right:2px;height:${h}px;background:${pasiva?'transparent':c};border:1.5px ${pasiva?'dashed':'solid'} ${c};border-radius:6px;color:${pasiva?c:'#fff'};font-size:.58rem;line-height:1.1;padding:2px 3px;overflow:hidden;cursor:pointer">${icon} ${esc((g.personaNombre||'').split(' ')[0])}${g.movilNombre?'<br>'+esc(g.movilNombre):''}</div>`;
    }).join('');
    return `<div onclick="cronoSlot(event,${dm})" style="flex:1;min-width:80px;position:relative;height:${24*CRONO_HH}px;border-left:1px solid var(--border)">${[...Array(24)].map(()=>`<div style="height:${CRONO_HH}px;border-bottom:1px solid var(--border)"></div>`).join('')}<div style="position:absolute;inset:0">${blocks}</div></div>`;
  }).join('');
  const grid=`<div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px;padding-bottom:2px"><div style="min-width:600px">${head}<div style="display:flex">${gutter}${cols}</div></div></div>`;

  return header+flashHtml+filters+grid;
}

function cronoWeek(d){ if(S.crono){ S.crono.weekStart+=d*7*86400000; S.crono.flash=null; render(); } }
function cronoHoy(){ if(S.crono){ S.crono.weekStart=cronoMondayMs(Date.now()); S.crono.flash=null; render(); } }
function cronoFilt(kind,id){ if(!S.crono) return; const m=kind==='mov'?S.crono.filtMov:S.crono.filtPers; m[id]=(m[id]===false); render(); } // undefined/true -> false (off); false -> true (on)

function cronoNueva(iniMs){
  if(!S.crono) return;
  const ini = iniMs || (function(){ const d=new Date(); d.setHours(8,0,0,0); return d.getTime(); })();
  S.crono.flash=null;
  S.crono.form={ personaId:'', rol:'', modalidad:'activa', movilId:'', inicio:cronoDTLocal(ini), fin:cronoDTLocal(ini+8*3600000), estado:'programada' };
  S.crono.confirmDel=null; S.crono.edit='new'; render();
}
function cronoSlot(ev,dayMs){
  const rect=ev.currentTarget.getBoundingClientRect();
  let hour=Math.floor((ev.clientY-rect.top)/CRONO_HH); if(hour<0)hour=0; if(hour>23)hour=23;
  cronoNueva(dayMs+hour*3600000);
}
function cronoEditar(id){
  const g=(S.crono&&S.crono.guardias||[]).find(x=>x.id===id); if(!g) return;
  S.crono.flash=null;
  S.crono.form={ personaId:g.personaId||'', rol:g.rol||'', modalidad:g.modalidad||'activa', movilId:g.movilId||'', inicio:cronoDTLocal(gMs(g.inicio)), fin:cronoDTLocal(gMs(g.fin)), estado:g.estado||'programada' };
  S.crono.confirmDel=null; S.crono.edit=id; render();
}
function cronoCancel(){ if(S.crono){ S.crono.edit=null; S.crono.form=null; S.crono.confirmDel=null; } render(); }
function cronoPersonaChange(){ const s=document.getElementById('cr-persona'); const o=s&&s.options[s.selectedIndex]; const r=document.getElementById('cr-rol'); if(r) r.textContent=(o&&o.dataset.rol)||'—'; }

function cronoForm(){
  const f=S.crono.form||{};
  const isNew=S.crono.edit==='new';
  const personas=S.crono.personas;
  const moviles=(S.crono.moviles||[]).filter(m=>m.activo!==false);
  let persField;
  if(Array.isArray(personas)){
    persField=`<select id="cr-persona" onchange="cronoPersonaChange()"><option value="">— Elegí persona —</option>${personas.map(p=>`<option value="${p.uid}" data-rol="${p.rol}" ${f.personaId===p.uid?'selected':''}>${esc(p.nombre||p.uid)} (${p.rol})</option>`).join('')}</select>`;
  } else if(personas==='denied'){
    persField=`<div style="font-size:.78rem;color:var(--ink3)">Tu rol no puede listar el personal (solo superadmin/admin). No podés elegir persona desde esta cuenta.</div>`;
  } else { persField=`<div style="font-size:.78rem;color:var(--ink3)">Cargando personal…</div>`; }
  return `<div class="card"><div class="ch">${isNew?'Nueva guardia':'Editar guardia'}</div>
    <div class="field"><label>Persona</label>${persField}</div>
    <div class="field"><label>Rol (derivado de la persona)</label><div id="cr-rol" style="font-size:.9rem;font-weight:700;color:var(--ink)">${f.rol||'—'}</div></div>
    <div class="field"><label>Modalidad</label><select id="cr-modalidad" onchange="document.getElementById('cr-movil-row').style.display=this.value==='activa'?'':'none'"><option value="activa" ${f.modalidad!=='pasiva'?'selected':''}>Activa (en móvil de flota)</option><option value="pasiva" ${f.modalidad==='pasiva'?'selected':''}>Pasiva (backup / auto propio)</option></select></div>
    <div class="field" id="cr-movil-row" style="display:${f.modalidad==='pasiva'?'none':''}"><label>Móvil</label><select id="cr-movil"><option value="">— Elegí móvil —</option>${moviles.map(m=>`<option value="${m.id}" data-nombre="${esc(m.nombre||'')}" ${f.movilId===m.id?'selected':''}>${esc(m.nombre||m.id)}${m.patente?(' · '+esc(m.patente)):''}</option>`).join('')}</select></div>
    <div class="field"><label>Inicio</label><input type="datetime-local" id="cr-inicio" value="${f.inicio||''}"></div>
    <div class="field"><label>Fin</label><input type="datetime-local" id="cr-fin" value="${f.fin||''}"></div>
    <div class="field"><label>Estado</label><select id="cr-estado">${GUARDIA_ESTADOS.map(s=>`<option value="${s}" ${(f.estado||'programada')===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div id="cr-flash" style="display:none;margin:.4rem 0"></div>
    <button class="btn-r" onclick="cronoGuardar(false)">Guardar</button>
    <button class="btn-o" onclick="cronoCancel()">Cancelar</button>
    ${isNew?'':(S.crono.confirmDel===S.crono.edit
      ? `<div style="margin-top:.6rem;padding:.7rem;border:1.5px solid var(--r);border-radius:10px;background:rgba(220,20,0,.06)">
           <div style="font-size:.82rem;color:var(--r);font-weight:700;margin-bottom:.5rem">¿Eliminar esta guardia? No se puede deshacer.</div>
           <button class="btn-r" onclick="cronoEliminarOk('${S.crono.edit}')">Sí, eliminar</button>
           <button class="btn-o" onclick="cronoEliminarCancel()">No, volver</button>
         </div>`
      : `<button class="btn-o" style="color:var(--r);border-color:var(--r)" onclick="cronoEliminarAsk('${S.crono.edit}')">Eliminar guardia</button>`)}
  </div>`;
}

async function cronoGuardar(force){
  cronoFlash(null);
  const persSel=document.getElementById('cr-persona');
  if(!persSel) return; // personas no listables (denied)
  const personaId=persSel.value||'';
  if(!personaId){ cronoFlash({t:'Elegí una persona.',k:'err'}); return; }
  const opt=persSel.options[persSel.selectedIndex];
  const rol=(opt&&opt.dataset.rol)||'';
  const personaNombre=(opt?opt.textContent.replace(/\s*\([^)]*\)\s*$/,''):'');
  const modalidad=document.getElementById('cr-modalidad').value||'activa';
  let movilId=null, movilNombre=null;
  if(modalidad==='activa'){
    const ms=document.getElementById('cr-movil');
    movilId=ms.value||'';
    if(!movilId){ cronoFlash({t:'Una guardia activa requiere móvil.',k:'err'}); return; }
    const mo=ms.options[ms.selectedIndex]; movilNombre=(mo&&mo.dataset.nombre)||'';
  }
  const iniStr=document.getElementById('cr-inicio').value||'';
  const finStr=document.getElementById('cr-fin').value||'';
  if(!iniStr||!finStr){ cronoFlash({t:'Cargá inicio y fin.',k:'err'}); return; }
  const inicio=firebase.firestore.Timestamp.fromDate(new Date(iniStr));
  const fin=firebase.firestore.Timestamp.fromDate(new Date(finStr));
  if(gMs(fin)<=gMs(inicio)){ cronoFlash({t:'El fin debe ser posterior al inicio.',k:'err'}); return; }
  const estado=document.getElementById('cr-estado').value||'programada';
  const datos={personaId,personaNombre,rol,modalidad,movilId,movilNombre,inicio,fin,estado};
  const editId=(S.crono.edit&&S.crono.edit!=='new')?S.crono.edit:null;

  if(editId){ // EDICIÓN: reusa gValidar (excluye la propia por id), update directo
    if(!puede('gestionar_guardias')){ cronoFlash({t:'Sin permiso para gestionar guardias.',k:'err'}); return; }
    const v=await gValidar({...datos,id:editId});
    if(v.bloqueo.length){ cronoFlash({t:v.bloqueo.join(' '),k:'err'}); return; }
    if(v.alertas.length && !force){ cronoFlash({t:v.alertas.join(' '),k:'warn'}); return; }
    try{ await db.collection('guardias').doc(editId).set({...datos,actualizadoEn:FV()},{merge:true});
      S.crono.edit=null; S.crono.form=null; S.crono.flash={t:'✓ Guardia actualizada.',k:'ok'}; render();
    }catch(e){ cronoFlash({t:'No se pudo guardar: '+(e.message||e),k:'err'}); }
  }else{ // ALTA: reusa gCrear (valida forma + solapes; force salta solo alertas)
    const r=await gCrear(datos, force);
    if(r.ok){ S.crono.edit=null; S.crono.form=null; S.crono.flash={t:'✓ Guardia creada.',k:'ok'}; render(); }
    else if(r.bloqueo){ cronoFlash({t:r.bloqueo.join(' '),k:'err'}); }
    else if(r.alertas){ cronoFlash({t:r.alertas.join(' '),k:'warn'}); }
    else cronoFlash({t:r.error||'No se pudo crear.',k:'err'});
  }
}
// Borrado en DOS pasos (en pantalla, no nativo): "Eliminar" revela la confirmación; "Sí, eliminar" borra.
function cronoEliminarAsk(id){ if(S.crono){ S.crono.confirmDel=id; } render(); }
function cronoEliminarCancel(){ if(S.crono){ S.crono.confirmDel=null; } render(); }
async function cronoEliminarOk(id){
  try{
    await db.collection('guardias').doc(id).delete();
    S.crono.edit=null; S.crono.form=null; S.crono.confirmDel=null; S.crono.flash={t:'Guardia eliminada.',k:'ok'}; render();
  }catch(e){ cronoFlash({t:'No se pudo eliminar: '+(e.message||e),k:'err'}); }
}

function bind(){
  const em=document.getElementById('em');
  const pw=document.getElementById('pw');
  if(em)em.addEventListener('keydown',e=>{if(e.key==='Enter')pw?pw.focus():doLogin()});
  if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  // Mapas Leaflet: se redibujan tras el render (el contenedor se recrea en cada innerHTML). Fire-and-forget.
  if(document.getElementById('mapa-vivo')){ mapaVivoDibujar(S._mapaVivoEps||[]); }              // mapa vivo (bandeja/dashboard)
  if(document.getElementById('geo-mapa') && S.est && S.est.mapaOn){ geoDibujarMapa(); }          // mapa histórico (Estadísticas), si ya se dibujó
}

/* Arranque: pinta login y deja que Auth decida (sesion persiste al recargar). */
render();
auth.onAuthStateChanged(fbUser=>{
  if(fbUser){ enterWithFbUser(fbUser); }
  else{ resetSession(true); render(); navReplace(); } // limpia TODA la sesión; keepErr preserva el mensaje "sin rol"
});
</script>
