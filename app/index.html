/* ===================== BANDEJA DE EPISODIOS + DETALLE — Etapa 2 =====================
   Bandeja: despachante ve todos; medico ve solo los suyos (medicoId == su uid).
   Activos arriba (orden por urgencia de codigo y luego hora de espera), inactivos
   abajo en dos secciones distintas: Cerrados y Cancelados.
   Detalle: cápsula del paciente + datos de despacho + asignar recursos + mover estado.
   NO incluye carga clínica del médico (examen/desenlace) — entregable siguiente. */

const FLUJO=['despacho','en_camino','arribo','atencion']; // estados ACTIVOS, en orden de avance
const ESTADO_LBL={despacho:'Despacho',en_camino:'En camino',arribo:'Arribo',atencion:'Atención',cerrado:'Cerrado',cancelado:'Cancelado'};
const RESOL_LBL={resuelto_domicilio:'Resuelto en domicilio',traslado:'Traslado',derivacion:'Derivación'};
const RESOLUCIONES=Object.keys(RESOL_LBL).map(k=>[k,RESOL_LBL[k]]);
const TIPO_LUGAR={domiciliaria:'Domiciliaria',via_publica:'Vía pública',comercio:'Comercio',fabrica:'Fábrica',instituto_educativo:'Instituto educativo',base:'Base'};
// Médicos para asignación: se cargan de la colección staff_medico (where activo==true)
// tras login y se cachean en S.staffMedico ({uid,nombre}). Ver loadStaffMedico().

const tsSec=t=>(t&&t.seconds)||0;
function codColor(c){ const f=CODIGOS.find(x=>x[0]===c); return f?f[3]:'#888'; }
function codOrden(e){ const o={rojo:0,amarillo:1,verde:2,traslado:3}; return o[e.codigoPresuntivo]!=null?o[e.codigoPresuntivo]:9; }
function horaDe(e){ const t=e&&e.creadoEn; if(t&&t.toDate){ const x=t.toDate(); return `${String(x.getHours()).padStart(2,'0')}:${String(x.getMinutes()).padStart(2,'0')}`; } return '—'; }
function tipoLugarLbl(t){ return TIPO_LUGAR[t]||t||''; }
function añoDe(t){ return (t&&t.toDate)?t.toDate().getFullYear():new Date().getFullYear(); }

/* ---- BANDEJA ---- */
function bandeja(){
  if(S.epView) return dEpDetalle();
  // Carga EN VIVO (Etapa 25): al entrar sin datos, (re)suscribe una escucha fresca (initial snapshot
  // inmediato). El detach al salir de la sección (en set()) y en logout garantiza una sola escucha viva.
  if(!S.bandeja){ banDetach(); S.bandeja={loading:true}; banAttach(); return banSkeleton(); }
  const b=S.bandeja;
  if(b.loading) return banSkeleton();
  if(b.err) return `<div class="card">No se pudo cargar la bandeja: ${esc(b.err)}<br><button class="btn-o" onclick="banReload()" style="margin-top:.6rem">Reintentar</button></div>`;
  return banView(b.items);
}
function banSkeleton(){ return `<div class="card">Cargando episodios…</div>`; }
function banReload(){ S.bandeja=null; render(); } // fuerza re-suscripción fresca vía bandeja()

/* Escucha en vivo de la bandeja (reemplaza el .get() one-shot). MISMA data que ya mostraba la bandeja;
   el mapa vivo del despachante cuelga de esta escucha (sin suscripción aparte). Despachante = 1 escucha
   (todos los episodios); médico = 2 (los suyos + los ofrecidos, merge dedup — Firestore no hace OR),
   igual que las 2 queries que hacía el .get(). Detach prolijo al salir de la vista y en logout. */
function banRender(){ if(!S.epView) render(); } // no re-renderiza si hay un detalle abierto (no lo pisa)
function banAttach(){
  if(S.banUnsub) return;
  S.banUnsub=[];
  if(S.user.rol==='medico'){
    const merge=()=>{ if(!S.bandeja) return; const map={}; (S.banMine||[]).forEach(e=>{ map[e.id]=e; }); (S.banOff||[]).forEach(e=>{ map[e.id]=e; }); S.bandeja={loading:false,items:Object.values(map)}; banRender(); };
    S.banUnsub.push(
      db.collection('episodios').where('medicoId','==',S.user.uid).onSnapshot(s=>{ if(!S.bandeja) return; S.banMine=s.docs.map(d=>({id:d.id,...d.data()})); merge(); }, e=>{ if(S.bandeja){ S.bandeja={loading:false,err:(e.message||String(e))}; render(); } }),
      db.collection('episodios').where('ofrecido','==',true).onSnapshot(s=>{ if(!S.bandeja) return; S.banOff=s.docs.map(d=>({id:d.id,...d.data()})); merge(); }, ()=>{})
    );
  }else{
    S.banUnsub.push(
      db.collection('episodios').onSnapshot(s=>{ if(!S.bandeja) return; S.bandeja={loading:false,items:s.docs.map(d=>({id:d.id,...d.data()}))}; banRender(); }, e=>{ if(S.bandeja){ S.bandeja={loading:false,err:(e.message||String(e))}; render(); } })
    );
  }
}
function banDetach(){ if(S.banUnsub){ S.banUnsub.forEach(u=>{ try{u();}catch(_){} }); S.banUnsub=null; } S.banMine=null; S.banOff=null; }

/* Auto-reconexión de la bandeja (reemplaza el "↻ Actualizar" manual, retirado): al volver el tab
   visible o recuperar red, re-suscribe la escucha en vivo — SOLO si la bandeja está activa (hay
   listener vivo: S.banUnsub != null). Transparente: NO resetea S.bandeja ni fuerza render; el
   snapshot inicial de la nueva escucha llama banRender() (que respeta S.epView → no pisa un
   detalle abierto), así el listado se refresca sin flash. Debounce de 5s anti-ráfaga
   (visibilitychange + online pueden dispararse juntos). Firestore ya reconecta solo; esto cubre
   el stall silencioso tras mucho tiempo en background. */
let banReconnectTs=0;
function banAutoReconnect(){
  if(!S.user || !S.banUnsub) return;                 // bandeja no activa -> nada
  const now=Date.now();
  if(now - banReconnectTs < 5000) return;            // debounce anti-ráfaga
  banReconnectTs=now;
  banDetach(); banAttach();                          // re-suscripción fresca; el snapshot entrante actualiza vía banRender
}
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible') banAutoReconnect(); });
window.addEventListener('online', banAutoReconnect);

function banView(items){
  const esMedico=S.user.rol==='medico';
  // Handoff: el médico ve los SUYOS + los OFRECIDOS por otros ("Disponibles para tomar").
  let disponibles=[];
  if(esMedico){
    disponibles=items.filter(e=>e.ofrecido===true && e.medicoId!==S.user.uid)
      .sort((a,b)=>(codOrden(a)-codOrden(b))||(tsSec(a.creadoEn)-tsSec(b.creadoEn)));
    items=items.filter(e=>e.medicoId===S.user.uid); // sus propios (incluye los que él ofreció: siguen siendo suyos)
  }
  const activos=items.filter(e=>FLUJO.includes(e.estado))
    .sort((a,b)=>(codOrden(a)-codOrden(b))||(tsSec(a.creadoEn)-tsSec(b.creadoEn)));
  const termTs=e=>tsSec((e.transiciones&&e.transiciones[e.estado])||e.creadoEn);
  const cerrados=items.filter(e=>e.estado==='cerrado').sort((a,b)=>termTs(b)-termTs(a));
  const cancelados=items.filter(e=>e.estado==='cancelado').sort((a,b)=>termTs(b)-termTs(a));
  const sec=(t,arr,empty)=>`<div class="ch" style="margin:.2rem 0 .4rem">${t} (${arr.length})</div>`+
    (arr.length?arr.map(banRow).join(''):`<div style="font-size:.78rem;color:var(--ink3);margin-bottom:.5rem">${empty}</div>`);
  const top=`<div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.7rem"><b style="font-size:1.15rem;font-style:italic;font-weight:800;letter-spacing:-.01em">${esMedico?'Mis episodios':'Bandeja de episodios'}</b><span class="live-tag">en vivo</span></div>`;
  const nuevo=(S.user.rol==='despachante')?`<button class="btn-r" onclick="verBandejaNuevo()" style="margin-bottom:.8rem">+ Nuevo despacho</button>`:''; // crear: solo despachante
  const disp=esMedico?`<div class="card">${sec('🤝 Disponibles para tomar',disponibles,'No hay casos ofrecidos')}</div>`:'';
  return `${top}${nuevo}
  ${S.user.rol==='despachante'?mapaVivoBloque(items):''}
  <div class="card">${sec('🟢 Activos',activos,'Sin episodios activos')}</div>
  ${disp}
  <div class="card">
    <div class="st">Inactivos</div>
    ${sec('Cerrados',cerrados,'Sin cerrados')}
    <div style="height:.5rem"></div>
    ${sec('Cancelados',cancelados,'Sin cancelados')}
  </div>`;
}

function banRow(e){
  const col=codColor(e.codigoPresuntivo);
  const movil=e.movilNombre||(e.movilId?('Móvil '+e.movilId):'sin asignar');
  const medico=e.medicoNombre||(e.medicoId?'asignado':'sin asignar');

    <div class="lrb">

      <div class="lrs">${esc(e.motivoLlamado)||'—'} · ${horaDe(e)}</div>
      <div class="lrs" style="margin-top:.15rem">🚑 ${esc(movil)} · 🩺 ${esc(medico)}</div>
    </div>

}

async function epLoad(id){
  try{
    const d=await db.collection('episodios').doc(id).get();
    if(!d.exists){ S.ep={err:'Episodio no encontrado'}; render(); return; }
    const data={id:d.id,...d.data()};
    let paciente=null;
    if(data.pacienteId){ try{ const p=await db.collection('pacientes').doc(data.pacienteId).get(); if(p.exists) paciente={id:p.id,...p.data()}; }catch(_){} }
    // Dotación para el selector de despacho: guardias ACTIVAS ahora (móvil + tripulación vigente).
    // Se trae acá, en el mismo ciclo, para que el <select> ya tenga la lista al primer render.
    if(S.user.rol==='despachante'){
      try{ S.guardiasActivas=await gGuardiasActivas(); }
      catch(_){ S.guardiasActivas=[]; }
    }
    const stage=(S.ep&&S.ep.stage)||''; // preserva sub-paso (cerrar/cancelar) tras recargar
    S.ep={data,paciente,stage};
    render();
  }catch(e){ S.ep={err:(e.message||String(e))}; render(); }
}

// Asignación de recursos TRANSACCIONAL: sincroniza el estado del móvil real con el episodio.
//  - Ocupa el móvil nuevo (estado:'ocupado', episodioActivoId) si está disponible.
//  - Libera el anterior (si era un móvil real distinto) en la misma transacción.
//  - Aborta sin escribir si el móvil elegido ya no está disponible (lo tomó otro).
// El doc episodio solo toca los 6 campos de la whitelist (movil*/medico*); el estado del
// móvil y episodioActivoId viven SOLO en el doc moviles. Requiere despachar_episodios (regla Fase 3).
async function epAsignar(){
  if(S.recBusy) return;          // evita doble-submit concurrente
  S.recBusy=true; S.recFlash=null; epRecErr('');
  const epId=S.ep.data.id;
  const prevMovilId0=S.ep.data.movilId||null;                   // lo que el episodio tenía (para saber si cambia)
  const movEl=document.getElementById('ep-movil');
  const nuevoMovilId=(movEl?.value||'').trim();
  let medicoUid=document.getElementById('ep-medico')?.value||'';
  // Robustez (fleco): si el select de médico no se pobló porque el ep-movil se seteó por vía
  // programática (no dispara onchange/epGuardiaChange), resolvé el médico desde la guardia elegida.
  if(!medicoUid && movEl){ const o=movEl.options[movEl.selectedIndex]; if(o && o.dataset && o.dataset.meid) medicoUid=o.dataset.meid; }
  const med=(S.staffMedico||[]).find(m=>m.uid===medicoUid);
  const cambioMovil0=(nuevoMovilId||null)!==(prevMovilId0||null);
  try{
    // Dotación VIGENTE resuelta FUERA de la tx (query — las tx no pueden querear). Solo al cambiar de móvil.
    let chofer=null;
    if(nuevoMovilId && cambioMovil0){
      const dv=await gDotacionVigente(nuevoMovilId);
      chofer=dv.chofer;
      // Bloqueo de cliente: no se despacha un móvil sin chofer de guardia vigente (§2).
      if(!chofer){ S.recFlash={text:'Ese móvil no tiene chofer de guardia vigente ahora. No se puede despachar un móvil sin chofer.', ok:false}; render(); S.recBusy=false; return; }
    }
    let okMsg='';
    await db.runTransaction(async tx=>{
      // === LECTURAS primero (requisito de runTransaction). Releemos el episodio y el móvil DENTRO
      //     de la tx, por id, que es la fuente de verdad (la dotación ya se resolvió por query pre-tx). ===
      const epRef=db.collection('episodios').doc(epId);
      const epSnap=await tx.get(epRef);
      if(!epSnap.exists) throw new Error('El episodio ya no existe.');
      const epNow=epSnap.data();
      const prevMovilId=epNow.movilId||null;                 // lo que el episodio TIENE realmente ahora
      const cambioMovil=(nuevoMovilId||null)!==(prevMovilId||null);

      // Móvil NUEVO: leerlo siempre (si hay id). 'real' = el doc existe (no el cache).
      let nuevoRef=null, nuevoNombre=null, nuevoReal=false;
      if(nuevoMovilId){
        nuevoRef=db.collection('moviles').doc(nuevoMovilId);
        const ns=await tx.get(nuevoRef);
        nuevoReal=ns.exists;
        if(nuevoReal){
          const md=ns.data();
          nuevoNombre=md.nombre||'';
          // si CAMBIA a un móvil distinto, exigir que esté disponible y activo
          if(cambioMovil && (md.activo===false || md.estado!=='disponible')){
            throw new Error('El móvil "'+(md.nombre||nuevoMovilId)+'" no está disponible (lo tomó otro). Elegí otro y reintentá.');
          }
        }
      }
      // Móvil ANTERIOR (si era real y cambió): leerlo para liberarlo.
      let prevRef=null, liberarPrev=false;
      if(prevMovilId && cambioMovil){
        prevRef=db.collection('moviles').doc(prevMovilId);
        const ps=await tx.get(prevRef);
        liberarPrev = ps.exists && ps.data().episodioActivoId===epId; // solo si sigue ligado a ESTE episodio
      }
      // === ESCRITURAS ===
      // Episodio: campos de la whitelist (movil*/medico*/chofer*). Chofer = SNAPSHOT de la dotación vigente.
      const movilNombreFinal = !nuevoMovilId ? null
        : (nuevoReal ? nuevoNombre : (epNow.movilNombre||nuevoMovilId));   // legacy (id no-real): conservar texto
      // Chofer: si cambia de móvil -> el resuelto pre-tx (snapshot). Si no cambia -> conservar el del episodio.
      const choferIdFinal     = !nuevoMovilId ? null : (cambioMovil ? (chofer?chofer.id:null)     : (epNow.choferId||null));
      const choferNombreFinal = !nuevoMovilId ? null : (cambioMovil ? (chofer?chofer.nombre:null) : (epNow.choferNombre||null));
      tx.update(epRef, {
        movilId: nuevoMovilId||null,
        movilNombre: movilNombreFinal,
        medicoId: medicoUid||null,
        medicoNombre: med?med.nombre:null,
        choferId: choferIdFinal,
        choferNombre: choferNombreFinal
      });
      if(liberarPrev)                       tx.update(prevRef,{estado:'disponible',episodioActivoId:null,actualizadoEn:FV()});
      if(nuevoRef && nuevoReal && cambioMovil) tx.update(nuevoRef,{estado:'ocupado',episodioActivoId:epId,actualizadoEn:FV()});

      okMsg = !nuevoMovilId ? '✓ Recursos guardados (sin móvil asignado).'
        : nuevoReal ? ('✓ '+(nuevoNombre||nuevoMovilId)+' asignado'+(choferIdFinal?(' · chofer '+(choferNombreFinal||'')):'')+(medicoUid?' · médico '+(med?med.nombre:''):'')+'.')
        : '✓ Guardado (móvil histórico conservado).';
    });
    audit('recursos_asignados','episodio',epId,okMsg);
    S.recFlash={text:okMsg, ok:true};      // feedback EXPLÍCITO de éxito (persiste al re-render)
    await epLoad(epId);                    // recarga episodio + flota
  }catch(e){
    S.recFlash={text:'No se pudo asignar: '+(e.message||String(e)), ok:false}; // NUNCA falla en silencio
    render();
  }finally{ S.recBusy=false; }
}

async function epAvanzar(){
  const cur=S.ep.data.estado, nx=nextEstado(cur);
  if(!nx) return;
  if(nx==='cerrado'){ S.ep.clin=freshClin(); epStage('cerrar'); return; }   // el cierre abre la carga clínica
  await epUpdate({ estado:nx, ['transiciones.'+nx]:FV() });
}
async function epCerrar(res){ await epUpdate({ estado:'cerrado', resolucion:res, ['transiciones.cerrado']:FV() }); audit('episodio_cerrado','episodio',(S.ep&&S.ep.data&&S.ep.data.id)||'','resolucion '+res); }
async function epCancelarOk(){
  const motivo=(document.getElementById('ep-cancel-motivo')?.value||'').trim();
  if(!motivo){ epMsg('Cargá un motivo de cancelación'); return; }
  await epUpdate({ estado:'cancelado', motivoCancelacion:motivo, ['transiciones.cancelado']:FV() });
  audit('episodio_cancelado','episodio',(S.ep&&S.ep.data&&S.ep.data.id)||'',motivo||'');
}

function dEpDetalle(){
  const ep=S.ep;
  if(!ep||ep.loading) return `<div class="card">Cargando episodio…</div>`;
  if(ep.err) return `<div class="card">Error: ${esc(ep.err)}<br><button class="btn-o" onclick="navBack()" style="margin-top:.6rem">Volver</button></div>`;
  const d=ep.data;
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
    <button class="btn-o" style="width:auto;padding:.4rem .8rem" onclick="navBack()">← Volver</button>
    <span class="badge">${ESTADO_LBL[d.estado]||d.estado}</span>
  </div>
  <div style="font-size:.8rem;color:var(--ink3);font-weight:700;letter-spacing:.03em;margin-bottom:.5rem">${fmtIncidente(d.nroIncidente,añoDe(d.creadoEn))}</div>
  ${epCapsula(ep)}
  ${epDespachoCard(ep)}
  ${epRecursosCard(ep)}
  ${epEstadoCard(ep)}
  ${(d.handoff && d.handoff.a)?`<div class="card"><div class="ch">Handoff</div><div class="ir"><span class="il">Recibido de</span><span class="iv">${esc(d.handoff.deNombre||'—')}</span></div></div>`:''}
  ${d.reabierto ? epReaperturaCard(ep) : ''}
  ${(d.examen||d.desenlace)&&ep.stage!=='cerrar'?epClinicaCard(ep):''}`;
}

function epReaperturaCard(ep){
  const r=ep.data.reabierto||{};
  return `<div class="card"><div class="ch">Reapertura</div>
    <div class="ir"><span class="il">Reabierto por</span><span class="iv">${esc(r.rol||'—')}</span></div>
    <div class="ir"><span class="il">Veces</span><span class="iv">${r.veces||1}</span></div>
  </div>`;
}

function epCapsula(ep){
  const p=ep.paciente, snap=ep.data.pac||{};
  const nombre=p?`${p.apellido||''} ${p.nombre||''}`.trim():(snap.nombre||'—');
  const edad=p?calcEdad(p.fechaNacimiento):(snap.edad!=null?snap.edad:'—');
  const cron=p?(p.antecedentesCronicos||[]):[];
  const otros=p?(p.antecedentesOtros||''):'';
  const alerta=cron.length
    ? `<div style="background:var(--r);color:#fff;border-radius:10px;padding:.55rem .7rem;font-weight:700;font-size:.82rem;margin-top:.55rem">⚠️ ALERTA: ${cron.join(', ')}${otros?(' · '+esc(otros)):''}</div>`
    : `<div style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.45rem">Sin antecedentes crónicos</div>`;
  return `<div class="card card-dk">
    <div class="ch">Paciente</div>
    <div style="font-size:1.15rem;font-weight:700;color:#fff">${esc(nombre)}</div>
    <div style="font-size:.95rem;color:#fff;opacity:.85;margin-top:.15rem"><strong style="font-size:1.05rem">${edad} años</strong>${p&&p.dni?(' · DNI '+esc(p.dni)):''}</div>
    ${alerta}
    ${p?'':'<div style="font-size:.62rem;color:rgba(255,255,255,.4);margin-top:.4rem">Datos del snapshot (paciente no disponible)</div>'}
  </div>`;
}

function epDespachoCard(ep){
  const d=ep.data;
  const ant=(d.antecedentes||[]).filter(a=>a!=='ninguna');
  const antStr=ant.length?ant.join(', '):'ninguna';
  const otros=d.antecedentesOtros?(' · otros: '+esc(d.antecedentesOtros)):'';
  return `<div class="card">
    <div class="ch">Despacho</div>
    <div class="ir"><span class="il">Código</span><span class="iv" style="color:${codColor(d.codigoPresuntivo)};font-weight:700">${codEmoji(d.codigoPresuntivo)} ${d.codigoPresuntivo||'—'}</span></div>
    <div class="ir"><span class="il">Motivo</span><span class="iv">${esc(d.motivoLlamado)||'—'}</span></div>
    <div class="ir"><span class="il">Antecedentes</span><span class="iv">${esc(antStr)}${otros}</span></div>
    <div class="ir"><span class="il">Ubicación</span><span class="iv">${esc(d.domicilio)||'—'}${d.tipoLugar?(' · '+esc(tipoLugarLbl(d.tipoLugar))):''}</span></div>
    <div class="ir"><span class="il">Creado</span><span class="iv">${fechaDe(d)} ${horaDe(d)}</span></div>
  </div>`;
}

function epRecursosCard(ep){
  const d=ep.data, term=(d.estado==='cerrado'||d.estado==='cancelado');
  const esDespachante=S.user.rol==='despachante';
  // Solo el despachante asigna recursos (regla). Terminal o cualquier otro rol: lectura.
  if(term || !esDespachante){
    return `<div class="card"><div class="ch">Recursos</div>
      <div class="ir"><span class="il">Móvil</span><span class="iv">${esc(d.movilNombre||d.movilId||'sin asignar')}</span></div>
      <div class="ir"><span class="il">Médico</span><span class="iv">${esc(d.medicoNombre||(d.medicoId?'asignado':'sin asignar'))}</span></div>
    </div>`;
  }
  const medOpts=['<option value="">Sin asignar</option>'].concat(
    (S.staffMedico||[]).map(m=>`<option value="${m.uid}" ${d.medicoId===m.uid?'selected':''}>${esc(m.nombre)}</option>`)
  ).join('');
  // Selector de DESPACHO = guardia ACTIVA ahora (móvil · chofer · médico vigentes). value = movilId.
  const activas=S.guardiasActivas||[];
  const inList=activas.some(a=>a.movilId===d.movilId);
  const optFor=a=>`<option value="${a.movilId}" data-chid="${esc(a.chofer?a.chofer.id:'')}" data-chnom="${esc(a.chofer?a.chofer.nombre:'')}" data-meid="${esc(a.medico?a.medico.id:'')}" ${d.movilId===a.movilId?'selected':''}>${esc(a.movilNombre||a.movilId)} · ${a.chofer?esc(a.chofer.nombre):'⚠ SIN CHOFER'}${a.medico?(' · '+esc(a.medico.nombre)):' · s/médico'}</option>`;
  const actOpts=activas.map(optFor).join('');
  // Asignación ACTUAL que ya no está entre las activas (guardia terminada o móvil legacy): conservar como opción.
  const curOpt=(d.movilId && !inList)
    ? `<option value="${esc(d.movilId)}" selected data-chid="${esc(d.choferId||'')}" data-chnom="${esc(d.choferNombre||'')}" data-meid="${esc(d.medicoId||'')}">${esc(d.movilNombre||d.movilId)} (actual)</option>`
    : '';
  const choferLbl = d.choferNombre || (d.choferId?'asignado':'—');
  // Feedback persistente: sobrevive al re-render que dispara epLoad tras guardar.
  const fl=S.recFlash;
  const flashHtml = fl
    ? `<div class="err" style="display:block;margin-bottom:.5rem;color:${fl.ok?'var(--g,#1D9E75)':'var(--r)'}">${esc(fl.text)}</div>`
    : `<div id="ep-rec-err" class="err" style="display:none;margin-bottom:.5rem"></div>`;
  return `<div class="card"><div class="ch">Recursos</div>
    <div class="field"><label>Guardia activa (móvil · chofer · médico)</label><select id="ep-movil" onchange="epGuardiaChange()"><option value="">Sin asignar</option>${curOpt}${actOpts}</select></div>
    <div class="field"><label>Chofer (de la guardia · snapshot)</label><div id="ep-chofer" style="font-size:.85rem;font-weight:600;color:var(--ink)">${esc(choferLbl)}</div></div>
    <div class="field"><label>Médico (pre-cargado de la guardia · editable)</label><select id="ep-medico">${medOpts}</select></div>
    ${flashHtml}
    ${puede('despachar_episodios')
      ? `<button class="btn-o" onclick="epAsignar()">Guardar recursos</button>`
      : `<div style="font-size:.72rem;color:var(--ink3)">Necesitás el permiso <b>Despachar episodios</b> para asignar recursos.</div>`}
  </div>`;
}
// Al elegir una guardia: actualiza el chofer derivado (label) y pre-carga el médico vigente (editable). Sin re-render.
function epGuardiaChange(){
  const s=document.getElementById('ep-movil'); const o=s&&s.options[s.selectedIndex];
  const chNom=(o&&o.dataset.chnom)||''; const meId=(o&&o.dataset.meid!=null)?o.dataset.meid:'';
  const chEl=document.getElementById('ep-chofer');
  if(chEl) chEl.textContent = (o&&o.value) ? (chNom||'⚠ sin chofer vigente') : '—';
  const meSel=document.getElementById('ep-medico');
  if(meSel && o && o.value) meSel.value=meId||''; // pre-carga el médico de la guardia (o lo limpia si no hay)
}

function epEstadoCard(ep){
  const d=ep.data, st=ep.stage, estado=d.estado;
  if(estado==='cerrado'){
    const puedeReabrir=(S.user.rol==='medico' && S.user.uid===d.medicoId) || S.user.rol==='admin';
    return `<div class="card"><div class="ch">Estado</div>
    <div class="ir"><span class="il">Estado</span><span class="iv">Cerrado</span></div>
    ${d.desenlace&&d.desenlace.codigoReal?`<div class="ir"><span class="il">Código real</span><span class="iv" style="color:${codColor(d.desenlace.codigoReal)};font-weight:700">${codEmoji(d.desenlace.codigoReal)} ${d.desenlace.codigoReal}</span></div>`:''}
    ${d.resolucion?`<div class="ir"><span class="il">Resolución</span><span class="iv">${RESOL_LBL[d.resolucion]||d.resolucion}</span></div>`:''}
    ${puedeReabrir?`<button class="btn-o" onclick="epReabrir()" style="margin-top:.6rem">Reabrir episodio</button>`:''}</div>`;
  }
  if(estado==='cancelado') return `<div class="card"><div class="ch">Estado</div>
    <div class="ir"><span class="il">Estado</span><span class="iv">Cancelado</span></div>
    <div class="ir"><span class="il">Motivo</span><span class="iv">${esc(d.motivoCancelacion)||'—'}</span></div></div>`;
  if(st==='cerrar') return clinForm(ep); // el cierre del médico = carga clínica (examen + desenlace)
  const nx=nextEstado(estado);
  // Gating por rol (espejo de las firestore.rules):
  const asignado = S.user.rol==='medico' && S.user.uid===d.medicoId; // médico ASIGNADO
  const esDespachante = S.user.rol==='despachante';
  let body;
  if(st==='cancelar'){
    body=`<div class="field"><label>Motivo de cancelación</label><input id="ep-cancel-motivo" type="text" placeholder="Ej. falsa alarma / paciente se fue" autocomplete="off"></div>
      <button class="btn-r" onclick="epCancelarOk()">Confirmar cancelación</button>
      <button class="btn-o" onclick="epStage('')" style="margin-top:.5rem">Volver</button>`;
  }else{
    const ofrecido = d.ofrecido===true;
    const esMed = S.user.rol==='medico';
    const parts=[];
    if(nx==='cerrado'){
      // Estado atención. Handoff médico→médico + cierre.
      if(asignado){
        if(ofrecido){
          // El cedente quedó congelado: no puede cerrar mientras esté ofrecido (espejo de la regla).
          parts.push(`<div style="font-size:.82rem;color:var(--o);font-weight:600;margin-bottom:.2rem">🤝 Ofrecido — esperando que otro médico lo tome.</div>`);
        }else{
          parts.push(`<button class="btn-r" onclick="epAvanzar()">Cerrar episodio</button>`);
          parts.push(`<button class="btn-o" onclick="epCeder()" style="margin-top:.5rem">Ceder caso</button>`);
        }
      }else if(esMed && ofrecido){
        // Otro médico puede tomar el caso ofrecido.
        parts.push(`<button class="btn-r" onclick="epTomar()">Tomar caso</button>`);
      }
    }else{
      // Avanzar de estado — despachante o médico asignado.
      if(esDespachante || asignado){
        const faltanRecursos = (estado==='despacho' && nx==='en_camino') && (d.movilId==null || d.medicoId==null);
        if(faltanRecursos){
          parts.push(`<button class="btn-r" disabled style="opacity:.5;cursor:not-allowed">Avanzar a ${ESTADO_LBL[nx]}</button>`);
          parts.push(`<div style="font-size:.72rem;color:var(--ink3);margin-top:.35rem">Asigná móvil y médico antes de avanzar</div>`);
        }else{
          parts.push(`<button class="btn-r" onclick="epAvanzar()">Avanzar a ${ESTADO_LBL[nx]}</button>`);
        }
      }
    }
    // Cancelar / anular — despachante o médico asignado.
    if(esDespachante || asignado){
      parts.push(`<button class="btn-o" onclick="epStage('cancelar')" style="margin-top:.5rem">Cancelar / anular</button>`);
    }
    body = parts.join('') || `<div style="font-size:.78rem;color:var(--ink3)">Sin acciones disponibles para tu rol en este episodio.</div>`;
  }
  return `<div class="card"><div class="ch">Estado actual: ${ESTADO_LBL[estado]||estado}</div>
    <div id="ep-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    ${body}
  </div>`;
}

/* ===================== CARGA CLÍNICA DEL MÉDICO — Etapa 2 =====================
   Fase atención + desenlace: al "Cerrar episodio" desde estado 'atencion', el médico
   completa examen por aparatos + desenlace en UN formulario y cierra con UNA escritura
   (epUpdate). Crónico nuevo marcado acá sube al paciente (arrayUnion, escritura aparte).
   Estado del form en memoria (S.ep.clin); inputs de texto se leen del DOM al cerrar
   (sin re-render mientras se tipea); los botones togglean clases sin render. */

const APAR_RESP=[['normal','Normal'],['irregular','Irregular'],['apnea','Apnea'],['asistida','Asistida'],['no_corresponde','No corresponde']];
const APAR_CV=[['normal','Normal'],['soplos','Soplos'],['sistolico','Sistólico'],['diastolico','Diastólico'],['pulso','Pulso'],['no_corresponde','No corresponde']];
const APAR_ABD=[['normal','Normal'],['hernias','Hernias'],['evisceraciones','Evisceraciones'],['enterorragia','Enterorragia'],['dolor','Dolor'],['otros','Otros']];
const COD_REAL=[['rojo','🔴 Rojo','#E5484D'],['amarillo','🟡 Amarillo','#E0A23B'],['verde','🟢 Verde','#1D9E75']];
const APAR_LBL={}; [...APAR_RESP,...APAR_CV,...APAR_ABD].forEach(o=>{APAR_LBL[o[0]]=o[1];});
const LBL_ST='display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:600;margin:.6rem 0 .3rem';
const CHIP_ST='display:inline-flex;align-items:center;gap:.35rem;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.35rem .6rem;font-size:.8rem;cursor:pointer';

function freshClin(){ return {respiratorio:null,cardiovascular:null,abdomen:[],codigoReal:null,internacion:null,rechaza:null}; }
function pillStyle(on,color){
  const bd=color||'var(--border2)', bg=color?color+'1a':'var(--bg)', fg=color||'var(--ink)';
  return `border:2px solid ${bd};background:${bg};color:${fg};border-radius:10px;padding:.5rem .65rem;font-size:.8rem;cursor:pointer;font-weight:${on?'700':'500'};opacity:${on?'1':'.55'};box-shadow:${on?'0 0 0 2px rgba(0,0,0,.18) inset':'none'}`;
}
function applySel(btn,on){ btn.style.fontWeight=on?'700':'500'; btn.style.opacity=on?'1':'.55'; btn.style.boxShadow=on?'0 0 0 2px rgba(0,0,0,.18) inset':'none'; }
function clinWrap(inner){ return `<div style="display:flex;flex-wrap:wrap;gap:.4rem">${inner}</div>`; }
function clinGrp(grp,opts,sel,multi,colors){
  return opts.map(o=>{
    const v=o[0],lbl=o[1],color=colors?o[2]:null;
    const on=multi?sel.includes(v):sel===v;
    const handler=multi?`clinToggleAbd('${v}',this)`:`clinPick('${grp}','${v}')`;
    return `<button type="button" data-cgrp="${grp}" data-cval="${v}" onclick="${handler}" style="${pillStyle(on,color)}">${lbl}</button>`;
  }).join('');
}

/* Handlers de los botones del form (mutan S.ep.clin + togglean clases, SIN render) */
function clinPick(grp,val){
  S.ep.clin[grp]=val;
  document.querySelectorAll(`[data-cgrp="${grp}"]`).forEach(b=>applySel(b,b.dataset.cval===val));
}
function clinToggleAbd(val,btn){
  const a=S.ep.clin.abdomen, i=a.indexOf(val);
  if(i>=0) a.splice(i,1); else a.push(val);
  applySel(btn,a.includes(val));
  if(val==='otros'){ const w=document.getElementById('clin-abd-otros'); if(w) w.style.display=a.includes('otros')?'block':'none'; }
}
function clinBool(grp,val){
  S.ep.clin[grp]=val; // 'si' | 'no'
  document.querySelectorAll(`[data-cgrp="${grp}"]`).forEach(b=>applySel(b,b.dataset.cval===val));
  const w=document.getElementById('clin-'+grp+'-extra'); if(w) w.style.display=(val==='si')?'block':'none';
}
function clinCronOtros(cb){ const w=document.getElementById('clin-cron-otros'); if(w) w.style.display=cb.checked?'block':'none'; }

function clinForm(ep){
  if(!S.ep.clin) S.ep.clin=freshClin(); // defensa: nunca rendir el form sin estado
  const c=S.ep.clin;
  return `
  <div class="card"><div class="ch">Examen por aparatos</div>
    <span style="${LBL_ST}">Respiratorio</span>${clinWrap(clinGrp('respiratorio',APAR_RESP,c.respiratorio,false))}
    <span style="${LBL_ST}">Cardiovascular</span>${clinWrap(clinGrp('cardiovascular',APAR_CV,c.cardiovascular,false))}
    <span style="${LBL_ST}">Abdomen</span>${clinWrap(clinGrp('abdomen',APAR_ABD,c.abdomen,true))}
    <div class="field" id="clin-abd-otros" style="display:${c.abdomen.includes('otros')?'block':'none'};margin:.4rem 0 0"><input id="clin-abd-otros-txt" type="text" placeholder="Abdomen — otros (detalle)" autocomplete="off"></div>
    <div class="field" style="margin-top:.6rem"><label>ECG</label><textarea id="clin-ecg" placeholder="Hallazgos del ECG…"></textarea></div>
    <div class="field"><label>Psiquiátrico</label><textarea id="clin-psiq" placeholder="…"></textarea></div>
  </div>
  <div class="card"><div class="ch">Desenlace</div>
    <div class="field"><label>Procedimiento efectuado</label><input id="clin-proc" type="text" autocomplete="off"></div>
    <div class="field"><label>Medicamento (in situ)</label><input id="clin-med" type="text" autocomplete="off"></div>
    <div class="field"><label>Diagnóstico presuntivo</label><input id="clin-dx" type="text" autocomplete="off"></div>
    <div class="field"><label>Epicrisis</label><textarea id="clin-epi" placeholder="Resumen clínico del episodio…"></textarea></div>
    <span style="${LBL_ST}">Internación</span>${clinWrap(
      `<button type="button" data-cgrp="internacion" data-cval="si" onclick="clinBool('internacion','si')" style="${pillStyle(c.internacion==='si')}">Sí</button>`+
      `<button type="button" data-cgrp="internacion" data-cval="no" onclick="clinBool('internacion','no')" style="${pillStyle(c.internacion==='no')}">No</button>`)}
    <div class="field" id="clin-internacion-extra" style="display:${c.internacion==='si'?'block':'none'};margin:.4rem 0 0"><input id="clin-donde" type="text" placeholder="¿Dónde?" autocomplete="off"></div>
    <span style="${LBL_ST}">Rechaza tratamiento</span>${clinWrap(
      `<button type="button" data-cgrp="rechaza" data-cval="si" onclick="clinBool('rechaza','si')" style="${pillStyle(c.rechaza==='si')}">Sí</button>`+
      `<button type="button" data-cgrp="rechaza" data-cval="no" onclick="clinBool('rechaza','no')" style="${pillStyle(c.rechaza==='no')}">No</button>`)}
    <div class="field" id="clin-rechaza-extra" style="display:${c.rechaza==='si'?'block':'none'};margin:.4rem 0 0"><input id="clin-motivo" type="text" placeholder="Motivo" autocomplete="off"></div>
    <span style="${LBL_ST}">Código real <span style="text-transform:none;letter-spacing:0;font-weight:500">(presunto: ${codEmoji(ep.data.codigoPresuntivo)} ${ep.data.codigoPresuntivo||'—'})</span></span>${clinWrap(clinGrp('codigoReal',COD_REAL,c.codigoReal,false,true))}
  </div>
  <div class="card"><div class="ch">Antecedente crónico nuevo</div>
    <div style="font-size:.7rem;color:var(--ink3);margin-bottom:.45rem">Lo que marques se suma a los crónicos del paciente al cerrar (no se re-pregunta a futuro).</div>
    <div style="display:flex;flex-wrap:wrap;gap:.4rem">
      ${ANTECEDENTES.map(a=>`<label style="${CHIP_ST}"><input type="checkbox" class="clin-cron" value="${a}"> ${a}</label>`).join('')}
      <label style="${CHIP_ST}"><input type="checkbox" class="clin-cron" value="otros" onclick="clinCronOtros(this)"> otros</label>
    </div>
    <div class="field" id="clin-cron-otros" style="display:none;margin-top:.4rem"><input id="clin-cron-otros-txt" type="text" placeholder="Otro antecedente crónico" autocomplete="off"></div>
  </div>
  <div id="ep-err" class="err" style="display:none;margin-bottom:.5rem"></div>
  <button class="btn-r" onclick="clinCerrar()">Cerrar episodio</button>
  <button class="btn-o" onclick="epStage('')" style="margin-top:.5rem">Volver (sin guardar)</button>`;
}

async function clinCerrar(){
  const ep=S.ep, c=ep.clin;
  epMsg('');
  const g=id=>(document.getElementById(id)?.value||'').trim();
  const dx=g('clin-dx');
  // VALIDACIÓN MÍNIMA: código real + diagnóstico. El resto opcional.
  if(!c.codigoReal){ epMsg('Seleccioná el código real antes de cerrar'); return; }
  if(!dx){ epMsg('Cargá el diagnóstico presuntivo antes de cerrar'); return; }

  const ecg=g('clin-ecg'), psiq=g('clin-psiq'), abdOtros=g('clin-abd-otros-txt');
  const examen={
    respiratorio:   c.respiratorio   ? {examinado:true,estado:c.respiratorio}   : {examinado:false,estado:null},
    cardiovascular: c.cardiovascular ? {examinado:true,estado:c.cardiovascular} : {examinado:false,estado:null},
    abdomen:        c.abdomen.length ? {examinado:true,hallazgos:c.abdomen.slice(),otros:(c.abdomen.includes('otros')?abdOtros:'')} : {examinado:false,hallazgos:[],otros:''},
    ecg:            {examinado:!!ecg,texto:ecg},
    psiquiatrico:   {examinado:!!psiq,texto:psiq}
  };
  const interna=(c.internacion==='si'), rechaza=(c.rechaza==='si');
  const desenlace={
    procedimiento:g('clin-proc'), medicamento:g('clin-med'), diagnostico:dx, epicrisis:g('clin-epi'),
    internacion:{interna, donde:interna?g('clin-donde'):''},
    rechazaTratamiento:{rechaza, motivo:rechaza?g('clin-motivo'):''},
    codigoReal:c.codigoReal
  };

  // CRÓNICO NUEVO → PACIENTE (escritura separada, antes del cierre del episodio)
  const cron=[...document.querySelectorAll('.clin-cron:checked')].map(x=>x.value);
  const cronOtrosTxt = cron.includes('otros') ? g('clin-cron-otros-txt') : '';
  if(cron.length && ep.data.pacienteId){
    const updP={ antecedentesCronicos: firebase.firestore.FieldValue.arrayUnion(...cron) };
    if(cronOtrosTxt){
      const prev=(ep.paciente&&ep.paciente.antecedentesOtros)||'';
      updP.antecedentesOtros=[prev,cronOtrosTxt].filter(Boolean).join('; '); // append, no pisa lo previo
    }
    try{ await db.collection('pacientes').doc(ep.data.pacienteId).set(updP,{merge:true}); }
    catch(e){ epMsg('No se pudo actualizar antecedentes del paciente: '+(e.message||e)); return; }
  }

  // CIERRE del episodio — escritor único. codigoPresuntivo queda intacto.
  // cierres[] versiona cada cierre (1ra vez y recierres tras reapertura).
  // OJO: dentro de arrayUnion NO va FV()/serverTimestamp -> timestamp de cliente (Date.now()).
  await epUpdate({
    estado:'cerrado', examen, desenlace,
    ['transiciones.cerrado']:FV(),
    cierres: firebase.firestore.FieldValue.arrayUnion({
      cerradoEn: Date.now(),
      examen: examen,
      desenlace: desenlace,
      por: S.user.uid
    })
  });
  audit('episodio_cerrado','episodio',(S.ep&&S.ep.data&&S.ep.data.id)||'','clinico'+((desenlace&&desenlace.codigoReal)?(' '+desenlace.codigoReal):''));
}

// Reapertura: cerrado -> atencion. Solo médico ASIGNADO o admin (la regla es la defensa real).
// hasOnly ESTRICTO en reglas: toca SOLO estado + reabierto (NO cierres ni transiciones).
async function epReabrir(){
  const d=S.ep.data;
  const puede = (S.user.rol==='medico' && S.user.uid===d.medicoId) || S.user.rol==='admin';
  if(!puede){ return; }
  await epUpdate({
    estado:'atencion',
    reabierto:{
      por: S.user.uid,
      rol: S.user.rol,
      en: Date.now(),
      veces: (d.reabierto && d.reabierto.veces ? d.reabierto.veces : 0) + 1
    }
  });
}

// Handoff CEDER: el médico asignado ofrece su caso (queda congelado para él hasta que otro lo tome).
// Toca solo ofrecido + handoff (espejo de la regla). serverTimestamp NO va dentro del objeto -> Date.now().
async function epCeder(){
  await epUpdate({
    ofrecido:true,
    handoff:{ de:S.user.uid, deNombre:S.user.nombre, cedidoEn:Date.now() }
  });
}

// Handoff TOMAR: otro médico toma el caso ofrecido -> se pone como medicoId y baja ofrecido.
async function epTomar(){
  const h=S.ep.data.handoff||{};
  await epUpdate({
    medicoId:S.user.uid,
    medicoNombre:S.user.nombre,
    ofrecido:false,
    handoff:{ ...h, a:S.user.uid, aNombre:S.user.nombre, tomadoEn:Date.now() }
  });
}

/* ===================== SUPERADMIN — Panel de Gestión de Personal/Roles =====================
   Opción A (solo Firestore): gestiona docs usuarios/{uid} (+ sincroniza staff_medico/{uid}
   cuando el rol es médico). NO toca Firebase Auth (alta de cuentas = script aparte).
   Baja = lógica (activo=false), nunca borrado. Guard anti-lockout: el superadmin no puede
   quitarse el rol ni darse de baja a sí mismo. */

// Roles reales del sistema (no se inventan director_* hasta que tengan reglas/UI propias).
const ROLES_PERSONAL=['superadmin','admin','despachante','medico','chofer','afiliado'];

function spMsg(t,ok){ const e=document.getElementById('sp-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color = (t&&ok)?'var(--g,#1D9E75)':''; } }
const spVal=id=>(document.getElementById(id)?.value||'').trim();
function spErr(e){ return (e&&e.message)||String(e); }

/* Listeners en tiempo real: la lista se refresca sola (no hay botón "Actualizar"). */
function spAttach(){
  if(S.spUnsub) return;
  S.spUnsub=[
    db.collection('usuarios').onSnapshot(s=>{ if(!S.sp) return; S.sp.users=s.docs.map(d=>({uid:d.id,...d.data()})); if(spIdle()) render(); }, e=>{ if(S.sp){ S.sp.err=spErr(e); render(); } }),
    db.collection('staff_medico').onSnapshot(s=>{ if(!S.sp) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.sp.staff=o; if(spIdle()) render(); }, ()=>{}),
    // Bloque 3 (staff): padrón laboral + identidad. Read-only acá para mostrar/editar; el alta de CUENTA sigue por la CF.
    db.collection('staff').onSnapshot(s=>{ if(!S.sp) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.sp.staffDocs=o; if(spIdle()) render(); }, ()=>{}),
    db.collection('personas').onSnapshot(s=>{ if(!S.sp) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.sp.personas=o; if(spIdle()) render(); }, ()=>{})
  ];
}
function spDetach(){ if(S.spUnsub){ S.spUnsub.forEach(u=>{ try{u();}catch(_){} }); S.spUnsub=null; } }
// idle = estoy en la lista (no en un form): un snapshot no debe re-renderizar y pisar lo que se tipea.
function spIdle(){ return !!(S.user && S.user.rol==='superadmin' && S.sp && !S.sp.edit && !S.sp.creating); }

function spReintentar(){ spDetach(); S.sp=null; render(); }
function spTab(t){ if(S.sp){ S.sp.tab=t; S.sp.edit=null; S.sp.creating=false; } render(); navPush(); }
function spOpenCreate(){ if(S.sp){ S.sp.creating=true; S.sp.edit=null; } render(); navPush(); }
function spVincReset(){ if(S.sp){ S.sp.vincDni=''; S.sp.vincMatch=null; S.sp.vincMsg=''; S.sp.vincOk=false; } }
function spOpenEdit(uid){ if(S.sp){ S.sp.edit=uid; S.sp.creating=false; spVincReset(); } render(); navPush(); }
function spBack(){ if(S.sp){ S.sp.edit=null; S.sp.creating=false; spVincReset(); } render(); }

function spPanel(){
  if(!S.sp){ S.sp={tab:'personal',edit:null,creating:false,users:null,staff:{},staffDocs:{},personas:{}}; spAttach(); }
  if(S.sp.err) return `<div class="card">No se pudo cargar: ${esc(S.sp.err)}<br><button class="btn-o" onclick="spReintentar()" style="margin-top:.6rem">Reintentar</button></div>`;
  if(S.sp.users===null) return `<div class="card">Cargando personal…</div>`;
  if(S.sp.creating) return spCreateView();
  if(S.sp.edit) return spEditView();
  return spListView();
}

function spListView(){
  const tab=S.sp.tab||'personal';
  const all=S.sp.users;
  const nPers=all.filter(u=>u.rol!=='afiliado').length;
  const nAfil=all.filter(u=>u.rol==='afiliado').length;
  // "Personal" = roles operativos/directivos (todo menos afiliado); afiliados (cuentas de paciente) en solapa aparte.
  const list=(tab==='afiliados'?all.filter(u=>u.rol==='afiliado'):all.filter(u=>u.rol!=='afiliado'))
    .slice().sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const rows=list.length?list.map(spRow).join(''):`<div style="font-size:.78rem;color:var(--ink3)">Sin registros</div>`;
  const tabBtn=(id,lbl)=>`<button class="btn-o" style="width:auto;padding:.4rem .8rem;${tab===id?'border-color:var(--r);color:var(--r);font-weight:700':''}" onclick="spTab('${id}')">${lbl}</button>`;
  return `
  <div class="panel-h"><b>Gestión de personal</b><span class="live-tag">en vivo</span></div>
  <button class="btn-r" onclick="spOpenCreate()" style="margin-bottom:.7rem">+ Crear persona</button>
  <div style="display:flex;gap:.4rem;margin-bottom:.7rem">
    ${tabBtn('personal','Personal ('+nPers+')')}
    ${tabBtn('afiliados','Cuentas afiliado ('+nAfil+')')}
  </div>
  <div class="card">${rows}</div>`;
}

function spRow(u){
  const activo=u.activo!==false; // campo ausente = activo
  const esMed=u.rol==='medico';
  const st=S.sp.staff[u.uid];
  const asignable=esMed && st && st.activo!==false;
  const medMark=esMed?` · ${asignable?'🩺 asignable':'🩺 no asignable'}`:'';
  // Ficha de staff (Bloque 3): rol laboral + estado, si existe.
  const sd=(S.sp.staffDocs||{})[u.uid];
  const staffMark=sd?` · staff: ${esc(sd.rol||'—')}${sd.activo===false?' (inactivo)':''}`:'';
  const badge=activo?`<span class="badge bg">activo</span>`:`<span class="badge br">inactivo</span>`;
  return `<div class="lr" onclick="spOpenEdit('${u.uid}')" style="cursor:pointer">
    <div class="lrb"><div class="lrn">${esc(u.nombre||'—')}</div>
      <div class="lrs">${esc(u.email||'')} · ${esc(u.rol||'—')}${medMark}${staffMark}</div></div>
    ${badge}
  </div>`;
}

/* CREAR persona -> Cloud Function createUser (Auth + usuarios + staff_medico si médico). */
function spCreateView(){
  const roleOpts=ROLES_PERSONAL.map(r=>`<option value="${r}" ${r==='despachante'?'selected':''}>${r}</option>`).join('');
  return `
  <div style="margin-bottom:.5rem"><button class="btn-o" style="width:auto;padding:.4rem .8rem" onclick="navBack()">← Volver</button></div>
  <div class="card card-dk"><div class="ch">Crear persona</div>
    <div style="font-size:.8rem;color:rgba(255,255,255,.6)">Crea la cuenta de acceso + su ficha. Si el rol es médico, queda asignable en el despacho.</div></div>
  <div class="card">
    <div class="field"><label>Nombre</label><input id="sp-c-nombre" type="text" autocomplete="off"></div>
    <div class="field"><label>Email</label><input id="sp-c-email" type="email" placeholder="usuario@medicaronline.ar" autocomplete="off"></div>
    <div class="field"><label>Rol</label><select id="sp-c-rol">${roleOpts}</select></div>
    <div class="field"><label>Contraseña inicial</label><input id="sp-c-pass" type="text" placeholder="mín. 6 caracteres" autocomplete="off"></div>
    <div id="sp-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" id="sp-c-btn" onclick="spCrear()">Crear</button>
  </div>`;
}
async function spCrear(){
  spMsg('');
  const nombre=spVal('sp-c-nombre'), email=spVal('sp-c-email'), rol=document.getElementById('sp-c-rol')?.value||'';
  const pass=document.getElementById('sp-c-pass')?.value||'';
  if(!nombre||!email){ spMsg('Nombre y email son requeridos.'); return; }
  if(pass.length<6){ spMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
  const btn=document.getElementById('sp-c-btn'); if(btn){ btn.disabled=true; btn.textContent='Creando…'; }
  try{
    const res=await fnsCall('createUser',{email,nombre,rol,passwordInicial:pass});
    const uid=res&&res.uid;
    // Bloque 3: tras el alta de CUENTA (CF intacta), engancho persona+staff client-side con el uid devuelto.
    // Excluye afiliado/superadmin (no integran el padrón staff). Si el enganche falla, la cuenta YA quedó
    // creada por la CF; se completa luego con migrarStaffUno(uid). NO altera la CF ni la cuenta.
    if(uid && rol!=='afiliado' && rol!=='superadmin'){
      try{
        const np=parseNombre(nombre);
        await db.collection('personas').doc(uid).set({ apellido:np.apellido, nombre:np.nombre, dni:'', fechaNacimiento:'', telefono:'', email, direccion:'', antecedentesCronicos:[], antecedentesOtros:'', creadoEn:FV() },{merge:true});
        await db.collection('staff').doc(uid).set({ personaId:uid, rol:staffRolDe(rol), matricula:'', activo:true, nombre:nombreStaff(np.apellido, np.nombre), creadoEn:FV() },{merge:true});
        await db.collection('usuarios').doc(uid).set({ personaId:uid },{merge:true});
      }catch(e2){ console.warn('[spCrear] enganche staff/persona falló (la cuenta se creó OK):',e2); }
    }
    if(S.sp) S.sp.creating=false; render(); // el listener trae el nuevo registro
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Crear'; } spMsg(spErr(e)); }
}

function spEditView(){
  const u=S.sp.users.find(x=>x.uid===S.sp.edit);
  if(!u){ S.sp.edit=null; return spListView(); }
  const esSelf=u.uid===S.user.uid;
  const activo=u.activo!==false;
  const roleOpts=ROLES_PERSONAL.map(r=>`<option value="${r}" ${u.rol===r?'selected':''}>${r}</option>`).join('');
  return `
  <div style="margin-bottom:.5rem"><button class="btn-o" style="width:auto;padding:.4rem .8rem" onclick="navBack()">← Volver</button></div>
  <div class="card card-dk"><div class="ch">Editar persona</div>
    <div style="font-size:1.05rem;font-weight:700;color:#fff">${esc(u.nombre||'—')}</div>
    <div style="font-size:.85rem;color:#fff;opacity:.8;margin-top:.15rem">${esc(u.email||'')}</div>
    ${esSelf?`<div style="background:var(--o,#E0A23B);color:#fff;border-radius:8px;padding:.45rem .6rem;font-size:.76rem;font-weight:600;margin-top:.55rem">Es tu propia cuenta: no podés quitarte superadmin, darte de baja ni borrarte.</div>`:''}
  </div>
  <div class="card">
    <div class="field"><label>Nombre</label><input id="sp-nombre" type="text" value="${esc(u.nombre||'')}" autocomplete="off"></div>
    <div class="field"><label>Rol</label><select id="sp-rol" ${esSelf?'disabled':''}>${roleOpts}</select></div>
    <div class="field"><label>Estado</label><select id="sp-activo" ${esSelf?'disabled':''}>
      <option value="si" ${activo?'selected':''}>Activo</option>
      <option value="no" ${!activo?'selected':''}>Inactivo (baja lógica)</option>
    </select></div>
    <div style="font-size:.68rem;color:var(--ink3);margin:-.3rem 0 .6rem">Rol a/desde médico sincroniza staff_medico. La baja lógica lo saca del selector de despacho.</div>
    <div id="sp-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" onclick="spGuardar('${u.uid}')">Guardar cambios</button>
  </div>
  <div class="card"><div class="ch">Contraseña</div>
    <div class="field"><label>Nueva contraseña</label><input id="sp-rp" type="text" placeholder="mín. 6 caracteres" autocomplete="off"></div>
    <button class="btn-o" onclick="spResetPass('${u.uid}')">Resetear contraseña</button>
  </div>
  ${spCardPermisos(u)}
  ${spVinculoAfiliadoCard(u)}
  ${spStaffPersonaCards(u)}
  <div class="card"><div class="ch">Zona peligrosa</div>
    ${esSelf
      ? `<div style="font-size:.78rem;color:var(--ink3)">No podés borrar tu propia cuenta.</div>`
      : `<div style="font-size:.7rem;color:var(--ink3);margin-bottom:.5rem">Si tiene episodios asociados, se desactiva (baja lógica) en vez de borrarse.</div>
         <button class="btn-r" onclick="spBorrar('${u.uid}')">Borrar persona</button>`}
  </div>`;
}

// EDITAR nombre/rol/estado: escritura directa a Firestore (el superadmin tiene permiso por reglas).
async function spGuardar(uid){
  const u=S.sp.users.find(x=>x.uid===uid); if(!u) return;
  spMsg('');
  const esSelf=uid===S.user.uid;
  const nombre=spVal('sp-nombre');
  const rol = esSelf ? u.rol : (document.getElementById('sp-rol')?.value||u.rol);
  const activo = esSelf ? true : ((document.getElementById('sp-activo')?.value||'si')==='si');
  if(esSelf && (rol!=='superadmin' || activo!==true)){ spMsg('No podés quitarte el rol superadmin ni darte de baja.'); return; }
  if(!nombre){ spMsg('El nombre no puede estar vacío.'); return; }
  try{
    await db.collection('usuarios').doc(uid).set({ rol, nombre, activo }, { merge:true });
    if(rol==='medico'){
      await db.collection('staff_medico').doc(uid).set({ nombre, activo }, { merge:true });
    }else if(S.sp.staff[uid]){
      await db.collection('staff_medico').doc(uid).set({ activo:false }, { merge:true });
    }
    if(S.sp) S.sp.edit=null; render(); // el listener refleja el cambio
  }catch(e){ spMsg('No se pudo guardar: '+spErr(e)); }
}

// RESETEAR contraseña -> Cloud Function setPassword.
async function spResetPass(uid){
  spMsg('');
  const p=document.getElementById('sp-rp')?.value||'';
  if(p.length<6){ spMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
  try{
    await fnsCall('setPassword',{uid,nuevaPassword:p});
    const el=document.getElementById('sp-rp'); if(el) el.value='';
    spMsg('✓ Contraseña actualizada.',true);
  }catch(e){ spMsg(spErr(e)); }
}

// BORRAR -> Cloud Function deleteUser (borra si no tiene episodios; si tiene, baja lógica).
async function spBorrar(uid){
  spMsg('');
  if(uid===S.user.uid){ spMsg('No podés borrarte a vos mismo.'); return; }
  if(!confirm('¿Borrar esta persona? Si tiene episodios asociados se desactivará (baja lógica) en vez de borrarse.')) return;
  try{
    const r=await fnsCall('deleteUser',{uid});
    if(S.sp) S.sp.edit=null; render();
    if(r&&r.deleted) alert('Persona borrada.');
    else if(r&&r.deactivated) alert('Tenía episodios asociados: se desactivó (baja lógica) en vez de borrarse.');
  }catch(e){ spMsg(spErr(e)); }
}

/* ===================== STAFF + PERSONA del personal (Estructura 3, Bloque 3) =====================
   Se SUMA alrededor de la gestión de cuentas existente; NO la reemplaza. Las Cloud Functions
   (createUser/setPassword/deleteUser) quedan intactas. staff/{uid} y personas/{uid} reusan el uid
   del usuario (personaId == uid), igual que socios/personas reusan pacienteId en el Bloque 2.
   Excluye del padrón a 'afiliado' (es socio/paciente) y 'superadmin' (dueño, caso especial). */
function parseNombre(full){ const w=String(full||'').trim().split(/\s+/).filter(Boolean); if(!w.length) return {apellido:'',nombre:''}; if(w.length===1) return {apellido:'',nombre:w[0]}; return {apellido:w[w.length-1], nombre:w.slice(0,-1).join(' ')}; }
const STAFF_ROL={medico:'medico',chofer:'chofer',despachante:'despachante',admin:'administrativo'};
function staffRolDe(userRol){ return STAFF_ROL[userRol]||'administrativo'; }

/* ---- Vínculo cuenta-afiliado <-> persona (Etapa 23 — app del socio) ----
   Las cuentas rol 'afiliado' NO tienen personaId (el backfill de staff las excluyó). Acá se
   busca la persona por DNI (en el padrón ya cargado por el listener) y se guarda
   usuarios/{uid}.personaId — así el socio ve su credencial en la PWA. Solo toca ese campo en
   usuarios; el superadmin tiene permiso por reglas. Quitar vínculo = personaId:null. */
function spVinculoAfiliadoCard(u){
  if(u.rol!=='afiliado') return '';
  const nomDe=p=>((p&&p.apellido||'')+', '+(p&&p.nombre||'')).replace(/^, /,'').replace(/, $/,'');
  const pid=u.personaId;
  if(pid){
    const per=(S.sp.personas||{})[pid]||{};
    const nom=nomDe(per)||'(persona '+pid+')';
    return `<div class="card"><div class="ch">Vínculo con persona (socio)</div>
      <div style="font-size:.76rem;color:var(--ink2);margin-bottom:.5rem">Esta cuenta entra a la app del socio con la identidad de:</div>
      <div class="lr"><div class="lrb"><div class="lrn">${esc(nom)}</div><div class="lrs">DNI ${esc(per.dni||'—')} · id ${esc(pid)}</div></div></div>
      <button class="btn-o" style="margin-top:.6rem" onclick="spAfilDesvincular('${u.uid}')">Quitar vínculo</button>
    </div>`;
  }
  const m=S.sp.vincMatch;
  const matchBox = m
    ? `<div class="lr" style="margin-top:.5rem"><div class="lrb"><div class="lrn">${esc(nomDe(m)||'(sin nombre)')}</div><div class="lrs">DNI ${esc(m.dni||'—')} · id ${esc(m.id)}</div></div></div>
       <button class="btn-r" style="margin-top:.5rem" onclick="spAfilVincular('${u.uid}','${m.id}')">Vincular esta persona</button>`
    : '';
  return `<div class="card"><div class="ch">Vincular con persona (socio)</div>
    <div style="font-size:.72rem;color:var(--ink3);margin-bottom:.5rem">Esta cuenta de afiliado no tiene una persona vinculada. Buscá por DNI para asociarla (así ve su credencial en la app del socio).</div>
    <div class="field"><label>DNI de la persona</label><input id="sp-vinc-dni" value="${esc(S.sp.vincDni||'')}" placeholder="sin puntos" inputmode="numeric"></div>
    <div id="sp-vinc-msg" class="err" style="display:${S.sp.vincMsg?'block':'none'};margin-bottom:.5rem;${S.sp.vincOk?'color:var(--g,#1D9E75)':''}">${esc(S.sp.vincMsg||'')}</div>
    <button class="btn-o" onclick="spAfilBuscarPersona()">Buscar persona</button>
    ${matchBox}
  </div>`;
}
function spAfilBuscarPersona(){
  const raw=(document.getElementById('sp-vinc-dni')?.value||'').replace(/\D/g,'');
  S.sp.vincDni=raw; S.sp.vincMatch=null; S.sp.vincOk=false;
  if(raw.length<6){ S.sp.vincMsg='Ingresá un DNI válido (solo números).'; render(); return; }
  const personas=S.sp.personas||{};
  const hits=Object.keys(personas).filter(id=>String(personas[id].dni||'').replace(/\D/g,'')===raw).map(id=>({id,...personas[id]}));
  if(!hits.length){ S.sp.vincMsg='No hay ninguna persona con ese DNI en el padrón. Cargala primero en Afiliados.'; render(); return; }
  if(hits.length>1){ S.sp.vincMsg='Hay '+hits.length+' personas con ese DNI; resolvé el duplicado antes de vincular.'; render(); return; }
  S.sp.vincMatch=hits[0]; S.sp.vincMsg=''; render();
}
async function spAfilVincular(uid,personaId){
  try{
    await db.collection('usuarios').doc(uid).set({ personaId }, { merge:true });
    audit('afiliado_vinculado','usuario',uid,'persona '+personaId);
    spVincReset(); render();
  }catch(e){ S.sp.vincMsg='No se pudo vincular: '+spErr(e); S.sp.vincOk=false; render(); }
}
async function spAfilDesvincular(uid){
  if(!confirm('¿Quitar el vínculo de esta cuenta con su persona? El socio dejará de ver su credencial en la app hasta volver a vincularla.')) return;
  try{
    await db.collection('usuarios').doc(uid).set({ personaId:null }, { merge:true });
    audit('afiliado_desvinculado','usuario',uid,'');
    spVincReset(); render();
  }catch(e){ S.sp.vincMsg='No se pudo quitar: '+spErr(e); render(); }
}

function spStMsg(id,t){ const e=document.getElementById(id); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
// Fase-usuarios-hardening: nombre denormalizado en `staff` (fuente NO sensible para los selectores de Móviles/Cronograma).
// Formato "Apellido, Nombre" (calca el socioNombre de generarAbonos; el chip muestra la primera palabra = apellido).
function nombreStaff(ape,nom){ return ((ape||'')+', '+(nom||'')).replace(/^, /,'').replace(/, $/,'')||''; }
async function spGuardarStaff(uid){
  spStMsg('sp-st-err','');
  const rol=document.getElementById('sp-st-rol')?.value||'administrativo';
  const matricula=(document.getElementById('sp-st-mat')?.value||'').trim();
  const activo=(document.getElementById('sp-st-activo')?.value||'si')==='si';
  const exists=!!(S.sp.staffDocs||{})[uid];
  const per=((S.sp&&S.sp.personas)||{})[uid]||{}; // nombre desde la persona ya cargada
  const data={ personaId:uid, rol, matricula, activo, nombre:nombreStaff(per.apellido, per.nombre), actualizadoEn:FV() };
  if(!exists) data.creadoEn=FV();
  try{
    await db.collection('staff').doc(uid).set(data,{merge:true});
    audit('staff_guardado','staff',uid,rol);
    S.sp.staffDocs[uid]=Object.assign({}, S.sp.staffDocs[uid]||{}, {personaId:uid,rol,matricula,activo}); // optimista
    render();
  }catch(e){ spStMsg('sp-st-err','No se pudo guardar la ficha: '+spErr(e)); }
}
async function spGuardarPersona(uid){
  spStMsg('sp-pe-err','');
  const apellido=(document.getElementById('sp-pe-ape')?.value||'').trim();
  const nombre=(document.getElementById('sp-pe-nom')?.value||'').trim();
  if(!apellido && !nombre){ spStMsg('sp-pe-err','Completá al menos apellido o nombre.'); return; }
  const exists=!!(S.sp.personas||{})[uid];
  const data={ apellido, nombre,
    dni:(document.getElementById('sp-pe-dni')?.value||'').trim(),
    fechaNacimiento:(document.getElementById('sp-pe-fnac')?.value||''),
    telefono:(document.getElementById('sp-pe-tel')?.value||'').trim(),
    email:(document.getElementById('sp-pe-email')?.value||'').trim(),
    direccion:(document.getElementById('sp-pe-dir')?.value||'').trim(),
    actualizadoEn:FV() };
  if(!exists){ data.antecedentesCronicos=[]; data.antecedentesOtros=''; data.creadoEn=FV(); }
  try{
    await db.collection('personas').doc(uid).set(data,{merge:true});
    // Sync del nombre denormalizado en staff (si existe): el selector de Móviles/Cronograma no queda con nombre viejo.
    if((S.sp.staffDocs||{})[uid]){
      try{ await db.collection('staff').doc(uid).set({ nombre:nombreStaff(apellido, nombre), actualizadoEn:FV() },{merge:true}); if(S.sp.staffDocs[uid]) S.sp.staffDocs[uid].nombre=nombreStaff(apellido, nombre); }catch(_){}
    }
    // Sync doble-rol: si esta persona también es socio (staff+socio), sincronizar socios.nombreVista (mismo helper que generarAbonos lee).
    try{ const ss=await db.collection('socios').where('personaId','==',uid).get(); for(const sd of ss.docs){ await db.collection('socios').doc(sd.id).set({ nombreVista: socioNombreDe({ apellido, nombre, dni:data.dni }) },{merge:true}); } }catch(_){}
    S.sp.personas[uid]=Object.assign({}, S.sp.personas[uid]||{}, data); // optimista
    render();
  }catch(e){ spStMsg('sp-pe-err','No se pudo guardar la identidad: '+spErr(e)); }
}

/* ---- Migración Bloque 3: usuarios -> persona + staff (MISMO uid), idempotente. NO la corre la app sola;
   se invoca a mano en verificación con sesión superadmin (consola / Claude in Chrome). NO toca cuentas Auth,
   NO borra staff_medico (queda intacto), NO toca afiliado/superadmin, NO toca episodios. ---- */
async function migrarStaffUno(uid, uData){
  const out={uid, persona:null, staff:null, personaIdBackfill:false, skipped:[]};
  let u=uData;
  if(!u){ const us=await db.collection('usuarios').doc(uid).get(); if(!us.exists) throw new Error('No existe usuarios/'+uid); u=us.data(); }
  if(u.rol==='afiliado'||u.rol==='superadmin'){ out.skipped.push('rol '+u.rol+' excluido del padrón staff'); console.log('[migrarStaffUno]',out); return out; }
  // 1) persona/{uid} (mismo id), idempotente. Identidad mínima parseada del nombre del usuario.
  const perRef=db.collection('personas').doc(uid);
  if((await perRef.get()).exists){ out.skipped.push('persona ya existía'); out.persona=uid; }
  else{
    const np=parseNombre(u.nombre);
    await perRef.set({ apellido:np.apellido, nombre:np.nombre, dni:'', fechaNacimiento:'', telefono:'', email:u.email||'', direccion:'', antecedentesCronicos:[], antecedentesOtros:'', creadoEn:FV() });
    out.persona=uid;
  }
  // 2) staff/{uid} (mismo id), idempotente. Para médicos arrastra 'activo' de staff_medico si existe.
  const stRef=db.collection('staff').doc(uid);
  if((await stRef.get()).exists){ out.skipped.push('staff ya existía'); out.staff=uid; }
  else{
    let activo=true;
    if(u.rol==='medico'){ const sm=await db.collection('staff_medico').doc(uid).get(); if(sm.exists) activo=sm.data().activo!==false; }
    const npS=parseNombre(u.nombre);
    await stRef.set({ personaId:uid, rol:staffRolDe(u.rol), matricula:'', activo, nombre:nombreStaff(npS.apellido, npS.nombre), creadoEn:FV() });
    out.staff=uid;
  }
  // 3) backfill usuarios/{uid}.personaId = uid (cierra el enlace; la regla de usuarios exige superadmin).
  await db.collection('usuarios').doc(uid).set({ personaId:uid },{merge:true});
  out.personaIdBackfill=true;
  console.log('[migrarStaffUno]', out);
  return out;
}
async function migrarStaff(){
  const snap=await db.collection('usuarios').get();
  const res=[];
  for(const d of snap.docs){
    const u=d.data();
    if(u.rol==='afiliado'||u.rol==='superadmin'){ continue; }
    res.push(await migrarStaffUno(d.id, u));
  }
  console.log('[migrarStaff] procesados:', res.length, res);
  return res;
}

/* ===================== SUPERADMIN — Centro de mando (navegación interna) =====================
   superView() = menú de secciones + cuerpo. Default: Dashboard. Secciones activas:
   Dashboard + Personal (la existente). Móviles/Auditoría/Configuración: previstas (próximamente).
   Cada sección con onSnapshot tiene su detach al salir de la sección y en logout. */

// [id, label, activa]
const SUPER_SECS=[['dashboard','Dashboard',true],['personal','Personal',true],['moviles','Móviles',true],['cronograma','Cronograma',true],['catalogo','Catálogo',true],['afiliados','Afiliados',true],['facturacion','Facturación',true],['cobranza','Cobranza',true],['novedades','Novedades',true],['marketing','Marketing',true],['estadisticas','Estadísticas',true],['auditoria','Auditoría',true],['monitoreo','Monitoreo',true]];

function superMenu(sec){
  const items=SUPER_SECS.map(([id,lbl,on])=>{
    const active=sec===id;
    const style=`white-space:nowrap;width:auto;padding:.4rem .7rem;${active?'border-color:var(--r);color:var(--r);font-weight:700':''}${on?'':';opacity:.5;cursor:not-allowed'}`;
    return on
      ? `<button class="btn-o" style="${style}" onclick="superNav('${id}')">${lbl}</button>`
      : `<button class="btn-o" style="${style}" disabled>${lbl} · próx</button>`;
  }).join('');
  return `<div style="display:flex;gap:.4rem;overflow-x:auto;margin-bottom:.7rem;padding-bottom:.2rem">${items}</div>`;
}

function superView(){
  if(!S.superSec) S.superSec='dashboard';
  const sec=S.superSec;
  let body;
  if(sec==='personal') body=spPanel();
  else if(sec==='dashboard') body=dashSuper();

// Cambiar de sección: cortar listeners + estado de la sección que dejo.
function superNav(sec){
  if(S.superSec==='personal'){ spDetach(); S.sp=null; }
  if(S.superSec==='dashboard'){ dashDetach(); S.dash=null; if(S.mapaVivo){ try{S.mapaVivo.remove();}catch(_){} S.mapaVivo=null; } }
