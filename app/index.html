function facHoyISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// registrarPago — tx atómica contadores/recibos + create del pago (calco de generarFacturas). Luego flip derivado.
async function registrarPago(fid){
  if(!puedeCobrar()) return; cobErr('');
  const f=(S.cob.facturas||[]).find(x=>x.id===fid); if(!f){ cobErr('Factura no encontrada.'); return; }
  if(f.estado!=='emitida'){ cobErr('Solo se cobran facturas emitidas.'); return; }
  const monto=Number(document.getElementById('cob-monto')?.value);
  const medio=document.getElementById('cob-medio')?.value||'';
  const fecha=(document.getElementById('cob-fecha')?.value||'').trim();
  const nota=(document.getElementById('cob-nota')?.value||'').trim();
  if(!(monto>0)){ cobErr('El monto debe ser mayor a 0.'); return; }
  if(!['efectivo','transferencia','deposito'].includes(medio)){ cobErr('Elegí un medio de pago.'); return; }
  if(!/^\d{4}-\d{2}-\d{2}$/.test(fecha)){ cobErr('Elegí la fecha del cobro.'); return; }
  const pagadoPrev=cobPagadoDe(fid); const saldo=(Number(f.total)||0)-pagadoPrev;
  if(monto>saldo+0.001){ cobErr('El monto supera el saldo ('+facMoney(saldo)+').'); return; }
  const year=new Date().getFullYear();
  // E-3: el pagador DERIVA del cliente de la factura (C-1 modeló pagadorTipo 'empresa'). Persona → personaId; empresa → clienteId.
  const pagadorTipo = f.clienteTipo==='empresa' ? 'empresa' : 'persona';
  const pagadorId   = f.clienteTipo==='empresa' ? (f.clienteId||null) : (f.personaId||null);
  try{
    const counterRef=db.collection('contadores').doc('recibos');
    const pagoRef=db.collection('pagos').doc();
    let reciboAsignado='';
    await db.runTransaction(async tx=>{
      const cs=await tx.get(counterRef);
      const ultimo=cs.exists?(cs.data().ultimo||0):0;
      const next=ultimo+1;
      reciboAsignado=fmtRecibo(next,year);
      tx.set(counterRef,{ultimo:next,actualizadoEn:FV()},{merge:true});
      tx.set(pagoRef,{
        pagadorId, pagadorTipo, facturaId:fid, personaId:f.personaId||null,
        monto, fecha, medio, reciboNro:reciboAsignado, nota:nota||null,
        estado:'registrado', registradoEn:FV(), registradoPor:S.user.uid
      });
    });
    audit('pago_registrado','pago',pagoRef.id,reciboAsignado+' · '+facMoney(monto));
    // Actualización OPTIMISTA local: la tx (a diferencia de .set()) NO refleja el write en el cache antes del
    // round-trip, y el snapshot que llega después lo salta upd() con el detalle abierto (cobFormOpen). Empujamos
    // el pago al estado local para que el render inmediato muestre el saldo/historial nuevos; el snapshot reconcilia.
    if(S.cob && Array.isArray(S.cob.pagos)){
      S.cob.pagos.push({ id:pagoRef.id, pagadorId, pagadorTipo, facturaId:fid, personaId:f.personaId||null, monto, fecha, medio, reciboNro:reciboAsignado, nota:nota||null, estado:'registrado', registradoPor:S.user.uid });
    }
    // Flip derivado: si con este pago se salda, factura emitida->pagada (invariante client-side).
    if(pagadoPrev+monto >= (Number(f.total)||0)-0.001){
      try{ await db.collection('facturas').doc(fid).set({ estado:'pagada', pagadaEn:FV(), pagadaPor:S.user.uid },{merge:true}); audit('factura_pagada','factura',fid,'saldada por cobranza'); }
      catch(e){ console.warn('[registrarPago] flip a pagada falló',e); }
      const lf=(S.cob.facturas||[]).find(x=>x.id===fid); if(lf) lf.estado='pagada'; // espejo local del flip
      S.cob.fedit=null; // saldada: volver a la lista
    }
    render();
  }catch(e){ cobErr('No se pudo registrar el pago: '+(e.message||e)); }
}

function cobAnularPagoPrompt(pid){
  const motivo=prompt('Motivo de anulación del pago:'); // simple; el rebote real lo hace la regla
  if(motivo==null) return; const m=String(motivo).trim();
  if(!m){ cobErr('El motivo es requerido para anular.'); return; }
  cobAnularPago(pid, m);
}
// cobAnularPago — anula el pago (registrado->anulado + motivo). Flip inverso: si la factura estaba pagada
// y al descontar este pago queda Σ < total → pagada->emitida (resuelve app:4399).
async function cobAnularPago(pid, motivo){
  if(!puedeCobrar()) return; cobErr('');
  const p=(S.cob.pagos||[]).find(x=>x.id===pid); if(!p){ cobErr('Pago no encontrado.'); return; }
  if(p.estado!=='registrado'){ cobErr('El pago ya está anulado.'); return; }
  try{
    await db.collection('pagos').doc(pid).set({ estado:'anulado', motivoAnulacion:motivo, anuladoEn:FV(), anuladoPor:S.user.uid },{merge:true});
    audit('pago_anulado','pago',pid,motivo);
    const f=(S.cob.facturas||[]).find(x=>x.id===p.facturaId);
    if(f && f.estado==='pagada'){
      const nuevoPagado=cobPagadoDe(f.id)-(Number(p.monto)||0); // pagado actual menos el que se anula
      if(nuevoPagado < (Number(f.total)||0)-0.001){
        try{ await db.collection('facturas').doc(f.id).set({ estado:'emitida', pagadaEn:null, pagadaPor:null },{merge:true}); audit('factura_reabierta','factura',f.id,'anulación de pago'); }
        catch(e){ console.warn('[cobAnularPago] flip inverso falló',e); }
      }
    }
    render();
  }catch(e){ cobErr('No se pudo anular el pago: '+(e.message||e)); }
}

/* ===================== NOVEDADES (PWA-2a — curaduría del feed "Para vos") =====================
   Gate por ROL admin/superadmin. Cola de aprobación: la CF ingesta deja docs en 'pendiente'; nada se publica solo.
   Badge de pendientes en la tab (listener global). Sub-tabs: Pendientes / Publicados / + Nueva (alta manual 'interno'). */
function novEsAdmin(){ return puede('curar_novedades'); } // Tablero-Fase1: curaduría por cap (antes rol admin)
// ¿El admin está mirando la lista de curación de Novedades AHORA? Señal ROL-AGNÓSTICA: el contenedor #nov-pend-list existe
// en el DOM SOLO cuando esa lista está montada (sirve para superadmin=superSec y admin=cap-tab por igual). La usan el badge
// y el listener de auditoría para NO hacer full render al curar (audit() escribe auditoria en cada acción) → sin salto.
function curandoNovedades(){ return !!document.getElementById('nov-pend-list'); }
function novBadgeAttach(){ // listener GLOBAL del contador de pendientes (para el badge de la tab, siempre-on para admins)
  if(S.novBadgeUnsub) return;
  S.novBadgeUnsub = db.collection('feed_posts').where('estado','==','pendiente').onSnapshot(
    // Actualiza SIEMPRE el conteo, pero NO hace full render mientras estás curando → si no, cada aprobar/descartar
    // reconstruiría #app y saltaría el scroll de div.content.page. La lista y el "Mostrando X de Y" los actualiza el
    // listener de la vista (novRerenderPend). El badge del menú se auto-corrige en la próxima navegación.
    s=>{ if(s.size!==S.novPendCount){ S.novPendCount=s.size; if(!curandoNovedades()) render(); } }, ()=>{ S.novPendCount=0; });
}
const NOV_PAGE=15; // items de la cola por pantalla (paginado con "Cargar más")
function novAttach(){
  if(S.novUnsub) return;
  // upd(): re-render COMPLETO SOLO cuando NO molesta la curación → nunca con el form de edición abierto NI mientras estás
  // en la pestaña Pendientes (ahí el scroll se preserva con actualización puntual del contenedor, no full render).
  const upd=()=>{ if(S.nov && (S.nov.edit || S.nov.sub==='pendientes')) return; render(); };
  S.novUnsub=[
    // Pendientes = la pestaña CALIENTE de curación. Actualización PUNTUAL del contenedor (#nov-pend-list) → NO salta el
    // scroll ni re-arma el #app entero. Optimista: aprobar/descartar ya quitó la card; el snapshot solo reconcilia.
    db.collection('feed_posts').where('estado','==','pendiente').onSnapshot(s=>{ if(!S.nov)return; S.nov.pendientes=s.docs.map(d=>({id:d.id,...d.data()})); if(S.nov.edit) return; if(S.nov.sub==='pendientes') novRerenderPend(); }, e=>{ if(S.nov){ S.nov.err=(e.message||String(e)); render(); } }),
    db.collection('feed_posts').where('estado','==','publicado').onSnapshot(s=>{ if(!S.nov)return; S.nov.publicados=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.nov) S.nov.publicados=[]; }),
    db.collection('feed_posts').where('estado','==','descartado').onSnapshot(s=>{ if(!S.nov)return; S.nov.descartados=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.nov) S.nov.descartados=[]; })
  ];
}
function novFindPost(id){ const b=(S.nov&&S.nov.pendientes||[]).concat(S.nov&&S.nov.publicados||[], S.nov&&S.nov.descartados||[]); return b.find(x=>x.id===id); }
function novDetach(){ if(S.novUnsub){ S.novUnsub.forEach(u=>{ try{u();}catch(_){} }); S.novUnsub=null; } }
function novErr(t){ const e=document.getElementById('nov-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
function novSub(id){ if(!S.nov) return; S.nov.sub=id; S.nov.edit=null; S.nov.img=null; S.nov.imgQuitar=false; render(); navPush(); }
function novFechaLbl(f){ const t=f&&f.toDate?f.toDate():(f&&f.seconds?new Date(f.seconds*1000):null); if(!t) return '—'; return t.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
const NOV_CAT={ medicar:['#ED1C24','MEDICAR'], salud:['#2E8B57','Cuidado'], nutri:['#F7941E','Alimentación'], vida:['#6C5CE7','Vida'] };
function novChip(p){ const c=NOV_CAT[p.cat]||NOV_CAT.medicar; return `<span style="font-size:.6rem;font-weight:800;padding:.05rem .4rem;border-radius:6px;background:${c[0]};color:#fff">${c[1]}</span> <span style="font-size:.62rem;color:var(--ink3)">${esc(p.fuenteNombre||p.origen||'')}</span>`; }
// PWA-2c — imagen del post. Resize antes de subir: lado mayor ≤ 1200px, JPEG q=0.82 (una foto de celu de 4MB baja a ~100-300KB).
function feedResizeImg(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(img.src);
      const MAX=1200; const esc2=Math.min(1, MAX/Math.max(img.width,img.height));
      const cw=Math.max(1,Math.round(img.width*esc2)), ch=Math.max(1,Math.round(img.height*esc2));
      const c=document.createElement('canvas'); c.width=cw; c.height=ch;
      c.getContext('2d').drawImage(img,0,0,cw,ch);
      c.toBlob(b=> b?resolve(b):reject(new Error('No se pudo procesar la imagen')), 'image/jpeg', 0.82);
    };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); reject(new Error('Imagen inválida')); };
    img.src=URL.createObjectURL(file);
  });
}
function feedBlobToDataURL(b){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('lectura')); r.readAsDataURL(b); }); }
async function feedImgSeleccionar(input){
  const f=input.files&&input.files[0]; if(!f || !S.nov) return; novErr('');
  if(!/^image\//.test(f.type)){ novErr('El archivo debe ser una imagen.'); return; }
  if(f.size>15*1024*1024){ novErr('La imagen es demasiado grande (máx. 15 MB antes de comprimir).'); return; }
  try{ const blob=await feedResizeImg(f); const preview=await feedBlobToDataURL(blob); if(!S.nov) return; S.nov.img={ blob, preview }; S.nov.imgQuitar=false; render(); }
  catch(e){ novErr('No se pudo procesar la imagen: '+(e.message||e)); }
}
function feedImgQuitar(){ if(!S.nov) return; S.nov.img=null; S.nov.imgQuitar=true; render(); } // imgQuitar solo importa en edición
async function feedSubirImagen(docId, blob){ const ref=firebase.storage().ref('feed/'+docId+'/img.jpg'); const snap=await ref.put(blob,{contentType:'image/jpeg'}); return await snap.ref.getDownloadURL(); }
// Campo de imagen reusable (alta + edición). Prioridad: pendiente (recién elegida) > actual (edición) > input.
function novImgCampo(currentUrl){
  if(S.nov && S.nov.img && S.nov.img.preview){
    return `<div class="field"><label>Imagen</label><img src="${S.nov.img.preview}" style="max-width:100%;border-radius:10px;display:block;margin-bottom:.4rem">
      <button class="btn-o" style="width:auto;padding:.3rem .6rem;font-size:.7rem" onclick="feedImgQuitar()">Quitar imagen</button></div>`;
  }
  if(currentUrl && !(S.nov && S.nov.imgQuitar)){
    return `<div class="field"><label>Imagen actual</label><img src="${esc(currentUrl)}" style="max-width:100%;border-radius:10px;display:block;margin-bottom:.4rem">
      <div style="display:flex;gap:.4rem"><label class="btn-o" style="width:auto;padding:.3rem .6rem;font-size:.7rem;cursor:pointer;text-align:center;margin:0">Reemplazar<input type="file" accept="image/*" style="display:none" onchange="feedImgSeleccionar(this)"></label>
        <button class="btn-o" style="width:auto;padding:.3rem .6rem;font-size:.7rem" onclick="feedImgQuitar()">Quitar</button></div></div>`;
  }
  return `<div class="field"><label>Imagen (opcional)</label><input type="file" accept="image/*" onchange="feedImgSeleccionar(this)"></div>`;
}

function novPanel(){
  if(!novEsAdmin()) return `<div class="card"><div class="ch">Novedades</div><div style="font-size:.8rem;color:var(--ink3)">Solo para administradores.</div></div>`;
  if(!S.nov){ S.nov={sub:'pendientes', pendientes:null, publicados:null, descartados:null, edit:null, err:'', pendFuente:'todas', pendMostrar:NOV_PAGE}; novAttach(); }
  if(S.nov.err) return `<div class="card">No se pudo cargar novedades: ${esc(S.nov.err)}</div>`;
  const sub=S.nov.sub||'pendientes';

  const tab=(id,lbl)=>`<button onclick="novSub('${id}')" style="flex:1;padding:.45rem .3rem;border:1.5px solid ${sub===id?'var(--r)':'var(--border2)'};background:${sub===id?'var(--r)':'transparent'};color:${sub===id?'#fff':'var(--ink2)'};border-radius:10px;font-size:.68rem;font-weight:600;cursor:pointer">${lbl}</button>`;
  const head=`
  <div class="panel-h"><b>Novedades</b><span class="live-tag">en vivo</span></div>

  <div style="display:flex;gap:.35rem;margin-bottom:.8rem;flex-wrap:wrap">${tab('pendientes','Pendientes'+(nPend?` (${nPend})`:''))}${tab('publicados','Publicados')}${tab('descartados','Descartados')}${tab('nueva','+ Nueva')}</div>

function novPostCard(p, acciones){
  const link = p.link ? `<a href="${esc(p.link)}" target="_blank" rel="noopener" style="font-size:.72rem;color:var(--r);text-decoration:none">Ver fuente ↗</a>` : '';

  return `<div class="card" data-nov-card="${esc(p.id)}" style="margin-bottom:.6rem"><div style="margin-bottom:.3rem">${novChip(p)} <span style="font-size:.62rem;color:var(--ink3)">· ${novFechaLbl(p.fechaFuente)}</span></div>
    ${foto}
    <div style="font-weight:700;font-size:.92rem;color:var(--ink)">${esc(p.titulo||'—')}</div>
    <div style="font-size:.8rem;color:var(--ink2);margin:.25rem 0 .4rem;line-height:1.4">${esc(p.bajada||'')}</div>

// Pendientes filtrados por fuente + ordenados por fecha (desc). Fuente de verdad para lista y contadores.
function novPendFiltrados(){
  const f=(S.nov&&S.nov.pendFuente)||'todas';
  return (S.nov.pendientes||[]).filter(p=>f==='todas'||(p.fuenteNombre||'—')===f)
    .sort((a,b)=>((b.fechaFuente&&b.fechaFuente.seconds)||0)-((a.fechaFuente&&a.fechaFuente.seconds)||0));
}
// Selector de fuente con conteo por fuente ("La Opinión (75)"). Se regenera aparte de la lista (no toca las cards).
function novFiltroFuenteHTML(){
  const porFuente={}; (S.nov.pendientes||[]).forEach(p=>{ const f=p.fuenteNombre||'—'; porFuente[f]=(porFuente[f]||0)+1; });
  const total=(S.nov.pendientes||[]).length;
  const sel=(S.nov&&S.nov.pendFuente)||'todas';
  const opt=(v,lbl)=>`<option value="${esc(v)}"${sel===v?' selected':''}>${esc(lbl)}</option>`;
  const opts=[opt('todas',`Todas (${total})`)].concat(Object.keys(porFuente).sort().map(f=>opt(f,`${f} (${porFuente[f]})`))).join('');
  const filt=novPendFiltrados();
  return `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap">
    <select onchange="novPendFiltrar(this.value)" style="padding:.35rem .5rem;border:1.5px solid var(--border2);border-radius:9px;font-size:.72rem;background:transparent;color:var(--ink2);cursor:pointer">${opts}</select>
    <span style="font-size:.66rem;color:var(--ink3)">Mostrando ${Math.min(S.nov.pendMostrar||NOV_PAGE, filt.length)} de ${filt.length}</span>
  </div>`;
}
// Cards de la página actual + "Cargar más". Es lo ÚNICO que se re-arma al curar/paginar (contenedor #nov-pend-list).
function novPendListHTML(){
  const filt=novPendFiltrados();
  if(!filt.length) return `<div class="card"><div style="font-size:.82rem;color:var(--ink3);padding:.4rem">${(S.nov.pendFuente&&S.nov.pendFuente!=='todas')?'No hay pendientes de esa fuente.':'No hay novedades pendientes de aprobar. ✓'}</div></div>`;
  const shown=filt.slice(0, S.nov.pendMostrar||NOV_PAGE);
  const btn=(txt,fn,cls)=>`<button class="${cls}" style="width:auto;padding:.4rem .7rem;font-size:.72rem" onclick="${fn}">${txt}</button>`;
  const cards=shown.map(p=>novPostCard(p,
    btn('✓ Aprobar',`novAprobar('${p.id}')`,'btn-r')+btn('Editar',`novEditarAbrir('${p.id}')`,'btn-o')+btn('Descartar',`novDescartar('${p.id}')`,'btn-o')
  )).join('');
  const mas = filt.length>shown.length
    ? `<button class="btn-o" style="width:100%;margin-top:.2rem" onclick="novCargarMas()">Cargar más (${filt.length-shown.length} restantes)</button>`
    : (shown.length>NOV_PAGE?`<div style="text-align:center;font-size:.66rem;color:var(--ink3);padding:.4rem">— fin de la cola —</div>`:'');
  return cards + mas;
}
function novPendientesView(){
  if(S.nov.pendientes===null) return `<div class="card">Cargando pendientes…</div>`;
  if(S.nov.edit!=null){ const p=(S.nov.pendientes||[]).find(x=>x.id===S.nov.edit); if(p) return novEditarView(p); }
  return `<div id="nov-pend-filtro">${novFiltroFuenteHTML()}</div><div id="nov-pend-list">${novPendListHTML()}</div>`;
}
// Actualización PUNTUAL de la cola (sin full render → no salta el scroll). Reconcilia el DOM con el estado:
// si el set visible NO cambió (caso típico tras la quita optimista), NO reemplaza las cards (cero flicker), solo los contadores.
function novRerenderPend(){
  // Si el contenedor NO está montado (primer render en estado "Cargando…", o cualquier caso donde la vista de la lista
  // no exista todavía), un update puntual no-opearía y la vista quedaría clavada → FULL render UNA vez para montarla.
  // Solo pasa en el arranque/transición (en la curación el contenedor YA existe → camino puntual, sin saltar).
  const cont=document.getElementById('nov-pend-list'); if(!cont){ render(); return; }
  const domIds=[...cont.querySelectorAll('[data-nov-card]')].map(e=>e.getAttribute('data-nov-card'));
  const want=novPendFiltrados().slice(0, S.nov.pendMostrar||NOV_PAGE).map(p=>p.id);
  const igual = domIds.length===want.length && domIds.every((id,i)=>id===want[i]);
  if(!igual) cont.innerHTML=novPendListHTML(); // cambió el set visible (ingesta nueva / otro admin) → re-armar cards
  const f=document.getElementById('nov-pend-filtro'); if(f) f.innerHTML=novFiltroFuenteHTML(); // contadores siempre frescos (barato)
}
function novPendFiltrar(v){ if(!S.nov) return; S.nov.pendFuente=v||'todas'; S.nov.pendMostrar=NOV_PAGE; novRerenderPend(); }
function novCargarMas(){ if(!S.nov) return; S.nov.pendMostrar=(S.nov.pendMostrar||NOV_PAGE)+NOV_PAGE; novRerenderPend(); }

function novEditarView(p){

  )).join('');

function novDescartadosView(){

// Quita OPTIMISTA de la cola: saca SOLO esa card del DOM (no re-arma la lista → no salta el scroll) + del estado + refresca
// contadores. Devuelve el item para poder REPONERLO si la escritura falla. Si el item no está en pendientes, no hace nada.
function novQuitarPendOptimista(id){
  if(!S.nov) return null;
  const item=(S.nov.pendientes||[]).find(x=>x.id===id); if(!item) return null;
  S.nov.pendientes=(S.nov.pendientes||[]).filter(x=>x.id!==id);
  const sel=(window.CSS&&CSS.escape)?CSS.escape(id):id;
  const el=document.querySelector('[data-nov-card="'+sel+'"]'); if(el) el.remove(); // quita SOLO esa card
  const f=document.getElementById('nov-pend-filtro'); if(f) f.innerHTML=novFiltroFuenteHTML();
  return item;
}
function novRestaurarPend(item){ if(!S.nov||!item) return; S.nov.pendientes=(S.nov.pendientes||[]).concat([item]); if(S.nov.sub==='pendientes') novRerenderPend(); }
async function novAprobar(id){ if(!novEsAdmin())return; novErr('');
  const item=novQuitarPendOptimista(id); // desaparece YA, sin saltar; se repone si falla
  try{ await db.collection('feed_posts').doc(id).update({ estado:'publicado', aprobadoEn:FV(), aprobadoPor:S.user.uid }); audit('feed_aprobado','feed_posts',id,''); }
  catch(e){ novRestaurarPend(item); novErr('No se pudo aprobar: '+(e.message||e)); }
}
async function novDescartar(id){ if(!novEsAdmin())return; novErr('');
  const item=novQuitarPendOptimista(id);
  try{ await db.collection('feed_posts').doc(id).update({ estado:'descartado', aprobadoEn:FV(), aprobadoPor:S.user.uid }); audit('feed_descartado','feed_posts',id,''); }
  catch(e){ novRestaurarPend(item); novErr('No se pudo descartar: '+(e.message||e)); }
}
// Despublicar = VOLVER A LA COLA (pendiente), NO descartar. Se puede recuperar y republicar. Reset de creadoEn:
// re-entra a la cola ahora (el reloj de retención de 30d de 'pendiente' se cuenta desde acá, no desde el alta vieja).
async function novDespublicar(id){ if(!novEsAdmin())return; novErr('');
  try{ await db.collection('feed_posts').doc(id).update({ estado:'pendiente', creadoEn:FV(), aprobadoEn:firebase.firestore.FieldValue.delete(), aprobadoPor:firebase.firestore.FieldValue.delete() }); audit('feed_despublicado','feed_posts',id,''); }
  catch(e){ novErr('No se pudo despublicar: '+(e.message||e)); }
}
// Restaurar un descartado → vuelve a la cola (pendiente), con el reloj de 30d reiniciado.
async function novRestaurar(id){ if(!novEsAdmin())return; novErr('');
  try{ await db.collection('feed_posts').doc(id).update({ estado:'pendiente', creadoEn:FV(), aprobadoEn:firebase.firestore.FieldValue.delete(), aprobadoPor:firebase.firestore.FieldValue.delete() }); audit('feed_restaurado','feed_posts',id,''); }
  catch(e){ novErr('No se pudo restaurar: '+(e.message||e)); }
}
function novEditarAbrir(id){ if(!S.nov)return; S.nov.edit=id; S.nov.img=null; S.nov.imgQuitar=false; render(); navPush(); }
function novEditarCerrar(){ if(S.nov) S.nov.edit=null; render(); }
async function novEditarGuardar(id){ if(!novEsAdmin())return; novErr('');
  const titulo=(document.getElementById('nov-e-titulo')?.value||'').trim();
  const bajada=(document.getElementById('nov-e-bajada')?.value||'').trim();
  if(!titulo){ novErr('El título no puede quedar vacío.'); return; }
  const link=(document.getElementById('nov-e-link')?.value||'').trim();

/* ===================== NUMERACIÓN DE SOCIOS — Fase 1 (modelo + numeración transaccional) =====================
   Tres series con contador propio (mismo patrón atómico que el nº de incidente, ver dspCrear). El número lo lleva
   la RAÍZ (socio directo/titular familiar o empresa) como correlativo pelado de su serie; los integrantes llevan
   sufijo -NN. Correlativos atómicos (runTransaction) que NUNCA se reusan. numeroAfiliado queda string (compat).
   Este tramo define SOLO las primitivas; el form de alta las cablea en el tramo siguiente (afGuardarNuevo intacto). */
const SOCIO_SERIES = {
  directo: { counter: 'socios_directo', base: 20000 },  // directo individual y titular familiar
  corp:    { counter: 'socios_corp',    base: 30000 },  // corporativo
  area:    { counter: 'socios_area',    base: 40000 },  // área protegida
};
// Asigna el correlativo pelado de una serie y crea el doc RAÍZ (socio directo/titular o empresa) en la MISMA
// transacción — nunca incrementa el contador sin crear el doc. buildDoc(correlativo) => objeto a escribir en targetRef.
async function asignarNumeroRaiz(serie, targetRef, buildDoc){
  const cfg = SOCIO_SERIES[serie];
  if(!cfg) throw new Error('serie inválida: '+serie);
  const counterRef = db.collection('contadores').doc(cfg.counter);
  return await db.runTransaction(async tx=>{
    const cs = await tx.get(counterRef);                                   // read (antes de cualquier write)
    const ultimo = cs.exists ? (cs.data().ultimo || cfg.base) : cfg.base;
    const next = ultimo + 1;
    tx.set(counterRef, { ultimo: next, actualizadoEn: FV() }, { merge: true });
    const correlativo = String(next);
    tx.set(targetRef, buildDoc(correlativo));
    return { correlativo, id: targetRef.id };
  });
}
// Asigna el próximo sufijo -NN de una RAÍZ (titular familiar o empresa) y crea el doc INTEGRANTE en la MISMA
// transacción. La raíz lleva ultimoSufijo (contador local) + el número base en numeroRaiz/numeroConvenio.
async function asignarSufijo(raizRef, targetRef, buildDoc){
  return await db.runTransaction(async tx=>{
    const rs = await tx.get(raizRef);                                      // read (antes de cualquier write)
    if(!rs.exists) throw new Error('raíz inexistente: '+raizRef.id);
    const d = rs.data() || {};
    const base = String(d.numeroRaiz || d.numeroConvenio || (String(d.numeroAfiliado||'').split('-')[0]) || '');
    if(!base) throw new Error('la raíz no tiene número base (numeroRaiz/numeroConvenio)');
    const next = (d.ultimoSufijo || 0) + 1;
    const sufijo = String(next).padStart(2, '0');
    tx.set(raizRef, { ultimoSufijo: next }, { merge: true });
    const numeroAfiliado = base + '-' + sufijo;
    tx.set(targetRef, buildDoc(numeroAfiliado, sufijo));
    return { sufijo, numeroAfiliado };
  });
}

// Geocodifica una persona (MÁXIMO 1 request a Nominatim) y mergea coords/barrio. Nunca lanza; sin_ubicar si falla/rural.
async function afGeocodePersona(personaId, direccion, sindir){
  let upd;
  if(sindir){ upd={ geoPrecision:'sin_ubicar', geoResueltoEn:FV() }; }
  else{
    try{
      const nd=normalizarDireccion(direccion||'');                 // misma normalización que episodios (geoNormStreet)
      if(nd.isRural || !nd.calle || !nd.altura){ upd={ geoPrecision:'sin_ubicar', geoResueltoEn:FV() }; }
      else{
        const hit=await geoNominatim(nd.calle, nd.altura);         // <-- ÚNICA request a Nominatim por alta
        if(!hit){ upd={ geoPrecision:'sin_ubicar', geoResueltoEn:FV() }; }
        else{ let barrio=null; try{ barrio=await geoBarrioDeCoord(hit.lon,hit.lat); }catch(_){} upd={ geoLat:hit.lat, geoLng:hit.lon, barrio, geoPrecision: hit.exact?'geo_exacto':'geo_aprox', geoResueltoEn:FV() }; }
      }
    }catch(_){ upd={ geoPrecision:'sin_ubicar', geoResueltoEn:FV() }; } // Nominatim caído / red → NO bloquea el alta
  }
  try{ await db.collection('personas').doc(personaId).set(upd,{merge:true}); }catch(_){}
  return upd;
}
/* ---- Espejo eager pacientes/{personaId} (Tramo 4). Hace al socio BUSCABLE en el despacho SIN tocar dspBuscarQ.
   merge:true → NUNCA pisa antecedentesCronicos/antecedentesOtros (fuente clínica = paciente, la escribe epClinicaCard).
   normNombre(:1810) = misma normalización que el backfill de pacientes. Va FUERA de la tx de numeración; si falla,

async function afBuscarPersona(){
  if(!S.af) return;
  afErr('');

  if(!dni){ afErr('Ingresá un DNI para buscar.'); return; }
  try{
    const qs=await db.collection('personas').where('dni','==',dni).limit(1).get();
    S.af.lk={dni,searched:true,persona: qs.empty?null:{id:qs.docs[0].id,...qs.docs[0].data()}};

}
// F1 (denorm afiliado): nombre de vista para dependientes — MISMO formato que generarAbonos.socioNombre.
function socioNombreDe(per){
  const p=per||{};
  const ape=String(p.apellido||'').trim();
  let nom=String(p.nombre||'').trim();
  // Dato viejo: algunas personas guardan el nombre COMPLETO en `nombre` (ya incluye el apellido al final) →
  // sin esto sale "Torres, Lucía Torres". Si `nombre` termina en el apellido, lo quito antes de concatenar.
  if(ape && nom){ const re=new RegExp('\\s*'+ape.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*$','i'); if(re.test(nom)) nom=nom.replace(re,'').trim(); }
  return ((ape+', '+nom).replace(/^, /,'').replace(/, $/,'')) || String(p.dni||'') || '';
}

async function afGuardarNuevo(){
  if(!puedeAfil()) return; // la regla es la defensa real
  afErr('');
  const lk=S.af.lk||{};
  if(!lk.searched){ afErr('Primero buscá la persona por DNI.'); return; }
  const tipo=document.getElementById('af-tipo')?.value||'directo';
  const vig=afFechaToTs(document.getElementById('af-vig')?.value||'');
  const car=afFechaToTs(document.getElementById('af-car')?.value||'');
  // Validaciones específicas por tipo/modalidad (antes de crear nada).
  let numero='', empresa=null, titular=null, modo='individual', override=false;
  if(tipo==='directo'){
    modo=document.getElementById('af-modo')?.value||'individual';
    const esSuper=(S.user && S.user.rol==='superadmin');
    override=esSuper && !!document.getElementById('af-override')?.checked;
    if(modo==='dependiente'){
      const tid=document.getElementById('af-titular')?.value||'';
      if(!tid){ afErr('Elegí un titular.'); return; }
      titular=(S.af.socios||[]).find(s=>s.id===tid);
      if(!titular){ afErr('Titular no encontrado.'); return; }
    } else if(override){                                             // migración: N° a mano, unicidad contra socios + pacientes
      numero=(document.getElementById('af-num')?.value||'').trim();
      if(!numero){ afErr('Ingresá el N° manual.'); return; }
      if((S.af.socios||[]).some(s=>String(s.numeroAfiliado)===numero)){ afErr('Ya existe un socio con el N° '+numero+'.'); return; }
      // pacientes: excluye el espejo propio (id === personaId de la persona en curso) — no bloquea contra sí mismo.
      try{ const pex=await db.collection('pacientes').where('numeroAfiliado','==',numero).limit(1).get(); if(!pex.empty && pex.docs[0].id!==(lk.persona&&lk.persona.id)){ afErr('Ya existe un paciente/socio con el N° '+numero+'.'); return; } }
      catch(eq){ afErr('No se pudo validar el N°: '+(eq.message||eq)); return; }
    }
    // individual/titular sin override: N° automático (asignarNumeroRaiz) — nada que validar acá.
  } else {                                                           // === corporativo / área protegida (Tramo 2a, intacto) ===
    const empresaId=document.getElementById('af-empresa')?.value||'';
    if(!empresaId){ afErr('Elegí una empresa (o creá una nueva).'); return; }
    empresa=(S.af.empresas||[]).find(e=>e.id===empresaId);
    if(!empresa){ afErr('Empresa no encontrada.'); return; }
  }
  try{
    // Persona: se crea ANTES de la transacción si no existe (patrón acordado). Teléfono + dirección OBLIGATORIOS (email opcional).
    let personaId, geoParams=null, perData=null;
    if(lk.persona){
      personaId=lk.persona.id; perData=lk.persona;
      // persona existente sin coords → geocodificar su dirección actual también (fuera de la tx).
      if(lk.persona.geoLat==null){ geoParams={ personaId, direccion:lk.persona.direccion||'', sindir:false }; }
    } else {
      const apellido=(document.getElementById('af-p-apellido')?.value||'').trim();
      const nombre=(document.getElementById('af-p-nombre')?.value||'').trim();
      if(!apellido && !nombre){ afErr('Completá al menos apellido o nombre de la persona.'); return; }
      const telefono=(document.getElementById('af-p-tel')?.value||'').trim();
      if(!telefono){ afErr('El teléfono es obligatorio.'); return; }
      const sindir=!!document.getElementById('af-p-sindir')?.checked;
      const calle=(document.getElementById('af-p-calle')?.value||'').trim();
      const altura=(document.getElementById('af-p-altura')?.value||'').trim();
      const piso=(document.getElementById('af-p-piso')?.value||'').trim();
      if(!sindir){
        if(!calle){ afErr('Ingresá la calle (o marcá "sin domicilio exacto / zona rural").'); return; }
        if(!altura){ afErr('Ingresá la altura (o marcá "sin domicilio exacto / zona rural").'); return; }
      }
      const direccion = sindir ? calle : afComponerDir(calle,altura,piso);   // string compuesto = compat total
      const pdata={ dni:lk.dni, apellido, nombre, sexo:document.getElementById('af-p-sexo')?.value||'', fechaNacimiento:(document.getElementById('af-p-fnac')?.value||''), telefono, email:(document.getElementById('af-p-email')?.value||'').trim(), direccion, antecedentesCronicos:[], antecedentesOtros:'', creadoEn:FV() };
      const ref=await db.collection('personas').add(pdata);
      personaId=ref.id; perData=pdata;
      geoParams={ personaId, direccion, sindir };
    }
    let socioId, numeroFinal;
    if(tipo!=='directo'){                                            // corporativo / área (Tramo 2a, intacto)
      const grupoTipo=(tipo==='area_protegida')?'area_protegida':'corporativo';
      const socioRef=db.collection('socios').doc();
      const r=await asignarSufijo(db.collection('empresas').doc(empresa.id), socioRef, (numeroAfiliado)=>({
        personaId, tipoAfiliado:'corporativo', grupoTipo, empresaId:empresa.id, esResponsablePago:false,
        numeroAfiliado, planId: empresa.planIdDefault||null, vigenteDesde:vig||FV(), carenciaHasta:car||null, activo:true, creadoEn:FV()
      }));
      socioId=socioRef.id; numeroFinal=r.numeroAfiliado;
    } else if(modo==='dependiente'){                                 // sufijo -NN sobre el TITULAR
      const socioRef=db.collection('socios').doc();
      const r=await asignarSufijo(db.collection('socios').doc(titular.id), socioRef, (numeroAfiliado)=>({
        personaId, tipoAfiliado:'directo', grupoTipo:'familiar', titularSocioId:titular.id, esResponsablePago:false,
        titularPersonaId: titular.personaId||null, nombreVista: socioNombreDe(perData), // F1: llave de scoping (F2) + nombre denorm
        numeroAfiliado, planId:null, vigenteDesde:vig||FV(), carenciaHasta:car||null, activo:true, creadoEn:FV()
      }));
      socioId=socioRef.id; numeroFinal=r.numeroAfiliado;
      if(titular.grupoTipo!=='familiar'){ try{ await db.collection('socios').doc(titular.id).set({ grupoTipo:'familiar' },{merge:true}); }catch(_){} } // individual que suma su 1er dependiente (no renumera)
    } else if(override){                                             // migración: N° a mano, sin contador (igual raíz: numeroRaiz + ultimoSufijo)
      const planId=document.getElementById('af-planid')?.value||null;
      const grupoTipo=(modo==='titular')?'familiar':'directo';
      const sref=await db.collection('socios').add({ personaId, tipoAfiliado:'directo', grupoTipo, numeroAfiliado:numero, numeroRaiz:numero, ultimoSufijo:0, esResponsablePago:true, planId:planId||null, vigenteDesde:vig||FV(), carenciaHasta:car||null, activo:true, creadoEn:FV() });
      socioId=sref.id; numeroFinal=numero;
    } else {                                                          // individual / titular: correlativo pelado (asignarNumeroRaiz)
      const planId=document.getElementById('af-planid')?.value||null;
      const grupoTipo=(modo==='titular')?'familiar':'directo';
      const socioRef=db.collection('socios').doc();
      const r=await asignarNumeroRaiz('directo', socioRef, (correlativo)=>({
        personaId, tipoAfiliado:'directo', grupoTipo, numeroAfiliado:correlativo, numeroRaiz:correlativo, ultimoSufijo:0, esResponsablePago:true,
        planId:planId||null, vigenteDesde:vig||FV(), carenciaHasta:car||null, activo:true, creadoEn:FV()
      }));
      socioId=socioRef.id; numeroFinal=r.correlativo;
    }
    // E-2: facturarA (destinatario de facturación) — SOLO titular (el dependiente factura por su titular). Ortogonal
    // a la membresía corporativa (empresaId): NO se sincronizan. Solo escribe si se eligió una empresa válida.
    if(modo!=='dependiente' && socioId){ const fa=leerFacturarA('af-facturara'); if(fa && !fa.__err){ try{ await db.collection('socios').doc(socioId).set({ facturarA:fa },{merge:true}); }catch(_){} } }
    // Denorm del nombre para TODOS los socios (titular/dependiente/corporativo): generarAbonos lo lee de socios.nombreVista, NO de personas (clínico). El dependiente ya lo trae de la tx; el merge es idempotente.
    if(socioId){ try{ await db.collection('socios').doc(socioId).set({ nombreVista: socioNombreDe(perData) },{merge:true}); }catch(_){} }
    // Geocode-on-save: FUERA de la transacción de numeración (la tx no espera red). No bloquea el alta.
    if(geoParams){ try{ await afGeocodePersona(geoParams.personaId, geoParams.direccion, geoParams.sindir); }catch(_){} }
    // Espejo eager pacientes/{personaId} (Tramo 4): hace al socio BUSCABLE en el despacho. FUERA de la tx.
    try{ await afEspejoPaciente(personaId, perData, { tipoAfiliado:(tipo==='directo'?'directo':'corporativo'), numeroAfiliado:numeroFinal, activo:true }); }catch(_){}
    // Conversión de lead (callback): al guardar OK en modo conversión, marca el lead convertido + vínculo.
    if(S.convLeadId){
      try{ await db.collection('leads').doc(S.convLeadId).set({ estado:'convertido', personaId, socioId, actualizadoEn:FV() },{merge:true}); audit('lead_convertido','lead',S.convLeadId,'socio '+socioId); }
      catch(e2){ console.warn('[conversión] socio creado OK, pero no se pudo marcar el lead:',e2); }
      S.convLeadId=null; S.convPrefill=null;
    }
    audit('socio_alta','socio',personaId,'N° '+numeroFinal);
    S.af.flash='Socio creado — N° '+numeroFinal;                     // confirmación con el N° asignado
    S.af.edit=null; S.af.lk=null; S.af.altaDraft=null; render();
  }catch(e){ afErr('No se pudo guardar: '+(e.message||e)); }
}

function convenioLbl(c){ return (!c || !c.modo) ? '— sin cargar' : (c.modo==='fijo' ? ('fijo '+facMoney(c.montoMensual)) : 'per cápita'); }
function convenioChip(c){ const set=!!(c && c.modo); return `<span style="font-size:.6rem;font-weight:700;padding:.06rem .4rem;border-radius:6px;background:${set?'var(--r)':'transparent'};color:${set?'#fff':'var(--ink3)'};border:${set?'none':'1px solid var(--border2)'}">Convenio: ${esc(convenioLbl(c))}</span>`; }

// Editor del convenio: SOLO puedeConfig (el gate contable de E-1). Guarda SOLO convenio+actualizadoEn (no toca identidad).
async function empGuardarConvenio(id){
  if(!puedeConfig()) return; empConvErr('');
  const modo=document.getElementById('emp-conv-modo')?.value||'';
  if(!['fijo','per_capita'].includes(modo)){ empConvErr('Elegí un modo de convenio.'); return; } // espejo client-side de convenioOk
  let convenio;
  if(modo==='fijo'){
    const monto=Number(document.getElementById('emp-conv-monto')?.value);
    if(!(monto>0)){ empConvErr('El monto mensual debe ser mayor a 0.'); return; }
    convenio={ modo:'fijo', montoMensual:monto };
  } else { convenio={ modo:'per_capita' }; }
  // update() REEMPLAZA el mapa 'convenio' entero. Con set({..},{merge:true}) los mapas anidados se FUSIONAN →
  // fijo->per_capita dejaría montoMensual residual y convenioOk() rebotaría. El error del catch es persistente
  // (afFormOpen bloquea el re-render por snapshot mientras el form está abierto).
  try{ await db.collection('empresas').doc(id).update({ convenio, actualizadoEn:FV() }); audit('empresa_convenio','empresa',id,convenioLbl(convenio)); empSet({view:'list'}); }
  catch(e){ empConvErr('No se pudo guardar el convenio: '+(e.message||e)); } // empConvErr escribe el DOM directo; afFormOpen impide el re-render que lo borraría
}

function leerFacturarA(prefix){
  const tipo=document.getElementById(prefix+'-tipo')?.value||'persona';
  if(tipo!=='empresa') return null;
  const empId=document.getElementById(prefix+'-emp')?.value||'';
  if(!empId) return { __err:'Elegí la empresa destinataria de la facturación.' };
  const emp=(S.af.empresas||[]).find(e=>e.id===empId);
  return { tipo:'empresa', empresaId:empId, razonSocial:(emp&&emp.razonSocial)||'' }; // razonSocial denorm al momento
}

async function afGuardarEdit(id){
  if(!puedeAfil()) return;
  afErr('');
  const s=(S.af.socios||[]).find(x=>x.id===id)||{};
  const numero=(document.getElementById('af-e-num')?.value||'').trim();
  if(!numero){ afErr('El N° de afiliado es requerido.'); return; }
  if((S.af.socios||[]).some(s=>s.id!==id && String(s.numeroAfiliado)===numero)){ afErr('Ya existe otro socio con el N° '+numero+'.'); return; }
  const data={
    tipoAfiliado:document.getElementById('af-e-tipo')?.value||'directo',
    numeroAfiliado:numero,
    planId:document.getElementById('af-e-planid')?.value||null,
    vigenteDesde:afFechaToTs(document.getElementById('af-e-vig')?.value||'')||null,
    carenciaHasta:afFechaToTs(document.getElementById('af-e-car')?.value||''),
    activo:(document.getElementById('af-e-activo')?.value||'si')==='si',
    actualizadoEn:FV()
  };
  // E-2: facturarA — empresa => set; persona (ausencia) => delete (vuelve al default persona). Ortogonal a empresaId.
  const fa=leerFacturarA('af-e-facturara');
  if(fa && fa.__err){ afErr(fa.__err); return; }
  data.facturarA = fa ? fa : firebase.firestore.FieldValue.delete();
  try{
    await db.collection('socios').doc(id).set(data,{merge:true});
    // Punto 3 (Tramo 3): si se cargó una dirección nueva, actualizar personas.direccion + re-geocodificar.
    let nDir=null;
    const nCalle=(document.getElementById('af-e-calle')?.value||'').trim();
    const nSindir=!!document.getElementById('af-e-sindir')?.checked;
    if((nCalle || nSindir) && s.personaId){
      const nAltura=(document.getElementById('af-e-altura')?.value||'').trim();
      const nPiso=(document.getElementById('af-e-piso')?.value||'').trim();
      nDir = nSindir ? nCalle : afComponerDir(nCalle,nAltura,nPiso);
      if(nDir){ try{ await db.collection('personas').doc(s.personaId).set({direccion:nDir},{merge:true}); await afGeocodePersona(s.personaId,nDir,nSindir); }catch(_){} }
    }
    // Espejo (Tramo 4): re-sincroniza los campos buscables/mostrables (N°, tipo, estado, dirección). merge → NO pisa antecedentes.
    if(s.personaId){
      const per={ ...(afPersona(s.personaId)||{}) };
      if(nDir) per.direccion=nDir;
      try{ await afEspejoPaciente(s.personaId, per, { tipoAfiliado:data.tipoAfiliado, numeroAfiliado:data.numeroAfiliado, activo:data.activo }); }catch(_){}
      // Re-derivar nombreVista desde la persona en CADA edición (sync del denorm para TODOS los socios, no solo dependientes).
      // merge → no pisa nada más. Es la fuente del nombre para generarAbonos (evita leer personas).
      try{ await db.collection('socios').doc(id).set({ nombreVista: socioNombreDe(per) }, { merge:true }); }catch(_){}
    }
    S.af.edit=null; render();
  }
  catch(e){ afErr('No se pudo guardar: '+(e.message||e)); }
}
async function afBaja(id,reactivar){
  if(!puedeAfil()) return;
  afErr('');
  try{
    await db.collection('socios').doc(id).set({activo:!!reactivar,actualizadoEn:FV()},{merge:true}); audit(reactivar?'socio_reactivado':'socio_baja','socio',id,'');
    // Espejo (Tramo 4): reflejar el estado escribiendo el espejo COMPLETO (nunca parcial: si no existe lo crea
    // entero desde la persona; si existe, actualiza. merge → no pisa antecedentes).
    const soc=(S.af.socios||[]).find(x=>x.id===id);
    if(soc && soc.personaId){ try{ await afEspejoPaciente(soc.personaId, afPersona(soc.personaId), { tipoAfiliado:soc.tipoAfiliado, numeroAfiliado:soc.numeroAfiliado, codigoCorporativo:soc.codigoCorporativo, activo:!!reactivar }); }catch(_){} }
  }
  catch(e){ afErr('No se pudo actualizar: '+(e.message||e)); }
}

/* ---- Migración puntual: paciente -> persona (MISMO id) + socio. Idempotente. NO la corre la app sola;
   se invoca a mano en verificación (consola del navegador / Claude in Chrome) con sesión admin/superadmin.
   NO toca el paciente ni los episodios (que siguen apuntando por pacienteId == personaId). ---- */
async function migrarPacienteAAfiliado(pacienteId){
  if(!pacienteId) throw new Error('Falta pacienteId');
  const out={pacienteId, persona:null, socio:null, skipped:[]};
  const psnap=await db.collection('pacientes').doc(pacienteId).get();
  if(!psnap.exists) throw new Error('No existe pacientes/'+pacienteId);
  const pac=psnap.data();
  // 1) persona con el MISMO id que el paciente (idempotente: si ya existe, no la pisa)
  const perRef=db.collection('personas').doc(pacienteId);
  if((await perRef.get()).exists){ out.skipped.push('persona ya existía'); out.persona=pacienteId; }
  else{
    await perRef.set({
      dni: pac.dni||'', apellido: pac.apellido||'', nombre: pac.nombre||'',
      sexo: pac.sexo||'', fechaNacimiento: pac.fechaNacimiento||'',
      telefono: pac.telefono||'', direccion: pac.direccion||'',
      antecedentesCronicos: Array.isArray(pac.antecedentesCronicos)?pac.antecedentesCronicos:[],
      antecedentesOtros: pac.antecedentesOtros||'',
      creadoEn: FV()
    });
    out.persona=pacienteId;
  }
  // 2) socio (id autogenerado). Idempotente: por numeroAfiliado si lo hay, si no por personaId.
  const numero = pac.numeroAfiliado || '';
  let existeSocio=false;
  if(numero){ existeSocio = !(await db.collection('socios').where('numeroAfiliado','==',numero).limit(1).get()).empty; }
  else{ existeSocio = !(await db.collection('socios').where('personaId','==',pacienteId).limit(1).get()).empty; }
  if(existeSocio){ out.skipped.push('socio ya existía'); }
  else{
    const sref=await db.collection('socios').add({
      personaId: pacienteId,
      tipoAfiliado: pac.tipoAfiliado || 'directo',
      numeroAfiliado: numero,
      planId: null,
      vigenteDesde: pac.creadoEn || FV(),
      carenciaHasta: null,
      activo: true,
      creadoEn: FV()
    });
    out.socio=sref.id;
  }
  console.log('[migrarPacienteAAfiliado]', out);
  return out;
}

function mktLeadsView(){
  if(S.mkt.leads===null) return `<div class="card">Cargando leads…</div>`;
  if(S.mkt.edit!=null) return mktLeadForm();
  const showAll=!!S.mkt.showAll;
  const activo=e=> e==='nuevo'||e==='contactado';
  const nOcultos=(S.mkt.leads||[]).filter(l=>!activo(l.estado)).length;
  const list=(S.mkt.leads||[]).filter(l=> showAll || activo(l.estado)).slice().sort((a,b)=>((tms(b.creadoEn)||0)-(tms(a.creadoEn)||0)));
  const rows = list.length ? list.map(l=>{
    const contacto=[l.telefono,l.email].filter(Boolean).join(' · ')||'—';
    return `<div class="lr" style="cursor:pointer" onclick="mktEditar('${l.id}')"><div class="lrb"><div class="lrn">${esc(l.nombre||'—')}</div><div class="lrs">${leadOrigenLbl(l.origen)} · ${esc(contacto)}</div></div>${leadEstBadge(l.estado)}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin leads${showAll?'':' activos'}</div>`;
  const toggle=`<label style="display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--ink3);margin-bottom:.6rem;cursor:pointer"><input type="checkbox" onchange="mktShowAll(this.checked)" ${showAll?'checked':''}>Ver descartados/convertidos${nOcultos?(' ('+nOcultos+')'):''}</label>`;
  return `<button class="btn-r" onclick="mktNuevo()" style="margin-bottom:.7rem">+ Nuevo lead</button>${toggle}<div class="card">${rows}</div>`;
}

async function mktGuardar(id){
  if(!puede('marketing')) return; // la regla es la defensa real
  mktErr('');
  const nombre=(document.getElementById('mkt-l-nombre')?.value||'').trim();
  const telefono=(document.getElementById('mkt-l-tel')?.value||'').trim();
  const email=(document.getElementById('mkt-l-email')?.value||'').trim();
  const origen=document.getElementById('mkt-l-origen')?.value||'otro';
  const campanaId=document.getElementById('mkt-l-campana')?.value||'';
  const notas=(document.getElementById('mkt-l-notas')?.value||'').trim();
  if(!nombre){ mktErr('El nombre es requerido.'); return; }
  if(!telefono && !email){ mktErr('Cargá al menos un teléfono o un email.'); return; }
  const data={ nombre, telefono, email, origen, campanaId:campanaId||null, notas, actualizadoEn:FV() };
  try{
    if(id==='new'){ data.estado='nuevo'; data.motivoDescarte=null; data.personaId=null; data.socioId=null; data.creadoEn=FV(); data.creadoPor=S.user.uid; await db.collection('leads').add(data); audit('lead_creado','lead','',nombre); }
    else{ await db.collection('leads').doc(id).set(data,{merge:true}); }
    S.mkt.edit=null; render();
  }catch(e){ mktErr('No se pudo guardar: '+(e.message||e)); }
}

// Conversión lead -> socio: salta al alta de Afiliados existente (S.convLeadId + pre-carga). El alta reusa su
// propia lógica (búsqueda DNI: reusa persona o crea persona+socio). El callback en afGuardarNuevo cierra el lead.
function mktConvertir(id){
  if(!puede('marketing')) return;
  const l=((S.mkt&&S.mkt.leads)||[]).find(x=>x.id===id); if(!l) return;
  if(l.estado==='convertido'){ mktErr('Este lead ya está convertido.'); return; }
  S.convLeadId=id; S.convPrefill={ nombre:l.nombre||'', telefono:l.telefono||'' }; S.convOpenAlta=true;
  // Robustez: si YA estás en la sección Afiliados, abrí el alta directo (la navegación sería no-op y el
  // flag no se consumiría). Section-aware: superadmin navega por S.superSec, admin por S.tab.
  const enAfil = (S.user && S.user.rol==='superadmin') ? (S.superSec==='afiliados') : (S.tab==='afiliados');
  if(enAfil && S.af){ S.af.edit='new'; S.af.lk={dni:'',searched:false,persona:null}; S.convOpenAlta=false; render(); return; }
  if(S.user && S.user.rol==='superadmin'){ superNav('afiliados'); }
  else { S.tab='afiliados'; render(); }
}

/* ---- Métricas (panel de solo lectura; cálculo on-demand, cruce con Contable) ---- */
async function mktMetricasActualizar(){
  if(!puede('marketing')) return;
  const leads=S.mkt.leads||[], campanas=S.mkt.campanas||[];
  // Cruce con Contable: facturado por socioId (facturas emitida|pagada). Permiso-gated → try/catch.
  let facBySocio=null, facError=false;
  try{
    const fsnap=await db.collection('facturas').get();
    facBySocio={};
    fsnap.docs.forEach(d=>{ const f=d.data(); if((f.estado==='emitida'||f.estado==='pagada') && f.socioId){ facBySocio[f.socioId]=(facBySocio[f.socioId]||0)+(Number(f.total)||0); } });
  }catch(e){ facError=true; facBySocio=null; }
  // Funnel
  const funnel={ total:leads.length, nuevo:0, contactado:0, convertido:0, descartado:0 };
  leads.forEach(l=>{ if(funnel[l.estado]!=null) funnel[l.estado]++; });
  // Por origen
  const porOrigen={};
  leads.forEach(l=>{ const o=l.origen||'otro'; if(!porOrigen[o]) porOrigen[o]={total:0,convertidos:0}; porOrigen[o].total++; if(l.estado==='convertido') porOrigen[o].convertidos++; });
  // Por campaña (+ Sin campaña)
  const camById={}; campanas.forEach(c=>{ camById[c.id]=c; });
  const grupos={};
  leads.forEach(l=>{ const k=l.campanaId||'__none__'; if(!grupos[k]) grupos[k]={leads:0,convertidos:0,socioIds:[]}; grupos[k].leads++; if(l.estado==='convertido'){ grupos[k].convertidos++; if(l.socioId) grupos[k].socioIds.push(l.socioId); } });
  const porCampana=Object.keys(grupos).map(k=>{
    const g=grupos[k], cam= k==='__none__'?null:camById[k];
    const facturado = facBySocio ? g.socioIds.reduce((s,sid)=>s+(facBySocio[sid]||0),0) : null;
    return { key:k, nombre: k==='__none__'?'Sin campaña':(cam?(cam.nombre||k):('(campaña '+k+')')), canal: cam?cam.canal:'', costo: cam?(Number(cam.costo)||0):null, leads:g.leads, convertidos:g.convertidos, facturado };
  }).sort((a,b)=>{ if(a.key==='__none__') return 1; if(b.key==='__none__') return -1; return b.leads-a.leads; });
  S.mkt.metrics={ funnel, porOrigen, porCampana, facturasOk: !facError };
  render();
}
function mktMetricasView(){
  const m=S.mkt.metrics;
  const head=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem"><div style="font-size:.72rem;color:var(--ink3)">Cálculo on-demand (no en vivo)</div><button class="btn-r" style="width:auto;margin-top:0;padding:.4rem .8rem" onclick="mktMetricasActualizar()">Actualizar</button></div>`;
  if(!m) return head+`<div class="card"><div style="font-size:.8rem;color:var(--ink3)">Tocá "Actualizar" para calcular las métricas.</div></div>`;
  const f=m.funnel;
  const funnelCard=`<div class="card"><div class="ch">Funnel de leads</div>
    <div class="ir"><span class="il">Total</span><span class="iv">${f.total}</span></div>
    <div class="ir"><span class="il">Nuevo</span><span class="iv">${f.nuevo}</span></div>
    <div class="ir"><span class="il">Contactado</span><span class="iv">${f.contactado}</span></div>
    <div class="ir"><span class="il">Convertido</span><span class="iv">${f.convertido}</span></div>
    <div class="ir"><span class="il">Descartado</span><span class="iv">${f.descartado}</span></div></div>`;
  const origenRows=Object.keys(m.porOrigen).sort().map(o=>{ const g=m.porOrigen[o]; const tasa=g.total?Math.round(g.convertidos/g.total*100):0; return `<div class="ir"><span class="il">${leadOrigenLbl(o)}</span><span class="iv">${g.convertidos}/${g.total} · ${tasa}%</span></div>`; }).join('')||`<div style="font-size:.78rem;color:var(--ink3)">Sin datos</div>`;
  const origenCard=`<div class="card"><div class="ch">Conversión por origen</div>${origenRows}</div>`;
  const campRows=m.porCampana.map(c=>{
    const tasa=c.leads?Math.round(c.convertidos/c.leads*100):0;
    const costo=c.costo!=null?facMoney(c.costo):'—';
    const cpl=(c.costo!=null && c.leads)?facMoney(c.costo/c.leads):'—';
    const cpc=(c.costo!=null && c.convertidos)?facMoney(c.costo/c.convertidos):'—';
    const fac= m.facturasOk ? (c.facturado!=null?facMoney(c.facturado):'—') : '—';
    return `<div class="lr" style="flex-wrap:wrap"><div class="lrb" style="flex:1 1 100%"><div class="lrn">${esc(c.nombre)}${c.canal?(' <span style="font-size:.62rem;color:var(--ink3)">('+leadOrigenLbl(c.canal)+')</span>'):''}</div><div class="lrs">${c.convertidos}/${c.leads} leads · ${tasa}% · costo ${costo} · CPL ${cpl} · CPC ${cpc} · Facturado ${fac}</div></div></div>`;
  }).join('')||`<div style="font-size:.78rem;color:var(--ink3)">Sin datos</div>`;
  const facNote= m.facturasOk ? `<div style="font-size:.66rem;color:var(--ink3);margin-top:.3rem">CPL = costo/lead · CPC = costo por captación (costo/convertidos) · Facturado = facturas emitida/pagada de los socios convertidos.</div>` : `<div style="font-size:.66rem;color:var(--o,#E0A23B);margin-top:.3rem">Facturado "—" (requiere permiso de facturación). El resto del panel es válido.</div>`;
  const campCard=`<div class="card"><div class="ch">Por campaña</div>${campRows}${facNote}</div>`;
  return head+funnelCard+origenCard+campCard;
}

/* ===================== AUDITORÍA — registro transversal INMUTABLE (solo lectura) =====================
   Colección auditoria/{id}: {accion, entidad, refId, detalle, uid, email, en}. Se escribe por audit()
   fire-and-forget desde los puntos de mutación. Reglas: create esInterno(); read admin/configurar_sistema;
   sin update ni delete (inmutable). UI reverse-cronológica, últimas 100, filtro por texto. */
function audAttach(){
  if(S.audUnsub) return;
  S.audUnsub=[
    db.collection('auditoria').orderBy('en','desc').limit(100).onSnapshot(s=>{ if(!S.aud) return; S.aud.items=s.docs.map(d=>({id:d.id,...d.data()})); if(!curandoNovedades()) render(); }, e=>{ if(S.aud){ S.aud.err=(e.message||String(e)); if(!curandoNovedades()) render(); } })
  ];
}
function audDetach(){ if(S.audUnsub){ S.audUnsub.forEach(u=>{ try{u();}catch(_){} }); S.audUnsub=null; } }
function audFiltro(v){ if(S.aud){ S.aud.q=v||''; render(); } }
function audPuede(){ return puede('configurar_sistema'); } // Tablero-Fase1: sin bypass de rol (la regla de auditoría ya exige configurar_sistema)
function audFmt(t){ const ms=tms(t); if(ms==null) return '—'; const d=new Date(ms); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
function audPanel(){
  if(!audPuede()) return `<div class="card"><div class="ch">Auditoría</div><div style="font-size:.8rem;color:var(--ink3)">No tenés permiso para ver la auditoría.</div></div>`;
  if(!S.aud){ S.aud={items:null,q:'',err:''}; audAttach(); }
  if(S.aud.err) return `<div class="card">No se pudo cargar la auditoría: ${esc(S.aud.err)}</div>`;
  if(S.aud.items===null) return `<div class="card">Cargando auditoría…</div>`;
  const q=(S.aud.q||'').toLowerCase();
  const list=q ? S.aud.items.filter(a=>[a.accion,a.entidad,a.detalle,a.email,a.refId].join(' ').toLowerCase().indexOf(q)!==-1) : S.aud.items;
  const rows=list.length ? list.map(a=>`<div class="lr" style="flex-wrap:wrap"><div class="lrb" style="flex:1 1 100%"><div class="lrn" style="font-size:.82rem">${esc(a.accion||'—')} · ${esc(a.entidad||'')}</div><div class="lrs">${audFmt(a.en)} · ${esc(a.email||a.uid||'—')}${a.detalle?(' · '+esc(a.detalle)):''}</div></div></div>`).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin registros${q?' para el filtro':''}</div>`;
  return `<div style="font-weight:700;margin:.1rem 0 .6rem">Auditoría <span style="font-size:.62rem;color:var(--ink3);font-weight:400">● en vivo · últimas 100 · inmutable</span></div>
    <div class="field" style="margin-bottom:.6rem"><input id="aud-q" placeholder="Filtrar por texto…" value="${esc(S.aud.q||'')}" oninput="audFiltro(this.value)"></div>
    <div class="card">${rows}</div>`;
}

/* ===================== ESTADÍSTICAS — tablero operativo del negocio (v1, 100% READ-ONLY) =====================
   Cálculo on-demand (botón Actualizar) + rango de fechas (filtra por creadoEn del episodio). NO escribe nada.
   Shapes verificados: transiciones.{despacho,en_camino,arribo,atencion,cerrado} (Timestamps), codigoPresuntivo,
   desenlace.codigoReal, movilNombre/medicoNombre, atribucion.socioId, domicilio, estado; socios.vigenteDesde,
   facturas.{estado,socioId,total}, personas.{apellido,nombre}, planes.nombre. El mapa geo por barrio es v2
   (ver Disenio-Estadisticas). Gateo: puedeConfig() (admin/superadmin/configurar_sistema, igual que Auditoría). */
function estHoyStr(){ const d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function estHaceStr(dias){ const d=new Date(Date.now()-dias*86400000); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function estRangeMs(str,end){ if(!/^\d{4}-\d{2}-\d{2}$/.test(str||'')) return end?8.64e15:0; const d=new Date(str+'T00:00:00'); if(end) d.setHours(23,59,59,999); return d.getTime(); }
function estTts(ep,k){ return (ep.transiciones && ep.transiciones[k]!=null) ? tms(ep.transiciones[k]) : null; }
function estCod(ep){ return ep.codigoPresuntivo || (ep.desenlace&&ep.desenlace.codigoReal) || '—'; }
function estDia(ep){ const ms=tms(ep.creadoEn); if(ms==null) return '—'; const d=new Date(ms); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function estProm(a){ return a.length? a.reduce((s,x)=>s+x,0)/a.length : null; }
function estMediana(a){ if(!a.length) return null; const b=a.slice().sort((x,y)=>x-y); const m=Math.floor(b.length/2); return b.length%2? b[m] : (b[m-1]+b[m])/2; }
function estMMSS(ms){ if(ms==null||!isFinite(ms)||ms<0) return '—'; const s=Math.round(ms/1000); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }
function estSetD(k,v){ if(S.est){ S.est[k]=v; } }

async function estActualizar(){
  if(!puedeConfig() || !S.est) return;
  S.est.loading=true; S.est.err=''; render();
  try{
    const desdeMs=estRangeMs(S.est.desde,false), hastaMs=estRangeMs(S.est.hasta,true);
    const [epSnap,socSnap,planSnap,perSnap]=await Promise.all([
      db.collection('episodios').get(), db.collection('socios').get(), db.collection('planes').get(), db.collection('personas').get()
    ]);
    let facBySocio=null, facOk=true;
    try{ const fSnap=await db.collection('facturas').get(); facBySocio={}; fSnap.docs.forEach(d=>{ const f=d.data(); if((f.estado==='emitida'||f.estado==='pagada')&&f.socioId) facBySocio[f.socioId]=(facBySocio[f.socioId]||0)+(Number(f.total)||0); }); }
    catch(e){ facOk=false; facBySocio=null; }
    const eps=epSnap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>{ const ms=tms(e.creadoEn); return ms!=null && ms>=desdeMs && ms<=hastaMs; });
    const socios=socSnap.docs.map(d=>({id:d.id,...d.data()}));
    const personas={}; perSnap.docs.forEach(d=>personas[d.id]=d.data());
    const planes={}; planSnap.docs.forEach(d=>planes[d.id]=d.data());
    S.est.data=estComputar(eps,socios,personas,planes,facBySocio,facOk,desdeMs,hastaMs);
    S.est.loading=false; render();
  }catch(e){ S.est.loading=false; S.est.err=(e.message||String(e)); render(); }
}
function estComputar(eps,socios,personas,planes,facBySocio,facOk,desdeMs,hastaMs){
  const socioById={}; socios.forEach(s=>socioById[s.id]=s);
  const nomPersona=pid=>{ const p=personas[pid]; if(!p) return ''; return ((p.apellido||'')+', '+(p.nombre||'')).replace(/^, /,'').replace(/, $/,''); };
  const CODS=['rojo','amarillo','verde','traslado'];
  const op={ total:eps.length, byCod:{}, byEstado:{}, serie:{} }; CODS.forEach(c=>op.byCod[c]=0);
  eps.forEach(e=>{ const c=estCod(e); op.byCod[c]=(op.byCod[c]||0)+1; op.byEstado[e.estado||'—']=(op.byEstado[e.estado||'—']||0)+1; const dia=estDia(e); op.serie[dia]=(op.serie[dia]||0)+1; });
  const durs={salida:[],viaje:[],respuesta:[],atencion:[]}, durByCod={}, durByMovil={}; let sinTiempo=0;
  eps.forEach(e=>{
    const tD=estTts(e,'despacho'),tE=estTts(e,'en_camino'),tA=estTts(e,'arribo'),tAt=estTts(e,'atencion'),tC=estTts(e,'cerrado');
    if(tD!=null&&tE!=null) durs.salida.push(tE-tD);
    if(tE!=null&&tA!=null) durs.viaje.push(tA-tE);
    if(tAt!=null&&tC!=null) durs.atencion.push(tC-tAt);
    if(tD!=null&&tA!=null){ const r=tA-tD; durs.respuesta.push(r); const c=estCod(e); (durByCod[c]=durByCod[c]||[]).push(r); const m=e.movilNombre||e.movilId||'—'; (durByMovil[m]=durByMovil[m]||[]).push(r); }
    else sinTiempo++;
  });
  const med={}; eps.forEach(e=>{ if(!e.medicoId) return; const m=med[e.medicoId]||(med[e.medicoId]={nombre:e.medicoNombre||e.medicoId,count:0,atenc:[]}); m.count++; const tAt=estTts(e,'atencion'),tC=estTts(e,'cerrado'); if(tAt!=null&&tC!=null) m.atenc.push(tC-tAt); });
  const medRank=Object.keys(med).map(k=>({nombre:med[k].nombre,count:med[k].count,promAt:estProm(med[k].atenc)})).sort((a,b)=>b.count-a.count);
  const activos=socios.filter(s=>s.activo!==false);
  const altas=socios.filter(s=>{ const ms=tms(s.vigenteDesde); return ms!=null&&ms>=desdeMs&&ms<=hastaMs; }).length;
  const porPlan={}; activos.forEach(s=>{ const pn=s.planId?((planes[s.planId]&&planes[s.planId].nombre)||s.planId):'sin plan'; porPlan[pn]=(porPlan[pn]||0)+1; });
  const bySocio={}; eps.forEach(e=>{ const sid=e.atribucion&&e.atribucion.socioId; if(!sid) return; bySocio[sid]=(bySocio[sid]||0)+1; });
  const quienLlama=Object.keys(bySocio).map(sid=>{ const socio=socioById[sid]; const nombre=socio?nomPersona(socio.personaId):''; return { nombre:nombre||('socio '+sid), episodios:bySocio[sid], facturado:facBySocio?(facBySocio[sid]||0):null }; }).sort((a,b)=>b.episodios-a.episodios).slice(0,10);
  const byDom={}; eps.forEach(e=>{ const d=(e.domicilio||'').trim().toLowerCase(); if(!d) return; byDom[d]=(byDom[d]||0)+1; });
  const domicilios=Object.keys(byDom).map(d=>({dom:d,n:byDom[d]})).sort((a,b)=>b.n-a.n).slice(0,10);
  // Demanda por barrio (v2 geo) + desglose por precisión (transparencia del dato).
  const demanda={}, porPrec={}; let sinUbicar=0;
  eps.forEach(e=>{ if(e.barrio){ demanda[e.barrio]=(demanda[e.barrio]||0)+1; } else { sinUbicar++; } const p=e.geoPrecision||'(sin resolver)'; porPrec[p]=(porPrec[p]||0)+1; });
  return { op, durs, durByCod, durByMovil, sinTiempo, medRank, afil:{activos:activos.length,altas,porPlan}, quienLlama, domicilios, demanda, porPrec, sinUbicar, facOk, eps };
}
function estGenerarInforme(){
  if(!S.est||!S.est.data) return;
  const dim=document.getElementById('est-dim')?.value||'codigo';
  const met=document.getElementById('est-met')?.value||'cantidad';
  const groups={};
  S.est.data.eps.forEach(e=>{
    let key = dim==='codigo'?estCod(e) : dim==='movil'?(e.movilNombre||e.movilId||'—') : dim==='medico'?(e.medicoNombre||e.medicoId||'—') : dim==='estado'?(e.estado||'—') : estDia(e);
    const g=groups[key]||(groups[key]={count:0,resp:[]}); g.count++;
    const tD=estTts(e,'despacho'),tA=estTts(e,'arribo'); if(tD!=null&&tA!=null) g.resp.push(tA-tD);
  });
  const rows=Object.keys(groups).map(k=>({ dim:k, valor: met==='cantidad'? String(groups[k].count) : estMMSS(estProm(groups[k].resp)) }))
    .sort((a,b)=> met==='cantidad'? (Number(b.valor)-Number(a.valor)) : String(a.dim).localeCompare(String(b.dim)) );
  S.est.informe={dim,met,rows}; render();
}
function estExportarCSV(){
  if(!S.est||!S.est.informe||!S.est.informe.rows) return;
  const dimLbl={codigo:'Código',movil:'Móvil',medico:'Médico',estado:'Estado',dia:'Día'}[S.est.informe.dim]||S.est.informe.dim;
  const metLbl=S.est.informe.met==='cantidad'?'Cantidad':'Tiempo prom. respuesta';
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const csv=[q(dimLbl)+','+q(metLbl)].concat(S.est.informe.rows.map(r=>q(r.dim)+','+q(r.valor))).join('\n');
  const hoy=new Date(); const fn='medicar-informe-'+hoy.getFullYear()+'-'+('0'+(hoy.getMonth()+1)).slice(-2)+'-'+('0'+hoy.getDate()).slice(-2)+'.csv';
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fn; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ===================== MONITOREO — Nivel 1: cuestionario semanal (eje transversal) =====================
   Casa de la escalera de monitoreo: N1 ahora (cuestionario semanal configurable); N2 (auto-chequeo +
   motor de alertas) y N3 (wearables) vienen después. Gateo: puedeConfig() (admin/superadmin/

   plantillas) y Respuestas (lista read-only, INMUTABLE). Modelo:
     cuestionarios/{id}: { nombre, activo, frecuencia:'semanal', preguntas:[{id,texto,tipo}], creadoEn/Por }
     respuestas_cuestionario/{id}: { cuestionarioId, cuestionarioNombre, personaId, personaNombre,
                                     respuestas:[{preguntaId,texto,valor}], creadoEn }  (denorm para no joinear)
   REGLA OPERATIVA v1: el cuestionario ACTIVO aplica a TODOS los afiliados con app; si hay varios activos,

    db.collection('gestiones_contacto').onSnapshot(s=>{ if(!S.mon) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.mon.gest=o; if(!monFormOpen()) render(); }, ()=>{ /* degrada limpio: sin gestiones cargadas */ }),
