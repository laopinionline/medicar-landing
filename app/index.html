function epReaperturaCard(ep){
  const r=ep.data.reabierto||{};
  return `<div class="card"><div class="ch">Reapertura</div>
    <div class="ir"><span class="il">Reabierto por</span><span class="iv">${esc(r.rol||'—')}</span></div>
    <div class="ir"><span class="il">Veces</span><span class="iv">${r.veces||1}</span></div>
  </div>`;
}

function epCapsula(ep){
  const p=ep.paciente, snap=ep.data.pac||{};
  const nombre=p?`${p.apellido||''} ${p.nombre||''}`.trim():(snap.nombre||'—');
  const edad=p?calcEdad(p.fechaNacimiento):(snap.edad!=null?snap.edad:'—');
  const cron=p?(p.antecedentesCronicos||[]):[];
  const otros=p?(p.antecedentesOtros||''):'';
  const alerta=cron.length
    ? `<div style="background:var(--r);color:#fff;border-radius:10px;padding:.55rem .7rem;font-weight:700;font-size:.82rem;margin-top:.55rem">⚠️ ALERTA: ${cron.join(', ')}${otros?(' · '+esc(otros)):''}</div>`
    : `<div style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.45rem">Sin antecedentes crónicos</div>`;
  return `<div class="card card-dk">
    <div class="ch">Paciente</div>
    <div style="font-size:1.15rem;font-weight:700;color:#fff">${esc(nombre)}</div>
    <div style="font-size:.95rem;color:#fff;opacity:.85;margin-top:.15rem"><strong style="font-size:1.05rem">${edad} años</strong>${p&&p.dni?(' · DNI '+esc(p.dni)):''}</div>
    ${alerta}
    ${p?'':'<div style="font-size:.62rem;color:rgba(255,255,255,.4);margin-top:.4rem">Datos del snapshot (paciente no disponible)</div>'}
  </div>`;
}

function epDespachoCard(ep){
  const d=ep.data;
  const ant=(d.antecedentes||[]).filter(a=>a!=='ninguna');
  const antStr=ant.length?ant.join(', '):'ninguna';
  const otros=d.antecedentesOtros?(' · otros: '+esc(d.antecedentesOtros)):'';
  return `<div class="card">
    <div class="ch">Despacho</div>
    <div class="ir"><span class="il">Código</span><span class="iv" style="color:${codColor(d.codigoPresuntivo)};font-weight:700">${codEmoji(d.codigoPresuntivo)} ${d.codigoPresuntivo||'—'}</span></div>
    <div class="ir"><span class="il">Motivo</span><span class="iv">${esc(d.motivoLlamado)||'—'}</span></div>
    <div class="ir"><span class="il">Antecedentes</span><span class="iv">${esc(antStr)}${otros}</span></div>
    <div class="ir"><span class="il">Ubicación</span><span class="iv">${esc(d.domicilio)||'—'}${d.tipoLugar?(' · '+esc(tipoLugarLbl(d.tipoLugar))):''}</span></div>
    <div class="ir"><span class="il">Creado</span><span class="iv">${fechaDe(d)} ${horaDe(d)}</span></div>
  </div>`;
}

function epRecursosCard(ep){
  const d=ep.data, term=(d.estado==='cerrado'||d.estado==='cancelado');
  const esDespachante=S.user.rol==='despachante';
  // Solo el despachante asigna recursos (regla). Terminal o cualquier otro rol: lectura.
  if(term || !esDespachante){
    return `<div class="card"><div class="ch">Recursos</div>
      <div class="ir"><span class="il">Móvil</span><span class="iv">${esc(d.movilNombre||d.movilId||'sin asignar')}</span></div>
      <div class="ir"><span class="il">Médico</span><span class="iv">${esc(d.medicoNombre||(d.medicoId?'asignado':'sin asignar'))}</span></div>
    </div>`;
  }
  const medOpts=['<option value="">Sin asignar</option>'].concat(
    (S.staffMedico||[]).map(m=>`<option value="${m.uid}" ${d.medicoId===m.uid?'selected':''}>${esc(m.nombre)}</option>`)
  ).join('');
  // Selector de móvil: disponibles (activos) + SIEMPRE el actualmente asignado (aunque esté 'ocupado').
  const flota=S.movilesDisponibles||[];
  const asignadoReal=flota.find(m=>m.id===d.movilId);
  const movOpts=flota
    .filter(m=>m.estado==='disponible' || m.id===d.movilId)
    .map(m=>`<option value="${m.id}" ${d.movilId===m.id?'selected':''}>${esc(m.nombre)}${m.patente?(' · '+esc(m.patente)):''}</option>`)
    .join('');
  // Legacy: movilId guardado que NO matchea un móvil real (texto libre histórico tipo "05").
  // Se muestra como opción seleccionada y deshabilitada, para no perder el dato ni romper. NO se migra.
  const esLegacy = !!d.movilId && !asignadoReal;
  const legacyOpt = esLegacy ? `<option value="${esc(d.movilId)}" selected disabled>${esc(d.movilNombre||d.movilId)} (histórico)</option>` : '';
  // Feedback persistente: sobrevive al re-render que dispara epLoad tras guardar.
  const fl=S.recFlash;
  const flashHtml = fl
    ? `<div class="err" style="display:block;margin-bottom:.5rem;color:${fl.ok?'var(--g,#1D9E75)':'var(--r)'}">${esc(fl.text)}</div>`
    : `<div id="ep-rec-err" class="err" style="display:none;margin-bottom:.5rem"></div>`;
  return `<div class="card"><div class="ch">Recursos</div>
    <div class="field"><label>Móvil</label><select id="ep-movil"><option value="">Sin asignar</option>${legacyOpt}${movOpts}</select></div>
    <div class="field"><label>Médico</label><select id="ep-medico">${medOpts}</select></div>
    ${flashHtml}
    <button class="btn-o" onclick="epAsignar()">Guardar recursos</button>
  </div>`;
}

function epEstadoCard(ep){
  const d=ep.data, st=ep.stage, estado=d.estado;
  if(estado==='cerrado'){
    const puedeReabrir=(S.user.rol==='medico' && S.user.uid===d.medicoId) || S.user.rol==='admin';
    return `<div class="card"><div class="ch">Estado</div>
    <div class="ir"><span class="il">Estado</span><span class="iv">Cerrado</span></div>
    ${d.desenlace&&d.desenlace.codigoReal?`<div class="ir"><span class="il">Código real</span><span class="iv" style="color:${codColor(d.desenlace.codigoReal)};font-weight:700">${codEmoji(d.desenlace.codigoReal)} ${d.desenlace.codigoReal}</span></div>`:''}
    ${d.resolucion?`<div class="ir"><span class="il">Resolución</span><span class="iv">${RESOL_LBL[d.resolucion]||d.resolucion}</span></div>`:''}
    ${puedeReabrir?`<button class="btn-o" onclick="epReabrir()" style="margin-top:.6rem">Reabrir episodio</button>`:''}</div>`;
  }
  if(estado==='cancelado') return `<div class="card"><div class="ch">Estado</div>
    <div class="ir"><span class="il">Estado</span><span class="iv">Cancelado</span></div>
    <div class="ir"><span class="il">Motivo</span><span class="iv">${esc(d.motivoCancelacion)||'—'}</span></div></div>`;
  if(st==='cerrar') return clinForm(ep); // el cierre del médico = carga clínica (examen + desenlace)
  const nx=nextEstado(estado);
  // Gating por rol (espejo de las firestore.rules):
  const asignado = S.user.rol==='medico' && S.user.uid===d.medicoId; // médico ASIGNADO
  const esDespachante = S.user.rol==='despachante';
  let body;
  if(st==='cancelar'){
    body=`<div class="field"><label>Motivo de cancelación</label><input id="ep-cancel-motivo" type="text" placeholder="Ej. falsa alarma / paciente se fue" autocomplete="off"></div>
      <button class="btn-r" onclick="epCancelarOk()">Confirmar cancelación</button>
      <button class="btn-o" onclick="epStage('')" style="margin-top:.5rem">Volver</button>`;
  }else{
    const ofrecido = d.ofrecido===true;
    const esMed = S.user.rol==='medico';
    const parts=[];
    if(nx==='cerrado'){
      // Estado atención. Handoff médico→médico + cierre.
      if(asignado){
        if(ofrecido){
          // El cedente quedó congelado: no puede cerrar mientras esté ofrecido (espejo de la regla).
          parts.push(`<div style="font-size:.82rem;color:var(--o);font-weight:600;margin-bottom:.2rem">🤝 Ofrecido — esperando que otro médico lo tome.</div>`);
        }else{
          parts.push(`<button class="btn-r" onclick="epAvanzar()">Cerrar episodio</button>`);
          parts.push(`<button class="btn-o" onclick="epCeder()" style="margin-top:.5rem">Ceder caso</button>`);
        }
      }else if(esMed && ofrecido){
        // Otro médico puede tomar el caso ofrecido.
        parts.push(`<button class="btn-r" onclick="epTomar()">Tomar caso</button>`);
      }
    }else{
      // Avanzar de estado — despachante o médico asignado.
      if(esDespachante || asignado){
        const faltanRecursos = (estado==='despacho' && nx==='en_camino') && (d.movilId==null || d.medicoId==null);
        if(faltanRecursos){
          parts.push(`<button class="btn-r" disabled style="opacity:.5;cursor:not-allowed">Avanzar a ${ESTADO_LBL[nx]}</button>`);
          parts.push(`<div style="font-size:.72rem;color:var(--ink3);margin-top:.35rem">Asigná móvil y médico antes de avanzar</div>`);
        }else{
          parts.push(`<button class="btn-r" onclick="epAvanzar()">Avanzar a ${ESTADO_LBL[nx]}</button>`);
        }
      }
    }
    // Cancelar / anular — despachante o médico asignado.
    if(esDespachante || asignado){
      parts.push(`<button class="btn-o" onclick="epStage('cancelar')" style="margin-top:.5rem">Cancelar / anular</button>`);
    }
    body = parts.join('') || `<div style="font-size:.78rem;color:var(--ink3)">Sin acciones disponibles para tu rol en este episodio.</div>`;
  }
  return `<div class="card"><div class="ch">Estado actual: ${ESTADO_LBL[estado]||estado}</div>
    <div id="ep-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    ${body}
  </div>`;
}

/* ===================== CARGA CLÍNICA DEL MÉDICO — Etapa 2 =====================
   Fase atención + desenlace: al "Cerrar episodio" desde estado 'atencion', el médico
   completa examen por aparatos + desenlace en UN formulario y cierra con UNA escritura
   (epUpdate). Crónico nuevo marcado acá sube al paciente (arrayUnion, escritura aparte).
   Estado del form en memoria (S.ep.clin); inputs de texto se leen del DOM al cerrar
   (sin re-render mientras se tipea); los botones togglean clases sin render. */

const APAR_RESP=[['normal','Normal'],['irregular','Irregular'],['apnea','Apnea'],['asistida','Asistida'],['no_corresponde','No corresponde']];
const APAR_CV=[['normal','Normal'],['soplos','Soplos'],['sistolico','Sistólico'],['diastolico','Diastólico'],['pulso','Pulso'],['no_corresponde','No corresponde']];
const APAR_ABD=[['normal','Normal'],['hernias','Hernias'],['evisceraciones','Evisceraciones'],['enterorragia','Enterorragia'],['dolor','Dolor'],['otros','Otros']];
const COD_REAL=[['rojo','🔴 Rojo','#E5484D'],['amarillo','🟡 Amarillo','#E0A23B'],['verde','🟢 Verde','#1D9E75']];
const APAR_LBL={}; [...APAR_RESP,...APAR_CV,...APAR_ABD].forEach(o=>{APAR_LBL[o[0]]=o[1];});
const LBL_ST='display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:600;margin:.6rem 0 .3rem';
const CHIP_ST='display:inline-flex;align-items:center;gap:.35rem;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.35rem .6rem;font-size:.8rem;cursor:pointer';

function freshClin(){ return {respiratorio:null,cardiovascular:null,abdomen:[],codigoReal:null,internacion:null,rechaza:null}; }
function pillStyle(on,color){
  const bd=color||'var(--border2)', bg=color?color+'1a':'var(--bg)', fg=color||'var(--ink)';
  return `border:2px solid ${bd};background:${bg};color:${fg};border-radius:10px;padding:.5rem .65rem;font-size:.8rem;cursor:pointer;font-weight:${on?'700':'500'};opacity:${on?'1':'.55'};box-shadow:${on?'0 0 0 2px rgba(0,0,0,.18) inset':'none'}`;
}
function applySel(btn,on){ btn.style.fontWeight=on?'700':'500'; btn.style.opacity=on?'1':'.55'; btn.style.boxShadow=on?'0 0 0 2px rgba(0,0,0,.18) inset':'none'; }
function clinWrap(inner){ return `<div style="display:flex;flex-wrap:wrap;gap:.4rem">${inner}</div>`; }
function clinGrp(grp,opts,sel,multi,colors){
  return opts.map(o=>{
    const v=o[0],lbl=o[1],color=colors?o[2]:null;
    const on=multi?sel.includes(v):sel===v;
    const handler=multi?`clinToggleAbd('${v}',this)`:`clinPick('${grp}','${v}')`;
    return `<button type="button" data-cgrp="${grp}" data-cval="${v}" onclick="${handler}" style="${pillStyle(on,color)}">${lbl}</button>`;
  }).join('');
}

/* Handlers de los botones del form (mutan S.ep.clin + togglean clases, SIN render) */
function clinPick(grp,val){
  S.ep.clin[grp]=val;
  document.querySelectorAll(`[data-cgrp="${grp}"]`).forEach(b=>applySel(b,b.dataset.cval===val));
}
function clinToggleAbd(val,btn){
  const a=S.ep.clin.abdomen, i=a.indexOf(val);
  if(i>=0) a.splice(i,1); else a.push(val);
  applySel(btn,a.includes(val));
  if(val==='otros'){ const w=document.getElementById('clin-abd-otros'); if(w) w.style.display=a.includes('otros')?'block':'none'; }
}
function clinBool(grp,val){
  S.ep.clin[grp]=val; // 'si' | 'no'
  document.querySelectorAll(`[data-cgrp="${grp}"]`).forEach(b=>applySel(b,b.dataset.cval===val));
  const w=document.getElementById('clin-'+grp+'-extra'); if(w) w.style.display=(val==='si')?'block':'none';
}
function clinCronOtros(cb){ const w=document.getElementById('clin-cron-otros'); if(w) w.style.display=cb.checked?'block':'none'; }

function clinForm(ep){
  if(!S.ep.clin) S.ep.clin=freshClin(); // defensa: nunca rendir el form sin estado
  const c=S.ep.clin;
  return `
  <div class="card"><div class="ch">Examen por aparatos</div>
    <span style="${LBL_ST}">Respiratorio</span>${clinWrap(clinGrp('respiratorio',APAR_RESP,c.respiratorio,false))}
    <span style="${LBL_ST}">Cardiovascular</span>${clinWrap(clinGrp('cardiovascular',APAR_CV,c.cardiovascular,false))}
    <span style="${LBL_ST}">Abdomen</span>${clinWrap(clinGrp('abdomen',APAR_ABD,c.abdomen,true))}
    <div class="field" id="clin-abd-otros" style="display:${c.abdomen.includes('otros')?'block':'none'};margin:.4rem 0 0"><input id="clin-abd-otros-txt" type="text" placeholder="Abdomen — otros (detalle)" autocomplete="off"></div>
    <div class="field" style="margin-top:.6rem"><label>ECG</label><textarea id="clin-ecg" placeholder="Hallazgos del ECG…"></textarea></div>
    <div class="field"><label>Psiquiátrico</label><textarea id="clin-psiq" placeholder="…"></textarea></div>
  </div>
  <div class="card"><div class="ch">Desenlace</div>
    <div class="field"><label>Procedimiento efectuado</label><input id="clin-proc" type="text" autocomplete="off"></div>
    <div class="field"><label>Medicamento (in situ)</label><input id="clin-med" type="text" autocomplete="off"></div>
    <div class="field"><label>Diagnóstico presuntivo</label><input id="clin-dx" type="text" autocomplete="off"></div>
    <div class="field"><label>Epicrisis</label><textarea id="clin-epi" placeholder="Resumen clínico del episodio…"></textarea></div>
    <span style="${LBL_ST}">Internación</span>${clinWrap(
      `<button type="button" data-cgrp="internacion" data-cval="si" onclick="clinBool('internacion','si')" style="${pillStyle(c.internacion==='si')}">Sí</button>`+
      `<button type="button" data-cgrp="internacion" data-cval="no" onclick="clinBool('internacion','no')" style="${pillStyle(c.internacion==='no')}">No</button>`)}
    <div class="field" id="clin-internacion-extra" style="display:${c.internacion==='si'?'block':'none'};margin:.4rem 0 0"><input id="clin-donde" type="text" placeholder="¿Dónde?" autocomplete="off"></div>
    <span style="${LBL_ST}">Rechaza tratamiento</span>${clinWrap(
      `<button type="button" data-cgrp="rechaza" data-cval="si" onclick="clinBool('rechaza','si')" style="${pillStyle(c.rechaza==='si')}">Sí</button>`+
      `<button type="button" data-cgrp="rechaza" data-cval="no" onclick="clinBool('rechaza','no')" style="${pillStyle(c.rechaza==='no')}">No</button>`)}
    <div class="field" id="clin-rechaza-extra" style="display:${c.rechaza==='si'?'block':'none'};margin:.4rem 0 0"><input id="clin-motivo" type="text" placeholder="Motivo" autocomplete="off"></div>
    <span style="${LBL_ST}">Código real <span style="text-transform:none;letter-spacing:0;font-weight:500">(presunto: ${codEmoji(ep.data.codigoPresuntivo)} ${ep.data.codigoPresuntivo||'—'})</span></span>${clinWrap(clinGrp('codigoReal',COD_REAL,c.codigoReal,false,true))}
  </div>
  <div class="card"><div class="ch">Antecedente crónico nuevo</div>
    <div style="font-size:.7rem;color:var(--ink3);margin-bottom:.45rem">Lo que marques se suma a los crónicos del paciente al cerrar (no se re-pregunta a futuro).</div>
    <div style="display:flex;flex-wrap:wrap;gap:.4rem">
      ${ANTECEDENTES.map(a=>`<label style="${CHIP_ST}"><input type="checkbox" class="clin-cron" value="${a}"> ${a}</label>`).join('')}
      <label style="${CHIP_ST}"><input type="checkbox" class="clin-cron" value="otros" onclick="clinCronOtros(this)"> otros</label>
    </div>
    <div class="field" id="clin-cron-otros" style="display:none;margin-top:.4rem"><input id="clin-cron-otros-txt" type="text" placeholder="Otro antecedente crónico" autocomplete="off"></div>
  </div>
  <div id="ep-err" class="err" style="display:none;margin-bottom:.5rem"></div>
  <button class="btn-r" onclick="clinCerrar()">Cerrar episodio</button>
  <button class="btn-o" onclick="epStage('')" style="margin-top:.5rem">Volver (sin guardar)</button>`;
}

async function clinCerrar(){
  const ep=S.ep, c=ep.clin;
  epMsg('');
  const g=id=>(document.getElementById(id)?.value||'').trim();
  const dx=g('clin-dx');
  // VALIDACIÓN MÍNIMA: código real + diagnóstico. El resto opcional.
  if(!c.codigoReal){ epMsg('Seleccioná el código real antes de cerrar'); return; }
  if(!dx){ epMsg('Cargá el diagnóstico presuntivo antes de cerrar'); return; }

  const ecg=g('clin-ecg'), psiq=g('clin-psiq'), abdOtros=g('clin-abd-otros-txt');
  const examen={
    respiratorio:   c.respiratorio   ? {examinado:true,estado:c.respiratorio}   : {examinado:false,estado:null},
    cardiovascular: c.cardiovascular ? {examinado:true,estado:c.cardiovascular} : {examinado:false,estado:null},
    abdomen:        c.abdomen.length ? {examinado:true,hallazgos:c.abdomen.slice(),otros:(c.abdomen.includes('otros')?abdOtros:'')} : {examinado:false,hallazgos:[],otros:''},
    ecg:            {examinado:!!ecg,texto:ecg},
    psiquiatrico:   {examinado:!!psiq,texto:psiq}
  };
  const interna=(c.internacion==='si'), rechaza=(c.rechaza==='si');
  const desenlace={
    procedimiento:g('clin-proc'), medicamento:g('clin-med'), diagnostico:dx, epicrisis:g('clin-epi'),
    internacion:{interna, donde:interna?g('clin-donde'):''},
    rechazaTratamiento:{rechaza, motivo:rechaza?g('clin-motivo'):''},
    codigoReal:c.codigoReal
  };

  // CRÓNICO NUEVO → PACIENTE (escritura separada, antes del cierre del episodio)
  const cron=[...document.querySelectorAll('.clin-cron:checked')].map(x=>x.value);
  const cronOtrosTxt = cron.includes('otros') ? g('clin-cron-otros-txt') : '';
  if(cron.length && ep.data.pacienteId){
    const updP={ antecedentesCronicos: firebase.firestore.FieldValue.arrayUnion(...cron) };
    if(cronOtrosTxt){
      const prev=(ep.paciente&&ep.paciente.antecedentesOtros)||'';
      updP.antecedentesOtros=[prev,cronOtrosTxt].filter(Boolean).join('; '); // append, no pisa lo previo
    }
    try{ await db.collection('pacientes').doc(ep.data.pacienteId).set(updP,{merge:true}); }
    catch(e){ epMsg('No se pudo actualizar antecedentes del paciente: '+(e.message||e)); return; }
  }

  // CIERRE del episodio — escritor único. codigoPresuntivo queda intacto.
  // cierres[] versiona cada cierre (1ra vez y recierres tras reapertura).
  // OJO: dentro de arrayUnion NO va FV()/serverTimestamp -> timestamp de cliente (Date.now()).
  await epUpdate({
    estado:'cerrado', examen, desenlace,
    ['transiciones.cerrado']:FV(),
    cierres: firebase.firestore.FieldValue.arrayUnion({
      cerradoEn: Date.now(),
      examen: examen,
      desenlace: desenlace,
      por: S.user.uid
    })
  });
}

// Reapertura: cerrado -> atencion. Solo médico ASIGNADO o admin (la regla es la defensa real).
// hasOnly ESTRICTO en reglas: toca SOLO estado + reabierto (NO cierres ni transiciones).
async function epReabrir(){
  const d=S.ep.data;
  const puede = (S.user.rol==='medico' && S.user.uid===d.medicoId) || S.user.rol==='admin';
  if(!puede){ return; }
  await epUpdate({
    estado:'atencion',
    reabierto:{
      por: S.user.uid,
      rol: S.user.rol,
      en: Date.now(),
      veces: (d.reabierto && d.reabierto.veces ? d.reabierto.veces : 0) + 1
    }
  });
}

// Handoff CEDER: el médico asignado ofrece su caso (queda congelado para él hasta que otro lo tome).
// Toca solo ofrecido + handoff (espejo de la regla). serverTimestamp NO va dentro del objeto -> Date.now().
async function epCeder(){
  await epUpdate({
    ofrecido:true,
    handoff:{ de:S.user.uid, deNombre:S.user.nombre, cedidoEn:Date.now() }
  });
}

// Handoff TOMAR: otro médico toma el caso ofrecido -> se pone como medicoId y baja ofrecido.
async function epTomar(){
  const h=S.ep.data.handoff||{};
  await epUpdate({
    medicoId:S.user.uid,
    medicoNombre:S.user.nombre,
    ofrecido:false,
    handoff:{ ...h, a:S.user.uid, aNombre:S.user.nombre, tomadoEn:Date.now() }
  });
}

/* Display read-only de la clínica una vez cerrado el episodio */
function epClinicaCard(ep){
  const d=ep.data, ex=d.examen||{}, de=d.desenlace||{};
  const apar=(lbl,o,fmt)=>{ if(!o) return ''; const v=o.examinado?fmt(o):'<span style="color:var(--ink3)">no examinado</span>'; return `<div class="ir"><span class="il">${lbl}</span><span class="iv">${v}</span></div>`; };
  const aparLbl=k=>esc(APAR_LBL[k]||k||'—');
  const examenHtml=
    apar('Respiratorio',ex.respiratorio,o=>aparLbl(o.estado))+
    apar('Cardiovascular',ex.cardiovascular,o=>aparLbl(o.estado))+
    apar('Abdomen',ex.abdomen,o=>esc((o.hallazgos||[]).map(h=>APAR_LBL[h]||h).join(', ')+(o.otros?(' · '+o.otros):'')))+
    apar('ECG',ex.ecg,o=>esc(o.texto||'—'))+
    apar('Psiquiátrico',ex.psiquiatrico,o=>esc(o.texto||'—'));
  const fila=(l,v)=> v?`<div class="ir"><span class="il">${l}</span><span class="iv">${esc(v)}</span></div>`:'';
  const intern = de.internacion ? (de.internacion.interna?('Sí'+(de.internacion.donde?(' · '+de.internacion.donde):'')):'No') : '';
  const rech = de.rechazaTratamiento ? (de.rechazaTratamiento.rechaza?('Sí'+(de.rechazaTratamiento.motivo?(' · '+de.rechazaTratamiento.motivo):'')):'No') : '';
  return `<div class="card"><div class="ch">Atención (clínica)</div>
    ${examenHtml||'<div style="font-size:.78rem;color:var(--ink3)">Sin examen cargado</div>'}
    <div style="height:.5rem"></div>
    ${fila('Procedimiento',de.procedimiento)}
    ${fila('Medicamento',de.medicamento)}
    ${fila('Diagnóstico',de.diagnostico)}
    ${fila('Epicrisis',de.epicrisis)}
    ${fila('Internación',intern)}
    ${fila('Rechaza tratamiento',rech)}
    ${de.codigoReal?`<div class="ir"><span class="il">Código real</span><span class="iv" style="color:${codColor(de.codigoReal)};font-weight:700">${codEmoji(de.codigoReal)} ${de.codigoReal}</span></div>`:''}
  </div>`;
}

/* ===================== SUPERADMIN — Panel de Gestión de Personal/Roles =====================
   Opción A (solo Firestore): gestiona docs usuarios/{uid} (+ sincroniza staff_medico/{uid}
   cuando el rol es médico). NO toca Firebase Auth (alta de cuentas = script aparte).
   Baja = lógica (activo=false), nunca borrado. Guard anti-lockout: el superadmin no puede
   quitarse el rol ni darse de baja a sí mismo. */

// Roles reales del sistema (no se inventan director_* hasta que tengan reglas/UI propias).
const ROLES_PERSONAL=['superadmin','admin','despachante','medico','chofer','afiliado'];

function spMsg(t,ok){ const e=document.getElementById('sp-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color = (t&&ok)?'var(--g,#1D9E75)':''; } }
const spVal=id=>(document.getElementById(id)?.value||'').trim();
function spErr(e){ return (e&&e.message)||String(e); }

/* Listeners en tiempo real: la lista se refresca sola (no hay botón "Actualizar"). */
function spAttach(){
  if(S.spUnsub) return;
  S.spUnsub=[
    db.collection('usuarios').onSnapshot(s=>{ if(!S.sp) return; S.sp.users=s.docs.map(d=>({uid:d.id,...d.data()})); if(spIdle()) render(); }, e=>{ if(S.sp){ S.sp.err=spErr(e); render(); } }),
    db.collection('staff_medico').onSnapshot(s=>{ if(!S.sp) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.sp.staff=o; if(spIdle()) render(); }, ()=>{})
  ];
}
function spDetach(){ if(S.spUnsub){ S.spUnsub.forEach(u=>{ try{u();}catch(_){} }); S.spUnsub=null; } }
// idle = estoy en la lista (no en un form): un snapshot no debe re-renderizar y pisar lo que se tipea.
function spIdle(){ return !!(S.user && S.user.rol==='superadmin' && S.sp && !S.sp.edit && !S.sp.creating); }

function spReintentar(){ spDetach(); S.sp=null; render(); }
function spTab(t){ if(S.sp){ S.sp.tab=t; S.sp.edit=null; S.sp.creating=false; } render(); }
function spOpenCreate(){ if(S.sp){ S.sp.creating=true; S.sp.edit=null; } render(); }
function spOpenEdit(uid){ if(S.sp){ S.sp.edit=uid; S.sp.creating=false; } render(); }
function spBack(){ if(S.sp){ S.sp.edit=null; S.sp.creating=false; } render(); }

function spPanel(){
  if(!S.sp){ S.sp={tab:'personal',edit:null,creating:false,users:null,staff:{}}; spAttach(); }
  if(S.sp.err) return `<div class="card">No se pudo cargar: ${esc(S.sp.err)}<br><button class="btn-o" onclick="spReintentar()" style="margin-top:.6rem">Reintentar</button></div>`;
  if(S.sp.users===null) return `<div class="card">Cargando personal…</div>`;
  if(S.sp.creating) return spCreateView();
  if(S.sp.edit) return spEditView();
  return spListView();
}

function spListView(){
  const tab=S.sp.tab||'personal';
  const all=S.sp.users;
  const nPers=all.filter(u=>u.rol!=='afiliado').length;
  const nAfil=all.filter(u=>u.rol==='afiliado').length;
  // "Personal" = roles operativos/directivos (todo menos afiliado); afiliados (cuentas de paciente) en solapa aparte.
  const list=(tab==='afiliados'?all.filter(u=>u.rol==='afiliado'):all.filter(u=>u.rol!=='afiliado'))
    .slice().sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const rows=list.length?list.map(spRow).join(''):`<div style="font-size:.78rem;color:var(--ink3)">Sin registros</div>`;
  const tabBtn=(id,lbl)=>`<button class="btn-o" style="width:auto;padding:.4rem .8rem;${tab===id?'border-color:var(--r);color:var(--r);font-weight:700':''}" onclick="spTab('${id}')">${lbl}</button>`;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
    <div style="font-weight:700">Gestión de personal</div>
    <span style="font-size:.62rem;color:var(--ink3)">● en vivo</span>
  </div>
  <button class="btn-r" onclick="spOpenCreate()" style="margin-bottom:.7rem">+ Crear persona</button>
  <div style="display:flex;gap:.4rem;margin-bottom:.7rem">
    ${tabBtn('personal','Personal ('+nPers+')')}
    ${tabBtn('afiliados','Afiliados ('+nAfil+')')}
  </div>
  <div class="card">${rows}</div>`;
}

function spRow(u){
  const activo=u.activo!==false; // campo ausente = activo
  const esMed=u.rol==='medico';
  const st=S.sp.staff[u.uid];
  const asignable=esMed && st && st.activo!==false;
  const medMark=esMed?` · ${asignable?'🩺 asignable':'🩺 no asignable'}`:'';
  const badge=activo?`<span class="badge bg">activo</span>`:`<span class="badge br">inactivo</span>`;
  return `<div class="lr" onclick="spOpenEdit('${u.uid}')" style="cursor:pointer">
    <div class="lrb"><div class="lrn">${esc(u.nombre||'—')}</div>
      <div class="lrs">${esc(u.email||'')} · ${esc(u.rol||'—')}${medMark}</div></div>
    ${badge}
  </div>`;
}

/* CREAR persona -> Cloud Function createUser (Auth + usuarios + staff_medico si médico). */
function spCreateView(){
  const roleOpts=ROLES_PERSONAL.map(r=>`<option value="${r}" ${r==='despachante'?'selected':''}>${r}</option>`).join('');
  return `
  <div style="margin-bottom:.5rem"><button class="btn-o" style="width:auto;padding:.4rem .8rem" onclick="spBack()">← Volver</button></div>
  <div class="card card-dk"><div class="ch">Crear persona</div>
    <div style="font-size:.8rem;color:rgba(255,255,255,.6)">Crea la cuenta de acceso + su ficha. Si el rol es médico, queda asignable en el despacho.</div></div>
  <div class="card">
    <div class="field"><label>Nombre</label><input id="sp-c-nombre" type="text" autocomplete="off"></div>
    <div class="field"><label>Email</label><input id="sp-c-email" type="email" placeholder="usuario@medicaronline.ar" autocomplete="off"></div>
    <div class="field"><label>Rol</label><select id="sp-c-rol">${roleOpts}</select></div>
    <div class="field"><label>Contraseña inicial</label><input id="sp-c-pass" type="text" placeholder="mín. 6 caracteres" autocomplete="off"></div>
    <div id="sp-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" id="sp-c-btn" onclick="spCrear()">Crear</button>
  </div>`;
}
async function spCrear(){
  spMsg('');
  const nombre=spVal('sp-c-nombre'), email=spVal('sp-c-email'), rol=document.getElementById('sp-c-rol')?.value||'';
  const pass=document.getElementById('sp-c-pass')?.value||'';
  if(!nombre||!email){ spMsg('Nombre y email son requeridos.'); return; }
  if(pass.length<6){ spMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
  const btn=document.getElementById('sp-c-btn'); if(btn){ btn.disabled=true; btn.textContent='Creando…'; }
  try{
    await fnsCall('createUser',{email,nombre,rol,passwordInicial:pass});
    if(S.sp) S.sp.creating=false; render(); // el listener trae el nuevo registro
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Crear'; } spMsg(spErr(e)); }
}

function spEditView(){
  const u=S.sp.users.find(x=>x.uid===S.sp.edit);
  if(!u){ S.sp.edit=null; return spListView(); }
  const esSelf=u.uid===S.user.uid;
  const activo=u.activo!==false;
  const roleOpts=ROLES_PERSONAL.map(r=>`<option value="${r}" ${u.rol===r?'selected':''}>${r}</option>`).join('');
  return `
  <div style="margin-bottom:.5rem"><button class="btn-o" style="width:auto;padding:.4rem .8rem" onclick="spBack()">← Volver</button></div>
  <div class="card card-dk"><div class="ch">Editar persona</div>
    <div style="font-size:1.05rem;font-weight:700;color:#fff">${esc(u.nombre||'—')}</div>
    <div style="font-size:.85rem;color:#fff;opacity:.8;margin-top:.15rem">${esc(u.email||'')}</div>
    ${esSelf?`<div style="background:var(--o,#E0A23B);color:#fff;border-radius:8px;padding:.45rem .6rem;font-size:.76rem;font-weight:600;margin-top:.55rem">Es tu propia cuenta: no podés quitarte superadmin, darte de baja ni borrarte.</div>`:''}
  </div>
  <div class="card">
    <div class="field"><label>Nombre</label><input id="sp-nombre" type="text" value="${esc(u.nombre||'')}" autocomplete="off"></div>
    <div class="field"><label>Rol</label><select id="sp-rol" ${esSelf?'disabled':''}>${roleOpts}</select></div>
    <div class="field"><label>Estado</label><select id="sp-activo" ${esSelf?'disabled':''}>
      <option value="si" ${activo?'selected':''}>Activo</option>
      <option value="no" ${!activo?'selected':''}>Inactivo (baja lógica)</option>
    </select></div>
    <div style="font-size:.68rem;color:var(--ink3);margin:-.3rem 0 .6rem">Rol a/desde médico sincroniza staff_medico. La baja lógica lo saca del selector de despacho.</div>
    <div id="sp-err" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" onclick="spGuardar('${u.uid}')">Guardar cambios</button>
  </div>
  <div class="card"><div class="ch">Contraseña</div>
    <div class="field"><label>Nueva contraseña</label><input id="sp-rp" type="text" placeholder="mín. 6 caracteres" autocomplete="off"></div>
    <button class="btn-o" onclick="spResetPass('${u.uid}')">Resetear contraseña</button>
  </div>
  ${spCardPermisos(u)}
  <div class="card"><div class="ch">Zona peligrosa</div>
    ${esSelf
      ? `<div style="font-size:.78rem;color:var(--ink3)">No podés borrar tu propia cuenta.</div>`
      : `<div style="font-size:.7rem;color:var(--ink3);margin-bottom:.5rem">Si tiene episodios asociados, se desactiva (baja lógica) en vez de borrarse.</div>
         <button class="btn-r" onclick="spBorrar('${u.uid}')">Borrar persona</button>`}
  </div>`;
}

// EDITAR nombre/rol/estado: escritura directa a Firestore (el superadmin tiene permiso por reglas).
async function spGuardar(uid){
  const u=S.sp.users.find(x=>x.uid===uid); if(!u) return;
  spMsg('');
  const esSelf=uid===S.user.uid;
  const nombre=spVal('sp-nombre');
  const rol = esSelf ? u.rol : (document.getElementById('sp-rol')?.value||u.rol);
  const activo = esSelf ? true : ((document.getElementById('sp-activo')?.value||'si')==='si');
  if(esSelf && (rol!=='superadmin' || activo!==true)){ spMsg('No podés quitarte el rol superadmin ni darte de baja.'); return; }
  if(!nombre){ spMsg('El nombre no puede estar vacío.'); return; }
  try{
    await db.collection('usuarios').doc(uid).set({ rol, nombre, activo }, { merge:true });
    if(rol==='medico'){
      await db.collection('staff_medico').doc(uid).set({ nombre, activo }, { merge:true });
    }else if(S.sp.staff[uid]){
      await db.collection('staff_medico').doc(uid).set({ activo:false }, { merge:true });
    }
    if(S.sp) S.sp.edit=null; render(); // el listener refleja el cambio
  }catch(e){ spMsg('No se pudo guardar: '+spErr(e)); }
}

// RESETEAR contraseña -> Cloud Function setPassword.
async function spResetPass(uid){
  spMsg('');
  const p=document.getElementById('sp-rp')?.value||'';
  if(p.length<6){ spMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
  try{
    await fnsCall('setPassword',{uid,nuevaPassword:p});
    const el=document.getElementById('sp-rp'); if(el) el.value='';
    spMsg('✓ Contraseña actualizada.',true);
  }catch(e){ spMsg(spErr(e)); }
}

// BORRAR -> Cloud Function deleteUser (borra si no tiene episodios; si tiene, baja lógica).
async function spBorrar(uid){
  spMsg('');
  if(uid===S.user.uid){ spMsg('No podés borrarte a vos mismo.'); return; }
  if(!confirm('¿Borrar esta persona? Si tiene episodios asociados se desactivará (baja lógica) en vez de borrarse.')) return;
  try{
    const r=await fnsCall('deleteUser',{uid});
    if(S.sp) S.sp.edit=null; render();
    if(r&&r.deleted) alert('Persona borrada.');
    else if(r&&r.deactivated) alert('Tenía episodios asociados: se desactivó (baja lógica) en vez de borrarse.');
  }catch(e){ spMsg(spErr(e)); }
}

function perfilSuper(){
  const u=S.user;
  return `<div class="ptop"><div class="av">SA</div><div class="pname">${esc(u.nombre)}</div><div class="psub">Superadmin · acceso total</div></div>
  <div class="card"><div class="ch">Cuenta</div>
    <div class="ir"><span class="il">Rol</span><span class="iv">superadmin</span></div>
    <div class="ir"><span class="il">Email</span><span class="iv">${esc(u.email)}</span></div>
  </div>
  <button class="btn-o" onclick="doLogout()" style="margin-top:.8rem">Cerrar sesión</button>`;
}

/* ===================== SUPERADMIN — Centro de mando (navegación interna) =====================
   superView() = menú de secciones + cuerpo. Default: Dashboard. Secciones activas:
   Dashboard + Personal (la existente). Móviles/Auditoría/Configuración: previstas (próximamente).
   Cada sección con onSnapshot tiene su detach al salir de la sección y en logout. */

// [id, label, activa]
const SUPER_SECS=[['dashboard','Dashboard',true],['personal','Personal',true],['moviles','Móviles',true],['cronograma','Cronograma',true],['auditoria','Auditoría',false],['config','Configuración',false]];

function superMenu(sec){
  const items=SUPER_SECS.map(([id,lbl,on])=>{
    const active=sec===id;
    const style=`white-space:nowrap;width:auto;padding:.4rem .7rem;${active?'border-color:var(--r);color:var(--r);font-weight:700':''}${on?'':';opacity:.5;cursor:not-allowed'}`;
    return on
      ? `<button class="btn-o" style="${style}" onclick="superNav('${id}')">${lbl}</button>`
      : `<button class="btn-o" style="${style}" disabled>${lbl} · próx</button>`;
  }).join('');
  return `<div style="display:flex;gap:.4rem;overflow-x:auto;margin-bottom:.7rem;padding-bottom:.2rem">${items}</div>`;
}

function superView(){
  if(!S.superSec) S.superSec='dashboard';
  const sec=S.superSec;
  let body;
  if(sec==='personal') body=spPanel();
  else if(sec==='dashboard') body=dashSuper();
  else if(sec==='moviles') body=movPanel();
  else if(sec==='cronograma') body=cronoPanel();
  else body=`<div class="card"><div class="ch">${(SUPER_SECS.find(s=>s[0]===sec)||[,sec])[1]}</div><div style="font-size:.8rem;color:var(--ink3)">Próximamente. Módulo no disponible todavía.</div></div>`;
  return superMenu(sec)+body;
}

// Cambiar de sección: cortar listeners + estado de la sección que dejo.
function superNav(sec){
  if(S.superSec==='personal'){ spDetach(); S.sp=null; }
  if(S.superSec==='dashboard'){ dashDetach(); S.dash=null; }
  if(S.superSec==='moviles'){ movDetach(); S.mov=null; }
  if(S.superSec==='cronograma'){ cronoDetach(); S.crono=null; }
  S.superSec=sec;
  render();
}

/* ---- Dashboard de métricas en vivo ---- */
function tms(t){ if(!t) return null; if(t.toMillis) return t.toMillis(); if(t.seconds!=null) return t.seconds*1000; if(typeof t==='number') return t; return null; }
function esHoy(t){ const ms=tms(t); if(ms==null) return false; const d=new Date(ms), n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function fmtDur(s){ s=Math.round(s); if(!isFinite(s)||s<0) return '—'; if(s<60) return s+'s'; const m=Math.floor(s/60), r=s%60; return m+'m'+(r?(' '+r+'s'):''); }
function dashIdle(){ return !!(S.user && S.user.rol==='superadmin' && S.superSec==='dashboard'); }

function dashAttach(){
  if(S.dashUnsub) return;
  S.dashUnsub=[
    db.collection('episodios').onSnapshot(s=>{ if(!S.dash) return; S.dash.eps=s.docs.map(d=>d.data()); if(dashIdle()) render(); }, e=>{ if(S.dash){ S.dash.err=(e.message||String(e)); if(dashIdle()) render(); } }),
    db.collection('staff_medico').where('activo','==',true).onSnapshot(s=>{ if(!S.dash) return; S.dash.staffN=s.size; if(dashIdle()) render(); }, ()=>{}),
    db.collection('usuarios').where('rol','==','afiliado').onSnapshot(s=>{ if(!S.dash) return; S.dash.afilN=s.size; if(dashIdle()) render(); }, ()=>{}),
    db.collection('moviles').where('activo','==',true).onSnapshot(s=>{ if(!S.dash) return; S.dash.flota=s.docs.map(d=>d.data()); if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.flota=[]; if(dashIdle()) render(); } })
  ];
}
function dashDetach(){ if(S.dashUnsub){ S.dashUnsub.forEach(u=>{ try{u();}catch(_){} }); S.dashUnsub=null; } }

function dashSuper(){
  if(!S.dash){ S.dash={eps:null,staffN:null,afilN:null,flota:null}; dashAttach(); }
  const d=S.dash;
  const card=(n,l)=>`<div class="stat"><div class="sn">${n}</div><div class="sl">${l}</div></div>`;
  let hoy='…', activos='…', cDesp=0,cEnC=0,cArr=0,cAt=0, tResp='…', tAt='…';
  if(d.err) return `<div class="card">No se pudieron cargar las métricas: ${esc(d.err)}</div>`;
  if(d.eps){
    const ACT=['despacho','en_camino','arribo','atencion'];
    hoy=d.eps.filter(e=>esHoy(e.creadoEn)).length;
    const act=d.eps.filter(e=>ACT.includes(e.estado)); activos=act.length;
    cDesp=act.filter(e=>e.estado==='despacho').length;
    cEnC=act.filter(e=>e.estado==='en_camino').length;
    cArr=act.filter(e=>e.estado==='arribo').length;
    cAt=act.filter(e=>e.estado==='atencion').length;
    const resp=[], aten=[];
    d.eps.filter(e=>e.estado==='cerrado'&&e.transiciones).forEach(e=>{
      const tr=e.transiciones, dsp=tms(tr.despacho), arr=tms(tr.arribo), at=tms(tr.atencion), ce=tms(tr.cerrado);
      if(dsp!=null&&arr!=null&&arr>=dsp) resp.push((arr-dsp)/1000);
      if(at!=null&&ce!=null&&ce>=at) aten.push((ce-at)/1000);
    });
    tResp=resp.length?fmtDur(resp.reduce((a,b)=>a+b,0)/resp.length):'sin datos aún';
    tAt=aten.length?fmtDur(aten.reduce((a,b)=>a+b,0)/aten.length):'sin datos aún';
  }
  const medN=(d.staffN==null)?'…':d.staffN;
  const afN=(d.afilN==null)?'…':d.afilN;
  // Flota (móviles activos) por estado — en vivo.
  const fl=d.flota;
  const fLoad=(fl==null);
  const fDisp=fLoad?'…':fl.filter(m=>m.estado==='disponible').length;
  const fOcup=fLoad?'…':fl.filter(m=>m.estado==='ocupado').length;
  const fFds =fLoad?'…':fl.filter(m=>m.estado==='fuera_de_servicio').length;
  const fTot =fLoad?'…':fl.length;
  return `
  <div style="font-weight:700;margin:.1rem 0 .6rem">Dashboard <span style="font-size:.62rem;color:var(--ink3);font-weight:400">● en vivo</span></div>
  <div class="srow">${card(hoy,'Atenciones del día')}${card(activos,'Episodios activos')}</div>
  <div class="card"><div class="ch">Activos por estado</div>
    <div class="ir"><span class="il">Despacho</span><span class="iv">${cDesp}</span></div>
    <div class="ir"><span class="il">En camino</span><span class="iv">${cEnC}</span></div>
    <div class="ir"><span class="il">Arribo</span><span class="iv">${cArr}</span></div>
    <div class="ir"><span class="il">En atención</span><span class="iv">${cAt}</span></div>
  </div>
  <div class="srow">${card(medN,'Médicos activos')}${card(afN,'Afiliados totales')}</div>
  <div class="card"><div class="ch">Tiempos promedio (episodios cerrados)</div>
    <div class="ir"><span class="il">Respuesta (despacho→arribo)</span><span class="iv">${tResp}</span></div>
    <div class="ir"><span class="il">Atención (atención→cierre)</span><span class="iv">${tAt}</span></div>
  </div>
  <div class="card"><div class="ch">Flota (móviles activos)</div>
    <div class="ir"><span class="il">Disponibles</span><span class="iv">${fDisp}</span></div>
    <div class="ir"><span class="il">Ocupados</span><span class="iv">${fOcup}</span></div>
    <div class="ir"><span class="il">Fuera de servicio</span><span class="iv">${fFds}</span></div>
    <div class="ir"><span class="il">Total flota activa</span><span class="iv">${fTot}</span></div>
  </div>
  <div class="card"><div class="ch">Próximamente</div>
    <div class="ir"><span class="il">Consumos diarios (farmacia/insumos)</span><span class="iv" style="color:var(--ink3)">no modelado aún</span></div>
  </div>`;
}

/* ===================== MI PERFIL (editable, todos los roles) =====================
   Cada usuario edita SOLO lo propio (S.user.uid / auth.currentUser): nombre, foto y su
   contraseña. email/rol read-only. La contraseña va por SDK cliente (reauth + updatePassword),
   NO por la Cloud Function setPassword (esa es para que el superadmin resetee a otros). */
function mpMsg(id,t,ok){ const e=document.getElementById(id); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color=(t&&ok)?'var(--g,#1D9E75)':''; } }

function miPerfil(){

    : `<div class="av">${ini}</div>`;
  return `
  <div class="ptop">
    <div style="margin-bottom:.5rem">${avatar}</div>
    <div class="pname">${esc(u.nombre||'—')}</div>
    <div class="psub">${esc(u.rol)} · ${esc(u.email)}</div>
  </div>
  <div class="card"><div class="ch">Datos</div>
    <div class="field"><label>Nombre</label><input id="mp-nombre" type="text" value="${esc(u.nombre||'')}" autocomplete="off"></div>
    <div class="field"><label>Email</label><input type="email" value="${esc(u.email)}" disabled></div>
    <div class="field"><label>Rol</label><input type="text" value="${esc(u.rol)}" disabled></div>
    <div id="mp-err-nombre" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" onclick="mpGuardarNombre()">Guardar nombre</button>
  </div>
  <div class="card"><div class="ch">Foto de perfil</div>
    <input id="mp-foto" type="file" accept="image/*" onchange="mpSubirFoto(this)" style="font-size:.8rem">
    <div style="font-size:.66rem;color:var(--ink3);margin-top:.35rem">Imagen, máx. 3 MB.</div>
    <div id="mp-err-foto" class="err" style="display:none;margin-top:.5rem"></div>

async function mpGuardarNombre(){
  mpMsg('mp-err-nombre','');
  const nombre=(document.getElementById('mp-nombre')?.value||'').trim();
  if(!nombre){ mpMsg('mp-err-nombre','El nombre no puede estar vacío.'); return; }
  const uid=S.user.uid;
  try{
    await db.collection('usuarios').doc(uid).set({nombre},{merge:true}); // depende de la regla "mi perfil"
    // sync staff_medico (best-effort): el médico no puede escribirlo por reglas; lo sincroniza un admin.
    if(S.user.rol==='medico'){ try{ await db.collection('staff_medico').doc(uid).set({nombre},{merge:true}); }catch(_){ } }
    S.user.nombre=nombre; render();
    mpMsg('mp-err-nombre','✓ Nombre actualizado.',true);
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='permission-denied') m='Sin permiso para editar el nombre (la regla de "mi perfil" todavía no está aplicada).';
    mpMsg('mp-err-nombre',m);
  }
}

async function mpSubirFoto(input){
  mpMsg('mp-err-foto','');
  const f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ mpMsg('mp-err-foto','El archivo debe ser una imagen.'); return; }
  if(f.size>3*1024*1024){ mpMsg('mp-err-foto','La imagen supera 3 MB.'); return; }
  const uid=S.user.uid;
  mpMsg('mp-err-foto','Subiendo…',true);
  try{
    const ext=((f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,''))||'jpg';
    const ref=firebase.storage().ref('perfiles/'+uid+'/avatar.'+ext);
    const snap=await ref.put(f);
    const url=await snap.ref.getDownloadURL();
    await db.collection('usuarios').doc(uid).set({fotoURL:url},{merge:true});
    S.user.fotoURL=url; render();
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='storage/unauthorized') m='Sin permiso (la regla de Storage todavía no está aplicada).';
    mpMsg('mp-err-foto',m);
  }
}

async function mpCambiarPass(){
  mpMsg('mp-err-pass','');
  const act=document.getElementById('mp-pass-act')?.value||'';
  const nue=document.getElementById('mp-pass-new')?.value||'';
  const rep=document.getElementById('mp-pass-rep')?.value||'';
  if(!act){ mpMsg('mp-err-pass','Ingresá tu contraseña actual.'); return; }
  if(nue.length<6){ mpMsg('mp-err-pass','La nueva debe tener al menos 6 caracteres.'); return; }
  if(nue!==rep){ mpMsg('mp-err-pass','Las contraseñas nuevas no coinciden.'); return; }
  const user=auth.currentUser;
  try{
    const cred=firebase.auth.EmailAuthProvider.credential(user.email, act);
    await user.reauthenticateWithCredential(cred); // cubre requires-recent-login
    await user.updatePassword(nue);
    ['mp-pass-act','mp-pass-new','mp-pass-rep'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
    mpMsg('mp-err-pass','✓ Contraseña actualizada.',true);
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') m='La contraseña actual es incorrecta.';
    else if(e.code==='auth/weak-password') m='La nueva contraseña es muy débil.';
    mpMsg('mp-err-pass',m);
  }
}

const MOV_ESTADOS=[['disponible','Disponible'],['ocupado','Ocupado'],['fuera_de_servicio','Fuera de servicio']];
function movEstLbl(e){ const f=MOV_ESTADOS.find(x=>x[0]===e); return f?f[1]:(e||'—'); }

    db.collection('moviles').onSnapshot(s=>{ if(!S.mov) return; S.mov.items=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.mov){ S.mov.err=(e.message||String(e)); render(); } }),

/* ===================== GUARDIAS — Bloque 1 (BASE: modelo + validación cliente) =====================
   Cronograma de tripulación. Una guardia = UNA persona (chofer o médico) en una ventana horaria,
   en un móvil (modalidad 'activa') o sin móvil ('pasiva' = backup / auto propio).
   Reparto de validación: SOLAPES y MÉDICO-SIN-CHOFER se validan acá (cliente, con query + cómputo
   de intersección); las reglas Firestore controlan permiso + forma + coherencia local.
   La UI (calendario con filtros) es el 2º prompt — acá solo el modelo, la validación y un alta mínima.
   OJO: no usar S.guardias (lo ocupa el mock adGuardias del admin). Estado nuevo cuando haya UI: S.crono. */

const GUARDIA_ROLES=['chofer','medico'];
const GUARDIA_MODALIDADES=['activa','pasiva'];
const GUARDIA_ESTADOS=['programada','activa','cerrada'];

// Normaliza inicio/fin a ms. Acepta Timestamp de Firestore, {seconds}, Date, number o string ISO.
function gMs(v){
  if(v==null) return null;
  if(typeof v==='number') return v;
  if(typeof v.toMillis==='function') return v.toMillis();   // Firestore Timestamp
  if(v.seconds!=null) return v.seconds*1000;                // {seconds, nanoseconds}
  if(v instanceof Date) return v.getTime();
  const t=Date.parse(v); return isNaN(t)?null:t;
}
// Solape = intersección temporal REAL (>0). Bordes que se tocan (finA==inicioB) NO es solape (relevo limpio).
function gSolapan(aIni,aFin,bIni,bFin){
  const ai=gMs(aIni),af=gMs(aFin),bi=gMs(bIni),bf=gMs(bFin);
  if(ai==null||af==null||bi==null||bf==null) return false;
  return ai < bf && bi < af;   // estricto: tocarse en el borde no cuenta
}

// Trae las guardias de un móvil (para validar solapes y dotación). Excluye la propia (al editar).
async function gGuardiasDeMovil(movilId, excluirId){
  if(!movilId) return [];
  const snap=await db.collection('guardias').where('movilId','==',movilId).get();
  return snap.docs.filter(d=>d.id!==excluirId).map(d=>({id:d.id,...d.data()}));
}

// Validación de una guardia ANTES de guardar -> {bloqueo:[], alertas:[]}. UNA sola pasada de query.
//  - BLOQUEO DURO: otra persona del MISMO ROL, activa, en el MISMO MÓVIL, con intersección >0.
//  - ALERTA (médico-sin-chofer): médico activo sin chofer solapado en ese móvil (deja guardar).
async function gValidar(guardia){
  const out={bloqueo:[],alertas:[]};
  if(guardia.modalidad==='activa' && guardia.movilId){
    const otras=await gGuardiasDeMovil(guardia.movilId, guardia.id||null);
    const activas=otras.filter(g=>g.modalidad==='activa' && g.estado!=='cerrada');
    for(const g of activas){ // bloqueo: mismo rol solapado
      if(g.rol===guardia.rol && gSolapan(guardia.inicio,guardia.fin,g.inicio,g.fin)){
        out.bloqueo.push(`Ya hay ${g.rol==='chofer'?'un chofer':'un médico'} (${g.personaNombre||g.personaId}) en este móvil en esa franja.`);
      }
    }
    if(guardia.rol==='medico'){ // alerta: médico activo sin chofer solapado
      const hayChofer=activas.some(g=>g.rol==='chofer' && gSolapan(guardia.inicio,guardia.fin,g.inicio,g.fin));
      if(!hayChofer) out.alertas.push('Este móvil no tiene chofer en esa franja. Un móvil no puede operar sin chofer.');
    }
  }
  return out;
}

// Alta mínima de una guardia (valida modelo/reglas; la UI viene en el 2º prompt).
// force=true salta SOLO las ALERTAS (nunca el bloqueo duro). Devuelve {ok, id?, bloqueo?, alertas?, error?}.
async function gCrear(datos, force){
  if(!puede('gestionar_guardias')) return {ok:false,error:'Sin permiso para gestionar guardias.'};
  const g={
    personaId:datos.personaId||'', personaNombre:datos.personaNombre||'',
    rol:datos.rol, modalidad:datos.modalidad,
    movilId:(datos.modalidad==='activa')?(datos.movilId||null):null,
    movilNombre:(datos.modalidad==='activa')?(datos.movilNombre||null):null,
    inicio:datos.inicio, fin:datos.fin,
    estado:datos.estado||'programada'
  };
  // forma mínima (coherente con la regla; la regla es la defensa real)
  if(!GUARDIA_ROLES.includes(g.rol)) return {ok:false,error:'Rol inválido.'};
  if(!GUARDIA_MODALIDADES.includes(g.modalidad)) return {ok:false,error:'Modalidad inválida.'};
  if(!GUARDIA_ESTADOS.includes(g.estado)) return {ok:false,error:'Estado inválido.'};
  if(g.modalidad==='activa' && !g.movilId) return {ok:false,error:'Una guardia activa requiere móvil.'};
  if(gMs(g.inicio)==null || gMs(g.fin)==null) return {ok:false,error:'Inicio y fin son requeridos.'};
  if(gMs(g.fin)<=gMs(g.inicio)) return {ok:false,error:'El fin debe ser posterior al inicio.'};
  const v=await gValidar(g);
  if(v.bloqueo.length) return {ok:false,bloqueo:v.bloqueo};
  if(v.alertas.length && !force) return {ok:false,alertas:v.alertas};
  try{
    const ref=await db.collection('guardias').add({...g, creadoEn:FV(), creadoPor:S.user.uid});
    return {ok:true, id:ref.id, alertas:v.alertas};
  }catch(e){ return {ok:false,error:(e.message||String(e))}; }
}

/* ===================== CRONOGRAMA — UI del calendario de guardias (2º prompt del Bloque 1) =====================
   Vista semanal (7 días × horas), color por móvil, filtros superponibles, alta/edición/baja.
   Reusa gMs/gSolapan/gValidar/gCrear (base). Estado propio S.crono (NO S.guardias = mock admin). */
const CRONO_WD=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const CRONO_COLORS=['#DC1400','#1D9E75','#2D6CDF','#E08600','#7A3FB8','#0F8A8A','#C2185B','#4A7A1A'];
const CRONO_HH=34; // alto de hora en px

function cronoMondayMs(ms){ const d=new Date(ms); const dow=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-dow); return d.getTime(); }
function cronoDTLocal(ms){ if(ms==null) return ''; const d=new Date(ms); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function cronoColorMovil(id){ const arr=S.crono&&S.crono.moviles||[]; const i=arr.findIndex(m=>m.id===id); return CRONO_COLORS[(i<0?0:i)%CRONO_COLORS.length]; }
function cronoFormOpen(){ return !!(S.crono && S.crono.edit!=null); }
function cronoVisible(g){
  if(!S.crono) return true;
  const mk=g.movilId||'__pasiva__';
  return (S.crono.filtMov[mk]!==false) && (S.crono.filtPers[g.personaId]!==false);
}

function cronoAttach(){
  if(S.cronoUnsub) return;
  const upd=()=>{ if(!cronoFormOpen()) render(); }; // no re-render con el form abierto (perdería lo tipeado)
  S.cronoUnsub=[
    db.collection('guardias').onSnapshot(s=>{ if(!S.crono) return; S.crono.guardias=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.crono){ S.crono.err=(e.message||String(e)); render(); } })
  ];
  db.collection('moviles').where('activo','==',true).get()
    .then(s=>{ if(!S.crono) return; S.crono.moviles=s.docs.map(d=>({id:d.id,...d.data()})); if(!cronoFormOpen()) render(); })
    .catch(()=>{ if(S.crono) S.crono.moviles=[]; });
  // personas para selector/filtros: solo choferes y médicos. La regla usuarios solo deja listar a superadmin/admin.
  db.collection('usuarios').where('rol','in',['chofer','medico']).get()
    .then(s=>{ if(!S.crono) return; S.crono.personas=s.docs.map(d=>({uid:d.id,...d.data()})).filter(p=>p.activo!==false); if(!cronoFormOpen()) render(); })
    .catch(()=>{ if(S.crono) S.crono.personas='denied'; });
}
function cronoDetach(){ if(S.cronoUnsub){ S.cronoUnsub.forEach(u=>{ try{u();}catch(_){} }); S.cronoUnsub=null; } }

function cronoFlash(obj){ // mensaje en el form SIN re-render (preserva inputs)
  const e=document.getElementById('cr-flash'); if(!e) return;
  if(!obj){ e.innerHTML=''; e.style.display='none'; return; }
  const col=obj.k==='ok'?'var(--g,#1D9E75)':obj.k==='warn'?'var(--o)':'var(--r)';
  e.style.display='block';
  e.innerHTML=`<div style="color:${col};font-size:.8rem">${esc(obj.t)}${obj.k==='warn'?` <button class="btn-o" style="width:auto;padding:.2rem .55rem;margin-top:.3rem;color:var(--o);border-color:var(--o)" onclick="cronoGuardar(true)">Guardar igual</button>`:''}</div>`;
}

function cronoPanel(){
  if(!puede('gestionar_guardias')) return `<div class="card">No tenés permiso para gestionar guardias.</div>`;
  if(!S.crono){ S.crono={weekStart:cronoMondayMs(Date.now()),guardias:null,moviles:null,personas:null,filtMov:{},filtPers:{},edit:null,form:null,flash:null,err:''}; cronoAttach(); }
  if(S.crono.err) return `<div class="card">No se pudo cargar el cronograma: ${esc(S.crono.err)}</div>`;
  const fl=S.crono.flash;
  const flashHtml = fl?`<div style="margin-bottom:.5rem;font-size:.8rem;font-weight:600;color:${fl.k==='ok'?'var(--g,#1D9E75)':fl.k==='warn'?'var(--o)':'var(--r)'}">${esc(fl.t)}</div>`:'';
  if(S.crono.edit!=null) return `<div style="font-weight:700;margin:.1rem 0 .6rem">Cronograma de guardias</div>${flashHtml}${cronoForm()}`;
  if(S.crono.guardias===null||S.crono.moviles===null) return `<div class="card">Cargando cronograma…</div>`;

  const ws=S.crono.weekStart, we=ws+6*86400000;
  const dd=ms=>{const d=new Date(ms);return `${d.getDate()}/${d.getMonth()+1}`;};
  const header=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
    <div style="font-weight:700">Cronograma <span style="font-size:.62rem;color:var(--ink3);font-weight:400">● en vivo</span></div>
    <button class="btn-r" style="width:auto;padding:.4rem .7rem" onclick="cronoNueva()">+ Nueva</button>
  </div>
  <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem">
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoWeek(-1)">←</button>
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoHoy()">Hoy</button>
    <button class="btn-o" style="width:auto;padding:.3rem .6rem;margin-top:0" onclick="cronoWeek(1)">→</button>
    <span style="font-size:.75rem;color:var(--ink2);font-weight:600">${dd(ws)} – ${dd(we)}</span>
  </div>`;

  const chip=(txt,on,c,cb,dash)=>`<button onclick="${cb}" style="font-size:.62rem;padding:.2rem .5rem;border-radius:12px;border:1.5px ${dash?'dashed':'solid'} ${c};background:${on?c:'transparent'};color:${on?'#fff':c};cursor:pointer">${esc(txt)}</button>`;
  const movChips=(S.crono.moviles||[]).map(m=>chip(m.nombre||m.id, S.crono.filtMov[m.id]!==false, cronoColorMovil(m.id), `cronoFilt('mov','${m.id}')`)).join('');
  const pasChip=chip('Pasiva', S.crono.filtMov['__pasiva__']!==false, '#9a9a9a', `cronoFilt('mov','__pasiva__')`, true);
  const persArr=Array.isArray(S.crono.personas)?S.crono.personas:[];
  const persChips=persArr.map(p=>chip((p.nombre||p.uid).split(' ')[0], S.crono.filtPers[p.uid]!==false, p.rol==='chofer'?'#4A7A1A':'#2D6CDF', `cronoFilt('pers','${p.uid}')`)).join('');
  const filters=`<div style="margin-bottom:.5rem">
    <div style="font-size:.58rem;color:var(--ink3);letter-spacing:.08em;margin-bottom:.2rem">MÓVILES</div>
    <div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem">${movChips}${pasChip}</div>
    <div style="font-size:.58rem;color:var(--ink3);letter-spacing:.08em;margin-bottom:.2rem">PERSONAS</div>
    <div style="display:flex;flex-wrap:wrap;gap:.3rem">${persChips||'<span style="font-size:.7rem;color:var(--ink3)">— sin choferes/médicos —</span>'}</div>
  </div>`;

  const days=[...Array(7)].map((_,i)=>ws+i*86400000);
  const head=`<div style="display:flex;margin-left:30px">${days.map(dm=>{const d=new Date(dm);return `<div style="flex:1;min-width:80px;text-align:center;font-size:.6rem;font-weight:700;color:var(--ink2);padding:.2rem 0">${CRONO_WD[(d.getDay()+6)%7]} ${d.getDate()}</div>`;}).join('')}</div>`;
  const gutter=`<div style="width:30px;flex:none">${[...Array(24)].map((_,h)=>`<div style="height:${CRONO_HH}px;font-size:.55rem;color:var(--ink3);text-align:right;padding-right:2px">${h}</div>`).join('')}</div>`;
  const cols=days.map(dm=>{
    const dayEnd=dm+86400000;
    const blocks=(S.crono.guardias||[]).filter(cronoVisible).map(g=>{
      const gi=gMs(g.inicio),gf=gMs(g.fin); if(gi==null||gf==null||gf<=dm||gi>=dayEnd) return '';
      const top=Math.max(0,(Math.max(gi,dm)-dm)/3600000)*CRONO_HH;
      const h=Math.max(15,(Math.min(gf,dayEnd)-Math.max(gi,dm))/3600000*CRONO_HH);
      const pasiva=g.modalidad==='pasiva'||!g.movilId;
      const c=pasiva?'#9a9a9a':cronoColorMovil(g.movilId);
      const icon=g.rol==='chofer'?'🚗':'⚕️';
      return `<div onclick="event.stopPropagation();cronoEditar('${g.id}')" title="${esc(g.personaNombre||'')}" style="position:absolute;top:${top}px;left:2px;right:2px;height:${h}px;background:${pasiva?'transparent':c};border:1.5px ${pasiva?'dashed':'solid'} ${c};border-radius:6px;color:${pasiva?c:'#fff'};font-size:.58rem;line-height:1.1;padding:2px 3px;overflow:hidden;cursor:pointer">${icon} ${esc((g.personaNombre||'').split(' ')[0])}${g.movilNombre?'<br>'+esc(g.movilNombre):''}</div>`;
    }).join('');
    return `<div onclick="cronoSlot(event,${dm})" style="flex:1;min-width:80px;position:relative;height:${24*CRONO_HH}px;border-left:1px solid var(--border)">${[...Array(24)].map(()=>`<div style="height:${CRONO_HH}px;border-bottom:1px solid var(--border)"></div>`).join('')}<div style="position:absolute;inset:0">${blocks}</div></div>`;
  }).join('');
  const grid=`<div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px;padding-bottom:2px"><div style="min-width:600px">${head}<div style="display:flex">${gutter}${cols}</div></div></div>`;

  return header+flashHtml+filters+grid;
}

function cronoWeek(d){ if(S.crono){ S.crono.weekStart+=d*7*86400000; S.crono.flash=null; render(); } }
function cronoHoy(){ if(S.crono){ S.crono.weekStart=cronoMondayMs(Date.now()); S.crono.flash=null; render(); } }
function cronoFilt(kind,id){ if(!S.crono) return; const m=kind==='mov'?S.crono.filtMov:S.crono.filtPers; m[id]=(m[id]===false); render(); } // undefined/true -> false (off); false -> true (on)

function cronoNueva(iniMs){
  if(!S.crono) return;
  const ini = iniMs || (function(){ const d=new Date(); d.setHours(8,0,0,0); return d.getTime(); })();
  S.crono.flash=null;
  S.crono.form={ personaId:'', rol:'', modalidad:'activa', movilId:'', inicio:cronoDTLocal(ini), fin:cronoDTLocal(ini+8*3600000), estado:'programada' };
  S.crono.edit='new'; render();
}
function cronoSlot(ev,dayMs){
  const rect=ev.currentTarget.getBoundingClientRect();
  let hour=Math.floor((ev.clientY-rect.top)/CRONO_HH); if(hour<0)hour=0; if(hour>23)hour=23;
  cronoNueva(dayMs+hour*3600000);
}
function cronoEditar(id){
  const g=(S.crono&&S.crono.guardias||[]).find(x=>x.id===id); if(!g) return;
  S.crono.flash=null;
  S.crono.form={ personaId:g.personaId||'', rol:g.rol||'', modalidad:g.modalidad||'activa', movilId:g.movilId||'', inicio:cronoDTLocal(gMs(g.inicio)), fin:cronoDTLocal(gMs(g.fin)), estado:g.estado||'programada' };
  S.crono.edit=id; render();
}
function cronoCancel(){ if(S.crono){ S.crono.edit=null; S.crono.form=null; } render(); }
function cronoPersonaChange(){ const s=document.getElementById('cr-persona'); const o=s&&s.options[s.selectedIndex]; const r=document.getElementById('cr-rol'); if(r) r.textContent=(o&&o.dataset.rol)||'—'; }

function cronoForm(){
  const f=S.crono.form||{};
  const isNew=S.crono.edit==='new';
  const personas=S.crono.personas;
  const moviles=(S.crono.moviles||[]).filter(m=>m.activo!==false);
  let persField;
  if(Array.isArray(personas)){
    persField=`<select id="cr-persona" onchange="cronoPersonaChange()"><option value="">— Elegí persona —</option>${personas.map(p=>`<option value="${p.uid}" data-rol="${p.rol}" ${f.personaId===p.uid?'selected':''}>${esc(p.nombre||p.uid)} (${p.rol})</option>`).join('')}</select>`;
  } else if(personas==='denied'){
    persField=`<div style="font-size:.78rem;color:var(--ink3)">Tu rol no puede listar el personal (solo superadmin/admin). No podés elegir persona desde esta cuenta.</div>`;
  } else { persField=`<div style="font-size:.78rem;color:var(--ink3)">Cargando personal…</div>`; }
  return `<div class="card"><div class="ch">${isNew?'Nueva guardia':'Editar guardia'}</div>
    <div class="field"><label>Persona</label>${persField}</div>
    <div class="field"><label>Rol (derivado de la persona)</label><div id="cr-rol" style="font-size:.9rem;font-weight:700;color:var(--ink)">${f.rol||'—'}</div></div>
    <div class="field"><label>Modalidad</label><select id="cr-modalidad" onchange="document.getElementById('cr-movil-row').style.display=this.value==='activa'?'':'none'"><option value="activa" ${f.modalidad!=='pasiva'?'selected':''}>Activa (en móvil de flota)</option><option value="pasiva" ${f.modalidad==='pasiva'?'selected':''}>Pasiva (backup / auto propio)</option></select></div>
    <div class="field" id="cr-movil-row" style="display:${f.modalidad==='pasiva'?'none':''}"><label>Móvil</label><select id="cr-movil"><option value="">— Elegí móvil —</option>${moviles.map(m=>`<option value="${m.id}" data-nombre="${esc(m.nombre||'')}" ${f.movilId===m.id?'selected':''}>${esc(m.nombre||m.id)}${m.patente?(' · '+esc(m.patente)):''}</option>`).join('')}</select></div>
    <div class="field"><label>Inicio</label><input type="datetime-local" id="cr-inicio" value="${f.inicio||''}"></div>
    <div class="field"><label>Fin</label><input type="datetime-local" id="cr-fin" value="${f.fin||''}"></div>
    <div class="field"><label>Estado</label><select id="cr-estado">${GUARDIA_ESTADOS.map(s=>`<option value="${s}" ${(f.estado||'programada')===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div id="cr-flash" style="display:none;margin:.4rem 0"></div>
    <button class="btn-r" onclick="cronoGuardar(false)">Guardar</button>
    <button class="btn-o" onclick="cronoCancel()">Cancelar</button>
    ${isNew?'':`<button class="btn-o" style="color:var(--r);border-color:var(--r)" onclick="cronoEliminar('${S.crono.edit}')">Eliminar guardia</button>`}
  </div>`;
}

async function cronoGuardar(force){
  cronoFlash(null);
  const persSel=document.getElementById('cr-persona');
  if(!persSel) return; // personas no listables (denied)
  const personaId=persSel.value||'';
  if(!personaId){ cronoFlash({t:'Elegí una persona.',k:'err'}); return; }
  const opt=persSel.options[persSel.selectedIndex];
  const rol=(opt&&opt.dataset.rol)||'';
  const personaNombre=(opt?opt.textContent.replace(/\s*\([^)]*\)\s*$/,''):'');
  const modalidad=document.getElementById('cr-modalidad').value||'activa';
  let movilId=null, movilNombre=null;
  if(modalidad==='activa'){
    const ms=document.getElementById('cr-movil');
    movilId=ms.value||'';
    if(!movilId){ cronoFlash({t:'Una guardia activa requiere móvil.',k:'err'}); return; }
    const mo=ms.options[ms.selectedIndex]; movilNombre=(mo&&mo.dataset.nombre)||'';
  }
  const iniStr=document.getElementById('cr-inicio').value||'';
  const finStr=document.getElementById('cr-fin').value||'';
  if(!iniStr||!finStr){ cronoFlash({t:'Cargá inicio y fin.',k:'err'}); return; }
  const inicio=firebase.firestore.Timestamp.fromDate(new Date(iniStr));
  const fin=firebase.firestore.Timestamp.fromDate(new Date(finStr));
  if(gMs(fin)<=gMs(inicio)){ cronoFlash({t:'El fin debe ser posterior al inicio.',k:'err'}); return; }
  const estado=document.getElementById('cr-estado').value||'programada';
  const datos={personaId,personaNombre,rol,modalidad,movilId,movilNombre,inicio,fin,estado};
  const editId=(S.crono.edit&&S.crono.edit!=='new')?S.crono.edit:null;

  if(editId){ // EDICIÓN: reusa gValidar (excluye la propia por id), update directo
    if(!puede('gestionar_guardias')){ cronoFlash({t:'Sin permiso para gestionar guardias.',k:'err'}); return; }
    const v=await gValidar({...datos,id:editId});
    if(v.bloqueo.length){ cronoFlash({t:v.bloqueo.join(' '),k:'err'}); return; }
    if(v.alertas.length && !force){ cronoFlash({t:v.alertas.join(' '),k:'warn'}); return; }
    try{ await db.collection('guardias').doc(editId).set({...datos,actualizadoEn:FV()},{merge:true});
      S.crono.edit=null; S.crono.form=null; S.crono.flash={t:'✓ Guardia actualizada.',k:'ok'}; render();
    }catch(e){ cronoFlash({t:'No se pudo guardar: '+(e.message||e),k:'err'}); }
  }else{ // ALTA: reusa gCrear (valida forma + solapes; force salta solo alertas)
    const r=await gCrear(datos, force);
    if(r.ok){ S.crono.edit=null; S.crono.form=null; S.crono.flash={t:'✓ Guardia creada.',k:'ok'}; render(); }
    else if(r.bloqueo){ cronoFlash({t:r.bloqueo.join(' '),k:'err'}); }
    else if(r.alertas){ cronoFlash({t:r.alertas.join(' '),k:'warn'}); }
    else cronoFlash({t:r.error||'No se pudo crear.',k:'err'});
  }
}
async function cronoEliminar(id){
  if(!confirm('¿Eliminar esta guardia? No se puede deshacer.')) return;
  try{ await db.collection('guardias').doc(id).delete(); S.crono.edit=null; S.crono.form=null; S.crono.flash={t:'Guardia eliminada.',k:'ok'}; render(); }
  catch(e){ cronoFlash({t:'No se pudo eliminar: '+(e.message||e),k:'err'}); }
}

function bind(){
  const em=document.getElementById('em');
  const pw=document.getElementById('pw');
  if(em)em.addEventListener('keydown',e=>{if(e.key==='Enter')pw?pw.focus():doLogin()});
  if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
}

/* Arranque: pinta login y deja que Auth decida (sesion persiste al recargar). */
render();
auth.onAuthStateChanged(fbUser=>{
  if(fbUser){ enterWithFbUser(fbUser); }
  else{ resetSession(true); render(); } // limpia TODA la sesión; keepErr preserva el mensaje "sin rol"
});
