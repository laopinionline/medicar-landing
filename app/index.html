/* ---- Dashboard de métricas en vivo ---- */
function tms(t){ if(!t) return null; if(t.toMillis) return t.toMillis(); if(t.seconds!=null) return t.seconds*1000; if(typeof t==='number') return t; return null; }
function esHoy(t){ const ms=tms(t); if(ms==null) return false; const d=new Date(ms), n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function fmtDur(s){ s=Math.round(s); if(!isFinite(s)||s<0) return '—'; if(s<60) return s+'s'; const m=Math.floor(s/60), r=s%60; return m+'m'+(r?(' '+r+'s'):''); }
function dashIdle(){ return !!(S.user && S.user.rol==='superadmin' && S.superSec==='dashboard'); }

function dashAttach(){
  if(S.dashUnsub) return;
  S.dashUnsub=[
    db.collection('episodios').onSnapshot(s=>{ if(!S.dash) return; S.dash.eps=s.docs.map(d=>d.data()); if(dashIdle()) render(); }, e=>{ if(S.dash){ S.dash.err=(e.message||String(e)); if(dashIdle()) render(); } }),
    db.collection('staff_medico').where('activo','==',true).onSnapshot(s=>{ if(!S.dash) return; S.dash.staffN=s.size; if(dashIdle()) render(); }, ()=>{}),
    db.collection('usuarios').where('rol','==','afiliado').onSnapshot(s=>{ if(!S.dash) return; S.dash.afilN=s.size; if(dashIdle()) render(); }, ()=>{}),
    db.collection('moviles').where('activo','==',true).onSnapshot(s=>{ if(!S.dash) return; S.dash.flota=s.docs.map(d=>d.data()); if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.flota=[]; if(dashIdle()) render(); } }),
    // Alertas clínicas (Etapa 27): respuestas + gestiones para computarAlertas al vuelo (read-only).
    db.collection('respuestas_cuestionario').orderBy('creadoEn','desc').limit(300).onSnapshot(s=>{ if(!S.dash) return; S.dash.resp=s.docs.map(d=>({id:d.id,...d.data()})); if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.resp=[]; if(dashIdle()) render(); } }),
    db.collection('gestiones_contacto').onSnapshot(s=>{ if(!S.dash) return; const o={}; s.docs.forEach(d=>{ o[d.id]=d.data(); }); S.dash.gest=o; if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.gest={}; if(dashIdle()) render(); } }),
    // Reportes de síntomas (Etapa 30, N2): 2a fuente de alertas.
    db.collection('reportes_sintomas').orderBy('creadoEn','desc').limit(300).onSnapshot(s=>{ if(!S.dash) return; S.dash.reportes=s.docs.map(d=>({id:d.id,...d.data()})); if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.reportes=[]; if(dashIdle()) render(); } }),
    // Chequeos de parámetros (Etapa 34, N3): 3a fuente de alertas (NEWS2).
    db.collection('chequeos_parametros').orderBy('creadoEn','desc').limit(300).onSnapshot(s=>{ if(!S.dash) return; S.dash.parametros=s.docs.map(d=>({id:d.id,...d.data()})); if(dashIdle()) render(); }, ()=>{ if(S.dash){ S.dash.parametros=[]; if(dashIdle()) render(); } })
  ];
}
function dashDetach(){ if(S.dashUnsub){ S.dashUnsub.forEach(u=>{ try{u();}catch(_){} }); S.dashUnsub=null; } }

function dashSuper(){
  if(!S.dash){ S.dash={eps:null,staffN:null,afilN:null,flota:null,resp:null,gest:null,reportes:null,parametros:null}; dashAttach(); }
  const d=S.dash;
  const card=(n,l)=>`<div class="stat"><div class="sn">${n}</div><div class="sl">${l}</div></div>`;
  let hoy='…', activos='…', cDesp=0,cEnC=0,cArr=0,cAt=0, tResp='…', tAt='…';
  if(d.err) return `<div class="card">No se pudieron cargar las métricas: ${esc(d.err)}</div>`;
  if(d.eps){
    const ACT=['despacho','en_camino','arribo','atencion'];
    hoy=d.eps.filter(e=>esHoy(e.creadoEn)).length;
    const act=d.eps.filter(e=>ACT.includes(e.estado)); activos=act.length;
    cDesp=act.filter(e=>e.estado==='despacho').length;
    cEnC=act.filter(e=>e.estado==='en_camino').length;
    cArr=act.filter(e=>e.estado==='arribo').length;
    cAt=act.filter(e=>e.estado==='atencion').length;
    const resp=[], aten=[];
    d.eps.filter(e=>e.estado==='cerrado'&&e.transiciones).forEach(e=>{
      const tr=e.transiciones, dsp=tms(tr.despacho), arr=tms(tr.arribo), at=tms(tr.atencion), ce=tms(tr.cerrado);
      if(dsp!=null&&arr!=null&&arr>=dsp) resp.push((arr-dsp)/1000);
      if(at!=null&&ce!=null&&ce>=at) aten.push((ce-at)/1000);
    });
    tResp=resp.length?fmtDur(resp.reduce((a,b)=>a+b,0)/resp.length):'sin datos aún';
    tAt=aten.length?fmtDur(aten.reduce((a,b)=>a+b,0)/aten.length):'sin datos aún';
  }
  const medN=(d.staffN==null)?'…':d.staffN;
  const afN=(d.afilN==null)?'…':d.afilN;
  // Flota (móviles activos) por estado — en vivo.
  const fl=d.flota;
  const fLoad=(fl==null);
  const fDisp=fLoad?'…':fl.filter(m=>m.estado==='disponible').length;
  const fOcup=fLoad?'…':fl.filter(m=>m.estado==='ocupado').length;
  const fFds =fLoad?'…':fl.filter(m=>m.estado==='fuera_de_servicio').length;
  const fTot =fLoad?'…':fl.length;
  return `
  <div class="panel-h" style="margin:.1rem 0 .6rem"><b>Dashboard</b><span class="live-tag">en vivo</span></div>
  ${alertasBloqueDash(d.resp, d.gest, d.reportes, d.parametros)}
  ${mapaVivoBloque(d.eps||[])}
  <div class="srow">${card(hoy,'Atenciones del día')}${card(activos,'Episodios activos')}</div>
  <div class="card"><div class="ch">Activos por estado</div>
    <div class="ir"><span class="il">Despacho</span><span class="iv">${cDesp}</span></div>
    <div class="ir"><span class="il">En camino</span><span class="iv">${cEnC}</span></div>
    <div class="ir"><span class="il">Arribo</span><span class="iv">${cArr}</span></div>
    <div class="ir"><span class="il">En atención</span><span class="iv">${cAt}</span></div>
  </div>
  <div class="srow">${card(medN,'Médicos activos')}${card(afN,'Afiliados totales')}</div>
  <div class="card"><div class="ch">Tiempos promedio (episodios cerrados)</div>
    <div class="ir"><span class="il">Respuesta (despacho→arribo)</span><span class="iv">${tResp}</span></div>
    <div class="ir"><span class="il">Atención (atención→cierre)</span><span class="iv">${tAt}</span></div>
  </div>
  <div class="card"><div class="ch">Flota (móviles activos)</div>
    <div class="ir"><span class="il">Disponibles</span><span class="iv">${fDisp}</span></div>
    <div class="ir"><span class="il">Ocupados</span><span class="iv">${fOcup}</span></div>
    <div class="ir"><span class="il">Fuera de servicio</span><span class="iv">${fFds}</span></div>
    <div class="ir"><span class="il">Total flota activa</span><span class="iv">${fTot}</span></div>
  </div>
  <div class="card"><div class="ch">Próximamente</div>
    <div class="ir"><span class="il">Consumos diarios (farmacia/insumos)</span><span class="iv" style="color:var(--ink3)">no modelado aún</span></div>
  </div>`;
}

/* ===================== MI PERFIL (editable, todos los roles) =====================
   Cada usuario edita SOLO lo propio (S.user.uid / auth.currentUser): nombre, foto y su
   contraseña. email/rol read-only. La contraseña va por SDK cliente (reauth + updatePassword),
   NO por la Cloud Function setPassword (esa es para que el superadmin resetee a otros). */
function mpMsg(id,t,ok){ const e=document.getElementById(id); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; e.style.color=(t&&ok)?'var(--g,#1D9E75)':''; } }

function miPerfil(){
  const u=S.user;
  const ini=(u.nombre||u.email||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avatar=u.fotoURL
    ? `<img src="${esc(u.fotoURL)}" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:2.5px solid var(--r)" onerror="this.style.display='none'">`
    : `<div class="av">${ini}</div>`;
  return `
  <div class="ptop">
    <div style="margin-bottom:.5rem">${avatar}</div>
    <div class="pname">${esc(u.nombre||'—')}</div>
    <div class="psub">${esc(u.rol)} · ${esc(u.email)}</div>
  </div>
  <div class="card"><div class="ch">Datos</div>
    <div class="field"><label>Nombre</label><input id="mp-nombre" type="text" value="${esc(u.nombre||'')}" autocomplete="off"></div>
    <div class="field"><label>Email</label><input type="email" value="${esc(u.email)}" disabled></div>
    <div class="field"><label>Rol</label><input type="text" value="${esc(u.rol)}" disabled></div>
    <div id="mp-err-nombre" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" onclick="mpGuardarNombre()">Guardar nombre</button>
  </div>
  <div class="card"><div class="ch">Foto de perfil</div>
    <input id="mp-foto" type="file" accept="image/*" onchange="mpSubirFoto(this)" style="font-size:.8rem">
    <div style="font-size:.66rem;color:var(--ink3);margin-top:.35rem">Imagen, máx. 3 MB.</div>
    <div id="mp-err-foto" class="err" style="display:none;margin-top:.5rem"></div>
  </div>
  <div class="card"><div class="ch">Cambiar contraseña</div>
    <div class="field"><label>Contraseña actual</label><input id="mp-pass-act" type="password" autocomplete="off"></div>
    <div class="field"><label>Nueva contraseña</label><input id="mp-pass-new" type="password" placeholder="mín. 6 caracteres" autocomplete="off"></div>
    <div class="field"><label>Repetir nueva</label><input id="mp-pass-rep" type="password" autocomplete="off"></div>
    <div id="mp-err-pass" class="err" style="display:none;margin-bottom:.5rem"></div>
    <button class="btn-r" onclick="mpCambiarPass()">Cambiar contraseña</button>
  </div>
  ${(u.roles&&u.roles.length>1)?`<button class="tile" onclick="volverAlSelector()"><span class="tile-ic">${IC.user}</span><span class="tile-tx"><b>Cambiar de rol</b><span>Entrás como ${esc(u.rol)} · tenés ${u.roles.length} roles</span></span><span class="tile-go"><svg class="chev" width="11" height="14" viewBox="0 0 1794 2190"><use href="#cmono"/></svg></span></button>`:''}
  <button class="btn-o" onclick="doLogout()" style="margin-top:.4rem">Cerrar sesión</button>`;
}

async function mpGuardarNombre(){
  mpMsg('mp-err-nombre','');
  const nombre=(document.getElementById('mp-nombre')?.value||'').trim();
  if(!nombre){ mpMsg('mp-err-nombre','El nombre no puede estar vacío.'); return; }
  const uid=S.user.uid;
  try{
    await db.collection('usuarios').doc(uid).set({nombre},{merge:true}); // depende de la regla "mi perfil"
    // sync staff_medico (best-effort): el médico no puede escribirlo por reglas; lo sincroniza un admin.
    if(S.user.rol==='medico'){ try{ await db.collection('staff_medico').doc(uid).set({nombre},{merge:true}); }catch(_){ } }
    S.user.nombre=nombre; render();
    mpMsg('mp-err-nombre','✓ Nombre actualizado.',true);
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='permission-denied') m='Sin permiso para editar el nombre (la regla de "mi perfil" todavía no está aplicada).';
    mpMsg('mp-err-nombre',m);
  }
}

async function mpSubirFoto(input){
  mpMsg('mp-err-foto','');
  const f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ mpMsg('mp-err-foto','El archivo debe ser una imagen.'); return; }
  if(f.size>3*1024*1024){ mpMsg('mp-err-foto','La imagen supera 3 MB.'); return; }
  const uid=S.user.uid;
  mpMsg('mp-err-foto','Subiendo…',true);
  try{
    const ext=((f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,''))||'jpg';
    const ref=firebase.storage().ref('perfiles/'+uid+'/avatar.'+ext);
    const snap=await ref.put(f);
    const url=await snap.ref.getDownloadURL();
    await db.collection('usuarios').doc(uid).set({fotoURL:url},{merge:true});
    S.user.fotoURL=url; render();
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='storage/unauthorized') m='Sin permiso (la regla de Storage todavía no está aplicada).';
    mpMsg('mp-err-foto',m);
  }
}

async function mpCambiarPass(){
  mpMsg('mp-err-pass','');
  const act=document.getElementById('mp-pass-act')?.value||'';
  const nue=document.getElementById('mp-pass-new')?.value||'';
  const rep=document.getElementById('mp-pass-rep')?.value||'';
  if(!act){ mpMsg('mp-err-pass','Ingresá tu contraseña actual.'); return; }
  if(nue.length<6){ mpMsg('mp-err-pass','La nueva debe tener al menos 6 caracteres.'); return; }
  if(nue!==rep){ mpMsg('mp-err-pass','Las contraseñas nuevas no coinciden.'); return; }
  const user=auth.currentUser;
  try{
    const cred=firebase.auth.EmailAuthProvider.credential(user.email, act);
    await user.reauthenticateWithCredential(cred); // cubre requires-recent-login
    await user.updatePassword(nue);
    ['mp-pass-act','mp-pass-new','mp-pass-rep'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
    mpMsg('mp-err-pass','✓ Contraseña actualizada.',true);
  }catch(e){
    let m=e.message||String(e);
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') m='La contraseña actual es incorrecta.';
    else if(e.code==='auth/weak-password') m='La nueva contraseña es muy débil.';
    mpMsg('mp-err-pass',m);
  }
}

/* ===================== MÓVILES — módulo completo (flota + catálogo de tipos) =====================
   Gobernado por 'gestionar_moviles' (UI + reglas). read: operativos; write: con permiso.
   Subsecciones: Flota (moviles) y Tipos (tipos_movil). choferId es una referencia OPCIONAL a
   personal con rol 'chofer' (string ref; el chofer NO es operativo). Baja lógica (activo) en ambas. */
const MOV_ESTADOS=[['disponible','Disponible'],['ocupado','Ocupado'],['fuera_de_servicio','Fuera de servicio']];
function movEstLbl(e){ const f=MOV_ESTADOS.find(x=>x[0]===e); return f?f[1]:(e||'—'); }
function movFormOpen(){ return !!(S.mov && (S.mov.edit!=null || S.mov.tedit!=null)); }

function movAttach(){
  if(S.movUnsub) return;
  const upd=()=>{ if(!movFormOpen()) render(); }; // no re-renderiza con un form abierto (perdería lo tipeado)
  S.movUnsub=[
    db.collection('moviles').onSnapshot(s=>{ if(!S.mov) return; S.mov.items=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.mov){ S.mov.err=(e.message||String(e)); render(); } }),
    db.collection('tipos_movil').onSnapshot(s=>{ if(!S.mov) return; S.mov.tipos=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.mov) S.mov.tipos=[]; })
  ];
  movLoadChoferes();
}
function movDetach(){ if(S.movUnsub){ S.movUnsub.forEach(u=>{ try{u();}catch(_){} }); S.movUnsub=null; } }
function movErr(t){ const e=document.getElementById('mov-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }

// Choferes para el selector: se leen de `staff` (rol==chofer), fuente NO sensible (nombre+activo denormalizados),
// legible por esInterno → los cap-holders de gestionar_moviles ya no reciben 'denied'. NO se lee `usuarios`
// (permisos de todos) ni `personas` (antecedentes clínicos). Ver endurecimiento del read de usuarios.
function movLoadChoferes(){
  db.collection('staff').where('rol','==','chofer').get()
    .then(s=>{ if(!S.mov) return; S.mov.choferes=s.docs.map(d=>({uid:d.id, nombre:d.data().nombre||'', activo:d.data().activo})).filter(c=>c.activo!==false); if(!movFormOpen()) render(); })
    .catch(()=>{ if(S.mov) S.mov.choferes='denied'; });
}

function movPanel(){
  if(!S.mov){ S.mov={sub:'flota',items:null,tipos:null,choferes:null,edit:null,tedit:null,err:''}; movAttach(); }
  if(S.mov.err) return `<div class="card">No se pudo cargar móviles: ${esc(S.mov.err)}</div>`;
  const gest=puede('gestionar_moviles');
  const sub=S.mov.sub||'flota';
  const tab=(id,lbl)=>`<button onclick="movSub('${id}')" style="flex:1;padding:.5rem;border:1.5px solid ${sub===id?'var(--r)':'var(--border2)'};background:${sub===id?'var(--r)':'transparent'};color:${sub===id?'#fff':'var(--ink2)'};border-radius:10px;font-size:.78rem;font-weight:600;letter-spacing:.04em;cursor:pointer">${lbl}</button>`;
  const head=`
  <div style="font-weight:700;margin:.1rem 0 .6rem">Móviles <span style="font-size:.62rem;color:var(--ink3);font-weight:400">● en vivo</span></div>
  <div style="display:flex;gap:.5rem;margin-bottom:.8rem">${tab('flota','Flota')}${tab('tipos','Tipos')}</div>
  <div id="mov-err" class="err" style="display:none;margin-bottom:.5rem"></div>`;
  return head + (sub==='tipos' ? movTiposView(gest) : movFlotaView(gest));
}
function movSub(id){ if(!S.mov) return; S.mov.sub=id; S.mov.edit=null; S.mov.tedit=null; render(); }

/* ---- Flota ---- */
function movFlotaView(gest){
  if(S.mov.items===null) return `<div class="card">Cargando flota…</div>`;
  if(S.mov.edit!=null) return movForm(gest);
  const tipoNom=id=>{ if(!id) return ''; const t=(S.mov.tipos||[]).find(x=>x.id===id); return t?(t.nombre||''):''; };
  const rows = S.mov.items.length ? S.mov.items.map(m=>{
    const tn=tipoNom(m.tipoId);
    const meta=[movEstLbl(m.estado), tn?('· '+esc(tn)):'', m.patente?('· '+esc(m.patente)):'', m.choferNombre?('· '+esc(m.choferNombre)):'', m.activo===false?'· inactivo':''].filter(Boolean).join(' ');
    const selStyle="background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:.35rem .55rem;font-size:.78rem;color:var(--ink)";
    const estSel = (gest && m.activo!==false) ? `<select onchange="movEstado('${m.id}',this.value)" style="${selStyle}">${MOV_ESTADOS.map(([v,l])=>`<option value="${v}" ${m.estado===v?'selected':''}>${l}</option>`).join('')}</select>` : '';
    const btn="btn-o\" style=\"width:auto;padding:.3rem .6rem;margin-top:0";
    const acts = gest ? `<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center">${estSel}<button class="${btn}" onclick="movEditar('${m.id}')">Editar</button><button class="${btn}" onclick="movBaja('${m.id}',${m.activo===false})">${m.activo===false?'Reactivar':'Baja'}</button></div>` : '';
    return `<div class="lr" style="flex-wrap:wrap"><div class="lrb" style="flex:1 1 100%"><div class="lrn">${esc(m.nombre||'—')}</div><div class="lrs">${meta}</div></div>${acts}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin móviles cargados</div>`;
  return `${gest?`<button class="btn-r" onclick="movNuevo()" style="margin-bottom:.7rem">+ Nuevo móvil</button>`:`<div style="font-size:.78rem;color:var(--ink3);margin-bottom:.7rem">Solo lectura — no tenés permiso para gestionar móviles.</div>`}<div class="card">${rows}</div>`;
}
function movForm(gest){
  if(!gest){ S.mov.edit=null; return ''; }
  const isNew=S.mov.edit==='new';
  const m=isNew?{estado:'disponible'}:((S.mov.items||[]).find(x=>x.id===S.mov.edit)||{estado:'disponible'});
  const tiposAct=(S.mov.tipos||[]).filter(t=>t.activo!==false);
  const tipoOpts=['<option value="">— Sin tipo —</option>'].concat(tiposAct.map(t=>`<option value="${t.id}" ${m.tipoId===t.id?'selected':''}>${esc(t.nombre||'')}</option>`)).join('');
  const ch=S.mov.choferes;
  let choferField;
  if(Array.isArray(ch)){
    choferField = ch.length
      ? `<div class="field"><label>Chofer (opcional)</label><select id="mov-f-chofer"><option value="">— Sin chofer —</option>${ch.map(c=>`<option value="${c.uid}" ${m.choferId===c.uid?'selected':''}>${esc(c.nombre||c.uid)}</option>`).join('')}</select></div>`
      : `<div class="field"><label>Chofer (opcional)</label><select id="mov-f-chofer" disabled><option>No hay choferes cargados</option></select><div style="font-size:.7rem;color:var(--ink3);margin-top:.3rem">Creá personal con rol "chofer" para poder asignarlo.</div></div>`;
  } else if(ch==='denied'){
    choferField = `<div class="field"><label>Chofer (opcional)</label><div style="font-size:.78rem;color:var(--ink3)">Tu rol no puede listar choferes. ${m.choferNombre?('Actual: '+esc(m.choferNombre)+'. '):'Sin chofer asignado. '}Se conserva sin cambios.</div></div>`;
  } else {
    choferField = `<div class="field"><label>Chofer (opcional)</label><div style="font-size:.78rem;color:var(--ink3)">Cargando choferes…</div></div>`;
  }
  return `<div class="card"><div class="ch">${isNew?'Nuevo móvil':'Editar móvil'}</div>
    <div class="field"><label>Nombre / Número</label><input id="mov-f-nombre" value="${esc(m.nombre||'')}" placeholder="Ej. Móvil 1"></div>
    <div class="field"><label>Patente</label><input id="mov-f-patente" value="${esc(m.patente||'')}" placeholder="opcional"></div>
    <div class="field"><label>Tipo</label><select id="mov-f-tipo">${tipoOpts}</select></div>
    <div class="field"><label>Estado</label><select id="mov-f-estado">${MOV_ESTADOS.map(([v,l])=>`<option value="${v}" ${(m.estado||'disponible')===v?'selected':''}>${l}</option>`).join('')}</select></div>
    ${choferField}
    <div class="field"><label>Notas</label><textarea id="mov-f-notas" rows="2" placeholder="opcional">${esc(m.notas||'')}</textarea></div>
    ${isNew?'':`<div class="field"><label>Estado de alta</label><select id="mov-f-activo"><option value="si" ${m.activo!==false?'selected':''}>Activo</option><option value="no" ${m.activo===false?'selected':''}>Baja lógica</option></select></div>`}
    <button class="btn-r" onclick="movGuardar()">Guardar</button>
    <button class="btn-o" onclick="movCancelar()">Cancelar</button>
  </div>`;
}
function movNuevo(){ if(!puede('gestionar_moviles'))return; S.mov.edit='new'; render(); }
function movEditar(id){ if(!puede('gestionar_moviles'))return; S.mov.edit=id; render(); }
function movCancelar(){ if(S.mov) S.mov.edit=null; render(); }
async function movGuardar(){
  if(!puede('gestionar_moviles')) return; // la regla es la defensa real
  movErr('');
  const id=S.mov.edit;
  const nombre=(document.getElementById('mov-f-nombre')?.value||'').trim();
  if(!nombre){ movErr('El nombre/número es requerido.'); return; }
  const data={
    nombre,
    patente:(document.getElementById('mov-f-patente')?.value||'').trim(),
    tipoId:document.getElementById('mov-f-tipo')?.value||'',
    estado:document.getElementById('mov-f-estado')?.value||'disponible',
    notas:(document.getElementById('mov-f-notas')?.value||'').trim()
  };
  // Chofer: solo si el selector estaba disponible (lista cargada). Si no, se preserva (merge).
  if(Array.isArray(S.mov.choferes)){
    const chId=document.getElementById('mov-f-chofer')?.value||'';
    const c=S.mov.choferes.find(x=>x.uid===chId);
    data.choferId=chId; data.choferNombre=c?(c.nombre||''):'';
  }
  try{
    if(id==='new'){ data.activo=true; data.episodioActivoId=null; data.creadoEn=FV(); await db.collection('moviles').add(data); }
    else{ data.activo=(document.getElementById('mov-f-activo')?.value||'si')==='si'; data.actualizadoEn=FV(); await db.collection('moviles').doc(id).set(data,{merge:true}); }
    S.mov.edit=null; render();
  }catch(e){ movErr('No se pudo guardar: '+(e.message||e)); }
}
async function movEstado(id,estado){
  if(!puede('gestionar_moviles')) return;
  movErr('');
  try{ await db.collection('moviles').doc(id).set({estado,actualizadoEn:FV()},{merge:true}); }
  catch(e){ movErr('No se pudo cambiar el estado: '+(e.message||e)); }
}
async function movBaja(id,reactivar){
  if(!puede('gestionar_moviles')) return;
  movErr('');
  try{ await db.collection('moviles').doc(id).set({activo:!!reactivar,actualizadoEn:FV()},{merge:true}); }
  catch(e){ movErr('No se pudo actualizar: '+(e.message||e)); }
}

/* ---- Catálogo de tipos ---- */
function movTiposView(gest){
  if(S.mov.tipos===null) return `<div class="card">Cargando tipos…</div>`;
  if(S.mov.tedit!=null) return movTipoForm(gest);
  const btn="btn-o\" style=\"width:auto;padding:.3rem .6rem;margin-top:0";
  const rows = S.mov.tipos.length ? S.mov.tipos.map(t=>{
    const acts = gest?`<div style="display:flex;gap:.4rem"><button class="${btn}" onclick="tipoEditar('${t.id}')">Editar</button><button class="${btn}" onclick="tipoBaja('${t.id}',${t.activo===false})">${t.activo===false?'Reactivar':'Baja'}</button></div>`:'';
    return `<div class="lr"><div class="lrb"><div class="lrn">${esc(t.nombre||'—')}</div><div class="lrs">${t.activo===false?'inactivo':'activo'}</div></div>${acts}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin tipos cargados</div>`;
  return `${gest?`<button class="btn-r" onclick="tipoNuevo()" style="margin-bottom:.7rem">+ Nuevo tipo</button>`:`<div style="font-size:.78rem;color:var(--ink3);margin-bottom:.7rem">Solo lectura.</div>`}<div class="card">${rows}</div>`;
}
function movTipoForm(gest){
  if(!gest){ S.mov.tedit=null; return ''; }

/* ===================== CATÁLOGO — Prestaciones + Planes (Estructura 3, Administración) =====================
   ABM del catálogo comercial. Gobernado por configurar_sistema (UI: puedeConfig(); reglas: isAdmin||cap).
   Visible SOLO para admin/superadmin. Colecciones nuevas, arrancan vacías. NO toca la médica viva.
   Dos subsecciones:
     - prestaciones/{slug}: set base editable (nombre, activo). ID slug estable. Baja lógica (patrón tipos_movil).
     - planes/{id}: nombre, descripcion, precio, carenciaDias, activo, coberturas{prestacionId:bool}.
   REGLA de coberturas: una prestación nueva NO se asume cubierta. El editor de planes muestra TODAS las
   prestaciones ACTIVAS como checkboxes; las ausentes del mapa coberturas se ven en false. */
function catSlug(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}
function catFormOpen(){ return !!(S.cat && (S.cat.pedit!=null || S.cat.ledit!=null)); }
function catAttach(){
  if(S.catUnsub) return;
  const upd=()=>{ if(!catFormOpen()) render(); }; // no re-renderiza con un form abierto (perdería lo tipeado)
  S.catUnsub=[
    db.collection('prestaciones').onSnapshot(s=>{ if(!S.cat) return; S.cat.prest=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.cat){ S.cat.err=(e.message||String(e)); render(); } }),
    db.collection('planes').onSnapshot(s=>{ if(!S.cat) return; S.cat.planes=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.cat){ S.cat.err=(e.message||String(e)); render(); } }),
    db.collection('configuracion').doc('club').onSnapshot(d=>{ if(!S.cat) return; S.cat.config=d.exists?d.data():{}; upd(); }, ()=>{ if(S.cat) S.cat.config={}; })
  ];
}

// Precio total del plan según su modelo (Tramo 5a). Compat: sin modeloPrecio o !='por_integrante' → precio fijo
// (comportamiento actual). por_integrante: precio + max(0, integrantes - integrantesBase) * precioExtraIntegrante,
// con integrantes = cantidad de DEPENDIENTES ACTIVOS del titular.
function planPrecioTotal(plan, integrantes){
  const base=Number(plan&&plan.precio)||0;
  if(!plan || plan.modeloPrecio!=='por_integrante') return base;
  const extra=Number(plan.precioExtraIntegrante)||0;
  const baseInt=(plan.integrantesBase!=null)?Number(plan.integrantesBase):1;
  return base + Math.max(0,(Number(integrantes)||0)-baseInt)*extra;
}
function catModeloChange(v){ const g=document.getElementById('cat-l-grp-integrante'); if(g) g.style.display=(v==='por_integrante')?'':'none'; } // DOM puro, no borra inputs
// Espejo público planes_publicos/{planId} (Tramo 5b) — lo que lee la landing. Solo campos curados de marketing.
// Se sincroniza al guardar/dar-de-baja el plan: existe solo si mostrarEnLanding && activo; si no, se BORRA.
async function planEspejoLanding(planId, plan){
  try{
    const visible = plan && plan.mostrarEnLanding===true && plan.activo!==false;
    if(!visible){ await db.collection('planes_publicos').doc(planId).delete().catch(()=>{}); return; }
    const precioMostrado = (plan.etiquetaPrecio && String(plan.etiquetaPrecio).trim())
      ? String(plan.etiquetaPrecio).trim()
      : (plan.modeloPrecio==='por_integrante' ? ('desde $'+(Number(plan.precio)||0).toLocaleString('es-AR')) : ('$'+(Number(plan.precio)||0).toLocaleString('es-AR')));
    const subtitulo = (plan.etiquetaPrecio && String(plan.etiquetaPrecio).trim()) ? 'según acuerdo' : 'por mes';
    await db.collection('planes_publicos').doc(planId).set({
      nombre: plan.nombre||'', descripcion: plan.descripcion||'',
      precioMostrado, subtitulo,
      items: Array.isArray(plan.itemsLanding)?plan.itemsLanding:[],
      destacado: !!plan.destacado, orden: Number(plan.ordenLanding)||0,
      cta: (plan.ctaLanding && String(plan.ctaLanding).trim()) || 'Quiero afiliarme',
      actualizadoEn: FV()
    });
  }catch(e){ console.warn('[planes_publicos] sync falló (la landing usa fallback):',e); }
}

function catPlanEditar(id){ if(!puedeConfig())return; S.cat.ledit=id; render(); }

async function catPlanGuardar(){
  if(!puedeConfig()) return; // la regla es la defensa real
  catErr('');
  const isNew=S.cat.ledit==='new';
  const nombre=(document.getElementById('cat-l-nombre')?.value||'').trim();
  if(!nombre){ catErr('El nombre es requerido.'); return; }
  const precio=Number(document.getElementById('cat-l-precio')?.value||0)||0;
  const carenciaDias=Math.max(0,Math.round(Number(document.getElementById('cat-l-carencia')?.value||0)||0));
  // Coberturas: arranca del mapa existente (preserva prestaciones hoy inactivas) y sobreescribe
  // con el estado de los checkboxes de las prestaciones ACTIVAS. true/false por prestacionId.
  const base=isNew?{}:Object.assign({}, ((S.cat.planes||[]).find(x=>x.id===S.cat.ledit)||{}).coberturas||{});
  document.querySelectorAll('.cat-cob').forEach(c=>{ base[c.getAttribute('data-prest')]=!!c.checked; });
  const modeloPrecio=document.getElementById('cat-l-modelo')?.value||'fijo';
  const precioExtraIntegrante = modeloPrecio==='por_integrante' ? Math.max(0, Number(document.getElementById('cat-l-extra')?.value||0)||0) : null;
  const integrantesBase = modeloPrecio==='por_integrante' ? Math.max(0, Math.round(Number(document.getElementById('cat-l-baseint')?.value||1)||1)) : null;
  // Campos de presentación de la landing (Tramo 5b). Compat: ausentes → el plan no aparece en la landing.
  const mostrarEnLanding = !!document.getElementById('cat-l-landing')?.checked;
  const ordenLanding = Math.round(Number(document.getElementById('cat-l-orden')?.value||0)||0);
  const destacado = !!document.getElementById('cat-l-destacado')?.checked;
  const etiquetaPrecio = (document.getElementById('cat-l-etiqueta')?.value||'').trim() || null;
  const ctaLanding = (document.getElementById('cat-l-cta')?.value||'').trim() || null;
  const itemsLanding = (document.getElementById('cat-l-items')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const data={ nombre, descripcion:(document.getElementById('cat-l-desc')?.value||'').trim(), precio, carenciaDias, coberturas:base, modeloPrecio, precioExtraIntegrante, integrantesBase,
               mostrarEnLanding, ordenLanding, destacado, etiquetaPrecio, ctaLanding, itemsLanding };
  try{
    let planId;
    if(isNew){ data.activo=true; data.creadoEn=FV(); const ref=await db.collection('planes').add(data); planId=ref.id; audit('plan_creado','plan','',nombre); }
    else{
      const old=(S.cat.planes||[]).find(x=>x.id===S.cat.ledit)||{};
      const cambioPrecio = (Number(old.precio)||0)!==precio || (old.modeloPrecio||'fijo')!==modeloPrecio || (Number(old.precioExtraIntegrante)||0)!==(Number(precioExtraIntegrante)||0);
      data.activo=(document.getElementById('cat-l-activo')?.value||'si')==='si'; data.actualizadoEn=FV();
      await db.collection('planes').doc(S.cat.ledit).set(data,{merge:true}); planId=S.cat.ledit;
      // Historial de precios (Tramo 5a): solo si cambió precio/extra/modelo. Solo se escribe (sin UI de lectura acá).
      if(cambioPrecio){ try{ await db.collection('planes').doc(S.cat.ledit).collection('historialPrecios').add({
        precioAnterior:Number(old.precio)||0, precioNuevo:precio,
        extraAnterior:(old.precioExtraIntegrante!=null?Number(old.precioExtraIntegrante):null), extraNuevo:precioExtraIntegrante,
        modeloAnterior:old.modeloPrecio||'fijo', modeloNuevo:modeloPrecio,
        cambiadoPor:S.user.uid, cambiadoEn:FV() }); }catch(e2){ console.warn('[historialPrecios] no se pudo escribir:',e2); } }
    }
    // Espejo landing (Tramo 5b): crea/actualiza/borra planes_publicos según mostrarEnLanding && activo.
    await planEspejoLanding(planId, data);
    S.cat.ledit=null; render();
  }catch(e){ catErr('No se pudo guardar: '+(e.message||e)); }
}
async function catPlanBaja(id,reactivar){
  if(!puedeConfig()) return;
  catErr('');
  try{
    await db.collection('planes').doc(id).set({activo:!!reactivar,actualizadoEn:FV()},{merge:true});
    // Espejo landing (Tramo 5b): baja → se borra de planes_publicos; reactivación → se re-crea si mostrarEnLanding.
    const pl=(S.cat.planes||[]).find(x=>x.id===id);
    if(pl) await planEspejoLanding(id, { ...pl, activo:!!reactivar });
  }
  catch(e){ catErr('No se pudo actualizar: '+(e.message||e)); }
}

/* ===================== AGENDA DE TURNOS (Tramo Turnos T-A.2) =====================
   ABM de franjas de disponibilidad (videollamada). Lo cargan los DIRECTORES (cap
   gestionar_agenda_turnos). Calca el patrón de planes (list+form+baja lógica activa:false).
   Escribe agenda_turnos/{id} con el shape de T-A.1; slotsTomados[] NUNCA se pisa en edición
   (lo mueve la Cloud Function de reserva en T-B). Solape del mismo médico: bloqueo client-side
   (best-effort; las reglas no lo enforcan). Hint de guardia pasiva: informativo, nunca bloquea. */
function agtFormOpen(){ return !!(S.agt && S.agt.edit!=null); }
function agtAttach(){
  if(S.agtUnsub) return;
  S.agtUnsub=[ db.collection('agenda_turnos').onSnapshot(s=>{ if(!S.agt) return; S.agt.franjas=s.docs.map(d=>({id:d.id,...d.data()})); if(!agtFormOpen()) render(); }, e=>{ if(S.agt){ S.agt.err=(e.message||String(e)); render(); } }) ];
}
function agtDetach(){ if(S.agtUnsub){ S.agtUnsub.forEach(u=>{ try{u();}catch(_){} }); S.agtUnsub=null; } }
function agtErr(t){ const e=document.getElementById('agt-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
function agtShowInact(on){ if(S.agt){ S.agt.showInact=!!on; render(); } }
function agtNuevo(){ if(!puede('gestionar_agenda_turnos'))return; S.agt.edit='new'; render(); }
function agtEditar(id){ if(!puede('gestionar_agenda_turnos'))return; S.agt.edit=id; render(); }
function agtCancelar(){ if(S.agt) S.agt.edit=null; render(); }
// Solape client-side: misma fecha + mismo medicoId + rangos HH:mm pisados (borde que se toca NO cuenta).
function agtSolape(medicoId,fecha,hini,hfin,excluirId){
  return (S.agt.franjas||[]).find(f=> f.id!==excluirId && f.activa!==false && f.medicoId===medicoId && f.fecha===fecha && hini<f.horaFin && f.horaInicio<hfin) || null;
}
function agendaTurnosPanel(){
  if(!puede('gestionar_agenda_turnos')) return `<div class="card"><div class="ch">Agenda de turnos</div><div style="font-size:.8rem;color:var(--ink3)">No tenés permiso para gestionar la agenda de turnos.</div></div>`;
  if(!S.agt){ S.agt={franjas:null,edit:null,err:'',showInact:false}; agtAttach(); }
  if(S.agt.err) return `<div class="card">No se pudo cargar la agenda: ${esc(S.agt.err)}</div>`;
  if(S.agt.franjas===null) return `<div class="card">Cargando agenda…</div>`;
  if(S.agt.edit!=null) return agendaForm();
  const btn="btn-o\" style=\"width:auto;padding:.3rem .6rem;margin-top:0";
  const showInact=!!S.agt.showInact;
  const nInact=(S.agt.franjas||[]).filter(f=>f.activa===false).length;
  const list=(S.agt.franjas||[]).filter(f=> showInact || f.activa!==false).slice().sort((a,b)=>(String(a.fecha)+a.horaInicio).localeCompare(String(b.fecha)+b.horaInicio));
  const rows= list.length ? list.map(f=>{
    const inact=f.activa===false;
    const med=(S.staffMedico||[]).find(m=>m.uid===f.medicoId);
    const nombreMed=esc(f.medicoNombre || (med?med.nombre:'') || f.medicoId || '—');
    const reservas=(Array.isArray(f.slotsTomados)?f.slotsTomados.length:0);
    const acts=`<div style="display:flex;gap:.4rem"><button class="${btn}" onclick="agtEditar('${f.id}')">Editar</button><button class="${btn}" onclick="agendaBaja('${f.id}',${inact})">${inact?'Alta':'Baja'}</button></div>`;
    return `<div class="lr"${inact?' style="opacity:.5"':''}><div class="lrb"><div class="lrn">${fechaDisplay(f.fecha)} · ${esc(f.horaInicio)}–${esc(f.horaFin)}</div><div class="lrs">${nombreMed} · slot ${esc(String(f.duracionSlotMin||'—'))}min · ${reservas} reserva${reservas===1?'':'s'}${inact?' · inactiva':''}</div></div>${acts}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin franjas${showInact?'':' activas'}</div>`;
  const toggle=`<label style="display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--ink3);margin-bottom:.6rem;cursor:pointer"><input type="checkbox" onchange="agtShowInact(this.checked)" ${showInact?'checked':''}>Ver inactivas${nInact?(' ('+nInact+')'):''}</label>`;
  return `<div class="panel-h"><b>Agenda de turnos</b><span class="live-tag">en vivo</span></div>
  <div id="agt-err" class="err" style="display:none;margin-bottom:.5rem"></div>
  <button class="btn-r" onclick="agtNuevo()" style="margin-bottom:.7rem">+ Nueva franja</button>${toggle}<div class="card">${rows}</div>`;
}
function agendaForm(){
  const isNew=S.agt.edit==='new';
  const f=isNew?{}:((S.agt.franjas||[]).find(x=>x.id===S.agt.edit)||{});
  const meds=S.staffMedico||[];
  return `<div class="card"><div class="ch">${isNew?'Nueva franja':'Editar franja'}</div>
    <div class="field"><label>Fecha</label><input type="date" id="agt-fecha" value="${esc(f.fecha||'')}" onchange="agtHintPasiva()"></div>
    <div style="display:flex;gap:.5rem">
      <div class="field" style="flex:1"><label>Desde</label><input type="time" id="agt-hini" value="${esc(f.horaInicio||'09:00')}" onchange="agtHintPasiva()"></div>
      <div class="field" style="flex:1"><label>Hasta</label><input type="time" id="agt-hfin" value="${esc(f.horaFin||'12:00')}" onchange="agtHintPasiva()"></div>
    </div>
    <div class="field"><label>Duración de cada turno (min)</label><input type="number" id="agt-dur" min="1" step="5" value="${esc(String(f.duracionSlotMin!=null?f.duracionSlotMin:15))}"></div>
    <div class="field"><label>Médico</label>${meds.length
      ?`<select id="agt-medico" onchange="agtHintPasiva()"><option value="">— Elegí un médico —</option>${meds.map(m=>`<option value="${esc(m.uid)}" ${f.medicoId===m.uid?'selected':''}>${esc(m.nombre)}</option>`).join('')}</select>`
      :`<div style="font-size:.78rem;color:var(--r)">No hay médicos activos (staff_medico). Cargá personal primero.</div>`}</div>
    <div id="agt-hint" style="font-size:.75rem;margin:-.2rem 0 .6rem"></div>
    <button class="btn-r" onclick="agendaGuardar()">Guardar</button>

  </div>`;

// Hint de guardia pasiva (informativo, NUNCA bloquea). Actualiza el div directo, sin render() (no pierde lo tipeado).
async function agtHintPasiva(){
  const el=document.getElementById('agt-hint'); if(!el) return;
  const medicoId=(document.getElementById('agt-medico')?.value||'').trim();
  const fecha=(document.getElementById('agt-fecha')?.value||'').trim();
  const hini=(document.getElementById('agt-hini')?.value||'').trim();
  const hfin=(document.getElementById('agt-hfin')?.value||'').trim();
  if(!medicoId||!fecha||!hini||!hfin){ el.innerHTML=''; return; }
  el.innerHTML='<span style="color:var(--ink3)">Comprobando guardia pasiva…</span>';
  try{
    const snap=await db.collection('guardias').where('personaId','==',medicoId).get();  // índice single-field default
    const ini=new Date(fecha+'T'+hini).getTime(), fin=new Date(fecha+'T'+hfin).getTime();
    const pasiva=snap.docs.map(d=>d.data()).some(g=> g.modalidad==='pasiva' && gSolapan(ini,fin,g.inicio,g.fin));
    el.innerHTML= pasiva
      ? '<span style="color:#0F6E56">✓ El médico figura de guardia pasiva en esa franja.</span>'
      : '<span style="color:#B45309">⚠ El médico no figura de guardia pasiva en esa franja (informativo, no bloquea).</span>';
  }catch(e){ el.innerHTML='<span style="color:var(--ink3)">No se pudo comprobar la guardia pasiva.</span>'; }
}
async function agendaGuardar(){
  if(!puede('gestionar_agenda_turnos')) return; // la regla es la defensa real
  agtErr('');
  const isNew=S.agt.edit==='new';
  const fecha=(document.getElementById('agt-fecha')?.value||'').trim();
  const hini=(document.getElementById('agt-hini')?.value||'').trim();
  const hfin=(document.getElementById('agt-hfin')?.value||'').trim();
  const dur=parseInt(document.getElementById('agt-dur')?.value||'',10);
  const medicoId=(document.getElementById('agt-medico')?.value||'').trim();
  if(!fecha){ agtErr('Elegí una fecha.'); return; }
  if(!hini||!hfin){ agtErr('Completá el horario.'); return; }
  if(hini>=hfin){ agtErr('El horario de inicio debe ser anterior al fin.'); return; }
  if(!(dur>0)){ agtErr('La duración de cada turno debe ser mayor a 0.'); return; }
  if(!medicoId){ agtErr('Elegí un médico.'); return; }
  const conf=agtSolape(medicoId,fecha,hini,hfin, isNew?null:S.agt.edit);
  if(conf){ agtErr('Se pisa con otra franja de ese médico ese día ('+esc(conf.horaInicio)+'–'+esc(conf.horaFin)+').'); return; }
  const med=(S.staffMedico||[]).find(m=>m.uid===medicoId);
  const medicoNombre=(med&&med.nombre)||'';
  try{
    if(isNew){
      await db.collection('agenda_turnos').add({ fecha, horaInicio:hini, horaFin:hfin, duracionSlotMin:dur, medicoId, medicoNombre, activa:true, slotsTomados:[], creadoEn:FV(), creadoPor:S.user.uid });
    } else {
      // NUNCA pisar slotsTomados / activa / creadoEn en edición (los mueve la baja / la CF de reserva).
      await db.collection('agenda_turnos').doc(S.agt.edit).set({ fecha, horaInicio:hini, horaFin:hfin, duracionSlotMin:dur, medicoId, medicoNombre, actualizadoEn:FV() }, { merge:true });
    }
    S.agt.edit=null; render();
  }catch(e){ agtErr('No se pudo guardar: '+(e.message||e)); }
}
async function agendaBaja(id,reactivar){
  if(!puede('gestionar_agenda_turnos')) return;
  if(!reactivar && !confirm('¿Dar de baja esta franja? No se podrá reservar en ella.')) return;
  agtErr('');
  try{ await db.collection('agenda_turnos').doc(id).set({activa:!!reactivar,actualizadoEn:FV()},{merge:true}); }
  catch(e){ agtErr('No se pudo actualizar: '+(e.message||e)); }
}

/* ===================== FACTURACIÓN — Tarifas (Estructura 1, Contable) =====================
   Catálogo de tarifas (base para los motores de facturación futuros). Modelo de negocio mixto
   (abono mensual + extras por uso); este bloque construye SOLO el catálogo. Gobernado por
   configurar_sistema (UI: puedeConfig(); reglas: isAdmin||cap). Colección nueva, arranca vacía.
   NO toca episodios, ni despacho, ni Admin. Sub-secciones (por ahora una): Tarifas.
   tarifas/{id}: nombre, tipoCalculo('fija'|'por_km'), precioBase, valorPorKm (0 si fija), activo, creadoEn. */
function facFormOpen(){ return !!(S.fac && (S.fac.edit!=null || S.fac.cedit!=null || S.fac.aedit!=null)); }
function facAttach(){
  if(S.facUnsub) return;
  const upd=()=>{ if(!facFormOpen()) render(); }; // no re-renderiza con un form abierto
  // Fase2: tarifas/prestaciones son CONFIG (configurar_sistema). El contable (facturar, sin config) NO las ve ni las lee
  // → sus listeners solo se enganchan con puedeConfig(); si no, ni se suscriben (evita permission-denied y "NO ve tarifas").
  const subs=[
    db.collection('cargos').onSnapshot(s=>{ if(!S.fac) return; S.fac.cargos=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.fac) S.fac.cargos=[]; }),
    db.collection('abonos').onSnapshot(s=>{ if(!S.fac) return; S.fac.abonos=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.fac) S.fac.abonos=[]; }),
    db.collection('facturas').onSnapshot(s=>{ if(!S.fac) return; S.fac.facturas=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.fac) S.fac.facturas=[]; }),
    db.collection('empresas').onSnapshot(s=>{ if(!S.fac) return; S.fac.empresas=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.fac) S.fac.empresas=[]; }) // E-3: N° convenio para el membrete del comprobante de empresa
  ];
  if(puedeConfig()){
    subs.unshift(
      db.collection('tarifas').onSnapshot(s=>{ if(!S.fac) return; S.fac.tarifas=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.fac){ S.fac.err=(e.message||String(e)); render(); } }),
      db.collection('prestaciones').onSnapshot(s=>{ if(!S.fac) return; S.fac.prest=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.fac) S.fac.prest=[]; })
    );
  } else { if(S.fac){ S.fac.tarifas=[]; S.fac.prest=[]; } }
  S.facUnsub=subs;
}

function facErr(t){ const e=document.getElementById('fac-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }

/* ---- Cargos: motor de facturación directa + ABM (Estructura 1) ----

   se ajustan/anulan DESPUÉS. Sin bandeja de aprobación previa. El motor SOLO LEE episodios (nunca escribe).
   Mapeo FIJO codigo→prestación (valores reales verificados en CODIGOS): */
const COD_PRESTACION={ rojo:'emergencias', amarillo:'urgencias', verde:'atencion_medica', traslado:'traslados' };
const REGLA_LBL={ no_socio:'No socio', fuera_cobertura:'Fuera de cobertura', en_carencia:'En carencia', siempre_extra:'Siempre extra' };

  const report = S.fac.report ? `<div class="card" style="background:var(--bg)"><div style="font-size:.78rem;font-weight:700;margin-bottom:.3rem">Última corrida</div><div style="font-size:.75rem;color:var(--ink2);line-height:1.6">${S.fac.report}</div></div>` : '';

async function generarCargos(){
  if(!puede('facturar')) return; // la regla es la defensa real
  facErr('');
  if(!Array.isArray(S.fac.tarifas)){ facErr('Esperá a que carguen las tarifas.'); return; }
  const rep={ generados:0, sinTarifa:0, sinCargo:0, yaTenian:0, sinAtribucion:0, errores:0 };
  try{
    // SOLO LECTURA de episodios cerrados + cargos existentes (idempotencia por episodioId).
    const [epsSnap, cgSnap] = await Promise.all([
      db.collection('episodios').where('estado','==','cerrado').get(),
      db.collection('cargos').get()
    ]);
    const conCargo=new Set(cgSnap.docs.map(d=>d.data().episodioId));
    for(const doc of epsSnap.docs){
      const ep=doc.data(), epId=doc.id;
      if(conCargo.has(epId)){ rep.yaTenian++; continue; }
      // codigo = codigoReal (desenlace) || codigoPresuntivo (top-level). Mapeo fijo a prestación.
      const codigo=(ep.desenlace && ep.desenlace.codigoReal) || ep.codigoPresuntivo || '';
      const prestacionId=COD_PRESTACION[codigo]||null;
      if(!prestacionId){ rep.sinTarifa++; continue; }
      const tarifa=(S.fac.tarifas||[]).find(t=>t.activo!==false && t.prestacionId===prestacionId);
      if(!tarifa){ rep.sinTarifa++; continue; } // no generar cargo en 0
      const atrib=ep.atribucion||null;
      const sinAtrib=!atrib;
      const socioId=(atrib && atrib.socioId)?atrib.socioId:null;
      const cob=(atrib && atrib.planSnapshot && atrib.planSnapshot.coberturas)?atrib.planSnapshot.coberturas:{};
      const enCar=(atrib && atrib.planSnapshot && Array.isArray(atrib.planSnapshot.enCarencia))?atrib.planSnapshot.enCarencia:[];
      let regla=null;
      if(socioId==null){ regla='no_socio'; }              // a. no socio (o episodio histórico sin atribución)
      else if(cob[prestacionId]!==true){ regla='fuera_cobertura'; } // b. fuera de cobertura
      else if(enCar.includes(prestacionId)){ regla='en_carencia'; rep.enCarencia=(rep.enCarencia||0)+1; } // b2. cubierta por el plan PERO en carencia al momento del episodio → se cobra (enforcement financiero)
      else if(tarifa.siempreExtra){ regla='siempre_extra'; }       // c. tipo siempre-extra
      else { rep.sinCargo++; continue; }                  // d. cubierto por el abono → no genera
      if(sinAtrib) rep.sinAtribucion++;                   // histórico: se cuenta aparte (subconjunto de no_socio)
      const porKm=tarifa.tipoCalculo==='por_km';
      const base=Number(tarifa.precioBase)||0;
      const cargo={
        episodioId:epId,
        nroIncidente:(ep.nroIncidente!=null?ep.nroIncidente:null),
        nroIncidenteFmt:(ep.nroIncidente!=null?fmtIncidente(ep.nroIncidente,añoDe(ep.creadoEn)):'—'),
        personaId:ep.pacienteId||null,
        socioId,
        pacNombre:(ep.pac && ep.pac.nombre)||'',
        regla,
        tarifaId:tarifa.id, tarifaNombre:tarifa.nombre||'', tipoCalculo:tarifa.tipoCalculo||'fija',
        precioSugerido:base,
        valorPorKm:(porKm?(Number(tarifa.valorPorKm)||0):0),
        km:null, kmPendiente:porKm,
        precioFinal:base,
        motivoAjuste:null,
        estado:'generado', generadoEn:FV(), generadoPor:S.user.uid
      };
      try{ await db.collection('cargos').add(cargo); rep.generados++; }
      catch(e){ rep.errores++; console.warn('[generarCargos] fallo al crear cargo de',epId,e); }
    }
    audit('cargos_generados','cargos','',rep.generados+' generados, '+rep.sinTarifa+' sin tarifa');
    S.fac.report=`Generados: <b>${rep.generados}</b>${rep.enCarencia?(' (en carencia: '+rep.enCarencia+')'):''} · Salteados sin tarifa: ${rep.sinTarifa} · Sin cargo (cubierto por abono): ${rep.sinCargo} · Ya tenían: ${rep.yaTenian} · Sin atribución (históricos): <b>${rep.sinAtribucion}</b>${rep.errores?(' · Errores: '+rep.errores):''}`;
    render();
  }catch(e){ facErr('No se pudieron generar los cargos: '+(e.message||e)); }
}

async function facCargoGuardar(id){
  if(!puede('facturar')) return;
  facCMsg('');
  const c=(S.fac.cargos||[]).find(x=>x.id===id); if(!c) return;
  if(c.facturaId){ facCMsg('Este cargo está facturado: anulá la factura primero.'); return; }
  const porKm=c.tipoCalculo==='por_km';
  let km=(c.km!=null?c.km:null), kmPendiente=!!c.kmPendiente;
  if(porKm){
    const kmRaw=(document.getElementById('fac-c-km')?.value||'').trim();
    if(kmRaw!==''){ km=Number(kmRaw)||0; kmPendiente=false; }
  }
  const base=Number(c.precioSugerido)||0, vk=Number(c.valorPorKm)||0;
  const expected=(porKm && km!=null) ? (base + km*vk) : base;
  const precioFinal=Number(document.getElementById('fac-c-final')?.value||0)||0;
  const motivoAjuste=(document.getElementById('fac-c-motivo')?.value||'').trim();
  const manual=Math.abs(precioFinal-expected)>0.005;
  if(manual && !motivoAjuste){ facCMsg('Cambiaste el precio final a mano: el motivo de ajuste es obligatorio.'); return; }
  const data={ km, kmPendiente, precioFinal, motivoAjuste:(manual?motivoAjuste:(motivoAjuste||null)), actualizadoEn:FV() };
  try{ await db.collection('cargos').doc(id).set(data,{merge:true}); audit('cargo_ajustado','cargo',id,'$'+precioFinal); S.fac.cedit=null; render(); }
  catch(e){ facCMsg('No se pudo guardar: '+(e.message||e)); }
}
async function facCargoAnular(id){
  if(!puede('facturar')) return;
  facCMsg('');
  const cg=(S.fac.cargos||[]).find(x=>x.id===id);
  if(cg && cg.facturaId){ facCMsg('Este cargo está facturado: anulá la factura primero.'); return; }
  const motivo=(document.getElementById('fac-c-anmotivo')?.value||'').trim();
  if(!motivo){ facCMsg('El motivo de anulación es requerido.'); return; }
  try{ await db.collection('cargos').doc(id).set({ estado:'anulado', motivoAnulacion:motivo, anuladoEn:FV(), anuladoPor:S.user.uid },{merge:true}); audit('cargo_anulado','cargo',id,motivo); S.fac.cedit=null; render(); }
  catch(e){ facCMsg('No se pudo anular: '+(e.message||e)); }
}

/* ---- Abonos: corrida mensual de cuotas por socio (Estructura 1) ----
   Mismo espíritu que cargos: facturación DIRECTA (nace a precio de catálogo, se ajusta/anula después) +
   snapshot (el precio del plan se CONGELA a la corrida; si el plan cambia luego, los abonos ya generados
   no se tocan). Sin prorrateo (mes completo). La carencia NO afecta el abono. El motor SOLO LEE
   socios/planes/personas; escribe solo abonos. */
function facPeriodoActual(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function facSetPeriodo(v){ if(!S.fac) return; S.fac.periodo=v||facPeriodoActual(); render(); }

function facAbonoCancelar(){ if(S.fac) S.fac.aedit=null; render(); }

function facAbonosView(){
  if(S.fac.abonos===null) return `<div class="card">Cargando abonos…</div>`;
  if(S.fac.aedit!=null) return facAbonoForm();
  const btn="btn-o\" style=\"width:auto;padding:.3rem .6rem;margin-top:0";
  const periodo=S.fac.periodo||facPeriodoActual();
  const showAnul=!!S.fac.showAnulAb;
  const nAnul=(S.fac.abonos||[]).filter(a=>a.periodo===periodo && a.estado==='anulado').length;
  const list=(S.fac.abonos||[]).filter(a=>a.periodo===periodo && (showAnul||a.estado!=='anulado')).slice().sort((a,b)=>(a.socioNombre||'').localeCompare(b.socioNombre||''));
  const rows = list.length ? list.map(a=>{
    const anul=a.estado==='anulado';
    const meta=['N° '+esc(a.numeroAfiliado||'—'), '· '+esc(a.planNombre||'—'), '· '+facMoney(a.precioFinal), anul?'· ANULADO':''].filter(Boolean).join(' ');
    const acts=anul?'':`<div style="display:flex;gap:.4rem"><button class="${btn}" onclick="facAbonoEditar('${a.id}')">Editar</button></div>`;
    return `<div class="lr" style="flex-wrap:wrap${anul?';opacity:.5':''}"><div class="lrb" style="flex:1 1 100%"><div class="lrn">${esc(a.socioNombre||'—')}</div><div class="lrs">${meta}</div></div>${acts}</div>`;
  }).join('') : `<div style="font-size:.78rem;color:var(--ink3)">Sin abonos en ${esc(periodo)}${showAnul?'':' (activos)'}</div>`;
  const report = S.fac.reportAb ? `<div class="card" style="background:var(--bg)"><div style="font-size:.78rem;font-weight:700;margin-bottom:.3rem">Última corrida</div><div style="font-size:.75rem;color:var(--ink2);line-height:1.6">${S.fac.reportAb}</div></div>` : '';
  const toggle=`<label style="display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--ink3);margin-bottom:.6rem;cursor:pointer"><input type="checkbox" onchange="facShowAnulAb(this.checked)" ${showAnul?'checked':''}>Ver anulados${nAnul?(' ('+nAnul+')'):''}</label>`;
  // GENERAR ABONOS = producir la cuota devengada (write de abonos = puedeFacturar) → gate 'facturar'. Ya NO lee personas
  // (el nombre sale del denorm socios.nombreVista), así que el contable lo ejecuta sin tocar dato clínico.
  const genBtn = puede('facturar') ? `<button class="btn-r" onclick="generarAbonos()" style="margin-bottom:.4rem">⚙️ GENERAR ABONOS</button>
    <div style="font-size:.66rem;color:var(--ink3);margin:0 0 .7rem">Cuota mensual de cada socio activo con plan (precio congelado a la corrida). Idempotente por socio+período. Lee socios/planes (nombre denormalizado, NO personas).</div>` : '';
  return `<div class="field" style="margin-bottom:.6rem"><label>Período</label><input id="fac-ab-periodo" type="month" value="${esc(periodo)}" onchange="facSetPeriodo(this.value)"></div>
    ${genBtn}${report}${toggle}<div class="card">${rows}</div>`;
}

async function generarAbonos(){
  if(!puede('facturar')) return; // la regla es la defensa real
  facErr('');
  const periodo=(document.getElementById('fac-ab-periodo')?.value||S.fac.periodo||'').trim();
  if(!/^\d{4}-\d{2}$/.test(periodo)){ facErr('Elegí un período válido (AAAA-MM).'); return; }
  const rep={ generados:0, sinPlan:0, yaTenian:0, planInvalido:0, corpSinDest:0, destFijo:0, errores:0 };
  try{
    // SOLO LECTURA: socios activos + abonos del período + empresas (E-3: mapa de convenios cacheado UNA vez).
    const [socSnap, abSnap, empSnap] = await Promise.all([
      db.collection('socios').where('activo','==',true).get(),
      db.collection('abonos').where('periodo','==',periodo).get(),
      db.collection('empresas').get()
    ]);
    const empMap={}; empSnap.docs.forEach(d=>{ empMap[d.id]=d.data(); });
    const yaConAbono=new Set(abSnap.docs.map(d=>d.data().socioId)); // incluye anulados → no regenera
    for(const sd of socSnap.docs){
      const socio=sd.data(), socioId=sd.id;
      // E-3 (destino por facturarA, reemplaza la exclusión ciega por tipoAfiliado):
      //  · empresa con convenio FIJO → sin abono per-socio (la empresa paga flat; el ítem lo genera generarFacturas).
      //  · empresa per cápita (o convenio sin cargar) → genera abono normal, rolará a la factura de la empresa.
      //  · RED (fallback): corporativo SIN facturarA configurado → excluido, con línea en el reporte.
      const fa=socio.facturarA;
      if(fa && fa.tipo==='empresa'){
        const emp=empMap[fa.empresaId];
        if(emp && emp.convenio && emp.convenio.modo==='fijo'){ rep.destFijo++; continue; }
      } else if(socio.tipoAfiliado==='corporativo'){ rep.corpSinDest++; continue; }
      if(yaConAbono.has(socioId)){ rep.yaTenian++; continue; }
      if(!socio.planId){ rep.sinPlan++; continue; } // sin plan → no genera en 0
      let plan=null;
      try{ const pd=await db.collection('planes').doc(socio.planId).get(); if(pd.exists) plan=pd.data(); }catch(_){}
      if(!plan || plan.activo===false){ rep.planInvalido++; continue; } // plan inexistente/inactivo
      // Nombre del socio: se lee del DENORM en `socios` (nombreVista), NUNCA de `personas` (que lleva antecedentes
      // clínicos). Así el contable (facturar) genera abonos sin tocar dato de salud. El denorm se mantiene en alta/edición + backfill.
      const socioNombre = socio.nombreVista || '';
      // por_integrante (Tramo 5a): cuenta dependientes ACTIVOS del titular EN MEMORIA (socSnap ya trae los activos) — sin queries extra en el loop.
      const integrantes = (plan.modeloPrecio==='por_integrante') ? socSnap.docs.filter(x=>(x.data().titularSocioId)===socioId).length : 0;
      const precio=planPrecioTotal(plan, integrantes); // precio CONGELADO a la corrida (snapshot)
      const abono={
        periodo, socioId, personaId:socio.personaId||null,
        socioNombre, numeroAfiliado:socio.numeroAfiliado||'',
        planId:socio.planId, planNombre:plan.nombre||'',
        precioSugerido:precio, precioFinal:precio, motivoAjuste:null,
        estado:'generado', generadoEn:FV(), generadoPor:S.user.uid
      };
      if(plan.modeloPrecio==='por_integrante') abono.integrantesFacturados=integrantes;
      try{ await db.collection('abonos').add(abono); rep.generados++; }
      catch(e){ rep.errores++; console.warn('[generarAbonos] fallo',socioId,e); }
    }
    audit('abonos_generados','abonos',periodo,rep.generados+' generados');
    S.fac.reportAb=`Período <b>${esc(periodo)}</b> — Generados: <b>${rep.generados}</b> · Sin plan: ${rep.sinPlan} · Ya tenían: ${rep.yaTenian} · Plan inválido: ${rep.planInvalido} · Convenio fijo (sin abono): ${rep.destFijo} · <b>Corporativos sin destinatario configurado — excluidos: ${rep.corpSinDest}</b>${rep.errores?(' · Errores: '+rep.errores):''}`;
    render();
  }catch(e){ facErr('No se pudieron generar los abonos: '+(e.message||e)); }
}

async function facAbonoGuardar(id){
  if(!puede('facturar')) return;
  facAbMsg('');
  const a=(S.fac.abonos||[]).find(x=>x.id===id); if(!a) return;
  if(a.facturaId){ facAbMsg('Este abono está facturado: anulá la factura primero.'); return; }
  const base=Number(a.precioSugerido)||0;
  const precioFinal=Number(document.getElementById('fac-ab-final')?.value||0)||0;
  const motivoAjuste=(document.getElementById('fac-ab-motivo')?.value||'').trim();
  const manual=Math.abs(precioFinal-base)>0.005;
  if(manual && !motivoAjuste){ facAbMsg('Cambiaste el precio final a mano: el motivo de ajuste es obligatorio.'); return; }
  const data={ precioFinal, motivoAjuste:(manual?motivoAjuste:(motivoAjuste||null)), actualizadoEn:FV() };
  try{ await db.collection('abonos').doc(id).set(data,{merge:true}); audit('abono_ajustado','abono',id,'$'+precioFinal); S.fac.aedit=null; render(); }
  catch(e){ facAbMsg('No se pudo guardar: '+(e.message||e)); }
}
async function facAbonoAnular(id){
  if(!puede('facturar')) return;

  if(ab && ab.facturaId){ facAbMsg('Este abono está facturado: anulá la factura primero.'); return; }
  const motivo=(document.getElementById('fac-ab-anmotivo')?.value||'').trim();
  if(!motivo){ facAbMsg('El motivo de anulación es requerido.'); return; }

  catch(e){ facAbMsg('No se pudo anular: '+(e.message||e)); }
}

/* ---- Facturas: cierre de Contable. Agrupa abono + cargos por PERSONA (modelo BARRIDO) ----
   La factura toma todo lo CONFIRMADO y NO facturado de esa persona (abono del período + cargos pendientes de
   cualquier fecha; los cargos no tienen período propio → los pendientes ruedan a la próxima factura). Los ítems
   se congelan (monto = precioFinal al emitir). Integridad: se escribe facturaId en cada abono/cargo incluido →
   no puede re-facturarse ni editarse hasta anular la factura (que libera sus ítems). estado pagada = cobranza
   mínima. El motor SOLO LEE abonos/cargos y escribe facturas + el facturaId de los ítems. NUNCA delete físico. */

  const toggle=`<label style="display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--ink3);margin-bottom:.6rem;cursor:pointer"><input type="checkbox" onchange="facShowAnulF(this.checked)" ${showAnul?'checked':''}>Ver anuladas${nAnul?(' ('+nAnul+')'):''}</label>`;

    <div style="font-size:.66rem;color:var(--ink3);margin:0 0 .7rem">Barrido por persona: abono del período + TODOS los cargos pendientes (sin facturar, no anulados). Idempotente.</div>
    ${report}${toggle}<div class="card">${rows}</div>`;

async function generarFacturas(){
  if(!puede('facturar')) return; // la regla es la defensa real
  facErr('');
  const periodo=(document.getElementById('fac-fc-periodo')?.value||S.fac.periodo||'').trim();
  if(!/^\d{4}-\d{2}$/.test(periodo)){ facErr('Elegí un período válido (AAAA-MM).'); return; }
  const rep={ facturas:0, items:0, facPersona:0, facEmpresa:0, errores:0 };
  const year=new Date().getFullYear(); // F-2: año cosmético del comprobante (emisión), calco de INC-
  try{
    // E-3 (SOLO LECTURA): abonos del período + cargos + TODOS los socios (para resolver socioId→facturarA) +
    // empresas (convenios) + facturas del período (idempotencia del ítem sintético fijo, que no deja marca facturaId).
    const [abSnap, cgSnap, socSnap, empSnap, facSnap] = await Promise.all([
      db.collection('abonos').where('periodo','==',periodo).get(),
      db.collection('cargos').get(),
      db.collection('socios').get(),
      db.collection('empresas').get(),
      db.collection('facturas').where('periodo','==',periodo).get()
    ]);
    const socMap={}; socSnap.docs.forEach(d=>{ socMap[d.id]={id:d.id,...d.data()}; });
    const empMap={}; empSnap.docs.forEach(d=>{ empMap[d.id]={id:d.id,...d.data()}; });
    const empresasYaFacturadas=new Set(facSnap.docs.map(d=>d.data()).filter(f=>f.clienteTipo==='empresa').map(f=>f.clienteId)); // no duplicar el fijo
    // Resuelve el destinatario de un abono/cargo desde su socio. null = corporativo SIN facturarA (RED → excluido).
    const destinoDe=(socioId)=>{
      const s=socMap[socioId]; const fa=s&&s.facturarA;
      if(fa && fa.tipo==='empresa'){ const emp=empMap[fa.empresaId]; return { key:'e:'+fa.empresaId, tipo:'empresa', empresaId:fa.empresaId, razonSocial:fa.razonSocial||(emp&&emp.razonSocial)||'' }; }
      if(s && s.tipoAfiliado==='corporativo') return null;
      return { key:'p:'+(s?s.personaId:''), tipo:'persona' };
    };
    const grupos={}; const corpExcl=new Set();
    const push=(dest, base, item)=>{ const g=grupos[dest.key]||(grupos[dest.key]=Object.assign({items:[]},base)); g.items.push(item); };
    abSnap.docs.forEach(d=>{ const a=d.data(); if(a.estado==='anulado') return;
      const dest=destinoDe(a.socioId); if(!dest){ corpExcl.add(a.socioId); return; }
      if(a.estado!=='generado'||a.facturaId) return;
      if(dest.tipo==='persona' && !a.personaId) return;
      const item={ tipo:'abono', refId:d.id, monto:Number(a.precioFinal)||0,
        descripcion: dest.tipo==='empresa' ? ('Abono '+(a.socioNombre||'')+' · '+(a.planNombre||'')+' '+(a.periodo||'')).trim() : ('Abono '+(a.planNombre||'')+' '+(a.periodo||'')).trim() };
      if(dest.tipo==='empresa') push(dest,{clienteTipo:'empresa',clienteId:dest.empresaId,nombre:dest.razonSocial,clienteNombre:dest.razonSocial},item);
      else push(dest,{personaId:a.personaId,socioId:a.socioId||null,nombre:a.socioNombre||'',numeroAfiliado:a.numeroAfiliado||null},item);
    });
    cgSnap.docs.forEach(d=>{ const c=d.data(); if(c.estado==='anulado') return;
      const dest=destinoDe(c.socioId); if(!dest){ corpExcl.add(c.socioId); return; }
      if(c.estado!=='generado'||c.facturaId) return;
      if(dest.tipo==='persona' && !c.personaId) return;
      const item={ tipo:'cargo', refId:d.id, monto:Number(c.precioFinal)||0, descripcion:((c.tarifaNombre||'—')+' · '+(c.nroIncidenteFmt||('INC '+(c.nroIncidente!=null?c.nroIncidente:'—')))) };
      if(dest.tipo==='empresa') push(dest,{clienteTipo:'empresa',clienteId:dest.empresaId,nombre:dest.razonSocial,clienteNombre:dest.razonSocial},item);
      else push(dest,{personaId:c.personaId,socioId:c.socioId||null,nombre:c.pacNombre||'',numeroAfiliado:null},item);
    });
    // E-3: pasada de CONVENIOS FIJOS — ítem sintético (SIN refId) por empresa fija activa con ≥1 socio activo que le
    // factura, y que no tenga ya factura este período (idempotencia — el sintético no deja marca facturaId).
    Object.values(empMap).forEach(emp=>{
      if(emp.activo===false || !(emp.convenio && emp.convenio.modo==='fijo') || empresasYaFacturadas.has(emp.id)) return;
      const tieneSocios=socSnap.docs.some(x=>{ const s=x.data(); return s.activo!==false && s.facturarA && s.facturarA.tipo==='empresa' && s.facturarA.empresaId===emp.id; });
      if(!tieneSocios) return;
      push({key:'e:'+emp.id}, {clienteTipo:'empresa',clienteId:emp.id,nombre:emp.razonSocial||'',clienteNombre:emp.razonSocial||''},
        { tipo:'convenio', descripcion:('Convenio mensual '+(emp.razonSocial||'')+' · '+periodo), monto:Number(emp.convenio.montoMensual)||0 });
    });
    for(const key of Object.keys(grupos)){
      const g=grupos[key];
      if(!g.items.length) continue;
      const total=g.items.reduce((s,it)=>s+(Number(it.monto)||0),0);
      try{
        // F-2: numeración atómica (contador + factura en la MISMA tx). E-3: factura polimórfica (persona | empresa).
        const counterRef=db.collection('contadores').doc('facturas');
        const facRef=db.collection('facturas').doc();
        await db.runTransaction(async tx=>{
          const cs=await tx.get(counterRef); const ultimo=cs.exists?(cs.data().ultimo||0):0; const next=ultimo+1;
          tx.set(counterRef,{ultimo:next,actualizadoEn:FV()},{merge:true});
          const doc = g.clienteTipo==='empresa'
            ? { periodo, nombre:g.nombre||'', items:g.items, total, estado:'emitida', emitidaEn:FV(), emitidaPor:S.user.uid, nroComprobante:fmtComprobante(next,year), clienteTipo:'empresa', clienteId:g.clienteId, clienteNombre:g.clienteNombre||g.nombre||'' } // sin personaId (regla E-1)
            : { periodo, personaId:g.personaId, socioId:g.socioId||null, nombre:g.nombre||'', numeroAfiliado:g.numeroAfiliado||null, items:g.items, total, estado:'emitida', emitidaEn:FV(), emitidaPor:S.user.uid, nroComprobante:fmtComprobante(next,year) };
          tx.set(facRef, doc);
        });
        for(const it of g.items){ // vincular facturaId — SALTA los ítems sintéticos (sin refId, ej. convenio fijo)
          if(!it.refId) continue;
          const col= it.tipo==='abono' ? 'abonos' : 'cargos';
          try{ await db.collection(col).doc(it.refId).set({ facturaId:facRef.id },{merge:true}); }
          catch(e){ console.warn('[generarFacturas] no se pudo vincular',it.tipo,it.refId,e); }
        }
        rep.facturas++; rep.items+=g.items.length; if(g.clienteTipo==='empresa') rep.facEmpresa++; else rep.facPersona++;
      }catch(e){ rep.errores++; console.warn('[generarFacturas] fallo grupo',key,e); }
    }
    audit('facturas_generadas','facturas',periodo,rep.facturas+' facturas');
    S.fac.reportF=`Período <b>${esc(periodo)}</b> — Facturas: <b>${rep.facturas}</b> (persona ${rep.facPersona} · empresa ${rep.facEmpresa}) · Items: ${rep.items} · Corporativos sin destinatario (excluidos): <b>${corpExcl.size}</b>${rep.errores?(' · Errores: '+rep.errores):''}`;
    render();
  }catch(e){ facErr('No se pudieron generar las facturas: '+(e.message||e)); }
}

function facFcMsg(t){ const e=document.getElementById('fac-fc-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
function facFacturaDetalle(){

    <div class="card"><div class="ch">Factura · ${esc(f.nroComprobante||f.periodo||'—')} ${facEstBadge(est)}</div>
    <div style="font-size:.9rem;font-weight:700">${esc(f.nombre||'—')}</div>
    <div style="font-size:.75rem;color:var(--ink3);margin-bottom:.55rem">${afil}</div>

    ${items}
    <div class="ir" style="border-top:2px solid var(--border2);margin-top:.4rem;padding-top:.4rem"><span class="il" style="font-weight:700">Total</span><span class="iv" style="font-weight:700">${facMoney(f.total)}</span></div>
    <div style="margin-top:.8rem">${acciones}</div>
  </div>`;
}
// F-2: comprobante INTERNO imprimible (sin libs de PDF). window.print() + @media print que deja solo la hoja.

function facComprobante(){
  const f=(S.fac.facturas||[]).find(x=>x.id===S.fac.comprobante);
  if(!f) return `<div class="card">Comprobante no encontrado.<br><button class="btn-o" onclick="facCerrarComprobante()" style="margin-top:.6rem">Volver</button></div>`;
  const items=(f.items||[]).map(it=>`<tr><td style="padding:.4rem .2rem;border-bottom:1px solid #eee">${esc(it.descripcion||it.tipo||'—')}</td><td style="padding:.4rem .2rem;border-bottom:1px solid #eee;text-align:right;white-space:nowrap">${facMoney(it.monto)}</td></tr>`).join('');
  const afil = f.clienteTipo==='empresa'
    ? ('Convenio N° '+esc(((S.fac.empresas||[]).find(x=>x.id===f.clienteId)||{}).numeroConvenio||'—')) // E-3: membrete de empresa
    : (f.numeroAfiliado?('N° socio '+esc(f.numeroAfiliado)):'Particular');

async function facFacturaPagar(id){
  if(!puede('facturar')) return;
  facFcMsg('');
  const f=(S.fac.facturas||[]).find(x=>x.id===id); if(!f) return;
  if(f.estado!=='emitida'){ facFcMsg('Solo se puede marcar pagada una factura emitida.'); return; }
  try{ await db.collection('facturas').doc(id).set({ estado:'pagada', pagadaEn:FV(), pagadaPor:S.user.uid },{merge:true}); audit('factura_pagada','factura',id,''); render(); }
  catch(e){ facFcMsg('No se pudo marcar pagada: '+(e.message||e)); }
}
async function facFacturaAnular(id){
  if(!puede('facturar')) return;
  facFcMsg('');
  const f=(S.fac.facturas||[]).find(x=>x.id===id); if(!f) return;
  if(f.estado==='pagada'){ facFcMsg('Una factura pagada no se anula directo (decisión manual futura).'); return; }
  if(f.estado==='anulada'){ facFcMsg('La factura ya está anulada.'); return; }
  const motivo=(document.getElementById('fac-fc-anmotivo')?.value||'').trim();
  if(!motivo){ facFcMsg('El motivo de anulación es requerido.'); return; }
  try{
    for(const it of (f.items||[])){ // liberar facturaId de cada ítem → vuelven facturables/editables
      const col= it.tipo==='abono' ? 'abonos' : 'cargos';
      try{ await db.collection(col).doc(it.refId).set({ facturaId: firebase.firestore.FieldValue.delete() },{merge:true}); }
      catch(e){ console.warn('[facFacturaAnular] no se pudo liberar',it.tipo,it.refId,e); }
    }
    await db.collection('facturas').doc(id).set({ estado:'anulada', motivoAnulacion:motivo, anuladaEn:FV(), anuladaPor:S.user.uid },{merge:true});
    audit('factura_anulada','factura',id,motivo);
    render();
  }catch(e){ facFcMsg('No se pudo anular: '+(e.message||e)); }
}

/* ===================== COBRANZA (C-2, Contable-cobros) =====================
   Registro de pagos por factura (semántica pago-por-factura, parciales). Gate puedeCobrar()
   (cap gestionar_cobranza; admin/superadmin por bypass). El pago es INMUTABLE: se crea o se anula
   con motivo, nunca se edita (reglas C-1). saldo = total − Σ pagos registrados (no anulados), DERIVADO.
   El flip factura emitida<->pagada acompaña Σpagos>=total (invariante cross-doc client-side, rol confiable). */
function fmtRecibo(n,year){ return `RC-${year}-${String(n).padStart(6,'0')}`; } // calco de fmtComprobante (FC-)
function cobPagosDe(fid){ return (S.cob&&S.cob.pagos?S.cob.pagos:[]).filter(p=>p.facturaId===fid); }
function cobPagadoDe(fid){ return cobPagosDe(fid).filter(p=>p.estado==='registrado').reduce((s,p)=>s+(Number(p.monto)||0),0); }
function cobSaldoDe(f){ return (Number(f.total)||0) - cobPagadoDe(f.id); } // solo se llama sobre facturas 'emitida'
function cobFormOpen(){ return !!(S.cob && S.cob.fedit!=null); } // el detalle tiene el form: no re-renderizar por snapshot mientras se tipea

function cobAttach(){
  if(S.cobUnsub) return;
  const upd=()=>{ if(!cobFormOpen()) render(); };
  S.cobUnsub=[
    db.collection('facturas').onSnapshot(s=>{ if(!S.cob) return; S.cob.facturas=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, e=>{ if(S.cob){ S.cob.err=(e.message||String(e)); render(); } }),
    db.collection('pagos').onSnapshot(s=>{ if(!S.cob) return; S.cob.pagos=s.docs.map(d=>({id:d.id,...d.data()})); upd(); }, ()=>{ if(S.cob) S.cob.pagos=[]; })
  ];
}
function cobDetach(){ if(S.cobUnsub){ S.cobUnsub.forEach(u=>{ try{u();}catch(_){} }); S.cobUnsub=null; } }
function cobErr(t){ const e=document.getElementById('cob-err'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
function cobSub(id){ if(!S.cob) return; S.cob.sub=id; S.cob.fedit=null; render(); navPush(); }
function cobVerFactura(id){ if(!puedeCobrar()) return; S.cob.fedit=id; render(); navPush(); }
function cobCerrarFactura(){ if(S.cob) S.cob.fedit=null; render(); }

  if(!S.cob){ S.cob={sub:'porcobrar', facturas:null, pagos:null, fedit:null, err:''}; cobAttach(); }

function cobPorCobrarView(){

  if(S.cob.fedit!=null) return cobFacturaDetalle();
  // Solo facturas emitidas con saldo REAL pendiente (> 0). Excluye la corporativa pre-exclusión de total 0
  // y cualquier emitida ya saldada aún no flipeada. MISMO criterio que cobDeudaView (coherencia de vistas).
  const emit=(S.cob.facturas||[]).filter(f=>f.estado==='emitida' && ((Number(f.total)||0)-cobPagadoDe(f.id))>0.001).slice()
    .sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'') || String(a.nroComprobante||'').localeCompare(String(b.nroComprobante||'')));
  const rows = emit.length ? emit.map(f=>{
    const pagado=cobPagadoDe(f.id); const saldo=(Number(f.total)||0)-pagado; const parcial=pagado>0;

      <div style="text-align:right"><div style="font-size:.7rem;color:var(--ink3)">saldo</div><div style="font-weight:800;color:var(--r)">${facMoney(saldo)}</div></div>
      <svg class="chev" width="8" height="10" viewBox="0 0 1794 2190" style="margin-left:.5rem;opacity:.5"><use href="#cmono"/></svg></div>`;
  }).join('') : `<div style="font-size:.82rem;color:var(--ink3);padding:.4rem">No hay facturas con saldo pendiente. Todo al día. 🎉</div>`;
  const totalSaldo=emit.reduce((s,f)=>s+((Number(f.total)||0)-cobPagadoDe(f.id)),0);
  const resumen=emit.length?`<div class="card" style="background:var(--bg);display:flex;justify-content:space-between;align-items:center"><span style="font-size:.78rem;font-weight:700">Por cobrar (${emit.length})</span><span style="font-weight:800;color:var(--r)">${facMoney(totalSaldo)}</span></div>`:'';

function cobDeudaView(){
  if(S.cob.facturas===null || S.cob.pagos===null) return `<div class="card">Cargando…</div>`;
  const emit=(S.cob.facturas||[]).filter(f=>f.estado==='emitida');
  const porCliente={}; // E-3: agrupa por CLIENTE — empresa por clienteId (razón social), persona por socio/persona.
  emit.forEach(f=>{ const saldo=(Number(f.total)||0)-cobPagadoDe(f.id); if(saldo<=0) return;
    const esEmp=f.clienteTipo==='empresa'; const k=esEmp?('e:'+f.clienteId):('p:'+(f.socioId||f.personaId||f.id));
    if(!porCliente[k]) porCliente[k]={ nombre:f.nombre||'—', ref:esEmp?'convenio':(f.numeroAfiliado||null), esEmp, deuda:0, n:0 };
    porCliente[k].deuda+=saldo; porCliente[k].n++; });
  const list=Object.values(porCliente).sort((a,b)=>b.deuda-a.deuda);
  if(!list.length) return `<div class="card"><div style="font-size:.82rem;color:var(--ink3);padding:.4rem">Nadie con deuda. Todo al día. 🎉</div></div>`;
  const total=list.reduce((s,x)=>s+x.deuda,0);
  const rows=list.map(x=>`<div class="ir"><span class="il">${esc(x.nombre)}${x.esEmp?' <span style="font-size:.58rem;font-weight:800;color:var(--r)">EMPRESA</span>':(x.ref?(' · N° '+esc(x.ref)):'')} <span style="color:var(--ink3);font-size:.7rem">(${x.n} fact.)</span></span><span class="iv" style="font-weight:700;color:var(--r)">${facMoney(x.deuda)}</span></div>`).join('');
  return `<div class="card" style="background:var(--bg);display:flex;justify-content:space-between;align-items:center"><span style="font-size:.78rem;font-weight:700">Deuda total (${list.length} cliente${list.length===1?'':'s'})</span><span style="font-weight:800;color:var(--r)">${facMoney(total)}</span></div>
