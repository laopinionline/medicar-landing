<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MEDICAR — Socio</title>
<meta name="description" content="Credencial digital del socio de MEDICAR.">
<meta name="theme-color" content="#ED1C24">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MEDICAR">
<meta name="mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>

<style>
:root{
  /* tokens de marca (sistema-visual.html · manual Bidondo) */
  --rojo:#ED1C24; --rojo-hondo:#C8151C; --naranja:#F7941E;
  --tinta:#1A1A1A; --gris:#6B7075; --linea:#E7E9EC; --nieve:#F7F8FA;
  --blanco:#FFFFFF; --verde:#2E8B57; --ambar:#E6A100;
  --radio:16px;
  --sombra:0 1px 2px rgba(20,22,25,.04), 0 8px 24px rgba(20,22,25,.06);
  --sombra-alta:0 2px 4px rgba(20,22,25,.05), 0 18px 48px rgba(20,22,25,.12);
  /* ALIAS: nombres viejos -> tokens nuevos (vistas aun no redisenadas siguen andando con la paleta nueva) */
  --r:var(--rojo); --r-dk:var(--rojo-hondo); --o:var(--naranja);
  --bg:var(--nieve); --card:var(--blanco); --dark:var(--tinta);
  --ink:var(--tinta); --ink2:var(--gris); --ink3:#9AA0A6; --line:var(--linea); --g:var(--verde);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--nieve);color:var(--tinta);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100svh;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;background:var(--blanco)}
button{font-family:inherit;cursor:pointer;border:none}
input{font-family:inherit}

/* ---------- MARCA (chevron + palabra, PEGADOS) ---------- */
.chev{display:inline-block;vertical-align:middle;flex:none}
.brand{display:inline-flex;align-items:center;gap:2px}
.brand .word{font-style:italic;font-weight:800;letter-spacing:-.02em;color:var(--rojo);line-height:1}
@keyframes spin-pulse{0%{transform:translateX(-6px);opacity:.4}50%{transform:translateX(6px);opacity:1}100%{transform:translateX(-6px);opacity:.4}}
@keyframes pbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.chev-load{animation:spin-pulse 1.1s ease-in-out infinite}

/* ---------- LOGIN (blanco, limpio) ---------- */
.login{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2.4rem 1.7rem calc(2rem + env(safe-area-inset-bottom));background:var(--blanco)}
.login-brand{display:flex;flex-direction:column;gap:.7rem;margin-bottom:2.2rem}
.login-brand .brand .word{font-size:2.1rem}
.login-brand .login-sub{color:var(--gris);font-size:.9rem;font-weight:500}
.login h2{font-size:1.05rem;font-weight:800;margin-bottom:1.1rem;color:var(--tinta)}

/* ---------- CAMPOS / BOTONES ---------- */
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;font-weight:800;color:var(--gris);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.field input,.field textarea{width:100%;padding:.85rem .95rem;border:1.5px solid var(--linea);border-radius:12px;font-size:1rem;background:var(--nieve);outline:none;color:var(--tinta)}
.field input:focus,.field textarea:focus{border-color:var(--rojo);background:#fff}
.btn-r{display:inline-flex;align-items:center;justify-content:center;gap:.55rem;width:100%;background:var(--rojo);color:#fff;font-weight:800;font-size:1rem;padding:.95rem;border-radius:12px;box-shadow:var(--sombra)}
.btn-r:active{background:var(--rojo-hondo)}
.btn-r .chev{transition:transform .2s ease}
.btn-r:hover .chev{transform:translateX(4px)}
.btn-o{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;background:transparent;color:var(--tinta);font-weight:700;font-size:.95rem;padding:.85rem;border-radius:12px;border:1.5px solid var(--linea)}
.btn-o:active{background:var(--nieve)}
.err{display:none;background:#FDECEC;color:var(--rojo-hondo);font-size:.82rem;font-weight:600;padding:.65rem .8rem;border-radius:10px;margin-bottom:.85rem}
.err.on{display:block}

/* ---------- HOME ---------- */
.home{flex:1;display:flex;flex-direction:column;padding:1.2rem 1.1rem calc(1.4rem + env(safe-area-inset-bottom));background:var(--blanco)}
.topbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.1rem}
.topbar .brand .word{font-size:1.15rem}
.topbar .tb-t{font-weight:800;font-size:1.05rem;letter-spacing:-.02em;color:var(--tinta)}
.topbar .tb-t em{color:var(--rojo);font-style:normal}
.topbar .tb-sp{margin-left:auto}
.mini{background:none;color:var(--gris);font-size:.78rem;font-weight:700;padding:.4rem .2rem}

/* ---------- CREDENCIAL (mockup sistema visual) ---------- */
.cred{border-radius:20px;padding:1.3rem 1.3rem 1.4rem;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#2a2d31,#1a1a1a);box-shadow:var(--sombra-alta)}
.cred .lines-bg{position:absolute;right:-8px;top:-6px;opacity:.16;pointer-events:none}
.cred-top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.cred .cred-brand{display:inline-flex;align-items:center;gap:2px;font-style:italic;font-weight:800;font-size:.95rem}
.cred .est{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:#25d07a}
.cred .est.off{color:#ff9a9a}
.cred .nom{font-size:1.4rem;font-weight:800;font-style:italic;margin-top:1rem;line-height:1.15;position:relative;z-index:1}
.cred-num-lbl{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#9aa0a6;margin-bottom:.05rem}
.cred-num{font-size:1.5rem;font-weight:800;letter-spacing:.06em;font-variant-numeric:tabular-nums}
.cred .grid{display:flex;gap:1.5rem;margin-top:1rem;flex-wrap:wrap;position:relative;z-index:1}
.cred .grid .cell span{display:block;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9aa0a6;font-weight:800}
.cred .grid .cell b{font-size:.95rem;font-weight:700;margin-top:.1rem;display:block}

/* ---------- SECCIONES / TARJETAS (transicional para el resto del home) ---------- */
.sec{margin-top:1.3rem}
.sec-h{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--gris);margin:0 .2rem .5rem}
.card{background:#fff;border:1px solid var(--linea);border-radius:var(--radio);overflow:hidden;box-shadow:var(--sombra)}
.row{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.85rem 1rem;border-bottom:1px solid var(--linea)}
.row:last-child{border-bottom:none}
.row .rl{font-size:.8rem;color:var(--gris);font-weight:600}
.row .rv{font-size:.9rem;font-weight:700;text-align:right}
.btn-emerg{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:var(--rojo);color:#fff;font-weight:800;font-size:1.15rem;padding:1.05rem;border-radius:16px;text-decoration:none;margin-top:1.3rem;box-shadow:0 8px 20px -8px rgba(237,28,36,.55)}
.btn-emerg:active{background:var(--rojo-hondo)}
.btn-emerg .em-sub{display:block;font-size:.66rem;font-weight:700;opacity:.9;letter-spacing:.04em}
.btn-emerg svg{width:26px;height:26px;flex:none}
.hint{display:flex;gap:.65rem;align-items:flex-start;background:var(--nieve);border:1px solid var(--linea);border-radius:14px;padding:.8rem .9rem;margin-top:1.2rem;font-size:.8rem;color:var(--gris);line-height:1.45}
.hint svg{width:20px;height:20px;flex:none;color:var(--naranja);margin-top:.05rem}
.hint b{color:var(--tinta)}
.installed{margin-top:1.2rem;text-align:center;font-size:.76rem;color:var(--verde);font-weight:700}
.footer{margin-top:auto;padding-top:1.5rem}
.foot-note{text-align:center;font-size:.68rem;color:var(--ink3);margin-top:.9rem;line-height:1.5}

/* ---------- estados especiales ---------- */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.6rem;gap:.85rem;background:var(--blanco)}
.center .big{font-size:2.6rem}
.center h3{font-size:1.15rem;font-weight:800;color:var(--tinta)}
.center p{font-size:.9rem;color:var(--gris);line-height:1.5;max-width:22rem}
.center .btn-o,.center .btn-r{max-width:16rem}
.spin{width:34px;height:34px;border:3px solid var(--linea);border-top-color:var(--rojo);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- TRAMO 2 · tiles del home + formularios ---------- */
.tile{display:flex;align-items:center;gap:.85rem;width:100%;text-align:left;padding:1rem;border-radius:var(--radio);border:1px solid var(--linea);background:#fff;box-shadow:var(--sombra);cursor:pointer;transition:box-shadow .15s,transform .1s}
.tile:active{transform:scale(.99)}
.tile:hover{box-shadow:var(--sombra-alta)}
.tile-ic{width:44px;height:44px;flex:none;border-radius:12px;background:var(--nieve);display:flex;align-items:center;justify-content:center;font-size:1.35rem}
.tile-tx{flex:1;min-width:0}
.tile-t{font-weight:800;font-size:.95rem;color:var(--tinta)}
.tile-s{font-size:.76rem;color:var(--gris);margin-top:.12rem;line-height:1.35}
.tile-go{flex:none;color:var(--rojo);display:flex;align-items:center;transition:transform .2s ease}
.tile:hover .tile-go{transform:translateX(4px)}
/* hero (chequeo pendiente) */
.hero{color:#fff;border-radius:18px;padding:1.15rem 1.2rem;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--rojo),var(--rojo-hondo));box-shadow:0 10px 24px -10px rgba(237,28,36,.5)}
.hero .lines-bg{position:absolute;right:-8px;bottom:-16px;opacity:.14;pointer-events:none}
.hero-t{font-weight:800;font-size:1.05rem;position:relative;z-index:1}
.hero-s{font-size:.83rem;opacity:.93;margin-top:.25rem;line-height:1.4;position:relative;z-index:1}
.hero .go{margin-top:.9rem;display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:var(--rojo);font-weight:800;font-size:.95rem;padding:.7rem 1.1rem;border-radius:11px;border:none;cursor:pointer;position:relative;z-index:1}
.hero .go .chev{transition:transform .2s ease}
.hero .go:hover .chev{transform:translateX(4px)}
/* opciones seleccionables (si/no, escala, WHO-5, síntomas) */
.q{font-weight:700;font-size:.92rem;margin-bottom:.55rem;color:var(--tinta)}
.opt-row{display:flex;gap:.5rem}
.opt{display:flex;align-items:center;justify-content:center;gap:.5rem;flex:1;padding:.7rem;border-radius:12px;border:1.5px solid var(--linea);background:#fff;color:var(--tinta);font-weight:700;font-size:.9rem;cursor:pointer;transition:.12s}
.opt:active{transform:scale(.98)}
.opt.on{border-color:var(--rojo);background:var(--rojo);color:#fff}
.opt.wide{width:100%;justify-content:space-between;text-align:left;margin-bottom:.4rem}
.opt .val{opacity:.55;font-size:.72rem;font-weight:600}
.opt.on .val{opacity:.85}
.opt .chk{width:20px;height:20px;flex:none;border-radius:6px;border:2px solid var(--gris);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900}
.opt.on .chk{border-color:#fff;background:#fff;color:var(--rojo)}
.scale-lbl{display:flex;justify-content:space-between;font-size:.62rem;color:var(--gris);margin-top:.25rem}
/* WHO-5 sellado */
.who5-box{background:var(--nieve);border:1px solid var(--linea);border-radius:14px;padding:1rem .9rem;margin-top:1rem}
.who5-h{font-weight:800;font-size:.92rem;color:var(--rojo)}
.who5-intro{font-size:.78rem;color:var(--gris);line-height:1.45;margin-top:.3rem}
.who5-enc{font-weight:700;font-size:.82rem;margin-top:.7rem;color:var(--tinta)}
.who5-cite{font-size:.58rem;color:var(--ink3);margin-top:.85rem;line-height:1.4}
/* resultado (semáforo N3 / confirmación reporte) */
.result{border-radius:18px;padding:1.2rem;border:1.5px solid}
.result.ok{background:#eef7f1;border-color:#cfe8db}
.result.warn{background:#fff7ee;border-color:#f0c98a}
.result-t{font-weight:800;font-size:1.05rem}
.result-s{font-size:.86rem;line-height:1.5;margin-top:.35rem}
.result .call{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.9rem;background:var(--rojo);color:#fff;font-weight:800;padding:.8rem;border-radius:12px;text-decoration:none}
/* PWA-1: botón "i" educativo por signo (círculo visible 18px + hit-area ≥44px vía ::after) + sheet */
.sig-i{appearance:none;border:none;cursor:pointer;font-style:italic;font-weight:800;font-size:.72rem;color:var(--gris);background:#e8e8ea;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;line-height:1;position:relative;flex:none}
.sig-i::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px}
.sig-i:focus-visible{outline:2px solid var(--rojo);outline-offset:2px}
.sig-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.sig-sheet{background:#fff;width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:1.1rem 1.15rem 1.6rem;box-shadow:0 -8px 30px rgba(0,0,0,.2);max-height:80vh;overflow:auto}
.sig-sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.sig-sheet-h b{font-size:1.05rem;color:var(--tinta)}
.sig-close{appearance:none;border:none;background:#f2f2f2;width:44px;height:44px;border-radius:50%;font-size:1rem;color:var(--gris);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.sig-sec{margin-top:.75rem}
.sig-sec-t{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);margin-bottom:.2rem}
.sig-sec-b{font-size:.9rem;line-height:1.5;color:var(--tinta)}
.reg-hint{display:flex;gap:.55rem;align-items:flex-start;background:var(--nieve);border:1px solid var(--linea);border-radius:12px;padding:.7rem .8rem;margin-top:.6rem;font-size:.78rem;color:var(--gris);line-height:1.45}
.pref-row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-top:.7rem;padding:0 .2rem}
.pref-row select{padding:.45rem .55rem;border:1.5px solid var(--linea);border-radius:9px;font-size:.85rem;background:#fff;color:var(--tinta)}

/* ---------- TRAMO 3 · FEED ('Para vos') ---------- */
.feed{margin-top:1.7rem}
.feed-h{display:flex;align-items:center;gap:.55rem;margin:0 .2rem .85rem}
.feed-h b{font-size:1rem;font-style:italic;font-weight:800;color:var(--tinta)}
.feed-h .tres{opacity:.9;flex:none}
.post{border:1px solid var(--linea);border-radius:18px;overflow:hidden;background:#fff;margin-bottom:1rem;box-shadow:var(--sombra);transition:box-shadow .15s}
.post:hover{box-shadow:var(--sombra-alta)}
.post .ph-img{height:120px;background-size:cover;background-position:center}
.post .ph-body{padding:.9rem 1.05rem}
.post .tagp{display:inline-block;font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .6rem;border-radius:999px;margin-bottom:.55rem}
.tag-medicar{color:var(--rojo);background:#fdecec}
.tag-salud{color:#1f7a4d;background:#e7f5ee}
.tag-nutri{color:#b9700a;background:#fdf0dd}
.tag-vida{color:#5A4BD1;background:#ece9fb}
.post.tappable{cursor:pointer}
.post h5{font-size:.98rem;font-weight:700;line-height:1.35;margin-bottom:.35rem;letter-spacing:-.01em;color:var(--tinta)}
.post p{font-size:.8rem;color:var(--gris);line-height:1.5}
.post .meta{margin-top:.7rem;font-size:.7rem;color:#aeb3b8;font-weight:600}
</style>
</head>

/* ── F5 Turnos: Cloud Functions (mismo patrón que el panel), recarga y acciones ── */
const FNS_REGION='southamerica-east1';
function fnsCall(name,payload){ return firebase.app().functions(FNS_REGION).httpsCallable(name)(payload).then(r=>r.data); }
async function recargarCred(){ const u=auth.currentUser; if(!u) return; try{ const cred=await cargarCredencial(u.uid); if(cred && cred.estado==='ok'){ S.cred=cred; render(); } }catch(_){} }
function fechaTurno(fstr){ const p=String(fstr||'').split('-').map(Number); if(p.length!==3) return String(fstr||''); const dt=new Date(p[0],p[1]-1,p[2]); const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']; return dias[dt.getDay()]+' '+String(p[2]).padStart(2,'0')+'/'+String(p[1]).padStart(2,'0'); }
function turnoSetPara(v){ S.turnoPara=v; render(); }
async function reservarSlot(agendaId,hora){
  if(S.turnoBusy) return;
  const c=S.cred||{}; const para=S.turnoPara||c.personaId;
  S.turnoBusy=true; S.turnoErr=''; S.turnoMsg=''; render();
  try{
    await fnsCall('reservarTurno',{ agendaId, hora, paraPersonaId:para });
    // Nombre para la confirmación (si es un dependiente, el turno NO aparecerá en "Mis turnos" por reglas).
    let nom=''; if(para && para!==c.personaId){ const d=(c.dependientes||[]).find(x=>x.personaId===para); nom=(d&&d.nombreVista)||''; }
    S.turnoBusy=false; S.turnoMsg=nom?('✓ Turno reservado para '+nom+'.'):'✓ Turno reservado.';
    await recargarCred();
  }catch(e){ S.turnoBusy=false; S.turnoErr=(e&&e.message)||'No se pudo reservar el turno.'; render(); }
}
async function cancelarTurnoUI(turnoId){
  if(S.turnoBusy) return;
  if(!confirm('¿Cancelar este turno?')) return;
  S.turnoBusy=true; S.turnoErr=''; S.turnoMsg=''; render();
  try{ await fnsCall('cancelarTurno',{ turnoId }); S.turnoBusy=false; S.turnoMsg='✓ Turno cancelado.'; await recargarCred(); }
  catch(e){ S.turnoBusy=false; S.turnoErr=(e&&e.message)||'No se pudo cancelar el turno.'; render(); }
}

function set(patch){ Object.assign(S, patch); render(); }

/* ===================== HISTORY API — Fase 1b (app socio) =====================
   Mismo patrón que el panel (commit 5958cc5). El routing es en memoria (S.view/render)
   y no escribía historial -> el "atrás" del navegador salía del sitio. Descriptor plano
   mínimo; navPush al ABRIR una vista apilada; los "Volver/Cancelar" internos llaman
   navBack()=history.back; popstate -> navRestore aplica SOLO por las funciones existentes
   (abrir/cerrar). Flag navRestoring para no re-pushear. Solo navegación; cero lógica clínica. */
const APILADAS=['chequeo','reporte','parametros','comprobantes'];
let navRestoring=false;
function navDesc(){ return { v:1, view: (APILADAS.includes(S.view) ? S.view : 'home') }; }
function navPush(){ if(navRestoring) return; try{ history.pushState(navDesc(),''); }catch(_){} }      // al ABRIR (deeper)
function navReplace(){ if(navRestoring) return; try{ history.replaceState(navDesc(),''); }catch(_){} } // base (home/login)
function navBack(){ history.back(); }                                                                  // "Volver/Cancelar" internos
function navRestore(desc){
  // solo dentro de la app (home + apiladas). login/boot/no-afiliado/sin-vinculo/error los maneja onAuthStateChanged.
  if(!S.cred || !(S.view==='home' || APILADAS.includes(S.view))) return;
  navRestoring=true;
  try{
    const target=(desc&&desc.view)||'home';
    // CERRAR la apilada actual si no corresponde (dirección "atrás") — por las funciones existentes
    if(S.view==='chequeo'    && target!=='chequeo')    cerrarChequeo();
    else if(S.view==='reporte'    && target!=='reporte')    cerrarReporte();
    else if(S.view==='parametros' && target!=='parametros') cerrarParams();
    else if(S.view==='comprobantes' && target!=='comprobantes') cerrarComprobantes();
    // ABRIR la apilada del descriptor si estamos en home (dirección "adelante", best-effort).
    // GRACIA: los abrir* tienen guard (cuestionario/personaId); si falta la data NO cambian de vista -> queda home.
    if(S.view==='home' && APILADAS.includes(target)){
      if(target==='chequeo') abrirChequeo();
      else if(target==='reporte') abrirReporte();
      else if(target==='parametros') abrirParams();
      else if(target==='comprobantes') abrirComprobantes();
    }
    render();
  } finally { navRestoring=false; }
}
window.addEventListener('popstate', e=>navRestore(e.state));

/* ---------- Utilidades de credencial ---------- */
function nombreDe(per, u){
  const ap=(per&&per.apellido||'').trim(), no=(per&&per.nombre||'').trim();
  const full=[ap,no].filter(Boolean).join(', ');
  return full || (u&&u.nombre) || 'Socio/a';
}
function fmtDni(d){ const s=String(d||'').replace(/\D/g,''); if(!s) return '—'; return s.replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function tipoLbl(t){ return t==='corporativo'?'Corporativo':(t==='directo'?'Directo':(t||'—')); }
// F3: cuota — MISMA fórmula que app/index.html planPrecioTotal (base + max(0,integrantes-base)*extra).
function socioMoney(n){ const v=Number(n)||0; return '$'+v.toLocaleString('es-AR'); }
function planPrecioTotal(plan, integrantes){
  const base=Number(plan&&plan.precio)||0;
  if(!plan || plan.modeloPrecio!=='por_integrante') return base;
  const extra=Number(plan.precioExtraIntegrante)||0;
  const baseInt=(plan.integrantesBase!=null)?Number(plan.integrantesBase):1;
  return base + Math.max(0,(Number(integrantes)||0)-baseInt)*extra;
}
// F4: "2026-07" → "Julio 2026". Formato inválido → devuelve el crudo.
function periodoLbl(p){
  const m=String(p||'').match(/^(\d{4})-(\d{2})$/); if(!m) return String(p||'—');
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const i=parseInt(m[2],10)-1; return (meses[i]||m[2])+' '+m[1];
}
// Etiqueta del socio, derivada del ESTADO interno (que NO se toca): emitida→FACTURADO (listo para pagar),
// pagada→PAGADO, anulada→ANULADA. "Emitido" (vocabulario interno) desaparece de la vista del socio.
function facBadge(est){
  const m = est==='anulada' ? ['var(--gris)','ANULADA','text-decoration:line-through']
    : est==='pagada' ? ['var(--verde)','PAGADO','']
    : ['var(--tinta)','FACTURADO',''];
  return `<span style="font-size:.58rem;font-weight:800;letter-spacing:.06em;color:${m[0]};${m[2]}">${m[1]}</span>`;
}
// Detalle del comprobante: desglose por item.tipo. 'abono' → "Abono", 'cargo' → "Otras prestaciones".
// Hoy no hay cargos: esa sección se OCULTA (grupoDetalle devuelve '' si el grupo está vacío). No se simula nada.
function comprobanteDetalle(f){
  const items = f.items || [];
  const sum = arr => arr.reduce((s,it)=>s+(Number(it.monto)||0),0);
  const grupo = (titulo, arr) => !arr.length ? '' : `
    <div class="row" style="padding:.45rem 1rem"><span class="rl" style="font-weight:700;color:var(--tinta)">${titulo}</span><span class="rv" style="font-weight:700">${socioMoney(sum(arr))}</span></div>
    ${arr.map(it=>`<div class="row" style="padding:.15rem 1rem .15rem 1.7rem"><span class="rl" style="font-size:.74rem;color:var(--gris)">${esc(it.descripcion||it.tipo||'—')}</span><span class="rv" style="font-size:.74rem;color:var(--gris)">${socioMoney(it.monto)}</span></div>`).join('')}`;
  return `<div style="background:#fafafa">
    ${grupo('Abono', items.filter(it=>it.tipo==='abono'))}
    ${grupo('Otras prestaciones', items.filter(it=>it.tipo==='cargo'))}
    <div class="row" style="padding:.55rem 1rem;border-top:1px solid var(--linea)"><span class="rl" style="font-weight:800;color:var(--tinta)">TOTAL</span><span class="rv" style="font-weight:800">${socioMoney(f.total)}</span></div>
  </div>`;
}
// Fila expandible de un comprobante (nº · período · etiqueta · monto → detalle). Reusada en el home y en el historial.
function comprobanteRow(f){
  const tach = f.estado==='anulada';
  return `<details style="border-bottom:1px solid var(--linea)"><summary style="list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem">
    <span class="rl" style="color:var(--tinta);font-weight:700;${tach?'text-decoration:line-through;color:var(--gris)':''}">${esc(f.nroComprobante||'—')} <span style="font-weight:500;color:var(--gris)">· ${esc(periodoLbl(f.periodo))}</span> ${facBadge(f.estado)}</span>
    <span class="rv" style="${tach?'color:var(--gris);text-decoration:line-through':'font-weight:700'}">${socioMoney(f.total)}</span></summary>
    ${comprobanteDetalle(f)}</details>`;
}
function comprobantesOrdenadas(c){ return (c.facturas||[]).slice().sort((a,b)=> String(b.periodo||'').localeCompare(String(a.periodo||'')) || String(b.nroComprobante||'').localeCompare(String(a.nroComprobante||''))); }
function abrirComprobantes(){ if(!S.cred) return; S.view='comprobantes'; render(); navPush(); }
function cerrarComprobantes(){ S.view='home'; render(); }
function comprobantesFullView(){
  const c = S.cred || {};
  const fac = comprobantesOrdenadas(c);
  const rows = fac.length ? fac.map(comprobanteRow).join('') : `<div style="padding:.9rem 1rem;font-size:.82rem;color:var(--gris)">Todavía no tenés comprobantes.</div>`;
  return `<div class="home">
    <div class="topbar">${chv(16)}<div class="tb-t" style="margin-left:.4rem">Mis comprobantes</div><div class="tb-sp"></div><button class="mini" onclick="navBack()">Volver</button></div>
    <div class="sec"><div class="card">${rows}
      <div style="padding:.75rem 1rem;font-size:.7rem;color:var(--gris);line-height:1.45;border-top:1px solid var(--linea)">Comprobantes internos de tu cuenta — no son facturas fiscales. Tocá uno para ver el detalle. Los pagos se coordinan con MEDICAR.</div>
    </div></div>
  </div>`;
}

/* ---------- Monitoreo N1: fechas y estado del chequeo semanal ---------- */
function tsMs(t){ if(!t) return null; if(t.toMillis) return t.toMillis(); if(t.seconds!=null) return t.seconds*1000; if(typeof t==='number') return t; return null; }
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function startOfDay(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
function prefDateThisWeekMs(prefDay){
  const now=new Date();
  const weekStart=startOfDay(now.getTime()) - now.getDay()*86400000; // domingo 00:00 de esta semana
  return weekStart + (prefDay||0)*86400000;
}
// c = credencial ok. Regla: hay cuestionario activo Y no respondió en los últimos 7 días Y hoy >= su día
// preferido de esta semana -> pendiente. nextMs = próxima fecha de chequeo.
function chequeoEstado(c){
  if(!c || !c.cuestionario) return { activo:false, pending:false };
  const now=Date.now();
  const dueMs=prefDateThisWeekMs(c.prefDay||0);
  const answered7 = c.lastRespMs!=null && (now - c.lastRespMs) < 7*86400000;
  const llegoElDia = now >= dueMs;
  const pending = !answered7 && llegoElDia;
  const nextMs = (now>=dueMs) ? dueMs + 7*86400000 : dueMs;
  return { activo:true, pending, answered7, dueMs, nextMs };
}
function fmtFecha(ms){ if(ms==null) return '—'; const d=new Date(ms); return DIAS[d.getDay()]+' '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2); }

/* ---------- WHO-5 (Índice de Bienestar OMS) — MÓDULO SELLADO, redacción oficial ----------
   Versión oficial en español (OMS · WHO-5, versión 1998), alojada por la OMS (cdn.who.int) —
   © Psychiatric Research Unit, WHO Collaborating Center for Mental Health, Hillerød. Redacción VERBATIM.
   NO editable desde el armador (el armador solo tiene un flag incluirWHO5). El encabezado temporal
   "durante las últimas dos semanas" SE MANTIENE textual (parte de la validación), aunque el chequeo sea
   semanal. Corregidos 2 typos evidentes del PDF oficial (flaggeados a la dirección médica): encabezado
   "la últimas"→"las últimas", ítem 4 "descandado"→"descansado". */
const WHO5 = {
  intro: 'Por favor, indicá para cada una de las cinco afirmaciones cuál define mejor cómo te has sentido durante las últimas dos semanas. Cifras mayores significan mayor bienestar.',
  encabezado: 'Durante las últimas dos semanas:',
  items: [
    'Me he sentido alegre y de buen humor',
    'Me he sentido tranquilo y relajado',
    'Me he sentido activo y enérgico',
    'Me he despertado fresco y descansado',
    'Mi vida cotidiana ha estado llena de cosas que me interesan'
  ],
  // Escala oficial de 6 opciones (valor 5..0, labels verbatim).
  opciones: [ [5,'Todo el tiempo'], [4,'La mayor parte del tiempo'], [3,'Más de la mitad del tiempo'], [2,'Menos de la mitad del tiempo'], [1,'De vez en cuando'], [0,'Nunca'] ],
  copyright: '© Psychiatric Research Unit, WHO Collaborating Center for Mental Health, Frederiksborg General Hospital, DK-3400 Hillerød',
  UMBRAL: 52 // score < 52 = bienestar bajo (raw < 13 ×4); indicación de evaluación — fuente OMS
};
// Heurística de regularidad (documentada): ≥1 respuesta histórica Y (última > 14 días O ≤2 de las últimas 4 semanas).
function regularidadFloja(c){
  if(!c || !(c.histCount>=1)) return false;
  const now=Date.now();
  const masDe14 = c.lastRespMs!=null && (now-c.lastRespMs) > 14*86400000;
  const pocas4wk = (c.respLast4wk||0) <= 2;
  return masDe14 || pocas4wk;
}

/* ---------- NEWS2 PARCIAL — fuente Royal College of Physicians — BORRADOR firma médica ----------
   Tabla SELLADA (4 de 6 parámetros; los demás NO medidos → NEWS2 PARCIAL explícito). BORRADOR: adoptar
   como disparador de alerta SOLO tras firma de la dirección médica de MEDICAR (ver Doctrina-Alertas-Clinicas).
   SALVAGUARDA de la fuente: parámetro faltante NO es 0, es DATO FALTANTE → score PARCIAL, nunca un agregado
   bajo falsamente tranquilizador. Subscore null = no medido. */
function news2FC(v){   if(v==null) return null; if(v<=40)return 3; if(v<=50)return 2; if(v<=90)return 0; if(v<=110)return 1; if(v<=130)return 2; return 3; } // ≤40/≥131=3 · 41-50/111-130=2 · 91-110=1 · 51-90=0
function news2SIS(v){  if(v==null) return null; if(v<=90)return 3; if(v<=100)return 2; if(v<=110)return 1; if(v<=219)return 0; return 3; } // ≤90/≥220=3 · 91-100=2 · 101-110=1 · 111-219=0
function news2TEMP(v){ if(v==null) return null; if(v<=35.0)return 3; if(v<=36.0)return 1; if(v<=38.0)return 0; if(v<=39.0)return 1; return 2; } // ≤35.0=3 · ≥39.1=2 · 35.1-36.0/38.1-39.0=1 · 36.1-38.0=0
function news2SPO2(v){ if(v==null) return null; if(v<=91)return 3; if(v<=93)return 2; if(v<=95)return 1; return 0; } // ≤91=3 · 92-93=2 · 94-95=1 · ≥96=0 (escala 1)
// calcularNEWS2(fc, sis, temp, spo2) -> {score, parcial, redScore, subscores:{fc,sis,temp,spo2}, nivel}.
function calcularNEWS2(fc, sis, temp, spo2){
  const s = { fc:news2FC(fc), sis:news2SIS(sis), temp:news2TEMP(temp), spo2:news2SPO2(spo2) };
  const presentes = [s.fc, s.sis, s.temp, s.spo2].filter(x=>x!=null);
  const score = presentes.reduce((a,b)=>a+b, 0);
  const parcial = presentes.length < 4;           // falta al menos 1 de los 4 → PARCIAL (salvaguarda)
  const redScore = presentes.some(x=>x===3);       // cualquier parámetro en 3 = RED SCORE (Royal College)
  let nivel;
  if(score>=7) nivel='alto';                       // 7+ alto
  else if(score>=5) nivel='medio';                 // 5-6 medio
  else if(redScore) nivel='bajo-medio';            // 0-4 con un solo 3 = bajo-medio (RED SCORE)
  else nivel='bajo';                               // 0-4 sin rojos = bajo
  return { score, parcial, redScore, subscores:s, nivel };
}

/* ---------- Carga de datos del socio ---------- */
async function cargarCredencial(uid){
  const uDoc = await db.collection('usuarios').doc(uid).get();
  if(!uDoc.exists) return { estado:'sin-vinculo', u:null };
  const u = uDoc.data();
  // Multi-rol (espejo de /app/): quien tiene 'afiliado' se queda acá (incluido el doble-rol afiliado+staff).
  // Staff PURO (sin afiliado) → redirige silencioso a /app/ (en vez del cartel noAfiliadoView). Sin loop:
  // /app/ solo manda a /socio/ al afiliado-PURO, así que un staff-puro rebotado acá se queda en /app/.
  const roles = (Array.isArray(u.roles)&&u.roles.length) ? u.roles.filter(Boolean) : (u.rol?[u.rol]:[]);
  const STAFF = ['medico','despachante','admin','chofer','contable','superadmin'];
  if(!roles.includes('afiliado')){
    if(roles.some(r=>STAFF.includes(r))) return { estado:'staff', u }; // → /app/
    return { estado:'no-afiliado', u };                                 // sin rol válido → cartel honesto (no redirige, no loop)
  }
  const personaId = u.personaId;
  if(!personaId) return { estado:'sin-vinculo', u };

  // Identidad (persona)
  let per = {};
  try{ const p = await db.collection('personas').doc(personaId).get(); if(p.exists) per = p.data(); }catch(_){}

  // Afiliación (socio por personaId; se prefiere la activa)
  let socio = null;
  try{
    const snap = await db.collection('socios').where('personaId','==',personaId).get();
    if(!snap.empty){
      const arr = snap.docs.map(d=>({id:d.id, ...d.data()}));
      socio = arr.find(s=>s.activo!==false) || arr[0];
    }
  }catch(_){}

  // Plan (catálogo) — objeto completo (para la cuota) + nombre.
  let plan = null, planNombre = '';
  if(socio && socio.planId){
    try{ const pl = await db.collection('planes').doc(socio.planId).get(); if(pl.exists){ plan = pl.data(); planNombre = plan.nombre || ''; } }catch(_){}
  }

  // F3: grupo familiar — dependientes cuyo titular es esta persona (F2 habilita la lectura por titularPersonaId).
  let dependientes = [];
  if(personaId){
    try{ const dep = await db.collection('socios').where('titularPersonaId','==',personaId).get(); dependientes = dep.docs.map(d=>({id:d.id, ...d.data()})); }catch(_){}
  }

  // (El socio ya NO ve abonos: la vista de cuenta es por comprobantes/facturas. Se dejó de cargar c.abonos.)

  // F3: comprobantes — la factura lleva el personaId de la persona facturada (regla F-3 habilita la lectura).
  let facturas = [];
  if(personaId){
    try{ const fc = await db.collection('facturas').where('personaId','==',personaId).get(); facturas = fc.docs.map(d=>({id:d.id, ...d.data()})); }catch(_){}
  }

  // F5: turnos — franjas activas (la ventana real la enforca la CF; acá se filtra en la UI) + MIS turnos
  // (personaId propio; por reglas el titular NO lee los turnos de sus dependientes → solo los ve como slot tomado).
  let agenda = [], misTurnos = [];
  if(personaId){
    try{ const ag = await db.collection('agenda_turnos').where('activa','==',true).get(); agenda = ag.docs.map(d=>({id:d.id, ...d.data()})); }catch(_){}
    try{ const tt = await db.collection('turnos').where('personaId','==',personaId).get(); misTurnos = tt.docs.map(d=>({id:d.id, ...d.data()})); }catch(_){}
  }

  // Monitoreo N1: cuestionario ACTIVO (si hay varios, el más reciente) + última respuesta de esta persona.
  let cuestionario = null;
  try{
    const cs = await db.collection('cuestionarios').where('activo','==',true).get();
    if(!cs.empty){
      const arr = cs.docs.map(d=>({id:d.id, ...d.data()}));
      arr.sort((a,b)=> (tsMs(b.creadoEn)||0) - (tsMs(a.creadoEn)||0));
      cuestionario = arr[0];
    }
  }catch(_){}
  let lastRespMs = null, histCount = 0, respLast4wk = 0;
  try{
    const now = Date.now();
    const rs = await db.collection('respuestas_cuestionario').where('personaId','==',personaId).get();
    rs.docs.forEach(d=>{
      const ms=tsMs(d.data().creadoEn);
      histCount++;
      if(ms!=null){
        if(lastRespMs==null || ms>lastRespMs) lastRespMs=ms;
        if((now-ms) <= 28*86400000) respLast4wk++; // respuestas en las últimas 4 semanas (regularidad)
      }
    });
  }catch(_){}
  const prefDay = (typeof u.prefRecordatorio==='number' && u.prefRecordatorio>=0 && u.prefRecordatorio<=6) ? u.prefRecordatorio : 0;

  // N2 (Etapa 30): catálogo de síntomas activo, para el auto-reporte (ordenado).
  let sintomas = [];
  try{
    const sc = await db.collection('sintomas_catalogo').where('activo','==',true).get();
    sintomas = sc.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>((a.orden||0)-(b.orden||0)));
  }catch(_){}

  return { estado:'ok', u, per, socio, plan, planNombre, dependientes, facturas, agenda, misTurnos, personaId, cuestionario, lastRespMs, prefDay, histCount, respLast4wk, sintomas };
}

auth.onAuthStateChanged(async user => {
  if(!user){ set({ view:'login', cred:null, busy:false }); navReplace(); return; }
  set({ view:'boot' });
  try{
    const cred = await cargarCredencial(user.uid);
    if(cred.estado === 'staff'){ window.location.replace('../app/'); return; } // staff puro → panel, silencioso (espejo de /app/)
    if(cred.estado === 'no-afiliado'){ set({ view:'no-afiliado', cred }); return; }
    if(cred.estado === 'sin-vinculo'){ set({ view:'sin-vinculo', cred }); return; }
    set({ view:'home', cred }); navReplace();
  }catch(e){
    set({ view:'error-carga', err:(e&&e.message)||String(e) });
  }
});

async function doLogin(){
  if(S.busy) return;
  const email=(el('em')?.value||'').trim();
  const pw=el('pw')?.value||'';
  if(!email || !pw){ set({ err:'Ingresá tu email y contraseña.' }); return; }
  set({ busy:true, err:'' });
  try{
    await auth.signInWithEmailAndPassword(email, pw);
    // onAuthStateChanged toma el control.
  }catch(e){
    const code=(e&&e.code)||'';
    const msg = /wrong-password|user-not-found|invalid-credential|invalid-email/.test(code)
      ? 'Email o contraseña incorrectos.'
      : (/too-many-requests/.test(code) ? 'Demasiados intentos. Probá más tarde.' : 'No se pudo ingresar. Revisá tu conexión.');
    set({ busy:false, err:msg });
  }
}

/* Categorías de presentación (color/tag). 'cat' viene del doc (asignada por la CF según la fuente). */
const FEED_CAT = {
  medicar:{ lbl:'MEDICAR',      tag:'tag-medicar', band:'linear-gradient(135deg,#ED1C24,#C8151C)' },
  salud:  { lbl:'Cuidado',      tag:'tag-salud',   band:'linear-gradient(135deg,#2E8B57,#1f7a4d)' },
  nutri:  { lbl:'Alimentación', tag:'tag-nutri',   band:'linear-gradient(135deg,#F7941E,#e07d0a)' },
  vida:   { lbl:'Vida',         tag:'tag-vida',    band:'linear-gradient(135deg,#6C5CE7,#5A4BD1)' }
};
// Carga LAZY one-shot (NO onSnapshot: el feed cambia ~1 vez/día tras curaduría). Índice estado+fechaFuente ya en prod.
async function feedLoad(){
  if(S.feedLoading) return; S.feedLoading=true;
  try{
    const snap=await db.collection('feed_posts').where('estado','==','publicado').orderBy('fechaFuente','desc').limit(12).get();
    S.feed=snap.docs.map(d=>d.data());
  }catch(e){ S.feed=[]; console.warn('[feed] no se pudo cargar:', e); }
  S.feedLoading=false; render();
}
// PWA-2c: cualquier post CON link es tocable (incluida una novedad interna con nota detrás). Sin link → no-op.
function feedAbrir(i){
  const p=(S.feed||[])[i]; if(!p || !p.link) return;
  window.open(p.link, '_blank', 'noopener'); // mandar al sitio (para laopinion, devuelve tráfico al diario)
}
function homeFeedBlock(){
  if(S.feed===undefined){ feedLoad(); return ''; } // aún sin cargar → dispara la carga; se re-renderiza al llegar
  if(!S.feed.length) return '';                     // sin publicados → OCULTAR la sección entera (sin placeholder)
  const posts = S.feed.map((p,i)=>{
    const cc = FEED_CAT[p.cat] || FEED_CAT.medicar;
    const tappable = !!p.link; // interno con link también es tocable
    const fondo = p.imagenUrl ? `url('${esc(p.imagenUrl)}')` : cc.band; // con foto → la foto; sin foto → banda de color
    return `<article class="post${tappable?' tappable':''}"${tappable?` onclick="feedAbrir(${i})"`:''}>
      <div class="ph-img" style="background-image:${fondo}"></div>
      <div class="ph-body">
        <span class="tagp ${cc.tag}">${esc(cc.lbl)}</span>
        <h5>${esc(p.titulo)}</h5>
        <p>${esc(p.bajada||'')}</p>
        <div class="meta">${esc(p.fuenteNombre||'')}</div>
      </div>
    </article>`;
  }).join('');
  return `<div class="feed">
    <div class="feed-h"><b>Para vos</b><svg class="tres" width="30" height="15" viewBox="0 0 120 60"><rect x="6" y="16" width="108" height="7" rx="3.5" fill="#ED1C24"/><rect x="28" y="30" width="86" height="7" rx="3.5" fill="#ED1C24"/><rect x="50" y="44" width="64" height="7" rx="3.5" fill="#ED1C24"/></svg></div>
    ${posts}
  </div>`;
}

async function guardarPref(v){
  const day=parseInt(v,10); if(isNaN(day)||day<0||day>6) return;
  const uid=auth.currentUser&&auth.currentUser.uid; if(!uid) return;
  if(S.cred) S.cred.prefDay=day; // optimista
  render();
  try{ await db.collection('usuarios').doc(uid).set({ prefRecordatorio:day },{merge:true}); }
  catch(e){ console.warn('[pref] no se pudo guardar', e); }
}

  }

    let ctrl='';
    if(p.tipo==='si_no'){
      const mk=(val,lbl)=>`<button type="button" class="opt ${A[p.id]===val?'on':''}" onclick="chkSet('${p.id}',${val})">${lbl}</button>`;
      ctrl=`<div class="opt-row">${mk(true,'Sí')}${mk(false,'No')}</div>`;

    }
    return `<div class="sec" style="margin-top:1rem"><div class="q">${i+1}. ${esc(p.texto||'')}</div>${ctrl}</div>`;
  }).join('');

  const ped=!!(S.chk&&S.chk.pedido);
  const contacto=`<div class="sec" style="margin-top:1.3rem">
    <button type="button" class="opt wide ${ped?'on':''}" onclick="chkTogglePedido()"><span style="display:flex;align-items:center;gap:.6rem"><span class="chk">${ped?'✓':''}</span>Me gustaría que un médico de MEDICAR me contacte</span></button>
    ${ped?`<input id="chk-motivo" maxlength="200" value="${esc((S.chk&&S.chk.motivo)||'')}" placeholder="Motivo (opcional)" style="width:100%;margin-top:.5rem;padding:.65rem .8rem;border:1.5px solid var(--linea);border-radius:12px;font-size:.9rem;background:var(--nieve)">`:''}

    <button class="btn-r" style="margin-top:.9rem" onclick="enviarChequeo()">${S.chk&&S.chk.busy?'Enviando…':'Enviar'}${S.chk&&S.chk.busy?'':chv(14,'cw')}</button>
    <button class="btn-o" style="margin-top:.6rem" onclick="navBack()">Cancelar</button>
    <div class="footer"><div class="foot-note">Se registra una sola vez por semana.</div></div>
  </div>`;
}
async function enviarChequeo(){
  const c=S.cred||{}; const q=c.cuestionario; if(!q||!S.chk||S.chk.busy) return;
  chkSyncText();
  const A=S.chk.answers||{};
  // WHO-5 (si incluido): las 5 afirmaciones son obligatorias.
  if(q.incluirWHO5){
    const w=S.chk.who5||[];
    if(w.length!==5 || w.some(v=>v===null||v===undefined)){ S.chk.err='Respondé las 5 afirmaciones del Índice de Bienestar (OMS).'; render(); return; }
  }
  // si_no y escala obligatorias; texto opcional.
  const faltan=(q.preguntas||[]).filter(p=> (p.tipo==='si_no'||p.tipo==='escala') && (A[p.id]===undefined||A[p.id]===null));
  if(faltan.length){ S.chk.err='Respondé todas las preguntas (el texto es opcional).'; render(); return; }
  const respuestas=(q.preguntas||[]).map(p=>({ preguntaId:p.id, texto:p.texto||'', valor:(A[p.id]!==undefined?A[p.id]:'') }));
  const payload={
    cuestionarioId:q.id, cuestionarioNombre:q.nombre||'',
    personaId:c.personaId, personaNombre:nombreDe(c.per,c.u),
    personaTelefono: (c.per && c.per.telefono) || '', // denorm (Etapa 31): el médico llama sin leer /personas
    respuestas,
    pedidoContacto: !!S.chk.pedido,
    motivoContacto: (S.chk.pedido && (S.chk.motivo||'').trim()) ? (S.chk.motivo||'').trim().slice(0,200) : null,
    creadoEn: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(q.incluirWHO5){
    const valores=S.chk.who5.map(v=>Number(v)||0);
    const raw=valores.reduce((a,b)=>a+b,0);
    payload.who5={ valores, raw, score: raw*4 }; // raw 0-25 → score 0-100 (raw×4)
  }
  S.chk.busy=true; S.chk.err=''; render();
  try{
    await db.collection('respuestas_cuestionario').add(payload);
    if(S.cred){ S.cred.lastRespMs=Date.now(); S.cred.histCount=(S.cred.histCount||0)+1; S.cred.respLast4wk=(S.cred.respLast4wk||0)+1; }
    S.chk=null; S.view='home'; render(); navReplace(); // cierra el entry del chequeo tras enviar
  }catch(e){
    // Feedback claro al socio, sin detalles técnicos. El botón queda re-habilitado (busy=false).
    console.warn('[chequeo] no se pudo enviar:', e);
    S.chk.busy=false;
    S.chk.err='No pudimos enviar tu chequeo. Probá de nuevo en un momento.';
    render();
  }
}

    <div class="topbar">${chv(16)}<div class="tb-t" style="margin-left:.4rem">Reportar un síntoma</div><div class="tb-sp"></div><button class="mini" onclick="navBack()">Cerrar</button></div>
    <div style="font-size:.85rem;color:var(--gris);line-height:1.45">Marcá lo que sentís y contanos con tus palabras. Un médico de MEDICAR lo revisa.</div>
    <div class="sec" style="margin-top:1rem"><div class="sec-h">¿Qué sentís?</div>${sintHtml}</div>
    <div class="sec" style="margin-top:1rem"><div class="sec-h">Contanos qué te pasa</div>
      <textarea id="rpt-texto" maxlength="300" rows="3" placeholder="Escribí acá (opcional, máx. 300)" style="width:100%;padding:.75rem .8rem;border:1.5px solid var(--linea);border-radius:12px;font-size:.95rem;font-family:inherit;resize:vertical;background:var(--nieve)">${esc((S.rpt&&S.rpt.texto)||'')}</textarea></div>
    <div class="err ${S.rpt&&S.rpt.err?'on':''}" style="margin-top:1rem">${esc(S.rpt&&S.rpt.err||'')}</div>
    <button class="btn-r" style="margin-top:.9rem" onclick="enviarReporte()">${S.rpt&&S.rpt.busy?'Enviando…':'Enviar reporte'}${S.rpt&&S.rpt.busy?'':chv(14,'cw')}</button>
    <button class="btn-o" style="margin-top:.6rem" onclick="navBack()">Cancelar</button>
    <div class="footer"><div class="foot-note">Ante una emergencia, llamá directo al ${TEL_EMERG}.</div></div>
  </div>`;
}
async function enviarReporte(){
  const c=S.cred||{}; if(!S.rpt||S.rpt.busy||!c.personaId) return;
  rptSyncTexto();
  const seleccionados=(c.sintomas||[]).filter(s=>S.rpt.sel[s.id]);
  const texto=(S.rpt.texto||'').trim().slice(0,300);
  if(!seleccionados.length && !texto){ S.rpt.err='Marcá al menos un síntoma o contanos qué te pasa.'; render(); return; }
  const sintomas=seleccionados.map(s=>({ id:s.id, nombre:s.nombre||'', banderaRoja:s.banderaRoja===true }));
  const tieneBanderaRoja=sintomas.some(s=>s.banderaRoja);
  S.rpt.busy=true; S.rpt.err=''; render();
  try{
    await db.collection('reportes_sintomas').add({
      personaId:c.personaId, personaNombre:nombreDe(c.per,c.u),
      personaTelefono: (c.per && c.per.telefono) || '', // denorm (Etapa 31): el médico llama sin leer /personas
      sintomas, texto, tieneBanderaRoja,
      creadoEn: firebase.firestore.FieldValue.serverTimestamp()
    });
    S.rpt.busy=false; S.rpt.done={ tieneBanderaRoja }; render();
  }catch(e){
    console.warn('[reporte] no se pudo enviar:', e);
    S.rpt.busy=false; S.rpt.err='No pudimos enviar tu reporte. Probá de nuevo en un momento.'; render();
  }
}

/* ---------- Registrar mis signos (Monitoreo N3 — parámetros medidos) ---------- */
// Rangos de tipeo sano (rechazan errores groseros; NO son el juicio clínico, eso es NEWS2).
const PARAMS = [
  { k:'fc',   lbl:'Frecuencia cardíaca', uni:'lpm',  min:20, max:250, step:'1' },
  { k:'sis',  lbl:'Presión sistólica',   uni:'mmHg', min:50, max:300, step:'1' },
  { k:'temp', lbl:'Temperatura',         uni:'°C',   min:30, max:44,  step:'0.1' },
  { k:'spo2', lbl:'Saturación (SpO₂)',   uni:'%',    min:50, max:100, step:'1' }
];
/* PWA-1: textos educativos GENÉRICOS por signo (botón "i"). Contenido FIJO, idéntico para todos, indiferente
   al valor tipeado. N3 INVIOLABLE: NO rangos ni valores de corte, NO interpretar los datos del socio, solo
   "qué es" + técnica de medición (sin números). El semáforo verde/amarillo de enviarParams es el ÚNICO feedback.
   // PENDIENTE REVISIÓN DIRECTOR MÉDICO — pre-lanzamiento (misma tanda del catálogo clínico). */
const SIGNOS_INFO = {
  fc:   { titulo:'Frecuencia cardíaca', queEs:'Es la cantidad de veces que late tu corazón por minuto.', comoMedirlo:'Sentate y descansá unos minutos antes de medir. Apoyá dos dedos sobre la muñeca o el costado del cuello hasta sentir el pulso y contá los latidos. Evitá medir justo después de un esfuerzo, del café o del cigarrillo.' },
  sis:  { titulo:'Presión arterial (sistólica)', queEs:'Es la fuerza con la que la sangre empuja las paredes de tus arterias cuando el corazón late.', comoMedirlo:'Sentate con la espalda apoyada y los pies en el piso, sin cruzar las piernas. Apoyá el brazo relajado a la altura del corazón. Quedate quieto y en silencio mientras el tensiómetro mide. Evitá café o cigarrillo en la media hora previa.' },
  temp: { titulo:'Temperatura corporal', queEs:'Es el calor de tu cuerpo, una señal de cómo está funcionando.', comoMedirlo:'Usá el termómetro en el lugar que indique su instrucción (axila, boca u oído). Si es axilar, secá la piel y mantené el brazo pegado al cuerpo hasta que el termómetro avise. Evitá medir apenas salís de bañarte o después de bebidas muy frías o calientes.' },
  spo2: { titulo:'Saturación de oxígeno (SpO₂)', queEs:'Indica cuánto oxígeno está transportando tu sangre.', comoMedirlo:'Colocá el oxímetro en la punta de un dedo limpio, sin esmalte y que no esté frío. Apoyá la mano y quedate quieto unos segundos hasta que el número se estabilice. Si tenés las manos frías, entibiálas antes de medir.' }
};
function homeParamsBlock(c){
  return `<div class="sec">
    <div class="sec-h">Registrar mis signos</div>
    <button class="tile" onclick="abrirParams()">
      <span class="tile-ic">🩺</span>
      <span class="tile-tx"><span class="tile-t">Registrar mis signos</span><span class="tile-s">Pulso, presión, temperatura, oxígeno — si podés medirlos en casa.</span></span>
      <span class="tile-go">${chv(15)}</span>
    </button>
  </div>`;
}
function abrirParams(){
  if(!S.cred || !S.cred.personaId) return;
  S.par={ vals:{}, err:'', busy:false, done:null };
  S.view='parametros'; render(); navPush();
}
function cerrarParams(){ S.par=null; S.view='home'; render(); }
function parSync(){ if(!S.par) return; PARAMS.forEach(p=>{ const e=el('par-'+p.k); if(e) S.par.vals[p.k]=e.value; }); }
// PWA-1: popover educativo del botón "i". DOM PURO: NO llama render() ni toca S.par → no pierde lo tipeado.
// Solo lee SIGNOS_INFO (contenido fijo). Cierra por tap afuera, por ✕ y por Escape. Foco al abrir.
function signoInfoAbrir(k){
  const info=SIGNOS_INFO[k]; if(!info) return;
  signoInfoCerrar();
  const ov=document.createElement('div');
  ov.id='sig-info-ov'; ov.className='sig-ov';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true'); ov.setAttribute('aria-label',info.titulo);
  ov.innerHTML=`<div class="sig-sheet">
      <div class="sig-sheet-h"><b>${esc(info.titulo)}</b><button type="button" class="sig-close" aria-label="Cerrar" onclick="signoInfoCerrar()">✕</button></div>
      <div class="sig-sec"><div class="sig-sec-t">Qué es</div><div class="sig-sec-b">${esc(info.queEs)}</div></div>
      <div class="sig-sec"><div class="sig-sec-t">Cómo medirlo</div><div class="sig-sec-b">${esc(info.comoMedirlo)}</div></div>
    </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) signoInfoCerrar(); });       // tap fuera del sheet
  ov.addEventListener('keydown', e=>{ if(e.key==='Escape') signoInfoCerrar(); });   // accesibilidad
  document.body.appendChild(ov);
  const c=ov.querySelector('.sig-close'); if(c) c.focus();
}
function signoInfoCerrar(){ const ov=document.getElementById('sig-info-ov'); if(ov) ov.remove(); }
function paramsFormView(){
  // Confirmación tras enviar — SEMÁFORO SUAVE (verde/amarillo). NUNCA score, "rojo", ni diagnóstico.
  if(S.par&&S.par.done){
    const amar = S.par.done.nivel!=='bajo'; // bajo=verde; bajo-medio/medio/alto=amarillo
    const box = amar
      ? `<div class="result warn">
          <div class="result-t" style="color:#8a5a10">Registramos tus valores</div>
          <div class="result-s" style="color:#7a5210">Un médico de MEDICAR podría contactarte. Si no te sentís bien o es una emergencia, llamá al <b>${TEL_EMERG}</b>.</div>
          <a href="tel:${TEL_EMERG}" class="call">${IC.phone}<span>Llamar al ${TEL_EMERG}</span></a>
        </div>`
      : `<div class="result ok">
          <div class="result-t" style="color:var(--verde)">Tus valores están en rango ✓</div>
          <div class="result-s" style="color:var(--ink2)">Gracias por registrar.</div>
        </div>`;
    return `<div class="home">
      <div class="topbar">${chv(16)}<div class="tb-t" style="margin-left:.4rem">Signos registrados</div><div class="tb-sp"></div><button class="mini" onclick="navBack()">Volver</button></div>
      ${box}
      <div class="footer"><div class="foot-note">Tus valores quedaron registrados para tu equipo médico.</div></div>
    </div>`;
  }
  const v=(S.par&&S.par.vals)||{};
  const inputs=PARAMS.map(p=>`<div class="field" style="margin-top:.9rem"><label style="display:flex;align-items:center;gap:.35rem">${p.lbl} · ${p.uni}<button type="button" class="sig-i" aria-label="Información sobre ${esc(p.lbl)}" onclick="signoInfoAbrir('${p.k}')">i</button></label>
    <input id="par-${p.k}" type="number" inputmode="decimal" step="${p.step}" min="${p.min}" max="${p.max}" value="${esc(v[p.k]||'')}" placeholder="opcional"></div>`).join('');
  return `<div class="home">
    <div class="topbar">${chv(16)}<div class="tb-t" style="margin-left:.4rem">Registrar mis signos</div><div class="tb-sp"></div><button class="mini" onclick="navBack()">Cerrar</button></div>
    <div style="font-size:.85rem;color:var(--gris);line-height:1.45">Cargá los que puedas medir (al menos uno). Los que no midas, dejalos vacíos.</div>
    ${inputs}
    <div class="err ${S.par&&S.par.err?'on':''}" style="margin-top:1rem">${esc(S.par&&S.par.err||'')}</div>
    <button class="btn-r" style="margin-top:.9rem" onclick="enviarParams()">${S.par&&S.par.busy?'Enviando…':'Enviar'}${S.par&&S.par.busy?'':chv(14,'cw')}</button>
    <button class="btn-o" style="margin-top:.6rem" onclick="navBack()">Cancelar</button>
    <div class="footer"><div class="foot-note">Ante una emergencia, llamá directo al ${TEL_EMERG}.</div></div>
  </div>`;
}
async function enviarParams(){
  const c=S.cred||{}; if(!S.par||S.par.busy||!c.personaId) return;
  parSync();
  // Parseo + validación de rango de tipeo. Vacío → null (no medido). Fuera de rango → error.
  const parsed={}; let algun=false, invalido=null;
  for(const p of PARAMS){
    const raw=(S.par.vals[p.k]||'').trim();
    if(raw===''){ parsed[p.k]=null; continue; }
    const n=Number(raw);
    if(isNaN(n) || n<p.min || n>p.max){ invalido=p; break; }
    parsed[p.k]=n; algun=true;
  }
  if(invalido){ S.par.err=`Revisá ${invalido.lbl}: tiene que estar entre ${invalido.min} y ${invalido.max} ${invalido.uni}.`; render(); return; }
  if(!algun){ S.par.err='Cargá al menos un valor.'; render(); return; }
  const n2=calcularNEWS2(parsed.fc, parsed.sis, parsed.temp, parsed.spo2);
  S.par.busy=true; S.par.err=''; render();
  try{
    await db.collection('chequeos_parametros').add({
      personaId:c.personaId, personaNombre:nombreDe(c.per,c.u),
      personaTelefono: (c.per && c.per.telefono) || '',
      fc:parsed.fc, sis:parsed.sis, temp:parsed.temp, spo2:parsed.spo2,
      news2Score:n2.score, news2Parcial:n2.parcial, news2RedScore:n2.redScore, news2Nivel:n2.nivel,
      creadoEn: firebase.firestore.FieldValue.serverTimestamp()
    });
    S.par.busy=false; S.par.done={ nivel:n2.nivel }; render(); // done SOLO lleva el nivel para el semáforo suave
  }catch(e){
    console.warn('[parametros] no se pudo enviar:', e);
    S.par.busy=false; S.par.err='No pudimos registrar tus valores. Probá de nuevo en un momento.'; render();
  }
}

function render(){
  const root=el('app'); if(!root) return;
  let html='';
  switch(S.view){
    case 'login': html=loginView(); break;
    case 'no-afiliado': html=noAfiliadoView(); break;
    case 'sin-vinculo': html=sinVinculoView(); break;
    case 'error-carga': html=errorCargaView(); break;
    case 'home': html=homeView(); break;
    case 'chequeo': html=chequeoFormView(); break;
    case 'reporte': html=reporteFormView(); break;
    case 'parametros': html=paramsFormView(); break;
    case 'comprobantes': html=comprobantesFullView(); break;
    default: html=bootView();
  }
  root.innerHTML=html;
  // Enter para enviar el login.
  const pw=el('pw'); if(pw){ pw.onkeydown=e=>{ if(e.key==='Enter') doLogin(); }; }
  const em=el('em'); if(em){ em.onkeydown=e=>{ if(e.key==='Enter') el('pw')?.focus(); }; }
}

render();

/* ---------- Service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('[sw] no se registró:', err));
  });
}
</script>
</body>
