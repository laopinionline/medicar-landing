<style>
:root{
  --r:#DC1400; --r-dk:#B01000; --o:#F07800;
  --bg:#F0EDE7; --card:#FFFFFF; --dark:#141414;
  --ink:#1A1A1A; --ink2:#555555; --ink3:#999999;

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100svh;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none}
input{font-family:inherit}

/* ---------- LOGIN ---------- */
.login{flex:1;display:flex;flex-direction:column;background:var(--dark);position:relative;overflow:hidden}
.login-bg{position:absolute;right:-2rem;top:-1rem;font-size:9rem;font-weight:800;color:rgba(255,255,255,.04);letter-spacing:-.05em;pointer-events:none}
.login-top{padding:3.2rem 1.6rem 1.6rem;position:relative;z-index:1}
.login-logo{width:64px;height:64px;border-radius:16px;display:block}
.login-h1{color:#fff;font-size:1.7rem;font-weight:800;margin-top:1rem;letter-spacing:-.02em}
.login-h1 em{color:var(--r);font-style:normal}
.login-sub{color:rgba(255,255,255,.55);font-size:.86rem;margin-top:.25rem}
.sheet{background:var(--bg);border-radius:22px 22px 0 0;margin-top:auto;padding:1.7rem 1.6rem calc(1.6rem + env(safe-area-inset-bottom));position:relative;z-index:1}
.sheet h2{font-size:1.15rem;font-weight:800;margin-bottom:1rem}

.field input{width:100%;padding:.8rem .9rem;border:1.5px solid var(--line);border-radius:12px;font-size:1rem;background:#fff;outline:none}

.err{display:none;background:#FDECEC;color:#B01000;font-size:.82rem;font-weight:600;padding:.6rem .75rem;border-radius:10px;margin-bottom:.8rem}

.mini{background:none;color:var(--ink3);font-size:.78rem;font-weight:700;padding:.4rem .2rem}

/* credencial */
.cred{background:linear-gradient(150deg,#1c1c1c 0%,#2a1210 55%,var(--r-dk) 130%);color:#fff;border-radius:20px;padding:1.3rem 1.3rem 1.4rem;position:relative;overflow:hidden;box-shadow:0 10px 30px -12px rgba(0,0,0,.5)}

.cred-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.cred-brand{font-weight:800;letter-spacing:.02em;font-size:1rem}

.cred-chip{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:.28rem .55rem;border-radius:999px}
.chip-on{background:rgba(29,158,117,.25);color:#7ff0c8;border:1px solid rgba(29,158,117,.5)}
.chip-off{background:rgba(229,72,77,.22);color:#ff9a9a;border:1px solid rgba(229,72,77,.5)}

.cred-num{font-size:1.5rem;font-weight:800;letter-spacing:.08em;margin-top:.9rem;font-variant-numeric:tabular-nums;position:relative;z-index:1}
.cred-num-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:.05rem}
.cred-grid{display:flex;gap:1.4rem;margin-top:1rem;position:relative;z-index:1;flex-wrap:wrap}

.row .rl{font-size:.8rem;color:var(--ink2);font-weight:600}
.row .rv{font-size:.9rem;font-weight:700;text-align:right}

.btn-emerg{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:var(--r);color:#fff;font-weight:800;font-size:1.15rem;padding:1.05rem;border-radius:16px;text-decoration:none;margin-top:1.3rem;box-shadow:0 8px 20px -8px rgba(220,20,0,.6)}

.hint{display:flex;gap:.65rem;align-items:flex-start;background:#fff7ee;border:1px solid #f3d9b8;border-radius:14px;padding:.8rem .9rem;margin-top:1.2rem;font-size:.8rem;color:#8a5a10;line-height:1.45}

/* estados especiales */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.6rem;gap:.8rem}

.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--r);border-radius:50%;animation:sp .8s linear infinite}

<script>
/* ============================================================
   MEDICAR — App del Socio (PWA). Etapa 23 — esqueleto.
   Login SOLO afiliado + credencial digital (read-only).
   apiKey/firebaseConfig son públicos por diseño (frontend).
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCXCkuaFC_8qMPAEIUlBoQiv7hBgFDq1iw",
  authDomain: "medicar-sistema.firebaseapp.com",
  projectId: "medicar-sistema",
  storageBucket: "medicar-sistema.firebasestorage.app",
  messagingSenderId: "598531879440",
  appId: "1:598531879440:web:b630a162e9adb5981b9095"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const TEL_EMERG = '443044';
const ICON = 'icon.svg';

// Estado mínimo de la vista.
const S = { view:'boot', err:'', busy:false, cred:null, deferredPrompt:null, chk:null };
const el = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function set(patch){ Object.assign(S, patch); render(); }

/* ---------- Utilidades de credencial ---------- */
function nombreDe(per, u){
  const ap=(per&&per.apellido||'').trim(), no=(per&&per.nombre||'').trim();
  const full=[ap,no].filter(Boolean).join(', ');
  return full || (u&&u.nombre) || 'Socio/a';
}
function fmtDni(d){ const s=String(d||'').replace(/\D/g,''); if(!s) return '—'; return s.replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function tipoLbl(t){ return t==='corporativo'?'Corporativo':(t==='directo'?'Directo':(t||'—')); }

/* ---------- Monitoreo N1: fechas y estado del chequeo semanal ---------- */
function tsMs(t){ if(!t) return null; if(t.toMillis) return t.toMillis(); if(t.seconds!=null) return t.seconds*1000; if(typeof t==='number') return t; return null; }
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function startOfDay(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
function prefDateThisWeekMs(prefDay){
  const now=new Date();
  const weekStart=startOfDay(now.getTime()) - now.getDay()*86400000; // domingo 00:00 de esta semana
  return weekStart + (prefDay||0)*86400000;
}
// c = credencial ok. Regla: hay cuestionario activo Y no respondió en los últimos 7 días Y hoy >= su día
// preferido de esta semana -> pendiente. nextMs = próxima fecha de chequeo.
function chequeoEstado(c){
  if(!c || !c.cuestionario) return { activo:false, pending:false };
  const now=Date.now();
  const dueMs=prefDateThisWeekMs(c.prefDay||0);
  const answered7 = c.lastRespMs!=null && (now - c.lastRespMs) < 7*86400000;
  const llegoElDia = now >= dueMs;
  const pending = !answered7 && llegoElDia;
  const nextMs = (now>=dueMs) ? dueMs + 7*86400000 : dueMs;
  return { activo:true, pending, answered7, dueMs, nextMs };
}
function fmtFecha(ms){ if(ms==null) return '—'; const d=new Date(ms); return DIAS[d.getDay()]+' '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2); }

/* ---------- WHO-5 (Índice de Bienestar OMS) — MÓDULO SELLADO, redacción oficial ----------
   Versión oficial en español (OMS · WHO-5, versión 1998), alojada por la OMS (cdn.who.int) —
   © Psychiatric Research Unit, WHO Collaborating Center for Mental Health, Hillerød. Redacción VERBATIM.
   NO editable desde el armador (el armador solo tiene un flag incluirWHO5). El encabezado temporal
   "durante las últimas dos semanas" SE MANTIENE textual (parte de la validación), aunque el chequeo sea
   semanal. Corregidos 2 typos evidentes del PDF oficial (flaggeados a la dirección médica): encabezado
   "la últimas"→"las últimas", ítem 4 "descandado"→"descansado". */
const WHO5 = {
  intro: 'Por favor, indicá para cada una de las cinco afirmaciones cuál define mejor cómo te has sentido durante las últimas dos semanas. Cifras mayores significan mayor bienestar.',
  encabezado: 'Durante las últimas dos semanas:',
  items: [
    'Me he sentido alegre y de buen humor',
    'Me he sentido tranquilo y relajado',
    'Me he sentido activo y enérgico',
    'Me he despertado fresco y descansado',
    'Mi vida cotidiana ha estado llena de cosas que me interesan'
  ],
  // Escala oficial de 6 opciones (valor 5..0, labels verbatim).
  opciones: [ [5,'Todo el tiempo'], [4,'La mayor parte del tiempo'], [3,'Más de la mitad del tiempo'], [2,'Menos de la mitad del tiempo'], [1,'De vez en cuando'], [0,'Nunca'] ],
  copyright: '© Psychiatric Research Unit, WHO Collaborating Center for Mental Health, Frederiksborg General Hospital, DK-3400 Hillerød',
  UMBRAL: 52 // score < 52 = bienestar bajo (raw < 13 ×4); indicación de evaluación — fuente OMS
};
// Heurística de regularidad (documentada): ≥1 respuesta histórica Y (última > 14 días O ≤2 de las últimas 4 semanas).
function regularidadFloja(c){
  if(!c || !(c.histCount>=1)) return false;
  const now=Date.now();
  const masDe14 = c.lastRespMs!=null && (now-c.lastRespMs) > 14*86400000;
  const pocas4wk = (c.respLast4wk||0) <= 2;
  return masDe14 || pocas4wk;
}

/* ---------- Carga de datos del socio ---------- */
async function cargarCredencial(uid){
  const uDoc = await db.collection('usuarios').doc(uid).get();
  if(!uDoc.exists) return { estado:'sin-vinculo', u:null };
  const u = uDoc.data();
  if(u.rol !== 'afiliado') return { estado:'no-afiliado', u };
  const personaId = u.personaId;
  if(!personaId) return { estado:'sin-vinculo', u };

  // Identidad (persona)
  let per = {};
  try{ const p = await db.collection('personas').doc(personaId).get(); if(p.exists) per = p.data(); }catch(_){}

  // Afiliación (socio por personaId; se prefiere la activa)
  let socio = null;
  try{
    const snap = await db.collection('socios').where('personaId','==',personaId).get();
    if(!snap.empty){
      const arr = snap.docs.map(d=>({id:d.id, ...d.data()}));
      socio = arr.find(s=>s.activo!==false) || arr[0];
    }
  }catch(_){}

  // Plan (catálogo)
  let planNombre = '';
  if(socio && socio.planId){
    try{ const pl = await db.collection('planes').doc(socio.planId).get(); if(pl.exists) planNombre = pl.data().nombre || ''; }catch(_){}
  }

  // Monitoreo N1: cuestionario ACTIVO (si hay varios, el más reciente) + última respuesta de esta persona.
  let cuestionario = null;
  try{
    const cs = await db.collection('cuestionarios').where('activo','==',true).get();
    if(!cs.empty){
      const arr = cs.docs.map(d=>({id:d.id, ...d.data()}));
      arr.sort((a,b)=> (tsMs(b.creadoEn)||0) - (tsMs(a.creadoEn)||0));
      cuestionario = arr[0];
    }
  }catch(_){}
  let lastRespMs = null, histCount = 0, respLast4wk = 0;
  try{
    const now = Date.now();
    const rs = await db.collection('respuestas_cuestionario').where('personaId','==',personaId).get();
    rs.docs.forEach(d=>{
      const ms=tsMs(d.data().creadoEn);
      histCount++;
      if(ms!=null){
        if(lastRespMs==null || ms>lastRespMs) lastRespMs=ms;
        if((now-ms) <= 28*86400000) respLast4wk++; // respuestas en las últimas 4 semanas (regularidad)
      }
    });
  }catch(_){}
  const prefDay = (typeof u.prefRecordatorio==='number' && u.prefRecordatorio>=0 && u.prefRecordatorio<=6) ? u.prefRecordatorio : 0;

  return { estado:'ok', u, per, socio, planNombre, personaId, cuestionario, lastRespMs, prefDay, histCount, respLast4wk };
}

/* ---------- Auth flow ---------- */
auth.onAuthStateChanged(async user => {
  if(!user){ set({ view:'login', cred:null, busy:false }); return; }
  set({ view:'boot' });
  try{
    const cred = await cargarCredencial(user.uid);
    if(cred.estado === 'no-afiliado'){ set({ view:'no-afiliado', cred }); return; }
    if(cred.estado === 'sin-vinculo'){ set({ view:'sin-vinculo', cred }); return; }
    set({ view:'home', cred });
  }catch(e){
    set({ view:'error-carga', err:(e&&e.message)||String(e) });
  }
});

async function doLogin(){
  if(S.busy) return;
  const email=(el('em')?.value||'').trim();
  const pw=el('pw')?.value||'';
  if(!email || !pw){ set({ err:'Ingresá tu email y contraseña.' }); return; }
  set({ busy:true, err:'' });
  try{
    await auth.signInWithEmailAndPassword(email, pw);
    // onAuthStateChanged toma el control.
  }catch(e){
    const code=(e&&e.code)||'';
    const msg = /wrong-password|user-not-found|invalid-credential|invalid-email/.test(code)
      ? 'Email o contraseña incorrectos.'
      : (/too-many-requests/.test(code) ? 'Demasiados intentos. Probá más tarde.' : 'No se pudo ingresar. Revisá tu conexión.');
    set({ busy:false, err:msg });
  }
}
function salir(){ auth.signOut(); }

/* ---------- PWA install ---------- */
let _installShown=false;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); S.deferredPrompt=e; if(S.view==='home') render(); });
window.addEventListener('appinstalled', () => { S.deferredPrompt=null; if(S.view==='home') render(); });
async function instalar(){
  const dp=S.deferredPrompt; if(!dp) return;
  dp.prompt(); try{ await dp.userChoice; }catch(_){}
  S.deferredPrompt=null; render();
}
function esStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

/* ---------- Iconos inline ---------- */
const IC = {
  phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
  share:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'
};

/* ---------- Vistas ---------- */
function loginView(){
  return `<div class="login">
    <div class="login-bg">+</div>
    <div class="login-top">
      <img class="login-logo" src="${ICON}" alt="MEDICAR">
      <div class="login-h1">MEDI<em>CAR</em></div>
      <div class="login-sub">Emergencias médicas · Pergamino</div>
    </div>
    <div class="sheet">
      <h2>Ingresá con tu cuenta de socio</h2>
      <div class="err ${S.err?'on':''}">${esc(S.err)}</div>
      <div class="field"><label>Email</label><input id="em" type="email" inputmode="email" autocomplete="email" placeholder="tucorreo@ejemplo.com"></div>
      <div class="field"><label>Contraseña</label><input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <button class="btn-r" onclick="doLogin()">${S.busy?'Ingresando…':'Ingresar'}</button>
      <div class="foot-note">Esta app es exclusiva para socios de MEDICAR.<br>Ante una emergencia llamá al <b>${TEL_EMERG}</b>.</div>

}

function bootView(){ return `<div class="center"><div class="spin"></div><p>Cargando tu credencial…</p></div>`; }

function noAfiliadoView(){
  return `<div class="center">
    <div class="big">🔒</div>
    <h3>Esta app es para socios</h3>
    <p>Tu cuenta no es una cuenta de socio de MEDICAR. Si sos parte del personal, usá el sistema interno.</p>
    <button class="btn-r" onclick="salir()">Salir</button>
  </div>`;
}

function sinVinculoView(){
  return `<div class="center">
    <div class="big">🔗</div>
    <h3>Tu cuenta aún no está vinculada</h3>
    <p>Todavía no asociamos tu cuenta con tu ficha de socio. Contactá a MEDICAR para completar la vinculación.</p>
    <a class="btn-r" href="tel:${TEL_EMERG}" style="text-decoration:none;display:inline-block;text-align:center">Llamar a MEDICAR — ${TEL_EMERG}</a>

function errorCargaView(){
  return `<div class="center">
    <div class="big">⚠️</div>
    <h3>No pudimos cargar tu credencial</h3>

    <button class="btn-r" onclick="location.reload()">Reintentar</button>
    <button class="btn-o" onclick="salir()">Salir</button>
  </div>`;
}

function homeView(){
  const c=S.cred||{}; const per=c.per||{}; const u=c.u||{}; const socio=c.socio||null;
  const nombre=nombreDe(per,u);
  const activo = socio ? (socio.activo!==false) : false;
  const numero = socio && socio.numeroAfiliado ? socio.numeroAfiliado : '—';
  const plan = c.planNombre || '—';
  const tipo = socio ? tipoLbl(socio.tipoAfiliado) : '—';
  const estadoChip = socio
    ? (activo ? `<span class="cred-chip chip-on">Activo</span>` : `<span class="cred-chip chip-off">Inactivo</span>`)
    : `<span class="cred-chip chip-off">Sin afiliación</span>`;

  // contacto (solo lectura)
  const contacto = [
    ['Teléfono', per.telefono||''],
    ['Domicilio', per.direccion||''],
    ['Email', per.email||u.email||'']
  ].filter(r=>r[1]).map(r=>`<div class="row"><span class="rl">${r[0]}</span><span class="rv">${esc(r[1])}</span></div>`).join('')
    || `<div class="row"><span class="rl">Sin datos de contacto cargados</span><span class="rv"></span></div>`;

  // hint de instalación
  let instalBlock='';
  if(esStandalone()){
    instalBlock = `<div class="installed">✓ App instalada en tu teléfono</div>`;
  }else if(S.deferredPrompt){
    instalBlock = `<button class="btn-o" style="margin-top:1.2rem" onclick="instalar()">＋ Agregar MEDICAR a mi pantalla de inicio</button>`;
  }else{
    instalBlock = `<div class="hint">${IC.share}<div>Agregá <b>MEDICAR</b> a tu pantalla de inicio para tenerla siempre a mano: tocá el menú <b>Compartir</b> del navegador y elegí <b>“Agregar a inicio”</b>.</div></div>`;
  }

  const sinAfilNota = socio ? '' : `<div class="foot-note" style="color:var(--o)">No encontramos tu ficha de afiliación. Contactá a MEDICAR para regularizarla.</div>`;

  return `<div class="home">
    <div class="topbar">
      <img src="${ICON}" alt="">
      <div class="tb-t">MEDI<em>CAR</em></div>
      <div class="tb-sp"></div>
      <button class="mini" onclick="salir()">Salir</button>
    </div>

    <div class="cred">
      <div class="cred-top">
        <div class="cred-brand">MEDI<em>CAR</em> · Credencial</div>
        ${estadoChip}
      </div>
      <div class="cred-name">${esc(nombre)}</div>
      <div style="margin-top:.9rem;position:relative;z-index:1">
        <div class="cred-num-lbl">N° de afiliado</div>
        <div class="cred-num">${esc(numero)}</div>
      </div>
      <div class="cred-grid">
        <div class="cred-cell"><div class="cc-l">DNI</div><div class="cc-v">${esc(fmtDni(per.dni))}</div></div>
        <div class="cred-cell"><div class="cc-l">Plan</div><div class="cc-v">${esc(plan)}</div></div>
        <div class="cred-cell"><div class="cc-l">Tipo</div><div class="cc-v">${esc(tipo)}</div></div>
      </div>
    </div>
    ${sinAfilNota}

    ${homeChequeoBlock(c)}

    <div class="sec">
      <div class="sec-h">Mis datos de contacto</div>
      <div class="card">${contacto}</div>
    </div>

    <a class="btn-emerg" href="tel:${TEL_EMERG}">${IC.phone}<span>EMERGENCIAS<span class="em-sub">Llamar al ${TEL_EMERG}</span></span></a>

    ${instalBlock}

    <div class="footer">
      <div class="foot-note">Credencial digital · Solo lectura.<br>Los datos los administra MEDICAR.</div>
    </div>
  </div>`;
}

/* ---------- Chequeo semanal (Monitoreo N1) ---------- */
function homeChequeoBlock(c){
  const st=chequeoEstado(c);
  if(!st.activo) return ''; // sin cuestionario activo → no se muestra nada
  const prefSel=`<select onchange="guardarPref(this.value)" style="padding:.4rem .5rem;border:1.5px solid var(--line);border-radius:8px;font-size:.85rem;background:#fff">`+
    DIAS.map((d,i)=>`<option value="${i}" ${((c.prefDay||0)===i)?'selected':''}>${d}</option>`).join('')+`</select>`;
  let body;
  if(st.pending){
    body=`<div style="background:linear-gradient(135deg,#DC1400,#B01000);color:#fff;border-radius:16px;padding:1.1rem 1.15rem">
      <div style="font-weight:800;font-size:1.05rem">Tenés tu chequeo semanal 📝</div>
      <div style="font-size:.82rem;opacity:.92;margin-top:.25rem;line-height:1.4">Contanos cómo pasaste la semana. Son unas pocas preguntas.</div>
      <button onclick="abrirChequeo()" style="margin-top:.85rem;width:100%;background:#fff;color:var(--r);font-weight:800;font-size:.95rem;padding:.75rem;border-radius:10px;border:none;cursor:pointer">Responder ahora</button>
    </div>`;
  }else if(st.answered7){
    body=`<div class="card" style="padding:1rem"><div style="font-weight:700;color:var(--g)">✓ Ya respondiste esta semana</div>
      <div style="font-size:.8rem;color:var(--ink2);margin-top:.3rem">Gracias. Tu próximo chequeo: <b>${fmtFecha(st.nextMs)}</b>.</div></div>`;
  }else{
    body=`<div class="card" style="padding:1rem"><div style="font-weight:700">Tu próximo chequeo</div>
      <div style="font-size:.8rem;color:var(--ink2);margin-top:.3rem"><b>${fmtFecha(st.dueMs)}</b>. Te avisamos acá.</div></div>`;
  }
  // Aviso de regularidad (suave, no bloquea): heurística documentada en regularidadFloja().
  const regBanner = regularidadFloja(c)
    ? `<div style="display:flex;gap:.55rem;align-items:flex-start;background:#fff7ee;border:1px solid #f3d9b8;border-radius:12px;padding:.7rem .8rem;margin-top:.6rem;font-size:.78rem;color:#8a5a10;line-height:1.45">💡<div>La regularidad es importante: responder cada semana nos ayuda a mantener una lógica médica sobre tu estado de salud.</div></div>`
    : '';
  return `<div class="sec">
    <div class="sec-h">Chequeo semanal</div>
    ${body}
    ${regBanner}
    <div style="display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-top:.6rem;padding:0 .2rem">
      <span style="font-size:.76rem;color:var(--ink2)">Día de recordatorio</span>${prefSel}
    </div>
  </div>`;
}
async function guardarPref(v){
  const day=parseInt(v,10); if(isNaN(day)||day<0||day>6) return;
  const uid=auth.currentUser&&auth.currentUser.uid; if(!uid) return;
  if(S.cred) S.cred.prefDay=day; // optimista
  render();
  try{ await db.collection('usuarios').doc(uid).set({ prefRecordatorio:day },{merge:true}); }
  catch(e){ console.warn('[pref] no se pudo guardar', e); }
}
function abrirChequeo(){
  const c=S.cred; if(!c||!c.cuestionario) return;
  S.chk={ open:true, answers:{}, who5:[null,null,null,null,null], pedido:false, motivo:'', err:'', busy:false };
  S.view='chequeo'; render();
}
function cerrarChequeo(){ S.chk=null; S.view='home'; render(); }
function chkSyncText(){
  const c=S.cred||{}; const q=c.cuestionario; if(!q||!S.chk) return;
  (q.preguntas||[]).forEach(p=>{ if(p.tipo==='texto'){ const e=el('chk-txt-'+p.id); if(e) S.chk.answers[p.id]=e.value.slice(0,200); } });
  const m=el('chk-motivo'); if(m) S.chk.motivo=m.value.slice(0,200);
}
function chkSet(pid,val){ if(!S.chk) return; chkSyncText(); S.chk.answers[pid]=val; render(); }
function chkWho5Set(i,val){ if(!S.chk) return; chkSyncText(); S.chk.who5[i]=val; render(); }
function chkTogglePedido(){ if(!S.chk) return; chkSyncText(); S.chk.pedido=!S.chk.pedido; render(); }
function chequeoFormView(){
  const c=S.cred||{}; const q=c.cuestionario;
  if(!q){ S.view='home'; return homeView(); }
  const A=(S.chk&&S.chk.answers)||{};
  // Bloque WHO-5 (sellado) PRIMERO, si el cuestionario activo lo incluye.
  let who5Block='';
  if(q.incluirWHO5){
    const W=(S.chk&&S.chk.who5)||[];
    const itemsHtml=WHO5.items.map((txt,i)=>{
      const opts=WHO5.opciones.map(([val,lbl])=>{
        const sel=W[i]===val;
        return `<button type="button" onclick="chkWho5Set(${i},${val})" style="display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;padding:.5rem .7rem;margin-bottom:.3rem;border-radius:8px;border:1.5px solid ${sel?'var(--r)':'var(--line)'};background:${sel?'var(--r)':'#fff'};color:${sel?'#fff':'var(--ink)'};font-size:.85rem;font-weight:${sel?'700':'500'};cursor:pointer"><span>${esc(lbl)}</span><span style="opacity:.6;font-size:.72rem">${val}</span></button>`;
      }).join('');
      return `<div class="sec" style="margin-top:.9rem"><div style="font-weight:700;font-size:.9rem;margin-bottom:.45rem">${i+1}. ${esc(txt)}</div>${opts}</div>`;
    }).join('');
    who5Block=`<div style="background:#f2f6fb;border:1px solid #d9e4f0;border-radius:14px;padding:.9rem .85rem;margin-top:1rem">
      <div style="font-weight:800;font-size:.92rem;color:#1a3a5c">Índice de Bienestar (OMS · WHO-5)</div>
      <div style="font-size:.78rem;color:var(--ink2);line-height:1.45;margin-top:.3rem">${esc(WHO5.intro)}</div>
      <div style="font-weight:700;font-size:.82rem;margin-top:.7rem">${esc(WHO5.encabezado)}</div>
      ${itemsHtml}
      <div style="font-size:.58rem;color:var(--ink3);margin-top:.8rem;line-height:1.4">${esc(WHO5.copyright)}</div>
    </div>`;
  }
  const preg=(q.preguntas||[]).map((p,i)=>{
    let ctrl='';
    if(p.tipo==='si_no'){
      const mk=(val,lbl)=>{ const sel=A[p.id]===val; return `<button type="button" onclick="chkSet('${p.id}',${val})" style="flex:1;padding:.65rem;border-radius:10px;border:1.5px solid ${sel?'var(--r)':'var(--line)'};background:${sel?'var(--r)':'#fff'};color:${sel?'#fff':'var(--ink)'};font-weight:700;font-size:.9rem;cursor:pointer">${lbl}</button>`; };
      ctrl=`<div style="display:flex;gap:.5rem">${mk(true,'Sí')}${mk(false,'No')}</div>`;
    }else if(p.tipo==='escala'){
      ctrl=`<div style="display:flex;gap:.4rem">`+[1,2,3,4,5].map(n=>{ const sel=A[p.id]===n; return `<button type="button" onclick="chkSet('${p.id}',${n})" style="flex:1;padding:.6rem 0;border-radius:10px;border:1.5px solid ${sel?'var(--r)':'var(--line)'};background:${sel?'var(--r)':'#fff'};color:${sel?'#fff':'var(--ink)'};font-weight:700;cursor:pointer">${n}</button>`; }).join('')+`</div><div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--ink3);margin-top:.2rem"><span>Mal</span><span>Excelente</span></div>`;
    }else{
      ctrl=`<input id="chk-txt-${p.id}" maxlength="200" value="${esc(A[p.id]||'')}" placeholder="Escribí acá (opcional)" style="width:100%;padding:.65rem .75rem;border:1.5px solid var(--line);border-radius:10px;font-size:.95rem">`;
    }
    return `<div class="sec" style="margin-top:1rem"><div style="font-weight:700;font-size:.92rem;margin-bottom:.5rem">${i+1}. ${esc(p.texto||'')}</div>${ctrl}</div>`;
  }).join('');
  // "Quiero que me contacten" al final (en TODO cuestionario).
  const ped=!!(S.chk&&S.chk.pedido);
  const contacto=`<div class="sec" style="margin-top:1.3rem">
    <button type="button" onclick="chkTogglePedido()" style="display:flex;align-items:center;gap:.6rem;width:100%;text-align:left;padding:.7rem .8rem;border-radius:10px;border:1.5px solid ${ped?'var(--r)':'var(--line)'};background:${ped?'#fff5f4':'#fff'};cursor:pointer">
      <span style="width:20px;height:20px;flex:none;border-radius:5px;border:2px solid ${ped?'var(--r)':'var(--ink3)'};background:${ped?'var(--r)':'#fff'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900">${ped?'✓':''}</span>
      <span style="font-size:.88rem;font-weight:700;color:var(--ink)">Me gustaría que un médico de MEDICAR me contacte</span>
    </button>
    ${ped?`<input id="chk-motivo" maxlength="200" value="${esc((S.chk&&S.chk.motivo)||'')}" placeholder="Motivo (opcional)" style="width:100%;margin-top:.5rem;padding:.6rem .75rem;border:1.5px solid var(--line);border-radius:10px;font-size:.9rem">`:''}
  </div>`;
  return `<div class="home">
    <div class="topbar">
      <img src="${ICON}" alt="">
      <div class="tb-t">Chequeo semanal</div>
      <div class="tb-sp"></div>
      <button class="mini" onclick="cerrarChequeo()">Cerrar</button>
    </div>
    <div style="font-size:.85rem;color:var(--ink2);line-height:1.45">Contanos cómo pasaste la semana. Tus respuestas ayudan al equipo médico de MEDICAR.</div>
    ${who5Block}
    ${preg}
    ${contacto}
    <div class="err ${S.chk&&S.chk.err?'on':''}" style="margin-top:1rem">${esc(S.chk&&S.chk.err||'')}</div>
    <button class="btn-r" style="margin-top:.8rem" onclick="enviarChequeo()">${S.chk&&S.chk.busy?'Enviando…':'Enviar'}</button>
    <button class="btn-o" style="margin-top:.6rem" onclick="cerrarChequeo()">Cancelar</button>
    <div class="footer"><div class="foot-note">Se registra una sola vez por semana.</div></div>
  </div>`;
}
async function enviarChequeo(){
  const c=S.cred||{}; const q=c.cuestionario; if(!q||!S.chk||S.chk.busy) return;
  chkSyncText();
  const A=S.chk.answers||{};
  // WHO-5 (si incluido): las 5 afirmaciones son obligatorias.
  if(q.incluirWHO5){
    const w=S.chk.who5||[];
    if(w.length!==5 || w.some(v=>v===null||v===undefined)){ S.chk.err='Respondé las 5 afirmaciones del Índice de Bienestar (OMS).'; render(); return; }
  }
  // si_no y escala obligatorias; texto opcional.
  const faltan=(q.preguntas||[]).filter(p=> (p.tipo==='si_no'||p.tipo==='escala') && (A[p.id]===undefined||A[p.id]===null));
  if(faltan.length){ S.chk.err='Respondé todas las preguntas (el texto es opcional).'; render(); return; }
  const respuestas=(q.preguntas||[]).map(p=>({ preguntaId:p.id, texto:p.texto||'', valor:(A[p.id]!==undefined?A[p.id]:'') }));
  const payload={
    cuestionarioId:q.id, cuestionarioNombre:q.nombre||'',
    personaId:c.personaId, personaNombre:nombreDe(c.per,c.u),
    respuestas,
    pedidoContacto: !!S.chk.pedido,
    motivoContacto: (S.chk.pedido && (S.chk.motivo||'').trim()) ? (S.chk.motivo||'').trim().slice(0,200) : null,
    creadoEn: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(q.incluirWHO5){
    const valores=S.chk.who5.map(v=>Number(v)||0);
    const raw=valores.reduce((a,b)=>a+b,0);
    payload.who5={ valores, raw, score: raw*4 }; // raw 0-25 → score 0-100 (raw×4)
  }
  S.chk.busy=true; S.chk.err=''; render();
  try{
    await db.collection('respuestas_cuestionario').add(payload);
    if(S.cred){ S.cred.lastRespMs=Date.now(); S.cred.histCount=(S.cred.histCount||0)+1; S.cred.respLast4wk=(S.cred.respLast4wk||0)+1; }
    S.chk=null; S.view='home'; render();
  }catch(e){
    // Feedback claro al socio, sin detalles técnicos. El botón queda re-habilitado (busy=false).
    console.warn('[chequeo] no se pudo enviar:', e);
    S.chk.busy=false;
    S.chk.err='No pudimos enviar tu chequeo. Probá de nuevo en un momento.';
    render();
  }
}

function render(){
  const root=el('app'); if(!root) return;
  let html='';
  switch(S.view){
    case 'login': html=loginView(); break;
    case 'no-afiliado': html=noAfiliadoView(); break;
    case 'sin-vinculo': html=sinVinculoView(); break;
    case 'error-carga': html=errorCargaView(); break;
    case 'home': html=homeView(); break;
    case 'chequeo': html=chequeoFormView(); break;
    default: html=bootView();
  }
  root.innerHTML=html;
  // Enter para enviar el login.
  const pw=el('pw'); if(pw){ pw.onkeydown=e=>{ if(e.key==='Enter') doLogin(); }; }
  const em=el('em'); if(em){ em.onkeydown=e=>{ if(e.key==='Enter') el('pw')?.focus(); }; }
}

render();

/* ---------- Service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('[sw] no se registró:', err));
  });
}
</script>
</body>
